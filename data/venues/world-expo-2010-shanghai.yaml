_comments: >
  No dedicated "world's fair / expo" venue type exists; closest fit is
  `other`, matching the existing world-expo-2020-dubai and
  world-expo-2025-osaka records. The expo ran May-October 2010 in Shanghai;
  most pavilions, including the Shanghai Corporate Pavilion, were
  dismantled after the run and the site has since been redeveloped.
