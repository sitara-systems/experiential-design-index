summary: >
  David Cronenberg: Evolution, a 5,000-square-foot retrospective exhibition
  on filmmaker David Cronenberg's career, opened November 1, 2013 at TIFF
  Bell Lightbox in Toronto with exhibit design by Reich+Petch, before
  traveling to Amsterdam, Lucca, and Prague through 2016.
description: >
  TIFF's first major original exhibition, curated by TIFF Director & CEO
  Piers Handling and former Artistic Director Noah Cowan, featured more
  than 300 original artifacts from Cronenberg's films.
