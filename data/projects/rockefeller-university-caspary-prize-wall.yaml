summary: >
  The Caspary Prize Wall, a donor and laureate recognition installation in
  the lobby of Caspary Auditorium at The Rockefeller University in New York
  City, was redesigned and expanded by C&G Partners, reopening January 2021
  with 78 stainless steel plaques honoring 58 Rockefeller-affiliated Nobel,
  Lasker, Gairdner, Breakthrough Prize, and National Medal of Science
  winners, alongside a companion donor recognition wall.
description: >
  The original prize wall was installed in 2008, honoring Nobel and Lasker
  laureates with hand-drawn "hedcut"-style portraits in a geodesic-dome-
  inspired triangular geometry echoing Caspary Auditorium's architecture. The
  2021 update, led by C&G Partners managing partner Jonathan Alger, expanded
  the criteria to additional prizes and added blank tiles for future
  honorees, with a projected 25-year lifespan. A magnetic mounting system
  allows plaques to be added and repositioned without disturbing the
  uniform triangular grid.
