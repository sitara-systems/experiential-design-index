summary: >
  "Memory Unearthed: The Lodz Ghetto Photographs of Henryk Ross" was on
  view February 25 through June 24, 2018 at the Museum of Jewish Heritage --
  A Living Memorial to the Holocaust in New York, curated by Maia-Mari
  Sutnik, with exhibition design by Pure+Applied.
description: >
  The traveling exhibition presented Henryk Ross's recovered photographic
  negatives documenting the Lodz Ghetto under Nazi occupation (1940-1945),
  alongside video, artifacts, and survivor testimonies.
