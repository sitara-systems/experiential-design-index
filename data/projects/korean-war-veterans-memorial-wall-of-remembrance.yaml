summary: >
  The Wall of Remembrance, an addition to the Korean War Veterans
  Memorial on the National Mall in Washington, D.C., was dedicated July
  27, 2022, adding over 43,000 American and Korean augmentee names;
  Hartman-Cox Architects and HealyKohler Design developed the interpretive
  and architectural elements, and Coldspring fabricated the granite
  panels.
description: >
  The addition includes wayside exhibits providing historical context,
  interpretive graphics and media, tactile maps of the memorial and the
  Korean Peninsula, and audio descriptions delivered via solar-powered
  speakers.
