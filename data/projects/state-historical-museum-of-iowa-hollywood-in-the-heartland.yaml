summary: >
  Hollywood in the Heartland, a 6,400-square-foot exhibition at the State
  Historical Museum of Iowa in Des Moines exploring Iowa's history with film
  and historic movie theaters, opened in February 2023 with interpretive
  planning, exhibit design, graphics, and media design by HealyKohler.
description: >
  The exhibition traces Iowa's on-screen and behind-the-scenes film history
  from the late 1800s to today, including the role of historic theaters in
  Iowa communities and the Academy Award won by Iowa native Cloris Leachman.
  HealyKohler's broader collaboration with the State Historical Society of
  Iowa also covers two other exhibitions on its own project page — "Riding
  Through History" (RAGBRAI's 40th anniversary) and "Iowa History 101" — but
  independent completion dates for those two could not be confirmed from
  public sources, so they are not recorded as separate entries here.
