summary: >
  Experience Center One, a four-story briefing center, conference hall, and
  technology-demonstration building on Microsoft's revamped East Campus in
  Redmond, Washington, opened in 2025 with architecture by WRNS Studio.
description: >
  The building is described as a public-facing destination for global
  visitors but operates on an invitation-only basis, hosting business
  clients and dignitaries on guided tours through AI-themed demonstration
  rooms; it succeeds Microsoft's prior Redmond visitor center.
