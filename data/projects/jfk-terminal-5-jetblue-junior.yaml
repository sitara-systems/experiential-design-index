summary: >
  JetBlue Junior, a 650-square-foot aviation-themed interactive play space
  for children ages 2-12, opened at JFK Airport's Terminal 5i in New York
  around the terminal's international-arrivals expansion in November 2014;
  base-building architecture by Gensler, exhibit and interpretive design by
  Lee H. Skolnick Architecture + Design Partnership, and media design by
  Unified Field.
description: >
  The space includes a cockpit flight simulator letting children pilot a
  Boeing 737 from New York to San Juan, interactive airplane-window
  displays of JetBlue destinations, a Concentration-style landmark memory
  game, an illustrated aviation-history timeline, and a reading nook. The
  play space has since closed (confirmed no longer operating as of 2021).
