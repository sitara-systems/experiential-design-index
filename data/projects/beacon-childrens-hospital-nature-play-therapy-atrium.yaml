summary: >
  The Nature Play & Therapy Atrium, a 2,845 sq ft nature-themed play and
  physical-therapy space at Beacon Children's Hospital in South Bend,
  Indiana, opened with the hospital in 2017; exhibit design by Peter Hyde
  Design.
description: >
  A large-scale oak tree sculpture, scope stations to find animals, touch
  and sound quizzes, and natural percussion instruments fill the main
  floor; a treehouse and related activities continue on the balcony,
  giving pediatric patients and their families a nature-themed space to
  play, spend time together, and undergo physical therapy.
