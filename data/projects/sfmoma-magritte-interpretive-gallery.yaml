summary: >
  The Magritte Interpretive Gallery, an augmented-reality installation
  designed and developed by frog for SFMOMA's "René Magritte: The Fifth
  Season" exhibition (San Francisco, May 19–October 28, 2018), used
  depth-sensing and motion-tracking cameras to power six AR "digital
  windows" inspired by the window motif in Magritte's paintings, in which
  visitors' reflections behaved unexpectedly or opened into alternate-reality
  scenes.
