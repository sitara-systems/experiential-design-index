summary: >
  Poverty Encounter, a four-room immersive walkthrough experience at
  Children's Hunger Fund's warehouse facility in Sylmar, California, opened
  December 8, 2018, designed by Visioneering Studios (architecture) and
  Storyland Studios (exhibit design). It received a 2020 Thea Award for
  Outstanding Achievement in the Limited Budget category.
description: >
  Visitors board a simulated airplane and move through four recreated
  developing-world environments — a Guatemala City dump, earthquake-damaged
  Haitian streets, a Nepali brickyard, and a Romanian underground sewer —
  before packing food for children living in poverty.
