technologies:
  - telescopic viewing stations
summary: >
  Mars Encounter, an exhibition timed to Mars's close opposition to Earth,
  opened at Chabot Space & Science Center in Oakland, California in August
  2003, designed by West Office Exhibition Design.
description: >
  Visitors observed Mars through telescopic viewing stations and accessed
  real data from past and current Mars missions during the August 2003 close
  opposition, when the planet came closer to Earth than usual; the exhibit
  drew large crowds to the Center's telescopes that month.
