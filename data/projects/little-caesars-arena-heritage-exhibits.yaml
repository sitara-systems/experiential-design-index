summary: >
  Heritage exhibits and a team store woven through the concession arcade of
  Little Caesars Arena in Detroit, tracing Red Wings and Pistons history,
  opened with the arena September 5, 2017; exhibit design by CambridgeSeven,
  lighting design by Eos Lightmedia.
