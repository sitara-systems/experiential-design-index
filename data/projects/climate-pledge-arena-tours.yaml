summary: >
  TOURS @ Climate Pledge Arena, a 75-minute guided behind-the-scenes tour of
  Climate Pledge Arena in Seattle, Washington, went on public sale in
  January 2023, designed by BRC Imagination Arts.
description: >
  The tour visits the owner's suite, press bridge, private suites, dressing
  rooms, and arena floor, built around the arena's sustainability story as
  the first International Living Future Institute-certified zero-carbon
  arena.
