    note: >
      Developed the museum's strategic Master Plan (completed 2017),
      including market research and visitor focus-group studies, that set
      the interpretive and design direction the 2022 renovation carried out.
  - firm: reich-petch
    role: interpretive-planning
    note: "Developed the Interpretive Master Plan and fundraising materials for the capital campaign."
  - firm: reich-petch
    role: exhibit-design
    note: "Designed the permanent exhibits and common spaces; oversaw fabrication and installation."
  - firm: reich-petch
    role: architecture
    note: "Retail and branding experience design (interior architecture) for the 8,800 sq. ft. café and retail redesign."
  - firm: reich-petch
    role: graphics-wayfinding
    note: "Wayfinding and donor recognition design."
  - firm: kubik-maltbie
    role: fabrication
    note: "Exhibit fabricator, per Eos Lightmedia's own project page."
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Design-build specialty lighting for the renovated galleries, working
      with Kubik Maltbie: concept and technical lighting design, equipment
      supply, system integration, commissioning, programming, and focus,
      including integrated case lighting and overhead track lighting.
technologies: []
summary: >
  The Delaware Museum of Nature & Science (formerly the Delaware Museum of
  Natural History) in Wilmington, Delaware reopened May 23, 2022 after a
  $10.8 million, 17-month renovation that gutted and rebuilt its permanent
  galleries, café, and retail spaces; Reich+Petch led the master planning,
  interpretive planning, exhibit design, interior architecture, and
  wayfinding/donor-recognition design.
description: >
  The museum closed at the end of 2020 for the renovation; all exhibits in
  place since 1972 were removed and the galleries rebuilt from the studs,
  including the Regional Journey Gallery, the Alison K. Bradford Global
  Journey Gallery, and the Ellice & Rosa McDonald Foundation PaleoZone.
