summary: >
  The Old Faithful Visitor Education Center in Yellowstone National Park,
  Wyoming, opened August 25, 2010, replacing a 1970s-era facility; BBI
  Engineering installed the center's AV systems, including an earthquake
  monitor, interactive map kiosks, and a surround-sound theater, as part of
  a decade-long AV relationship with the National Park Service spanning
  Yellowstone's Canyon, Old Faithful, and Mammoth visitor centers.
