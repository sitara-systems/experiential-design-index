id: smithsonian-if-then-she-can-exhibit
name: "#IfThenSheCan – The Exhibit"
venue: smithsonian-arts-and-industries-building
project_type: temporary-exhibition
year_completed: 2022
credits:
  - firm: amaze-design
    role: exhibit-design
  - firm: group-delphi
    role: fabrication
    note: "statue production credited generally, not fabricator-of-record for every statue"
summary: >
  "#IfThenSheCan – The Exhibit," a display of 120 statues of women STEM
  innovators at the Smithsonian's Arts and Industries Building, Smithsonian
  Castle, Enid A. Haupt Garden, National Air and Space Museum, and National
  Museum of Natural History in Washington, DC, March 5–27, 2022; design by
  Amaze Design, with fabrication by Group Delphi, sponsored by Lyda Hill
  Philanthropies and the American Association for the Advancement of
  Science's IF/THEN initiative.
description: >
  The largest single-exhibition collection of statues of women ever
  presented and the largest 3D-printed project of its kind, featuring
  life-size statues of AAAS IF/THEN Ambassadors — STEM role models for
  middle-school girls — each with a QR code linking to information about the
  woman depicted. The exhibit toured earlier as pop-up displays at Dallas
  Love Field and NorthPark Center (2020–2021) before its full 2022
  installation at the Smithsonian.
sources:
