summary: >
  The Walmart Visitor Center (later renamed the Walmart Museum), a 6,000 sq
  ft museum and retail space at the site of Sam Walton's original store in
  Bentonville, Arkansas, reopened in May 2011 after a renovation and
  expansion with exhibit design by Ralph Appelbaum Associates and
  fabrication/installation by kubik maltbie, featuring an AV theater,
  interactive galleries, a recreated Sam Walton office, and a company
  timeline.
