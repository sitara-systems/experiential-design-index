summary: >
  Gothenburg View, the observation deck atop Karlatornet in Gothenburg,
  Sweden, opened June 2026; SOM won the tower's 2014 international
  design competition, with Copenhagen firm Entasis as collaborating
  architect. The deck includes a cantilevered glass viewing platform, a
  glass-bottom balcony, and exhibitions on the tower's construction and
  the city's skyline.
