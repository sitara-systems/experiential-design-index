summary: >
  The DaVinci Discovery Center of Science and Technology (the predecessor
  name of the DaVinci Science Center) opened a 10,000 sq ft exhibit hall in
  Allentown, Pennsylvania in 2005 built around Leonardo da Vinci's
  principles of curiosity and inquiry, with exhibit design by J. Jensen
  Design and graphics by Proun Design.
description: >
  A color-coded graphic system inspired by scientific flow charts organizes
  hands-on learning stations around three of da Vinci's principles:
  Curiosità (seek the truth), Sensazione (sharpen awareness), and
  Arte/Scienza (cultivate balance).
sources:
