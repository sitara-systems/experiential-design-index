id: wells-visitor-center-ice-cream-parlor
name: Wells Visitor Center & Ice Cream Parlor Renovation
venue: wells-visitor-center
project_type: major-renovation
year_completed: 2019
credits:
  - firm: peter-hyde-design
    role: exhibit-design
    note: "Thematic design, exhibits, and commercial interior design"
summary: >
  Wells Enterprises (maker of Blue Bunny ice cream) reopened its renovated
  Wells Visitor Center & Ice Cream Parlor in Le Mars, Iowa, in 2019;
  thematic design, exhibits, and interior design by Peter Hyde Design.
description: >
  The renovated facility includes an interactive ice cream parlor, a
  visitor center, a theater, an event space, and exhibits on Blue Bunny
  heritage, Le Mars history, and the "Farm to Spoon" ice cream production
  and distribution story.
