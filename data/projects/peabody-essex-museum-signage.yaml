summary: >
  Signage at PEM, a directional, digital, and donor recognition signage
  program spanning the Peabody Essex Museum's architecturally varied
  buildings in Salem, Massachusetts, was designed by C&G Partners to
  accompany the museum's 40,000-square-foot Ennead Architects-designed
  expansion, which opened September 28, 2019.
description: >
  Digital kiosks built to resemble shipbuilding batten-seam paneling provide
  wayfinding and event updates, while cut steel letterforms carry wayfinding
  and donor recognition messaging throughout the connected historic and new
  structures, drawing on the museum's maritime heritage.
