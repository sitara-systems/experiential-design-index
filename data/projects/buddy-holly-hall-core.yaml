summary: >
  The Buddy Holly Hall of Performing Arts and Sciences, a two-theatre
  performing arts center in Lubbock, Texas, opened in September 2021,
  designed by Diamond Schmitt Architects with local associate architects
  Parkhill and MWM Architects; a Finalist in Fast Company's 2022 Innovation
  by Design Awards, Spaces and Places category.
description: >
  The complex houses the 2,175-seat Helen DeVitt Jones Theater and the
  425-seat Crickets Theater, named for Buddy Holly's backing band, along with
  a sculpture garden and event spaces. Theatre planning and acoustics were
  led by Schuler Shook (lighting/theatre design) and Jaffe Holden Acoustics;
  general contractor was Lee Lewis Construction. The building's faceted glass
  and metal facade draws on the layered rock formations of nearby Texas
  canyons.
