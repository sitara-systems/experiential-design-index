summary: >
  The NC State Athletics Walk of Fame & History, a Hall of Fame and
  Athletics Hall of Fame exhibit built into the $35 million renovation of
  Reynolds Coliseum at NC State University in Raleigh, North Carolina,
  opened in August 2016, with exhibition, graphic, and media design by
  HealyKohler Design.
description: >
  Custom court-facility improvements and wayfinding signage accompany
  large-scale graphics, interactive media displays, and artifact
  collections celebrating athletic accomplishments across the university's
  sports programs; a large multi-screen interactive at the main entrance
  introduces the university's newest star athletes, with dedicated spaces
  for NC State Hall of Famers, Olympians, and professional athletes.
