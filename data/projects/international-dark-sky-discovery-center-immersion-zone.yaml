summary: >
  The International Dark Sky Discovery Center, a $25 million,
  23,000-sq-ft observatory and STEM education facility in Fountain
  Hills, Arizona, broke ground April 8, 2024 and is expected to open in
  2026; architecture by Swaback Architects + Planners, with the
  building's Immersion Zone exhibit hall designed and fabricated by
  Split Rock Studios.
description: >
  The facility includes a 27.5-inch PlaneWave telescope in a domed
  observatory, a 65-seat planetarium, and a multipurpose auditorium,
  alongside the 3,300-sq-ft Immersion Zone exhibit space dedicated to
  STEM education and dark sky preservation.
