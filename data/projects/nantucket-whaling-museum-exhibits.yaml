summary: >
  A major restoration and expansion of the Nantucket Whaling Museum, the
  operational center for the Nantucket Historical Association's properties
  in Nantucket, Massachusetts, completed in 2005; exhibit design by Amaze
  Design, with architecture by Martin Sokoloff, fabrication by Art Guild, and
  lighting design by Luce Group.
description: >
  The exhibits explore Nantucket's whaling heritage across four thematic
  areas — Making a Living, Peopling the Island, Ideologies, and The Island
  Resort — and include a 46-foot sperm whale skeleton, a 28-foot authentic
  19th-century whaleboat, an 1849 Fresnel lens, and the restored 1847 Hadwen
  & Barney Oil and Candle Factory.
