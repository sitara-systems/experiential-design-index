summary: >
  The Stuart A. Rose Manuscript, Archives, and Rare Book Library (then
  MARBL), a 15,000 sq ft renovated space on the 10th floor of Emory
  University's Robert W. Woodruff Library in Atlanta, Georgia, opened in
  fall 2015 after a roughly 15-month renovation; Collins Cooper Carusi
  Architects designed the building renovation and HealyKohler Design
  designed the exhibits and interpretive media.
description: >
  The renovation created a branded and interpretive experience integrated
  with the building's architecture, including a secure Reading Room,
  Woodruff Commons, learning spaces, and gallery/exhibit areas featuring
  artifact collections, interactive media, and large-scale graphics
  guiding visitors through the archival research process.
