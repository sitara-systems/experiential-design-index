summary: >
  The Georgia Aquarium, a 550,000-square-foot, $250 million aquarium in
  Atlanta, Georgia, opened November 23, 2005, as the world's largest
  aquarium at the time; architecture by TVS (Thompson, Ventulett, Stainback
  & Associates), exhibit design by PGAV Destinations, and lighting design by
  Fisher Marantz Stone.
description: >
  The original aquarium building includes seven galleries of immersive
  aquatic habitats, anchored by the Ocean Voyager gallery's viewing window
  (25 feet high by 65 feet long, among the largest in the world at opening).
  PGAV Destinations designed and supervised construction of all aquaria,
  animal exhibits, and interpretive elements across the facility.
