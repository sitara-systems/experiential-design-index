summary: >
  "Gold Mountain: Chinese Californian Stories," a signature exhibition on the
  history and contributions of Chinese Americans in California, opened at
  The California Museum in Sacramento on January 26, 2020; HGA designed the
  gallery renovation, with exhibit design by West Office Exhibition Design,
  fabrication by Cinnabar, AV integration by BBI Engineering, and AV media
  production by Full Frame Productions.
description: >
  The exhibition documents the history of Chinese immigrants who came to
  California in search of opportunity during the Gold Rush era — known to
  them as "Gold Mountain" — and stayed to help build the modern state,
  covering their impact on California's economy, governance, and culture
  from the 1840s to the present through historic artifacts, photographs,
  interactive video stations, games, and a custom-designed dragon.
