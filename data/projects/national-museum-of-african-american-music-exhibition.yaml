summary: >
  The National Museum of African American Music, a 56,000-square-foot
  museum tracing 400 years of African American musical heritage, opened
  January 30, 2021 in Nashville, Tennessee, with exhibit design and content
  development by Gallagher & Associates.
description: >
  The museum's own credits page also names Donna Lawrence Productions,
  Available Light, RomeAntics, Mind Over Data, Communications Electronic
  Design, Clair Solutions, and Don Hardin Group as project collaborators;
  roles for several are not stated precisely enough to assign a
  delivery-stack role and are omitted here rather than guessed (Available
  Light and RomeAntics already hold firm records/ids in this index from
  other projects, so the omission here is only about role-specificity for
  this particular project, not identity).
