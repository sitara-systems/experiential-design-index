summary: >
  Olson Kundig designed the exhibition and spatial fit-out of the Holocaust
  Center for Humanity's downtown Seattle location, which opened October 18,
  2015, nearly tripling the organization's previous exhibit space.
description: >
  The 3,200-square-foot space features immersive exhibits built around
  personal narratives of Pacific Northwest Holocaust survivors, including
  window graphics with survivor portraits, a reflective entry dome, an Anne
  Frank annex with a hinged-bookshelf installation, and interactive
  historic artifacts.
