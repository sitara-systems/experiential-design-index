id: chicago-riverwalk-wwii-submarine-veterans-memorial
name: World War II Submarine Veterans Memorial
venue: chicago-riverwalk
project_type: installation
year_completed: 2019
credits:
  - firm: chicago-scenic-studios
    role: fabrication
    note: "Project management, fabrication, and installation; refurbished the USS Trout watertight door and fabricated custom benches"
technologies:
  - restored historic submarine hardware
summary: >
  World War II Submarine Veterans Memorial, a monument honoring submarines
  built in Manitowoc, Wisconsin and transported through the Chicago River
  to the Pacific theater, was installed on Chicago's Riverwalk in 2019;
  fabricated and installed by Chicago Scenic Studios with design by Frank
  Voznak III, funded by submarine veterans groups Crash Dive Base and USS
  Chicago Base.
description: >
  Features a refurbished watertight door from the USS Trout submarine and
  custom benches made from submarine-grade materials including teakwood.
sources:
  - https://www.chicagoscenic.com/projects/world-war-ii-submarine-veterans-memorial
