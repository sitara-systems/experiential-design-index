summary: >
  Exhibiting the Universe, over 20,000 sq ft of permanent astronomy exhibits at
  Griffith Observatory in Los Angeles, California, opened November 2, 2006 as
  part of the observatory's renovation and expansion, with exhibit design by
  C&G Partners (then Chermayeff & Geismar) and building architecture by Pfeiffer
  Partners (as Hardy Holzman Pfeiffer Associates) with Levin & Associates
  Architects.
description: >
  The exhibition spans the observatory's public spaces with the "Big Picture"
  (a 150-foot porcelain enamel wall bearing the largest astronomical image ever
  created at the time), sculptural planetary models, the Hall of the Eye with
  Pepper's Ghost dioramas on the history of observation, an interactive
  periodic table with elemental samples, a scale model of the solar system
  built into the sidewalk paths, and outdoor elements aligned to solstices and
  equinoxes.
