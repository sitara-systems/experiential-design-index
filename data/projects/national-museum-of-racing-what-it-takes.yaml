summary: >
  The National Museum of Racing and Hall of Fame in Saratoga Springs, New
  York reopened September 5, 2020 with a reimagined Hall of Fame anchored by
  the 360-degree film "What It Takes: Journey to the Hall of Fame"; Gallagher
  & Associates led exhibition design, Donna Lawrence Productions produced the
  film, Available Light provided lighting, and Electrosonic served as
  technical director and AV integrator.
