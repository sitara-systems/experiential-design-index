summary: >
  The S.S. Keewatin Gallery, a 1,450-square-foot permanent exhibit on the
  Edwardian-era passenger liner S.S. Keewatin and the Canadian Pacific
  Railway's Great Lakes steamship service, opened in 2024 at the Great
  Lakes Museum in Kingston, Ontario, with exhibit design and interpretive
  planning by Reich+Petch.
description: >
  The gallery recreates the ship's deck using vintage design elements from
  CPR's historical marketing materials; the S.S. Keewatin itself, launched
  in Scotland in 1907, is berthed at the museum's site.
