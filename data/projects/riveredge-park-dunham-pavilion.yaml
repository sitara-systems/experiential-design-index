summary: >
  The John C. Dunham Pavilion at RiverEdge Park, an outdoor amphitheater on
  the Fox River in downtown Aurora, Illinois, opened in 2013 following a
  2012 construction start, designed by Muller & Muller with landscape
  architecture and urban design by Terry Guen Design Associates and theatre
  lighting design by Schuler Shook.
description: >
  RiverEdge Park (renamed Thomas J. Weisner RiverEdge Park in 2016) grew out
  of a 2007 master plan and design competition won by a team led by Terry
  Guen Design Associates. Muller & Muller designed the John C. Dunham
  Pavilion and associated structures; Schuler Shook designed the pavilion
  and pedestrian lighting, including the programmable color-changing
  lighting on the curved cedar-slat sound/screen wall, and coordinated with
  Talaske (then Talaske Sound Thinking) on sound and acoustic engineering.
  The first phase cost roughly $18.5 million. Capacity figures vary by
  source between roughly 6,000 (pavilion seating) and 8,500-10,500 (total
  park capacity including lawn areas).
