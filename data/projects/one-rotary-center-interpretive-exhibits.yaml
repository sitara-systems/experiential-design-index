summary: >
  Rotary International's world headquarters at One Rotary Center in
  Evanston, Illinois, added new interpretive and exhibit spaces across
  multiple floors, including a public lobby exhibit, completed in 2022;
  design by Peter Hyde Design.
description: >
  The project developed a cohesive interpretive narrative across the
  building's public-facing floors and strengthened the street-level
  presence of the lobby and building entrance; the resulting lobby exhibit
  is open to the public.
