id: one-rotary-center-interpretive-exhibits
name: One Rotary Center Interpretive and Exhibit Spaces
venue: one-rotary-center
project_type: new-exhibition
year_completed: 2022
credits:
  - firm: peter-hyde-design
    role: exhibit-design
  - firm: peter-hyde-design
