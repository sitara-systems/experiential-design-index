summary: >
  Connected Worlds, a large-scale gesture- and touch-driven interactive
  ecosystem simulation by Design I/O, opened June 27, 2015 in the New York
  Hall of Science's Great Hall in Queens, NY; visitors use physical logs to
  redirect a shared water supply across an interactive floor and plant seeds
  by hand across six wall-projected habitats linked by a projected
  waterfall, with real-time visitor actions shaping the ecosystem's health.
