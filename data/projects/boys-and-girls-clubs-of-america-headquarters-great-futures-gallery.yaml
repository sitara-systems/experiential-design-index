summary: >
  The Great Futures Gallery, a visitor and donor gallery at Boys & Girls
  Clubs of America's national headquarters in Atlanta, opened in June 2024,
  featuring a Hall of Heroes, an Alumni Hall of Fame, a club-member art wall,
  and a personalized split-flap display honoring the organization's history
  and alumni; Crafted Action led the Experiential Master Plan and exhibit
  design, with architecture and environmental graphic design by NELSON
  Worldwide and AV integration by AVI-SPL.
description: >
  The gallery replaced BGCA's prior headquarters space and was completed on
  a six-month timeline ahead of the organization's annual conference. It
  highlights notable alumni including Denzel Washington, Shaquille O'Neal,
  and Condoleezza Rice.
