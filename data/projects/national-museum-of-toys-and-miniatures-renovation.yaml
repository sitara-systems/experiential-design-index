summary: >
  The National Museum of Toys and Miniatures in Kansas City, Missouri
  reopened in August 2015 after an 18-month, $8 million renovation, with
  exhibit design by West Office Exhibition Design and architecture by Helix
  Architecture + Design.
description: >
  West Office worked with Helix Architecture + Design on a master plan that
  reimagined the decades-old Kansas City museum, improving circulation
  throughout the building and reinterpreting the museum's 72,000-object
  collection through new displays and interactive exhibits covering toys and
  fine-scale (1/12th scale) miniatures. The project won an AASLH Leadership
  in History Award.
