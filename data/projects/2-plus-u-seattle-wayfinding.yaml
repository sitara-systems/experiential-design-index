summary: >
  2+U, a mixed-use office tower and public plaza in downtown Seattle
  developed by Skanska Commercial Development, opened in 2021 with
  environmental graphics and wayfinding designed by Studio Matthews for
  architect Pickard Chilton.
description: >
  Studio Matthews created a playful visual language for the "urban village"
  at street level, taking the plus sign from the 2+U logo and using it both
  visually and conceptually to unify signage across the public plaza and
  office towers above, turning what could have been purely regulatory
  boundary markers into welcoming wayfinding. This was named 1 of 4
  honorees in Communication Arts' 62nd Design Annual (2021), Environmental
  Graphics category.
