  AT&T Stadium, the 80,000-seat home of the Dallas Cowboys in Arlington,
  Texas, opened May 27, 2009, designed by HKS with lead architect Bryan
  Trubey; at completion its twin center-hung video screens, manufactured by
  Mitsubishi Electric, were the largest high-definition displays in the
  world.
