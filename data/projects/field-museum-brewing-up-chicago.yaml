summary: >
  Brewing Up Chicago: How Beer Transformed a City, a temporary exhibition
  on beer's role in Chicago's 19th-century history, opened at the Field
  Museum in Chicago in November 2018 (ran through January 2020); media
  development by Angle Park with fabrication, installation, and project
  management by Chicago Scenic Studios.
description: >
  A four-section exhibition featuring interactive elements, historical
  artifacts including an original Siebel brewing kettle and Chicago Fire
  items, videos, and media installations.
