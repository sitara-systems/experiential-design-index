summary: >
  World of Life, one of two core hands-on science galleries that opened at
  the California Science Center in Los Angeles in February 1998, was
  designed by West Office Exhibition Design and centers on the BodyWorks
  Theater's 50-foot animatronic figure, Tess.
description: >
  The World of Life gallery examines biological systems shared across
  organisms, including respiration and reproduction. Its centerpiece,
  BodyWorks Theater, features a 50-foot animated character named Tess that
  demonstrates homeostasis through functioning heart, lung, circulatory, and
  nervous-system displays, and lets visitors compare human body systems to
  those of other animals.
