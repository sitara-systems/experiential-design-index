summary: >
  Ancient Americas, a 19,000-square-foot permanent exhibition displaying
  2,300 artifacts spanning over 12,000 years of history, opened at the Field
  Museum in Chicago, IL, in 2007, designed by Thinc Design.
description: >
  The exhibition organizes artifacts around stages of cultural complexity to
  show patterns of development in ancient American societies.
