summary: >
  "New Humans: Memories of the Future," the New Museum's inaugural
  exhibition in its expanded New York building, is on view through
  August 23, 2026, featuring artist Anicka Yi bringing autonomous
  aerial "aerobe" machines from her 2021 Tate Modern commission to a
  second venue, with the artificial-life system re-grounded for the new
  space by Sitara Systems.
description: ""
_comments: >
  NOT independently corroborated: four independent press reviews of the
  exhibition (ARTnews, ArtReview, Apollo, Artforum) and Anicka Yi
  Studio's own site name no technology credit for this venue
  specifically; the only place Sitara is credited for aerobe work at all
  (SEGD) explicitly covers Tate Modern only. Re-verified 2026-07-22
  against the live production
  https://www.sitara.systems/new-museum-new-humans/ (site launched at
  DNS cutover) — credits (Anicka Yi Studio, Sitara) and the "through
  August 23, 2026" run date both confirmed unchanged from the draft.

  CORRECTED 2026-07-21 per Nathan (two rounds): (1) Airstage was NOT a
  collaborator on this project — their aerobe fabrication was for the
  original Tate commission only — removed as a credit entirely, along
  with the "Airstage's control layer" claim that was in the sitara-
  systems credit's note. (2) this venue's flight-control tracking used
  OptiTrack, not Pozyx — Pozyx (UWB) was specific to the original Tate
  installation; New Museum's re-grounded system used different tracking
  hardware. Do not assume the Tate Modern record's Pozyx credit is also
  wrong — Nathan corrected only this project.
