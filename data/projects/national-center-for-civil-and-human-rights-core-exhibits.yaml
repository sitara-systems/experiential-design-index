summary: >
  The National Center for Civil and Human Rights, a 53,000 sq ft museum in
  Atlanta, opened June 23, 2014; architecture was by The Freelon Group in
  partnership with HOK, exhibit design was by Rockwell Group, and Second
  Story produced interactive installations with Design & Production
  Incorporated and History Associates, and batwin + robin produced the
  museum's linear media pieces.
