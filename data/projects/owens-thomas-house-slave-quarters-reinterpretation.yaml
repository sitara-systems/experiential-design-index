  Telfair Museums' Owens-Thomas House & Slave Quarters in Savannah,
  Georgia reopened November 17, 2018 after an NEH-sponsored restoration
  and re-curation that shifted interpretation to center the enslaved
  people who lived on the site, with exhibit design work by Andrew
  Merriell & Associates.
