summary: >
  "Becoming Texas: Our Story Begins Here," a renovation of the Bullock
  Texas State History Museum's first-floor Texas History Galleries in
  Austin covering more than 16,000 years of Texas history, opened in
  December 2018, with media content by Northern Light Productions.
description: >
  Northern Light Productions produced a large-scale projected map program
  and an animated map depicting Spanish Catholic missions and settlements
  for the renovated galleries, and separately produced three films on the
  story of the La Belle shipwreck and its recovery, featuring animations,
  historian interviews, and conservation footage, along with iPad-based
  interactive kiosks (with Terra Incognita) for the museum's La Belle
  exhibit.
