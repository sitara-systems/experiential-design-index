summary: >
  Leonard Bernstein: The Power of Music, a centennial exhibition on the
  composer and conductor's life, Jewish identity, and social activism, opened
  March 16, 2018 at the National Museum of American Jewish History (now the
  Weitzman National Museum of American Jewish History) in Philadelphia, with
  interactive media by Dome.
description: >
  Curated by Ivy Weingram, the exhibition presented roughly 100 historic
  artifacts and photographs alongside original films and immersive sound
  installations, framing Bernstein's life through his search for a solution
  to what he considered the twentieth century's crisis of faith. Dome
  designed an interactive table of building blocks and two films exploring
  his influence and social activism. The exhibition ran through September 2,
  2018 before touring nationally.
