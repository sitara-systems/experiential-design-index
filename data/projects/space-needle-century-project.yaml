id: space-needle-century-project
name: The Century Project
venue: space-needle
project_type: major-renovation
year_completed: 2018
credits:
  - firm: olson-kundig
    role: architecture
technologies:
  - rotating glass floor
  - floor-to-ceiling glass observation deck
summary: >
  Olson Kundig led The Century Project, a major renovation of Seattle's
  Space Needle unveiled in summer 2018, adding the world's first rotating
  glass floor, floor-to-ceiling glass barriers on the observation deck, and
  a new glass stairway and elevators.
description: >
  The renovation increased the amount of glazing in the structure by 196%
  and won Olson Kundig the American Institute of Architects' 2022 National
  Architecture Honor Award. Distinct from the 2014 SkyPad interactive
  installation (see the separate SkyPad project record), this project is
  the building-wide architectural renovation of the observation deck and
  restaurant level.
sources:
