summary: >
  AlegreMENTE | Happy Brain, a bilingual Spanish-English traveling
  exhibition about early childhood brain development created by OMSI's
  design and fabrication teams under an NIH SEPA grant, premiered at the
  Oregon Museum of Science and Industry in Portland, Oregon on September
  14, 2021 before beginning its national tour; Glowbox created the
  "Everybody Dance Now" motion-driven interactive within it.
