summary: >
  The Grove, a corporate briefing center for Google in Redwood City,
  California, opened in 2018, designed by TAIT (via its Thinkwell Group
  studio) in partnership with Google's Experience Studio team, with AV
  integration across thirteen spaces by Electrosonic; the space is themed
  around the nearby coastal redwood forests and won a 2020 World-Class
  Center Award from the Association of Briefing Program Managers.
