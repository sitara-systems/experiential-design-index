summary: >
  Exterior environmental graphics and interpretive elements for the East
  Boston Branch of the Boston Public Library, a new 15,000-square-foot
  branch building in Boston, Massachusetts designed by William Rawn
  Associates and opened in November 2013, with graphics by Arrowstreet.
description: >
  Arrowstreet worked in consultation with lead architect William Rawn
  Associates on the branch's environmental graphics, including interpretive
  panels for a stormwater garden with custom graphics and symbols, and 21
  engraved pavers along the building's Reading Porch identifying the top
  countries of origin for East Boston residents. The branch later received a
  2018 Boston Society of Architects Citation Award.
