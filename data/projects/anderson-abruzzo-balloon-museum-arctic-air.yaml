summary: >
  "Arctic Air: The Bold Flight of S.A. Andrée," an exhibit on S.A. Andrée's
  failed 1897 balloon expedition to the North Pole, opened in 2016 at the
  Anderson-Abruzzo Albuquerque International Balloon Museum as part of the
  museum's tenth-anniversary celebration, with exhibit design by Andrew
  Merriell & Associates (referred to on the firm's own site as "A Doomed
  Expedition").
