summary: >
  "Folk City: New York and the Folk Music Revival" opened June 17, 2015 at
  the Museum of the City of New York, curated by Stephen Petrus and Sarah
  Henry, with exhibition design and catalogue design by Pure+Applied.
description: >
  The exhibition traced New York's role in the folk music revival from the
  1930s-40s through the 1950s-60s, featuring original instruments,
  handwritten lyrics, and interactive video and listening stations.
