summary: >
  The Legacy Museum, built by the Equal Justice Initiative on the site of a
  former slave warehouse in Montgomery, Alabama, opened April 26, 2018,
  tracing the throughline from slavery to lynching, segregation, and mass
  incarceration; master planning, exhibit design, and media design by Local
  Projects (the original 2018-2021 iteration of the museum, later expanded).
