summary: >
  A 6,600 sq ft gallery expansion at the Indiana Basketball Hall of Fame in
  New Castle, Indiana, reopened December 12, 2024; exhibit design by Peter
  Hyde Design, content development by Fleming Museum Consulting, media
  production and AV integration by Silver Oaks, and exhibit fabrication by
  Pinpoint Productions.
description: >
  The expansion, which broke ground in October 2023, added a new Archive
  Room, an expanded Enshrinement Gallery, a History of Women's Basketball
  in Indiana/Title IX exhibit, an "Officials: You Make the Call"
  interactive, a 270-degree immersive "Game Day" experience, and a
  revamped "Make Your Last Shot" feature; admission became free with a
  sponsorship from Henry Community Health.
