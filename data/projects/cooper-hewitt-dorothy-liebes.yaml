summary: >
  "A Dark, A Light, A Bright: The Designs of Dorothy Liebes," a 6,000-
  square-foot retrospective of textile designer Dorothy Liebes spanning the
  museum's entire second floor, opened at Cooper Hewitt, Smithsonian Design
  Museum in New York City in 2023, designed by Isometric Studio.
description: >
  The exhibition design includes loom-inspired thresholds, ash-wood display
  platforms with green cord, and monumental casework referencing studio
  work tables, showcasing over 175 textiles, furniture pieces, documents,
  and photographs.
