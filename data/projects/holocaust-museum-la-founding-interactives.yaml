summary: >
  Memory Pool and 18 Camps, two permanent interactive installations in the
  opening galleries of Holocaust Museum LA (then the Los Angeles Museum of
  the Holocaust) in Los Angeles, California, opened with the museum's new
  Pan Pacific Park building on October 14, 2010; Potion designed and
  fabricated both interactives, working with interactive strategy consultant
  Variate Labs, in a building designed by Belzberg Architects.
description: >
  Memory Pool is a tabletop touchscreen installation displaying archival
  photographs and testimony of pre-war European Jewish families; 18 Camps is
  a field of interactive screens in the museum's Holocaust gallery, each
  screen devoted to a specific concentration camp. Potion also produced a
  companion handheld Spatial Audio Guide for the museum, not separately
  recorded here.
