summary: >
  The Centier Bank Museum, a corporate history museum in the bank's
  original Whiting, Indiana branch, opened in 2021 for the bank's 125th
  anniversary; exhibit design by Peter Hyde Design.
description: >
  The museum traces the history of the family-owned Centier Bank from
  founder Henry Schrage's arrival in Whiting through the present, using
  photos, artifacts, and stories, including a 126-year-old concrete
  entrance arch, a vintage safe, and a 1875 bank ledger.
