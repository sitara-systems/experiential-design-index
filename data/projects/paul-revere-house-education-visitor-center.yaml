summary: >
  The Education and Visitor Center at Lathrop Place, a new building
  adaptively reusing two 1835-36 rowhouses adjacent to the Paul Revere
  House in Boston's North End, opened December 2016; architecture by Mills
  Whitaker Architects, with exhibit design and fabrication credited by
  Mystic Scenic Studios to Neal Mayer and itself respectively.
description: >
  The center added classroom and exhibit space, including a diorama of
  Paul Revere's silver shop, plus offices and accessible restrooms
  previously unavailable at the historic house museum. The $4.1 million
  project won the 2017 Boston Preservation Alliance Preservation
  Achievement Award and the 2019/2020 Boston Society of Architects Honor
  Award for Accessible Design. Independent sources confirm the architect
  and the award; the exhibit-design and fabrication credits come from
  Mystic Scenic Studios' own published awards list rather than an
  independent project page.
