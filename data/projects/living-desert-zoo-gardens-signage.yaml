summary: >
  Taylor Studios developed a bilingual (English/Spanish) interpretive master
  sign plan for Living Desert Zoo & Gardens, a New Mexico State Parks site
  in Carlsbad, completed in 2008, including custom maps and scientifically
  accurate illustrations of Chihuahuan Desert habitats and species.
description: >
  The project began with a site evaluation of existing outdoor signage and
  audience research to shape themes and narratives, resolving the challenge
  of concise bilingual panel text within New Mexico's Spanish-speaking
  visitor base.
sources:
