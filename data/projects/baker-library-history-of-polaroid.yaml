summary: >
  "At the Intersection of Science and Art: Edwin H. Land and the Polaroid
  Corporation, The Formative Years," the first exhibit in a planned
  trilogy on Polaroid's history, opened at Baker Library, Harvard Business
  School, Boston, Massachusetts, in 2017, with exhibit design by Proun
  Design, fabrication by WB Inc., and media production by Northern Light
  Productions.
description: >
  The exhibit chronicles Edwin Land's early years developing polarizing
  filter products, including military goggles and sunglasses, before he
  went on to invent the Polaroid instant camera, drawing on Baker
  Library's roughly 1.5-million-item Polaroid Corporation archive.
