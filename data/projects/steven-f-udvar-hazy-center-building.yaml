summary: >
  The Steven F. Udvar-Hazy Center, a 760,000 sq ft annex of the Smithsonian's
  National Air and Space Museum near Washington Dulles International Airport
  in Chantilly, Virginia, opened December 15, 2003; it was designed by HOK,
  which also designed the museum's original National Mall building.
description: >
  The Center comprises two large display hangars able to receive aircraft and
  spacecraft delivered directly from the adjacent airport. The aviation hangar
  suspends air- and spacecraft from arching steel trusses, each capable of
  supporting 20,000 pounds, beneath an artificial sky, with elevated
  observation areas for visitors. The Center displays roughly 3,000 artifacts,
  including Space Shuttle Discovery, the Enola Gay, the Concorde, and the
  SR-71 Blackbird.
