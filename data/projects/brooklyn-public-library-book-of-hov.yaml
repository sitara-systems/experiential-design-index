summary: >
  The Book of HOV, a tribute exhibition to Shawn "JAY-Z" Carter produced by
  Roc Nation, opened at the Brooklyn Public Library's Central Branch in
  Brooklyn, New York, in July 2023, designed by GENERAL IDEA.
description: >
  Woven throughout the library's 350,000-square-foot Central Branch, the
  exhibition presented archival objects from Jay-Z's career, including
  recording masters, photographs, stage wear, and awards. It drew more than
  600,000 visitors between July and December 2023, a 74% increase in the
  library's attendance over the same period the prior year. It received a
  2024 SEGD Global Design Award (Placemaking).
