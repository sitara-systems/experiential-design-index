summary: >
  Ghosted Structures, steel-frame representations of the houses and
  churches built by the formerly enslaved community of Mitchelville at
  Historic Mitchelville Freedom Park on Hilton Head Island, South Carolina,
  unveiled at a June 7, 2024 ribbon cutting as the first major built
  element of the park's $22.8 million master plan, with exhibit design by
  Proun Design and preservation landscape architecture by WLA Studio.
description: >
  The framed structures carry interpretive signage and a reproduction
  archaeological core sample, part of Phase 1 of the interpretation of the
  first self-governed freedman's town in America, established after Union
  forces freed the enslaved population of Hilton Head Island in 1861.
