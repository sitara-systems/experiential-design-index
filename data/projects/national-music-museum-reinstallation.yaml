summary: >
  The National Music Museum at the University of South Dakota in Vermillion
  reopened its first floor of permanent exhibitions on August 26, 2023,
  following a multi-year renovation of its historic Carnegie Library
  building; Luci Creative led exhibit design across 15,000 square feet and
  seven redesigned galleries, with content production by Northern Light
  Productions, AV integration by Electrosonic, and fabrication by Ravenswood
  Studio.
description: >
  The reinstallation redisplayed the museum's collection of over 600
  instruments (from holdings of over 15,000 worldwide), curating tactile and
  digital interactives, media, and soundscapes intended to broaden and
  diversify the museum's audience. The project also added the Lillibridge
  Wing, a new special-exhibitions gallery, performance hall, and gift shop.
