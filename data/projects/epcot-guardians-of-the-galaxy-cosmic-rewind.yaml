id: epcot-guardians-of-the-galaxy-cosmic-rewind
name: "Guardians of the Galaxy: Cosmic Rewind"
venue: epcot
project_type: installation
year_completed: 2022
credits:
  - firm: pgav-destinations
    role: architecture
    note: >
      Credited by PGAV Destinations as "Architect of Record": coordinated
      the designs from multiple Walt Disney Imagineering teams (ride,
      interiors, show) for cohesive integration, devised construction
      methods meeting code/budget/schedule, while Walt Disney Imagineering
      (an in-house Disney design unit, not an independent firm with its own
      record in this index) led the ride, show, and interior design.
technologies:
  - reverse-launch roller coaster (OmniCoaster spinning ride vehicles)
  - trackless-feel show scenes
  - large-scale projection and animatronics
summary: >
  Guardians of the Galaxy: Cosmic Rewind, an enclosed reverse-launch roller
  coaster attraction with individually spinning "OmniCoaster" ride vehicles,
  opened May 27, 2022, at EPCOT in the Walt Disney World Resort, Lake Buena
  Vista, Florida; PGAV Destinations served as Architect of Record,
  coordinating the building design across Walt Disney Imagineering's ride,
  interior, and show teams, which led the attraction's creative and ride
  design.
description: >
  The attraction required a new show building constructed with 960
  truckloads of concrete for foundation and floor systems and an enclosed
  bridge spanning a road for site access; it won a Thea Award for
  Outstanding Achievement in a New Attraction. PGAV's public project page
  describes a coordination/architect-of-record role rather than creative or
  ride design credit, which sits with Walt Disney Imagineering.
sources:
  - https://pgavdestinations.com/project/guardians-of-the-galaxy-epcot/
  - https://en.wikipedia.org/wiki/Guardians_of_the_Galaxy:_Cosmic_Rewind
