summary: >
  "Maine Eats!," an exhibition on Maine's regional food culture at the
  Maine Historical Society in Portland, opened March 2018, with graphics by
  Proun Design and graphic fabrication by MegaPrint.
description: >
  The exhibition explores Maine foods from lobster to Italian sandwiches to
  whoopie pies alongside food insecurity and the farm-to-table movement,
  with interactive elements including a "Guess That Smell" station and a
  giant sandwich photo opportunity.
