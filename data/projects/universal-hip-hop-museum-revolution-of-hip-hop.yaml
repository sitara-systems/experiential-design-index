summary: >
  "[R]Evolution of Hip Hop," a 2,400 sq ft preview exhibit for the Universal
  Hip Hop Museum, opened in September 2022 at Bronx Terminal Market in the
  Bronx, New York, across the street from the museum's future permanent
  home; the exhibit was designed, fabricated, and built by Brooklyn studio
  Collab.
description: >
  A pop-up preview of the future Universal Hip Hop Museum covering hip-hop's
  1986-1990 "golden era," featuring a 24-foot light-and-music tunnel, an
  interactive virtual-graffiti experience, a 15-foot-wide working replica of
  a JVC RC-M90 boombox, live DJ sets, and period artifacts including concert
  posters, cassette tapes, and stage outfits. Named an honoree of the
  Experience Design category in Fast Company's 2023 Innovation by Design
  Awards.
