summary: >
  Engineering Design Workshop, Powered by MathWorks, a permanent exhibition
  at the Museum of Science, Boston, opened in 2021 as part of the museum's
  Blue Wing transformation; Northern Light Productions produced its film
  content.
description: >
  Northern Light Productions developed six short films called "Engineering
  Stories" demonstrating how professionals apply engineering to real-world
  problem-solving, filmed at locations ranging from robotics facilities to
  climbing gyms, featuring hand-drawn animations and origami-inspired
  animated titles.
