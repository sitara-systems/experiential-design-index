summary: >
  The Student Welcome Center at the University of Oregon in Eugene, an
  experiential admissions and welcome space built around the "Rewarding
  Curiosity" concept, opened in January 2022; it was designed by Advent and
  includes fifteen interactive discovery lockers, a projection-mapped
  "enchanted book," a working postcard mail room, and an alumni library.
