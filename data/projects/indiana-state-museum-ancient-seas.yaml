summary: >
  Ancient Seas, a reimagined permanent exhibit at the Indiana State
  Museum in Indianapolis, opened June 8, 2024; exhibit design by Split
  Rock Studios, with projection-mapped media and augmented reality by
  Boston Productions and fabrication support from Bowen Technovation.
description: >
  The exhibit showcases more than 200 fossils from ancient forests and
  shallow seas that once covered Indiana, combining physical specimens
  with 3D animation, sweeping environmental projection, and digital
  interactives such as building a crinoid.
