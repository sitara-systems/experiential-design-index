summary: >
  The University of Michigan Museum of Natural History opened new
  permanent galleries in the university's new Biological Sciences Building
  in Ann Arbor, Michigan, on April 14, 2019 (remaining galleries opened
  November 10, 2019); architecture by Ennead Architects and SmithGroup,
  with exhibition planning, design, and fabrication by the Great Plains
  Exhibit Development joint venture of Lord Cultural Resources, Taylor
  Studios, and Xibitz.
description: >
  The museum relocated from its prior 90-year-old building into a new
  seven-story facility shared with two university biology departments,
  engaging the Great Plains joint venture (also responsible for the North
  Dakota Heritage Center expansion) in 2014 to design, build, and manage
  more than 13 new exhibitions, including a Digital Dome Theater with
  planetarium capabilities.
