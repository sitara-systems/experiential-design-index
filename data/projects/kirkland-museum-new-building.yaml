summary: >
  Olson Kundig designed a new 38,500-square-foot building for the Kirkland
  Museum of Fine & Decorative Art in Denver's Golden Triangle district,
  which opened to the public March 10, 2018, with 65% more gallery space
  than the museum's previous home.
description: >
  The museum's collection includes more than 30,000 works, including the
  nation's largest repository of Colorado art. Vance Kirkland's original
  1910–1911 studio and art-school building was relocated intact to the new
  site and preserved as part of the larger museum.
