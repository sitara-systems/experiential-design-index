summary: >
  de Youngsters Studio is a free, permanent interactive children's gallery at
  the de Young Museum in San Francisco, conceptually designed by Yves
  Behar's fuseproject and realized by Tellart, which opened December 1,
  2018.
description: >
  The studio comprises five hands-on activity stations exploring
  fundamental art-making concepts -- color, composition, shape and form,
  texture, and sculpture -- aimed at children ages 3-8 exploring alongside
  an accompanying adult.
