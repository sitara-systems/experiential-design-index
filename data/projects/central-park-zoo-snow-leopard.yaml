    note: "on other credits; per Hadley's own portfolio"
summary: >
  The Allison Maher Stern Snow Leopard Exhibit at the Wildlife Conservation
  Society's Central Park Zoo in New York City opened June 11, 2009, funded by
  a $7 million gift from Allison and Leonard Stern, with fabrication by
  Hadley Exhibits.
description: >
  The $10.6 million exhibit was the first new feature at the zoo since its
  1988 renovation, incorporating behavioral-enrichment features including
  heated rocks, shaded caves and trees, fog, and a waterfall. Public sources
  (WCS press materials and press coverage) name the funding and opening
  details but do not identify an exhibit designer or architect of record;
  only Hadley's own portfolio documents its fabrication role.
