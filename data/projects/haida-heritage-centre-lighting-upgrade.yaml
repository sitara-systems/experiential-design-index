id: haida-heritage-centre-lighting-upgrade
name: Haida Heritage Centre Exhibit Lighting Upgrade
venue: haida-heritage-centre
project_type: exhibition-refresh
year_completed: 2021
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Delivered a comprehensive exhibit-lighting upgrade introducing LED
      technology for sustainability and artifact conservation; Eos
      Lightmedia partners also created the original 2007 lighting design
      for the Centre.
technologies:
  - LED lighting retrofit
summary: >
  The Haida Heritage Centre at Kay Llnagaay, an interpretive museum and
  cultural complex for the Haida Nation in Skidegate, British Columbia,
  which opened in 2007 with an original lighting design by Eos Lightmedia
  partners, received a comprehensive LED exhibit-lighting upgrade from Eos
  Lightmedia in 2021.
description: >
  The upgrade was completed during peak COVID-19 restrictions, delivered on
  time to keep the Centre operational and eligible for essential funding.
sources:
  - https://www.eoslightmedia.com/work/124
