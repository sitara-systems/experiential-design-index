summary: >
  Red Ape Rain Forest, a multi-level orangutan habitat at the Los Angeles Zoo
  and Botanical Gardens in Los Angeles, California, opened in 2000, exhibit
  design by CLR Design (led by Jon Coe) and fabrication by Hadley Exhibits.
description: >
  The exhibit recreates a Southeast Asian rainforest with elevated platforms,
  fire-hose hammocks, bridges, and vines, and introduced flexible mesh chute
  and linkage systems for animal management later adopted at other zoos
  worldwide.
