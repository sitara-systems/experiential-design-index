id: los-angeles-zoo-red-apes-of-the-rainforest
name: Red Ape Rain Forest (Red Apes of the Rainforest)
venue: los-angeles-zoo
project_type: new-exhibition
year_completed: 2000
credits:
  - firm: clr-design
    role: exhibit-design
    note: "No firm record yet; led by Jon Coe"
  - firm: hadley-exhibits
    role: fabrication
