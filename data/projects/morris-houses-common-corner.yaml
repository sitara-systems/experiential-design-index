summary: >
  Common Corner, a community-co-designed multi-zone gathering space
  transforming underutilized concrete bleachers at the Morris Houses public
  housing development in the Bronx, NY, opened in December 2025; it was
  designed and fabricated by The Urban Conga with NYCHA, the Community
  Housing Fund, the Center for Justice Innovation, and resident co-design
  workshops.
