summary: >
  An interactive "iWall" exhibit on the Regulus 1 cruise missile opened
  June 2018 at the Intrepid Sea, Air & Space Museum in Manhattan, with
  content by Perfect Prototype and fabrication by Art Guild.
description: >
  A touch-screen monitor slides along a track in front of a continuous
  series of images, letting visitors explore the Regulus 1's history,
  propulsion, and warhead through video and digital content.
