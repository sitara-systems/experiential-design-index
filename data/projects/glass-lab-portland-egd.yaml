summary: >
  The Glass Lab, an adaptive reuse of a former Morehouse Glass Company
  factory into a creative-office building, opened November 2019 in
  Portland, Oregon's Innovation Quadrant, with architecture and environmental
  graphics by Tryba Architects.
description: >
  Tryba Architects preserved original industrial elements — two overhead
  cranes and etched-glass features — while introducing a brand identity,
  signage system, and large exterior supergraphic that reference the site's
  history as the Morehouse Glass Company. The project won a 2021 SEGD Global
  Design Award Merit Award in the Placemaking and Identity category.
