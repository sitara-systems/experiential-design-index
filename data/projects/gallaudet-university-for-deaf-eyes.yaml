summary: >
  An Experience "For Deaf Eyes," the multimedia visitor experience inside
  the Maguire Welcome Center at Gallaudet University in Washington, D.C.,
  was designed by C&G Partners under DeafSpace design principles, opening
  April 9, 2018.
description: >
  Working in partnership with Gallaudet's Campus Design and Facilities office
  and architects Dangermond Keane Architecture, C&G Partners incorporated
  more than 150 DeafSpace design elements addressing touch points between
  deaf experience and the built environment, including artistic
  representations of ASL movement, soft diffused lighting, neon friezes, an
  informational ceiling chandelier, and interactive tables, maps, and
  tablets.
