summary: >
  A series of interpretive exhibits transforming Derby Wharf at Salem
  Maritime National Historic Site in Salem, Massachusetts into an
  educational corridor spanning five historical eras opened in 2011, with
  exhibit design by Wondercabinet Interpretive Design, graphics by Proun
  Design, and fabrication by Mystic Scenic Studios.
description: >
  Custom illustrated trade cargo groupings, trade maps, and view tubes
  depict the wharf's evolution from the American Revolution through the
  Industrial Revolution, with interactive elements for sail furling,
  compass navigation, semaphore signaling, and knot-tying.
