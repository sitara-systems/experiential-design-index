summary: >
  "Shall Not Be Denied: Women Fight for the Vote" opened June 4, 2019 at the
  Library of Congress in Washington, D.C., on the 100th anniversary of the
  Senate's passage of the suffrage amendment, with exhibition design and
  branding by Pure+Applied and exhibition video by Upswell.
description: >
  Curated by Janice E. Ruth and Carroll Johnson-Welsh, the exhibition used
  backlit lenticular street-protest imagery, artifact displays, and an
  interactive digital table exploring suffrage contributions from all 50
  states.
