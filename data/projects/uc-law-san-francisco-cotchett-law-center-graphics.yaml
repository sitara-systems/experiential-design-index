summary: >
  The Cotchett Law Center at UC Law San Francisco (formerly UC Hastings
  College of the Law), a new academic building at 333 Golden Gate Avenue in
  San Francisco, opened in 2020 with architecture and a visual identity and
  environmental graphics program both designed by Skidmore, Owings & Merrill.
description: >
  SOM's Graphics and Brand Studio designed the building's visual identity and
  environmental graphics, including a six-story graphic wall in the lobby
  with wayfinding cues woven into the pattern. The palette blends the law
  school's colors with roughly 600 unique colors abstracted from a
  cross-section of San Francisco, transitioning from the bay's blues at
  lower floors to the neighborhood's varied hues higher up. This was named
  1 of 4 honorees in Communication Arts' 62nd Design Annual (2021),
  Environmental Graphics category.
