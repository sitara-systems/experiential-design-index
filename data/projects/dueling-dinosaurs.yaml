summary: >
  Dueling Dinosaurs, a permanent exhibition around a fossilized Tyrannosaurus
  and Triceratops pair, opened April 27, 2024, at the North Carolina Museum
  of Natural Sciences in Raleigh, featuring three interactive experiences
  fabricated and built by Ideum with dinosaur animation from Urvogel
  Studios.
description: >
  Ideum's Exhibit Fabrication team CNC-milled a scaled, four-panel foam
  reproduction of the museum's 3D scan of the Dueling Dinosaurs fossil pair
  for the Fossil Block Theater, which uses projection mapping to depict
  burial scenarios. A separate Appearance Interactive lets visitors design a
  Triceratops using paleontological methods, and a CT Scanning Interactive
  uses a 32" Looking Glass holographic display to let visitors explore a
  Thescelosaurus skull's inner-ear anatomy.
