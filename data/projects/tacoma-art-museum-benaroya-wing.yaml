summary: >
  Olson Kundig designed the Rebecca and Jack Benaroya Wing, an addition to
  the Tacoma Art Museum that opened January 19, 2019 to display over 350
  works from the Benaroya glass, painting, and sculpture collection.
description: >
  The wing includes flexible exhibit spaces with moveable temporary walls
  and a 46-foot-wide Vista Gallery window wall overlooking the Prairie Line
  Trail.
