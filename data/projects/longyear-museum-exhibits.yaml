summary: >
  Permanent exhibits at the Longyear Museum in Chestnut Hill, Massachusetts,
  presenting the life of Mary Baker Eddy; exhibit design by Amaze Design,
  with architecture by Stopfel Architects, fabrication by EDE Corporation,
  lighting design by Available Light, and media design by Batwin + Robin
  Productions.
description: >
  Amaze Design developed the conceptual framework, designed exhibit elements
  in 2D and 3D, created media content, and managed fabrication through
  installation for the two interconnected galleries presenting artifacts,
  audio, media, and Eddy's own words.
