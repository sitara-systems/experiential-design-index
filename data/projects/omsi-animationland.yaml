summary: >
  Animationland, a traveling exhibition about the craft of animation
  developed and produced by OMSI, debuted at the Oregon Museum of Science
  and Industry in Portland, Oregon in 2019, with strategy, branding,
  characters, and animation by Portland studio Jolby; the exhibition
  continues to tour, opening at the National Children's Museum in
  Washington, DC in January 2025.
