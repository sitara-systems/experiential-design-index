summary: >
  Journeys Beyond Genocide: The Human Experience, a permanent exhibition at
  Chhange (Center for Holocaust, Human Rights & Genocide Education) on the
  Brookdale Community College campus in Lincroft, New Jersey, opened to the
  public April 8, 2018; exhibit graphics and content development by Proun
  Design with Neal Mayer (exhibit design) and Sari Boren (content
  development).
description: >
  The exhibition traces the life experiences of Jewish, Armenian, and
  Rwandan survivors before, during, and after genocide, using video
  testimony and archival items from local survivors and custom
  tablet-based interactives that let visitors individualize their path
  through the exhibit. Visits conclude in "Stand Up for Human Rights," an
  interactive section on taking action. Proun Design's own portfolio
  describes the project (there listed as "Armenian Genocide") as also
  addressing "atrocities committed upon the Armenians ... Jews during
  WWII, and more recently, in Rwanda," matching this exhibition's scope.
