summary: >
  The Boston Red Sox Jimmy Fund Gallery, dedicated May 29, 2014 at the
  Dana-Farber Cancer Institute in Boston, celebrates the Red Sox's
  decades-long partnership with the Jimmy Fund, with exhibit and graphic
  design by Proun Design and fabrication by Clayton Bluebird.
description: >
  The gallery features life-sized cutouts of Red Sox players, championship
  banners, memorabilia, murals, and a 48-foot illuminated timeline of the
  Red Sox-Jimmy Fund partnership.
