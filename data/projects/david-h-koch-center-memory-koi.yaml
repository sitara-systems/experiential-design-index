summary: >
  Memory Koi, an interactive digital koi pond at the David H. Koch Center for
  Cancer Care, Memorial Sloan Kettering's outpatient facility in New York
  City, opened with the building in January 2020, designed by C&G Partners in
  collaboration with Potion.
description: >
  Virtual koi fish with custom behavioral AI respond to visitor proximity
  across multiple accessible viewing heights, changing behavior with the time
  of day and season and occasionally surfacing messages of encouragement to
  patients.
