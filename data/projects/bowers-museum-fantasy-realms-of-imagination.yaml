summary: >
  Fantasy: Realms of Imagination, a British Library exhibition on the
  fantasy genre presented with the Bowers Museum in Santa Ana, California,
  opened October 26, 2024, with AV integration by MAD Systems.
description: >
  The exhibition featured over 150 artifacts spanning fairy tales and
  folklore to Studio Ghibli, The Lord of the Rings, and Pan's Labyrinth,
  including costumes, historical manuscripts, rare first editions, and film
  props, alongside roughly 20 media displays and projection-based immersive
  environments.
