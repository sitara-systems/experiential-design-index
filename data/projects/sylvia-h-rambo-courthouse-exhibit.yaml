summary: >
  A permanent exhibition honoring Judge Sylvia H. Rambo's judicial career
  opened in April 2023 at the Sylvia H. Rambo United States Courthouse in
  Harrisburg, PA, designed by Thinc Design in collaboration with the
  building's architect, Ennead Architects.
description: >
  The exhibit includes a triptych of graphic panels flanking a film
  installation with interviews, a display case of photographs and
  documents, and a portrait of Judge Rambo, Pennsylvania's Middle District's
  first female federal judge (1979) and first female chief judge (1992).
