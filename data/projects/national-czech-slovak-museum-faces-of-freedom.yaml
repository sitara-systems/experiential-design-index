summary: >
  "Faces of Freedom: The Czech and Slovak Journey," a 7,261-square-foot
  permanent exhibition gallery at the National Czech & Slovak Museum &
  Library in Cedar Rapids, Iowa, opened June 15, 2013; interpretive
  planning and curatorial development by Lord Cultural Resources,
  fabrication by Xibitz, graphics by Crux Creative.
description: >
  The exhibition, in the museum's Jiruska Gallery, traces Czech and Slovak
  immigration and cultural history from ancient tribes through modern
  republics, using interactive displays and artifacts to connect
  visitors' own experiences of freedom to that history.
