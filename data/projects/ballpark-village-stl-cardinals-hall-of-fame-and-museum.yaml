summary: >
  The St. Louis Cardinals Hall of Fame and Museum, an approximately
  8,000-square-foot museum on the second floor of Ballpark Village in St.
  Louis, Missouri, opened April 7, 2014; architecture, master planning, and
  exhibit design by PGAV Destinations.
description: >
  The museum covers more than 120 years of St. Louis Cardinals history
  across seven galleries, including a Hall of Fame gallery with
  touchscreen interactives, a recreation of Sportsman's Park, a
  Championship Gallery marking the team's 11 World Series titles, and
  "Cardinals Nation," a fan-engagement gallery. It opened as part of the
  first phase of the Ballpark Village mixed-use development across from
  Busch Stadium.
