summary: >
  "Spying Launched a Nation," a revamped gallery experience on the Culper
  Spy Ring at the International Spy Museum in Washington, DC, opened
  January 2024; exhibit design by Peter Hyde Design, media by Cortina
  Productions, and AV integration by Electrosonic.
description: >
  The immersive experience, narrated by actor Chris Jackson, uses wall and
  floor projection and transparent OLED monitors to bring to life a 1777
  letter in which George Washington authorized the Culper Spy Ring,
  America's first spy network; funded by a grant from the Verstandig
  Family Foundation.
