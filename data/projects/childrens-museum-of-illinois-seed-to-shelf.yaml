summary: >
  Seed to Shelf, a children's exhibit on food's journey from farm to store
  spanning over 2,500 sq ft, opened at the Children's Museum of Illinois in
  Decatur in February 2015; design by Kraemer Design + Production with
  fabrication, installation, and project management by Chicago Scenic
  Studios.
description: >
  Centered on a custom figure-eight play table, the exhibit uses local
  landmarks and references to Archer Daniels Midland, the exhibit sponsor.
