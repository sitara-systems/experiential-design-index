summary: >
  Interpretive exhibits at the Kenai Fjords National Park Visitor Center in
  Seward, Alaska, a $1M design-build project covering the park's geology,
  ecology, and indigenous history; exhibit design by Amaze Design, with
  fabrication by Southern Custom Exhibits, lighting design by Available
  Light, and media design by Northern Light Productions.
description: >
  The exhibits include a scenic recreation of Kenai's rocky shore, a
  tidewater-glacier mural with an underwater diorama, and a full-size
  climbable orca fin, with cultural components developed in partnership with
  the Port Graham Corporation.
