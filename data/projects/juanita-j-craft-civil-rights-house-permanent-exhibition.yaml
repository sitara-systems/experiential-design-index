summary: >
  The permanent exhibition at the Juanita J. Craft Civil Rights House and
  Museum, a restored historic home in Dallas, Texas, opened to the public
  in May 2023, designed by Isometric Studio in collaboration with the City
  of Dallas.
description: >
  Isometric Studio curated, wrote, designed, and installed the new permanent
  exhibition following restoration of the flood-damaged house, including a
  custom typeface called Craft based on a silkscreen Juanita Craft used to
  make protest signs, and custom casework in African Sapele wood to display
  historic objects.
