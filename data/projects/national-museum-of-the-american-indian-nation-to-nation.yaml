summary: >
  "Nation to Nation: Treaties Between the United States and American Indian
  Nations" opened September 21, 2014 at the Smithsonian's National Museum of
  the American Indian in Washington, DC, on the museum's 10th anniversary,
  and ran through fall 2018; exhibition design and fabrication were a
  design-build collaboration between R&P Design and Hadley Exhibits.
description: >
  Guest curated by Suzan Shown Harjo (Cheyenne and Hodulgee Muscogee), the
  exhibition traced the history of US-tribal treaty making from the early
  republic through 20th-century treaty-rights litigation, featuring original
  treaties on loan from the National Archives on a rotating basis. It won
  the 2016 AAM Award of Excellence in Exhibitions, the museum's first.
