summary: >
  A Moon Odyssey, a permanent exhibition on lunar exploration history,
  opened at Chabot Space & Science Center in Oakland, California in 2006,
  with exhibit design by West Office Exhibition Design and fabrication by
  Gizmo Art Production.
description: >
  Visitors take a simulated moonwalk, climb into a Mercury capsule replica,
  and operate a lunar-module landing simulator, while displays address
  lunar phases, gravity, and the Moon's effects on Earth using space
  artifacts and replicas spanning Sputnik to Apollo, including an actual
  Moon-rock sample.
