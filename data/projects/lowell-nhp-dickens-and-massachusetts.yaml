summary: >
  Dickens and Massachusetts, a 1,200 sq ft exhibition at Lowell National
  Historical Park on Charles Dickens's 1842 visit to Boston and Lowell and
  his return 25 years later, opened in 2012 with exhibit design by Proun
  Design and fabrication by Aries Custom Works.
description: >
  The exhibition, developed with curatorial input from University of
  Massachusetts Lowell Dickens scholar Dr. Diana Archibald, used striking
  imagery, contemporary typography, and a bold color scheme to emphasize
  the author's continued relevance.
