summary: >
  Harvest to Home Interactive, a hands-on food-processing exhibit at the St.
  Louis Science Center, opened in 2018; exhibit design by Peter Hyde Design
  with fabrication, installation, and project management by Chicago Scenic
  Studios.
description: >
  Visitors engage in hands-on activities using corn as a case study to
  experience food-processing steps including pouring, rolling, grinding,
  sifting, spinning, mixing, and cooking.
