summary: >
  Sphere in Las Vegas, a 366-foot spherical entertainment venue, opened
  October 2023 with architecture by Populous and space-inspired public
  interior design by ICRAVE, a Journey Studio.
description: >
  Winner of the Experience Design category in Fast Company's 2024 Innovation
  by Design Awards, credited to ICRAVE. Additional named collaborators on
  the interiors (Holoplot audio, Sphere Studios content, ARUP engineering)
  are vendor/engineering credits not sourced in enough design-role detail to
  add here. Sphere as a venue also received a 2025 Thea Award for
  Outstanding Achievement, Immersive Technology and Production, from the
  Themed Entertainment Association — that award covers the venue's overall
  technology platform (exosphere display, wraparound interior screen, haptic
  seating) rather than this record's architecture/interior-design scope;
  no additional independently sourceable design-firm credits distinct from
  Populous/ICRAVE were found for that specific award.
