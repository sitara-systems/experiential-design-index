    note: "Architect of record for the Sphere venue overall"
  - firm: icrave
    role: exhibit-design
    note: "Interior, wayfinding, and lighting design for ~400,000 sq ft of public-facing spaces (Atrium, F&B, expo, premium suites); no firm record yet"
technologies:
