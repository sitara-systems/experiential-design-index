summary: >
  "Art and Ideals: President John F. Kennedy," a permanent exhibition in a
  renovated 7,500 sq ft atrium at the Kennedy Center for the Performing
  Arts in Washington, DC, opened September 2022, with architecture by
  KieranTimberlake, exhibit design by Pentagram, interactive media design
  by Studio TheGreenEyl, media production by batwin + robin, and acoustics
  and AV design by Threshold.
description: >
  The exhibition tells the story of JFK's presidency through the lens of
  the arts, organized into four areas linking the arts to democracy,
  social change, culture, and the White House; Pentagram's design features
  an architectural frieze of LEDs that lets visitors experience Kennedy's
  oratory.
