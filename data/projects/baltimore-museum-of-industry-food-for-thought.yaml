summary: >
  Food for Thought, a temporary exhibition honoring Baltimore City Public
  Schools food-service workers, opened at the Baltimore Museum of Industry in
  Baltimore, Maryland, in February 2023; it was designed by Ashton Design with
  fabrication by P&M Exhibits and DUO Signage + Graphics.
description: >
  The exhibition combined photojournalist portraits by J.M. Giordano with
  audio interviews produced by Aaron Henkin, documenting the workers who
  prepare and distribute over 88,000 meals a day to food-insecure students.
  Working within a limited budget, the design team repurposed surplus school
  cafeteria furniture and used an "Educational Bauhaus" graphic style
  throughout the gallery. It received a 2024 SEGD Global Design Award (Merit,
  Exhibition).
