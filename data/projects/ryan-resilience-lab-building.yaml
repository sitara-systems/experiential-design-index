summary: >
  The Ryan Resilience Lab, an $8 million environmental education building
  sited in a floodplain in Norfolk, Virginia's North Colley neighborhood,
  opened in 2024 for the nonprofit Elizabeth River Project, designed by Work
  Program Architects to demonstrate flood-resilient construction alongside
  on-site signage, displays, and rotating art exhibits.
description: >
  A finalist in the Urban Design category of Fast Company's 2024 Innovation
  by Design Awards. Sources describe on-site signage, displays, and art
  exhibits but do not name a separate exhibit-design firm distinct from
  Work Program Architects; only the architecture credit is sourced here.
