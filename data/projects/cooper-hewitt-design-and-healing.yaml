summary: >
  Design and Healing: Creative Responses to Epidemics, an exhibition on
  design responses to the COVID-19 pandemic curated by MASS Design Group and
  Cooper Hewitt, opened at Cooper Hewitt, Smithsonian Design Museum in New
  York City in December 2021, with exhibition design by MASS Design Group
  and graphic design by Span Studio and Rick Valicenti.
description: >
  The exhibition presented architectural case studies and design responses to
  COVID-19 — including medical devices, protective gear, infographics, and
  community services — curated by MASS Design Group with Cooper Hewitt
  curators Ellen Lupton and Julie Pastor. Visitors passed through a tent
  module evoking field hospitals into a reconceived solarium furnished with
  recycled-fabric seating.
