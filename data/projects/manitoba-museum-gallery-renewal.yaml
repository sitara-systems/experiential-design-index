summary: >
  The Manitoba Museum, Winnipeg's largest museum, completed a four-year
  renovation of more than two-thirds of its gallery space in 2019, timed to
  its 50th anniversary; exhibit design was led by AldrichPears Associates
  with lighting design and integration by Eos Lightmedia.
description: >
  The renewal marked the museum's 50th anniversary and the Hudson's Bay
  Company's 350th anniversary; Eos Lightmedia worked with AldrichPears
  Associates and Winnipeg general contractor Bockstael Construction across
  schematic design, fixture installation, and theatrical lighting
  programming.
