id: boise-art-museum-sign-language-labels
name: Sign Language Labels for "Myths, Fables, and Fortunes"
venue: boise-art-museum
project_type: installation
year_completed: 2024
credits:
  - firm: prime-access-consulting
    role: technical-consulting
    note: >
      Established a community Deaf Access Working Group (DAWG) and
      developed ASL video interpretations of artwork labels (created
      in-house with Deaf sign talent) plus ASL-first visitor onboarding
      materials, staff coaching, and sustainable production workflows for
      "Myths, Fables, and Fortunes: Our Place within the Landscape"
      (November 2022 – August 2024).
technologies:
  - ASL video labels
summary: >
  Boise Art Museum's "Myths, Fables, and Fortunes: Our Place within the
  Landscape" exhibition added Deaf-centered ASL video artwork labels,
  developed with Prime Access Consulting and a community Deaf Access
  Working Group; the initiative won the 2024 Award for Excellence from the
  Idaho Council for the Deaf and Hard of Hearing.
description: ""
sources:
