id: heinz-history-center-tomato-waterfall
name: Tomato Waterfall Heinz Ketchup Bottle Sculpture
venue: senator-john-heinz-history-center
project_type: installation
year_completed: 2014
credits:
  - firm: chicago-scenic-studios
    role: fabrication
    note: "Fabrication, installation, and project management of the sculptural centerpiece"
technologies:
  - custom sculptural installation
summary: >
  Tomato Waterfall, a nine-foot-tall sculpture celebrating H.J. Heinz
  Company's history, opened at the Senator John Heinz History Center in
  Pittsburgh in 2014; fabricated, installed, and project-managed by
  Chicago Scenic Studios in collaboration with the museum's in-house
  fabrication shop.
description: >
  Features a near double-helix cascade of realistic tomatoes falling from a
  custom-built basket into a Heinz bottle replica, built on a steel
  armature with over 100 spot-welded, custom-cast tomatoes.
sources:
  - https://www.chicagoscenic.com/projects/heinz-history-center
