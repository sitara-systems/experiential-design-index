summary: >
  Ethiopia at the Crossroads, an 8,765-square-foot exhibition of 225
  historical and contemporary Ethiopian artworks spanning three galleries,
  opened at the Toledo Museum of Art in Toledo, Ohio, in August 2024,
  designed by Isometric Studio.
description: >
  Isometric Studio designed the exhibition architecture and graphic design,
  including custom typography based on Ge'ez script and the spatial flow
  through the exhibition's three galleries, in collaboration with curator
  Sophie Ong and the Brooklyn-based Ethiopian art collective Yatreda.
