summary: >
  The Contemplative Site at Monticello's Burial Ground for Enslaved People,
  centered on a 60-foot curved weathered-steel wall etched with the names of
  people enslaved by Thomas Jefferson, opened in June 2022 near
  Charlottesville, Virginia, designed by HGA with landscape architecture by
  Nelson Byrd Woltz for the Thomas Jefferson Foundation.
