summary: >
  Corn / Meal, an installation exploring Indiana's corn economy and food
  literacy through a communal dining table, opened at Central Middle School
  in Columbus, Indiana, in 2019 as part of the Exhibit Columbus biennial
  exhibition, designed by MASS Design Group.
description: >
  Created for the 2019 Exhibit Columbus symposium and exhibition cycle, Corn
  / Meal used Indiana's iconic corn landscape as a lens for a communal-table
  installation exploring food literacy and where the state's corn crop
  actually goes.
