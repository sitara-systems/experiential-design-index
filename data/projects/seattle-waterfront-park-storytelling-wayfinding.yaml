summary: >
  Studio Matthews developed the storytelling strategy, wayfinding, and
  branding, completed in 2025, for Seattle's 20-acre Waterfront Park,
  built after removal of the elevated Alaskan Way Viaduct, for the City
  of Seattle's Office of the Waterfront.
description: >
  The program addresses the layered history, culture, ecology, geology, and
  communities of the waterfront. Landscape architecture by Field Operations
  (James Corner Field Operations); fabrication by Knight Signs.
