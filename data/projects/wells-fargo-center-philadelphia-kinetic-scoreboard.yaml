summary: >
  A first-of-its-kind kinetic center-hung 4K LED scoreboard at the Wells
  Fargo Center arena in Philadelphia, home of the NBA's 76ers and NHL's
  Flyers, was installed in 2019 as part of the arena's transformation,
  designed, fabricated, and integrated by TAIT with movable crown trusses
  automated on the TAIT Navigator platform.
description: >
  The 90,000 lb system totals 6,601 sq ft of 4K LED video across more than
  40 million pixels, with crown trusses on either side capable of vertical
  movement at up to 4 ft per second, enabling motion, pyrotechnics,
  lighting, and video effects in combination.
