summary: >
  The Ottawa Riverkeeper Learning Lab, a 2,689-square-foot interactive
  exhibit space at the NCC River House in Ottawa, Ontario, was completed
  in 2025; exhibit design by Reich+Petch in partnership with Holman
  Exhibits.
description: >
  The Learning Lab is a public, free-to-access space for hands-on
  education about the Ottawa River and its watershed, located inside the
  restored century-old boathouse that Ottawa Riverkeeper shares with the
  National Capital Commission's River House, which opened to the public
  in 2023.
