summary: >
  Two large-format artifact display cases for "The New Mexico Showcase:
  Curious Contraptions and Collectible Curiosities" opened to the public in
  2024 (ribbon-cutting August 9, 2024) at the New Mexico History Museum in
  Santa Fe, fabricated by Ideum from a preliminary design by Chiodo Design.
description: >
  Each self-supporting cabinet measures roughly 10 feet tall by 14 feet wide
  by 4 feet deep and weighs about a ton, including 800 pounds of hinged
  glass panels sourced through Ideum's partner Case[werks]. The cases were
  built modular for on-site assembly, include positive-pressure and
  temperature-monitoring systems for artifact conservation, and provide
  curators front-access hinged doors for rotating displays.
