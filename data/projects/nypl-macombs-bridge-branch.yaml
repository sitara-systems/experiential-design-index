summary: >
  The New York Public Library's Macomb's Bridge Branch, a 3,500-square-
  foot renovation of storefronts within the landmarked Harlem River
  Houses, opened in New York in January 2020, designed by Michielli +
  Wyetzner Architects with lighting design by Anita Jorgensen Lighting
  Design; the project won a 2020 AIA New York State Adaptive Reuse Design
  Merit Award.
