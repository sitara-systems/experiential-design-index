id: national-museum-of-american-jewish-history-art-of-rube-goldberg
name: "The Art of Rube Goldberg"
venue: national-museum-of-american-jewish-history
project_type: temporary-exhibition
year_completed: 2018
credits:
  - firm: dome-collective
    role: fabrication
    note: "Built a working Rube Goldberg machine for the exhibition's title wall, as the National Museum of American Jewish History's host-venue addition to the traveling exhibition; note that the exhibition itself was conceived by Creighton Michael and organized for tour by International Arts & Artists (not a Dome credit)"
technologies:
  - kinetic sculpture / physical mechanism
summary: >
  The Art of Rube Goldberg, a traveling exhibition on the cartoonist and
  inventor, opened at the National Museum of American Jewish History (now the
  Weitzman National Museum of American Jewish History) in Philadelphia on
  October 12, 2018, with Dome building a working Rube Goldberg machine for the
  exhibition's title wall as the host venue's addition.
description: >
  The traveling exhibition was conceived by Creighton Michael, developed with
  the Heirs of Rube Goldberg, LLC, curated by Max Weintraub, and organized for
  tour by International Arts & Artists; it ran at NMAJH through January 21,
  2019. Dome's contribution was limited to a physical Rube Goldberg machine
  built for the title wall as an homage to the cartoonist's famously
  over-engineered (and rarely actually built) contraptions.
