summary: >
  A $29 million transformation of the Harry S. Truman Presidential Library
  and Museum in Independence, Missouri, reopened July 2, 2021 after a
  renovation led by exhibit designer Gallagher & Associates and architect
  Clark & Enersen, adding a new east-side entrance and reimagining all
  permanent-exhibition galleries into a single-level chronological visitor
  experience.
description: >
  Closed for renovation beginning July 22, 2019 (extended by the COVID-19
  pandemic), the museum reopened with a restructured "circular" visitor path
  through fifteen galleries covering Truman's life and presidency, including
  new immersive sound-and-light theaters depicting his WWI service and the
  Cold War, a 14-foot interactive globe on the challenges of postwar peace,
  and expanded interactives on the Berlin Airlift and the Red Scare. The
  project was financed by the Truman Library Institute's Stay TRU capital
  campaign. General contractor was JE Dunn Construction Company (out of
  index scope per editorial policy).
