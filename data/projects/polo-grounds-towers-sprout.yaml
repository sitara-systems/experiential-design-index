summary: >
  Sprout, a multisensory neurodiverse-friendly playscape built on the
  foundations of former benches at NYCHA's Polo Grounds Towers in Harlem, New
  York, NY, was completed in June 2024 by The Urban Conga through a
  community co-design process funded by the Mayor's Action Plan for
  Neighborhood Safety.
