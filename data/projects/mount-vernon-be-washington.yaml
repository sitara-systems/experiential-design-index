id: mount-vernon-be-washington
name: "Be Washington: It's Your Turn to Lead"
venue: mount-vernon
project_type: installation
year_completed: 2018
credits:
  - firm: gallagher-and-associates
    role: exhibit-design
  - firm: cortina-productions
    role: media-design
    note: "Lead interactive producer; developed gameplay and produced media"
  - firm: solomon-group
    role: fabrication
  - firm: solomon-group
