summary: >
  Larry Berg Flight Path Park, a public park near Vancouver International
  Airport named for the airport authority's retiring CEO, was completed in
  2013 with lighting design and integration by Eos Lightmedia.
description: >
  The park's central feature, a hemispherical globe, carries interpretive
  graphics celebrating aviation and YVR's role connecting global travelers,
  and serves as a gathering point for viewing planes taking off and landing.
