summary: >
  A 1,000-square-foot suite of interactive Great Lakes ecology exhibits at
  the Aquarium of Niagara in Niagara Falls, New York, completed in 2024 by
  Taylor Studios, covering fishing, turtles, wetlands, lamprey, and
  sturgeon.
description: >
  The installation combines physical and digital components in a
  multi-modal approach to learning intended to serve a diverse visitor
  population.
