summary: >
  The Rail Park Interpretive Wall, an 80-foot laser-cut corten steel "story
  wall" at The Rail Park in Philadelphia, opened in 2018 with experiential
  graphic design by Cloud Gehshan and fabrication by Urban Sign; it was a
  finalist in the Communication Arts 2020 Design Competition, Environmental
  Graphics category.
description: >
  The wall depicts a laser-cut map of the Callowhill Industrial District with
  company logos, buildings, and manufacturer advertisements from the area's
  industrial heyday, paired with interpretive panels on the Reading and
  Pennsylvania Railroads. Landscape architecture by Studio Bryan Hanes and
  engineering by Urban Engineers are documented on the project but are not
  represented in the current roles vocabulary (see research log).
