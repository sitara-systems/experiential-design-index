summary: >
  Evan Williams Bourbon Experience, a 12,000 sq ft visitor attraction on
  Louisville's Whiskey Row, opened 2014; exhibit design, media design, and
  fabrication by Solid Light.
description: >
  Located near the original site of Evan Williams' historic distillery, the
  venue features a five-story bottle sculpture at its entrance and immerses
  visitors in Kentucky bourbon heritage; a cornerstone of the Kentucky
  Bourbon Trail.
