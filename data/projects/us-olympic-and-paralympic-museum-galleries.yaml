summary: >
  The United States Olympic & Paralympic Museum, a purpose-built museum
  telling the story of Team USA athletes, opened July 2020 in Colorado
  Springs, Colorado, with architecture by Diller Scofidio + Renfro and
  Anderson Mason Dale Architects and exhibition/interactive design by
  Gallagher & Associates and Centre Screen.
description: >
  The 60,000-square-foot museum uses RFID-enabled visitor credentials,
  motion-capture and reflex-testing interactives, and immersive AV
  environments across galleries dedicated to Olympic and Paralympic sport.
  Centre Screen led audiovisual and interactive design and production; CREO
  Industrial Arts fabricated exhibits and built supporting exhibit software.
  The project won both an SEGD 2021 Honor Award (Interactive Experiences,
  credited to Centre Screen and Gallagher & Associates) and a Merit Award
  (Exhibition, credited to Gallagher & Associates).
