summary: >
  Weather Worlds, a gesture-driven interactive installation by Design I/O
  that lets visitors command weather effects, opened with the National
  Children's Museum's new downtown Washington, DC facility in February
  2020 in the museum's Innovation Sandbox space, where it remains on
  view.
