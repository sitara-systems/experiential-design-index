summary: >
  A Walk in the Wild: Continuing Muir's Journey, a temporary exhibition at
  the Oakland Museum of California in Oakland, California, opened August 6,
  2011, exhibit design by West Office Exhibition Design.
description: >
  The exhibition positioned conservationist John Muir as a historical guide,
  pairing historical narratives and artifacts about his legacy with
  contemporary stories of modern practitioners advancing his conservation
  work, inviting visitors to reconsider their relationship to the natural
  world. It ran through January 22, 2012.
