summary: >
  Cloud Swing, an accessible public swing-set installation funded by Wellcome
  Trust, opened at Grounds For Sculpture in Hamilton, New Jersey, in August
  2023, designed by Isometric Studio.
description: >
  The installation is a cloud-shaped, electric-blue steel canopy on tripod
  legs suspending two wheelchair-accessible swings and three plank swings,
  developed with input from disability activist Trina Hazell and INCLUDEnyc
  as part of Wellcome Trust's Mindscapes mental-health program. It received a
  2024 SEGD Global Design Award (Public Installation).
