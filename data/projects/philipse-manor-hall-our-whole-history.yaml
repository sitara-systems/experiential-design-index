summary: >
  "Philipse Manor Hall: Our Whole History," a permanent exhibition at
  Philipse Manor Hall State Historic Site in Yonkers, New York, opened in
  November 2022; exhibit design by Amaze Design, with architecture by
  Saratoga Associates, fabrication by Split Rock Studios, and media design by
  Trivium Interactive.
description: >
  The exhibition presents an inclusive 350-year narrative of the 1682
  colonial structure encompassing the Munsee people, Dutch and English
  colonists, and free and enslaved Africans, developed with advisory input
  from the Stockbridge-Munsee Band of Mohican Indians and the Delaware Tribe
  of Indians. The exhibits received the 2024 Award of Excellence from the
  American Association for State and Local History.
