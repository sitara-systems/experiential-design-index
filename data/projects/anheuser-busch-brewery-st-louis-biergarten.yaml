summary: >
  The Biergarten, a 275-seat outdoor beer garden at the Anheuser-Busch
  Brewery and Tour Center in St. Louis, Missouri, opened August 6, 2013, as
  part of a broader brewery-experience overhaul designed by PGAV
  Destinations.
description: >
  Built from reclaimed beechwood with hand-selected glassware, the
  Biergarten offers 17 beers on tap and daily 3 p.m. tastings. PGAV
  Destinations describes the Biergarten as part of a larger "Anheuser-Busch
  Beer Experience" engagement that also included a Beer Museum at the Old
  Schoolhouse, a refreshed campus tour, a new entry experience, and a
  renovated retail shop; those additional elements are not independently
  dated from public sources and are not recorded as separate project
  entries here.
