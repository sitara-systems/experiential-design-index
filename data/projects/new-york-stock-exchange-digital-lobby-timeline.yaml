summary: >
  The Digital Lobby Timeline, an animated media wall chronicling more than
  three centuries of stock exchange history, was installed in the main
  entryway of NYSE Euronext headquarters in Manhattan by C&G Partners,
  debuted by 2012.
description: >
  C&G Partners designed a monumental-scale animated timeline installation
  for the New York Stock Exchange's main entryway, using fluid dynamic
  movement and synchronized "ticker" style animations to chronicle the
  Exchange's history.
