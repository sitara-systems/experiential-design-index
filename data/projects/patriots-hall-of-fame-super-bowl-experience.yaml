summary: >
  The New England Patriots Super Bowl Experience, a permanent gallery at the
  Patriots Hall of Fame in Foxborough, Massachusetts, opened in 2015
  following the team's fourth Super Bowl win, with exhibit design by
  CambridgeSeven and lighting design by Eos Lightmedia.
description: >
  The gallery features a 16'x9' video wall of Super Bowl moments, four Super
  Bowl pods with artifacts and interactive stations, an augmented-reality
  station recreating the Malcolm Butler interception from Super Bowl XLIX,
  and the team's four Vince Lombardi trophies displayed free of glass cases.
