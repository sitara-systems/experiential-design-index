summary: >
  Curiosity Farms, a 3,500 sq ft working-farm exhibit at Thanksgiving Point
  in Lehi, Utah, opened September 30, 2024 as a reimagining of the
  institute's former Farm Country attraction; it was designed by The
  Exhibits Dept. with architecture by FFKR Architects, fabrication by Split
  Rock Studios, interactive media by Trivium Interactive, and a custom
  climbing playscape by Luckey Climber.
