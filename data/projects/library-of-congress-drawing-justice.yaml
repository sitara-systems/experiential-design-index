summary: >
  Drawing Justice: The Art of Courtroom Illustration, a temporary exhibition
  at the Library of Congress's Thomas Jefferson Building in Washington, DC,
  ran April 27 - October 28, 2017; exhibit design by Proun Design with
  fabrication by Hillmann & Carr, featuring approximately 100 courtroom
  illustrations from high-profile trials spanning five decades.
description: >
  The exhibition showcases courtroom illustrations documenting notable
  cases including those of John Gotti, Larry Flynt, Michael Jackson, and
  Charles Manson, capturing dramatic courtroom moments from an era when
  photography was prohibited from many US courtrooms.
