summary: >
  A rehabilitation of the Lodgepole Visitor Center, a Mission 66-era building
  at 6,700 feet elevation in Sequoia National Park, California, reopened
  August 4, 2023 with interpretive exhibits designed by HealyKohler walking
  visitors through the park's foothill, montane, subalpine, and alpine
  ecosystems; the historic redwood exterior was preserved.
description: >
  The project, a collaboration between the National Park Service and Sequoia
  Parks Conservancy, combines scenic recreations, soundscapes, and tactile
  elements across the park's four ecosystems, with a photo opportunity
  featuring Mt. Whitney as a backdrop.
