summary: >
  The Town Green Bandshell, an outdoor performance bandshell with a
  cantilevered concrete canopy on West Arbor Lake in Maple Grove,
  Minnesota's civic Town Green park, opened in 2010, designed by HGA with
  landscape architecture by Damon Farber and theatre planning, lighting, and
  rigging design by Schuler Shook.
description: >
  The bandshell's six-pole, wing-like concrete canopy is inspired by the
  form of a maple seed pod; it seats up to 500 on grassy, terraced tiers
  next to the Maple Grove Government Center and Library. Acoustic
  consulting was by Kvernstoen, Ronnholm & Associates — not credited here
  as acoustics is outside this index's role vocabulary. Theatrical
  lighting/dimming equipment (ETC Source 4 fixtures, ETC Unison control) was
  supplied and installed by Norcostco, an equipment supplier rather than a
  design credit. The bandshell won a 2011 ASLA Minnesota Merit Award.
