summary: >
  "Neilson Library: An Evolution," an exhibit chronicling Smith College's
  Neilson Library's architectural history and expanding role in student
  life, opened inside the newly renovated Neilson Library in Northampton,
  Massachusetts in 2021, with design by Proun Design and fabrication by WB
  Inc.
description: >
  Permanent display cases show images and artifacts documenting the
  library's significance to the student experience, floor cases showcase
  the collection, and a timeline honors librarian and faculty
  contributions, alongside an interactive graffiti-board element.
sources:
