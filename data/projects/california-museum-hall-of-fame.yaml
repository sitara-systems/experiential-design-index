summary: >
  The California Hall of Fame, a 40-by-7-foot lobby installation at The
  California Museum in Sacramento established in 2006 to honor inductees'
  lives and legacies, was designed by West Office Exhibition Design.
description: >
  The installation showcases artifacts, photographs, and memorabilia
  representing the lives and legacies of California Hall of Fame inductees,
  including figures such as Clint Eastwood, Frank Gehry, Cesar Chavez, and
  Billie Jean King. The design was built for flexibility so the display can
  be updated annually as new inductees are added.
