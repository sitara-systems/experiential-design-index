summary: >
  RSM Design created an entrance landmark and wayfinding signage system for
  Bel Air Village, a 280-acre residential community in Sherman, Texas
  developed by American Communities, featuring monumental illuminated letter
  and pylon sculptures created in collaboration with artist Cyril Kongo.
description: >
  The entrance sculptures use 12-foot-tall letterforms finished with street
  artist Cyril Kongo's vibrant pattern work, paired with illuminated pylon
  sculptures evoking sunrise and sunset, fabricated by Creo Industrial Arts.
