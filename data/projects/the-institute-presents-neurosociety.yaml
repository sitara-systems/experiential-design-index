summary: >
  The Institute Presents: Neurosociety, a 60-minute immersive theatrical
  experience of neuroscience-inspired activities created by David Byrne
  and Mala Gaonkar, opened at 350 El Camino Real in Menlo Park, California
  on October 27, 2016; interactive systems and device interfaces designed
  by Unified Field.
description: >
  Visitors move through four rooms of neuroscience-inspired experiments
  exploring how personal biases influence moral behavior and perception.
  The run at Menlo Park continued through March 31, 2017; the experience
  later had additional runs at other venues, including Pace Gallery in New
  York in 2018.
