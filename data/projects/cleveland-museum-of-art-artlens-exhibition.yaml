summary: >
  The ARTLENS Exhibition, a touchscreen-free reimagining of the Cleveland
  Museum of Art's technology gallery in Cleveland, Ohio, opened June 25,
  2017, with sixteen interactive games using motion- and gaze-tracking across
  six projection walls, designed by Potion in collaboration with Local
  Projects and Dome Collaborative.
