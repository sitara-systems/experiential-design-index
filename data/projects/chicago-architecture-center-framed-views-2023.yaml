summary: >
  Framed Views, an exhibition of finalist and winning photographs from the
  Chicago Architecture Center's first Open House Chicago photo competition
  (Interior, Exterior, Architectural Detail, and Black & White categories),
  opened at the Chicago Architecture Center on November 23, 2023, designed
  by Span Studio.
description: >
  The competition and its exhibition became an annual program (Framed
  Views 2024, Framed Views 2025); this record covers the original 2023
  edition.
