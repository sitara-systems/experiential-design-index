summary: >
  Intuit Dome, the LA Clippers' arena in Inglewood, CA, opened in August 2024
  with PixMob's NOVA Armrest permanently integrated into each of its 17,000
  seats, combining synchronized crowd LED lighting with NFC readers, USB
  charging, and game controllers for live fan interaction.
description: >
  The NOVA Armrest is PixMob's most advanced permanent installation product,
  distinct from the company's temporary event-wristband business: it ships
  built into the seat itself rather than distributed per event, and stays in
  place for the life of the venue.
