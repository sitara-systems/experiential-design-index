summary: >
  The 130,000 sq ft Harley-Davidson Museum in Milwaukee, Wisconsin, opened
  July 12, 2008; architecture by HGA with Pentagram, and fabrication by
  Kubik Maltbie.
description: >
  The museum campus houses Harley-Davidson's corporate archive and permanent
  collection of motorcycles alongside interpretive galleries. This record
  covers the original building and its opening exhibits; the museum's 2022
  Experience Gallery is tracked as a separate, later project.
