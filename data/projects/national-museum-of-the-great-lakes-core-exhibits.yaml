summary: >
  The National Museum of the Great Lakes, a 12,000 sq ft riverfront museum
  in Toledo, Ohio operated by the Great Lakes Historical Society, opened
  April 26, 2014, with media and interactive experiences produced by
  Monadnock Media and exhibit design by Hilferty & Associates.
description: >
  Notable installations include "Dive to the Edmund Fitzgerald," a virtual
  submersible piloted through a 3D underwater environment to investigate
  the Lake Superior shipwreck, and an orientation theater with projected
  imagery over a rear-lit topographic map. The museum won an American
  Alliance of Museums MUSE Award.
