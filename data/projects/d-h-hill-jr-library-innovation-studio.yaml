summary: >
  Innovation Studio, a hands-free interactive media space on the second
  floor of NC State University's D. H. Hill Jr. Library in Raleigh, NC,
  opened in August 2020 following the library's renovation; its
  four-projector, depth-sensor tabletop system and custom software
  platform were developed by Relative Scale.
description: >
  The Innovation Studio occupies the south tower's second floor and
  showcases student and faculty work across disciplines including digital
  humanities, data science, and visualization. Visitors navigate content
  displayed across four large projected tables by moving their hands above
  the surface rather than touching it, using hover-based depth-sensor
  detection. The project won a MUSE Creative Gold Award in the
  "Experiential & Immersive" category and a Bronze MUSE Award (AAM Media &
  Technology, Research and Innovation category) in 2021.
