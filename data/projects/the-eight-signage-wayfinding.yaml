summary: >
  Studio Matthews designed a signage and wayfinding system for The Eight, a
  new mixed-use development with public plaza and amenity spaces in downtown
  Bellevue, Washington, developed by Skanska Commercial Development and
  completed in 2024.
description: >
  The signage scheme draws on the building's looping "8" logo to create an
  animated, layered wayfinding system across ground and amenity floors,
  extending into the parking garage, with materials and finishes coordinated
  with the building's architecture and interior design.
