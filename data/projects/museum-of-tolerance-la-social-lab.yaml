summary: >
  The Claudia and Nelson Peltz Social Lab, a 10,000-square-foot interactive
  exhibition on social responsibility, opened at the Museum of Tolerance in
  Los Angeles in August 2021; exhibit and media design by Unified Field,
  with architecture by Yazdani Studio of CannonDesign and AV integration by
  Electrosonic.
description: >
  Sixteen sequential media-driven experiences guide visitors through themes
  of bias, empathy, and civic participation, including a POV projection
  exercise, a "We The People" interactive history wall, collaborative Forum
  activity tables, and Empathy Vending Machines.
