  - firm: frankndesign
    role: fabrication
    note: "Four bronze tactile models of key Boston landmarks for low-vision guests; no firm record yet"
  - firm: eos-lightmedia
    role: lighting-design
    note: "Credited as Abernathy Lighting Design, an Eos Lightmedia studio; attraction lighting designer"
  - firm: lightborne
    role: content-production
    note: "Concepted and animated 12 shows; no firm record yet"
technologies:
  - projection mapping
  - virtual itinerary interactives
  - LED touch screens
  - 360-degree virtual viewers
  - tactile bronze models
summary: >
  View Boston, a 59,000 sq ft observation deck atop the Prudential Tower in
  Boston, opened June 15, 2023; Electrosonic provided technology concepting,
  AV and control system design, and systems integration, with Float4
  designing and producing eight accessible interactive media exhibits across
  the multi-floor experience.
