credits:
  - firm: jack-rouse-associates
    role: exhibit-design
    note: >
      Master planning, writing and content development, experience
      planning and design, graphic design, art direction,
      vendor/supplier procurement, fabrication supervision, and
      on-site project management as creative and design lead
  - firm: electrosonic
    role: av-integration
    note: Blue-sky technology concepts, AV and control system design, and system integration
  - firm: float4
    role: media-design
