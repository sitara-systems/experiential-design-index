summary: >
  The Pikes Peak Summit Visitor Center, a new 38,000-square-foot building
  at the 14,115-foot summit of Pikes Peak near Colorado Springs, Colorado,
  opened in June 2021; designed by GWWO Architects with RTA Architects as
  architect of record, exhibit design by Gallagher & Associates, and media
  experiences by Northern Light Productions.
description: >
  Northern Light Productions produced the "Explore Pikes Peak Summit"
  mobile app, the "My Pikes Peak Touchwall" interactive display, an
  immersive 180-degree film, seven touchscreen interactive exhibits on
  geology, ecology, history, and recreation, and a projection-mapped 3D
  mountain model.
