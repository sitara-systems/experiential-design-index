summary: >
  The Rose Center for Earth and Space, a new wing of the American Museum
  of Natural History in New York, opened February 19, 2000, designed by
  Polshek Partnership Architects (now Ennead Architects) with exhibition
  design by Ralph Appelbaum Associates; batwin + robin produced the Hayden
  Planetarium's inaugural space shows.
description: >
  The Rose Center houses the Hayden Planetarium within a glass cube
  enclosing a 87-foot sphere, alongside the Scales of the Universe walkway
  and the Hall of the Universe. batwin + robin's inaugural space shows,
  "Passport to the Universe" and "The Big Bang Theater," combined audio,
  video, lighting, and effects narrated with writer Ann Druyan and
  astrophysicist Neil deGrasse Tyson.
