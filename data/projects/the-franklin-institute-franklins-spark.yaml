summary: >
  Franklin's Spark, a 120-degree projection-mapped, multisensory experience
  in the rotunda of the Franklin Institute in Philadelphia, debuted January
  17, 2026, marking Benjamin Franklin's 320th birthday; Crafted Action served
  as lead experience designer, with AV integration by IMS Technology
  Services.
description: >
  Funded by The Satell Family Foundation and Ed Satell, the hourly
  experience uses dynamic projection, lighting, and sound to present Franklin
  as an experimenter and innovator, timed to build momentum toward the
  nation's 250th anniversary in 2026.
