summary: >
  The Milwaukee Public Museum's "Future Museum," a new building replacing
  its current facility in Milwaukee, WI, is targeted to open in 2027, with
  exhibition design by Thinc Design and architecture by Ennead Architects
  and Kahler Slater.
description: >
  The new facility will present five permanent gallery themes, including
  "Time Travel" and "Wisconsin Journey," exploring the intersections of
  nature and culture; described as the largest cultural project in
  Wisconsin's history. The current Milwaukee Public Museum building
  stays open through 2026, with a planned last day of January 3, 2027;
  the new building has no announced opening date beyond 2027.
