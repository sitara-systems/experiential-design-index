summary: >
  "Denver A to Z," a permanent gallery devoted to Denver's people, places,
  and pop culture, opened November 17, 2012 at the History Colorado
  Center in Denver, Colorado — distinct from the museum's April 2012
  inaugural core exhibits — with exhibit design by Andrew Merriell &
  Associates (referred to on the firm's own site as "Why We Love Denver").
