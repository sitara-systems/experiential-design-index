summary: >
  Star Wars: Galaxy's Edge, a 14-acre themed land at Disneyland Park in
  Anaheim, California, opened May 31, 2019, creatively led by Walt Disney
  Imagineering (an in-house Disney design unit, not credited as an
  independent firm in this index) in collaboration with Lucasfilm, with
  audio systems installed by Technomedia. It received a 2020 Thea Award for
  Outstanding Achievement in the New Park Land category.
description: >
  Walt Disney Imagineering led creative and show design under executive
  creative directors Scott Trowbridge, Asa Kalama, and Chris Beatty, with
  narrative consultation from Lucasfilm's Story Group (Pablo Hidalgo) and
  concept design input from Industrial Light & Magic's Doug Chiang.
