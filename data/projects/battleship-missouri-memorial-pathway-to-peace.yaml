summary: >
  Pathway to Peace: USS Missouri's World War II Experience, a permanent
  exhibit aboard the historic Battleship Missouri Memorial (BB-63) at Pearl
  Harbor, Hawaii, was unveiled September 2, 2025, on the 80th anniversary of
  the end of World War II, designed, fabricated, and built by Ideum.
description: >
  The exhibit charts the Missouri's history from construction through its
  Pacific War service and the September 2, 1945 Japanese surrender ceremony
  aboard the ship, using large-scale archival-film projection, interpretive
  graphics, and custom fabricated cabinets fitted to the ship's bulkheads. A
  dedicated oral history station features eight video interviews with
  surviving WWII veterans, with a Naval-ID-card interface letting visitors
  select a veteran and navigate through recorded interview questions.
