summary: >
  The Priddy Family Foundation Freedom Theater, a 30-minute immersive
  theatrical experience on a rotating turntable on the third floor of the
  National WWII Museum's Liberation Pavilion in New Orleans, Louisiana,
  opened in 2023, designed and produced by The Hettema Group in
  collaboration with Mousetrappe (now Medici Media).
description: >
  Winner of the 2025 Thea Award for Outstanding Achievement, Museum
  Attraction, from the Themed Entertainment Association. Distinct from the
  broader Liberation Pavilion exhibit build (see
  national-wwii-museum-liberation-pavilion.yaml, credited to Solomon Group)
  — this record covers the dedicated third-floor theater experience within
  it.
