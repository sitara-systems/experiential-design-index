summary: >
  People of the Waters, a 2,000-sq-ft permanent gallery at the Oshkosh
  Public Museum in Oshkosh, Wisconsin, opened in 2017 as the centerpiece
  of the museum's 90th anniversary; exhibit design and fabrication by
  Split Rock Studios, including a custom artifact mounting system and a
  bark lodge recreation.
description: >
  The gallery combines physical and digital experience elements —
  touchable lodge walls, a walk-through archaeologist's dig pit, and
  touchscreen displays paired with artifacts — with audio recordings
  featuring Menominee tribal elder perspectives on regional early
  cultural history.
