summary: >
  Porsche Cars North America's combined headquarters and public Experience
  Center, a 260,000 sq ft complex on a 1.6-mile private test track in
  Atlanta, Georgia, opened in June 2015; it was designed by HOK.
description: >
  The complex combines Porsche's North American corporate headquarters with a
  public-facing brand experience center: a classic car heritage gallery, a
  restoration center, a design studio for virtual car customization, a
  driving simulator lab, and a track-side restaurant, alongside three levels
  of naturally lit office space.
