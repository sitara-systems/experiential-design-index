summary: >
  The West Virginia Judicial Learning Center, an interactive exhibit space
  on the third floor of the State Capitol's East Wing in Charleston, West
  Virginia, opened December 7, 2023; HealyKohler Design designed the
  exhibits, graphics, and interpretive content.
description: >
  Located directly across from the West Virginia Supreme Court of Appeals'
  courtroom, the center is aimed at school groups and general visitors and
  includes a locker interactive presenting school-related court cases, a
  "Be the Judge" touchscreen station, and a Scales of Justice hands-on
  activity for younger visitors.
