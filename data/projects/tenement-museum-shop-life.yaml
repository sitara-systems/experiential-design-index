summary: >
  Shop Life, a new permanent exhibition at the Lower East Side Tenement
  Museum in New York City recreating businesses that occupied 97 Orchard
  Street over more than a century, opened December 3, 2012, featuring an
  interactive RFID-triggered touchscreen counter designed by Potion — the
  museum's first interactive installation.
