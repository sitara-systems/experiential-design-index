project_type: temporary-exhibition
year_completed: 2023
credits:
  - firm: moment-factory
    role: media-design
    note: >
      Creative and production partner for a seasonal outdoor immersive
      light-and-sound walk within the fort's bastions and courtyard —
      experience design, technical design, music/sound design, lighting
      design, and pre-rendered/real-time content, powered by X-Agora. Ran
      winter seasons 2023-2024 through 2024-2025; the Warren County
      Coalition's partnership with Moment Factory ended May 2025.
technologies:
  - projection
  - interactive lighting
  - sound design
summary: >
  Lake George Winter's Dream, a seasonal outdoor immersive light-and-sound
  walk produced by Moment Factory, opened at the historic Fort William
  Henry in Lake George, New York, in December 2023 and ran through 2025.
