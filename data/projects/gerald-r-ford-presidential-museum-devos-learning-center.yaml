    role: fabrication
technologies:
  - multimedia simulation
summary: >
  An eight-month, multimillion-dollar renovation of the Gerald R. Ford
  Presidential Museum in Grand Rapids, Michigan, reopened June 7, 2016,
  adding a new 8,000-square-foot DeVos Learning Center and redesigned
  permanent exhibits on the life and legacy of President and Mrs. Ford;
  exhibit design by Gallagher & Associates, fabrication by Xibitz.
description: >
  The $13 million project (of which $8 million funded the new DeVos
  Learning Center) included new technology-based exhibits such as a
  multimedia simulation of the 1944 USS Monterey typhoon Ford survived
  as a young naval officer, developed in coordination with the National
  Archives and Records Administration, which operates the museum.
