summary: >
  "Panel 44," a traveling exhibition built around a rejected 1982 granite
  panel from the Vietnam Veterans Memorial engraved with 335 names,
  debuted January–March 2022 at the National Museum of the Marine Corps
  in Triangle, Virginia, designed and built by Art Guild for the Vietnam
  Veterans Memorial Fund, and toured to additional military museums
  through 2022.
description: >
  The panel was fabricated and engraved in 1982 but withheld from the
  Memorial due to a visible crack; it later surfaced for sale online and
  was acquired by VVMF. The touring exhibit pairs the panel with artifacts
  and video profiles of the 335 service members commemorated on it,
  including Medal of Honor and Distinguished Service Cross recipients. It
  subsequently toured to the National Museum of the U.S. Army, First
  Division Museum, and National Museum of the U.S. Air Force in 2022.
