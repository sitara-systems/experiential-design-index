summary: >
  Piranesi on the Page, an exhibition of original volumes designed by
  Giovanni Battista Piranesi, was on view in the Ellen and Leonard Milberg
  Gallery at Firestone Library, Princeton University, from October to
  December 2021, designed by Isometric Studio.
description: >
  Isometric Studio designed custom casework, display pedestals, and
  contemporary graphic framing referencing Piranesi's visual aesthetic.
