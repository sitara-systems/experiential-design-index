summary: >
  The Jean & Ric Edelman Fossil Park & Museum of Rowan University, a
  new 65,000-square-foot museum in Glassboro, New Jersey built around an
  active Cretaceous-era fossil dig site, opened March 29, 2025, with
  architecture by Ennead Architects and KSS Architects and exhibition
  design by Gallagher & Associates.
