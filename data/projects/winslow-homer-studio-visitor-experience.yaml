summary: >
  A visitor experience and interpretive exhibits at the Winslow Homer Studio,
  a National Historic Landmark in Scarborough (Prouts Neck), Maine, operated
  by the Portland Museum of Art, opened 2012; exhibit design by Amaze
  Design, with architecture by Mills Whitaker Architects.
description: >
  The design includes a gallery orientation, a visit to three principal
  rooms of the studio, and a walk along the rocky shoreline that influenced
  Homer's paintings; ground- and second-floor exhibits explore Homer's life,
  career, and creative process, and the museum gallery interprets the
  building's history and restoration.
