summary: >
  The National WWII Museum's Road to Victory master plan expanded the New
  Orleans museum from a single D-Day pavilion into a seven-pavilion, seven-acre
  campus in phases from 2009 through the 2023 opening of the capstone
  Liberation Pavilion, with campus architecture by Voorsanger Architects and
  Mathes Brierre Architects and exhibit design across multiple pavilions by
  Gallagher & Associates.
description: >
  Gallagher & Associates describes itself as "responsible for identifying
  the most appropriate specialty consultants and procuring their services"
  across the museum's expansion; the fabrication and media credits above are
  drawn from G&A's own project page and are not all attributable to a single
  pavilion or year within the multi-phase master plan. This record covers
  G&A's exhibit-design engagement across the master plan generally, distinct
  from the separately-recorded "Voices from the Front" installation (2024),
  which G&A was not involved in.
