summary: >
  Molecules, a series of five interactive water-molecule sculptures along the
  Arizona Canal, was designed and fabricated by The Urban Conga for
  Scottsdale Arts' Canal Convergence festival (Scottsdale, AZ), opening
  November 2024.
description: >
  A temporary festival installation (Canal Convergence, Nov. 8-17, 2024)
  reflecting daylight and landscape by day and responding to visitor voices
  with internal LED lighting by night.
