summary: >
  "What Do You Make of This?", a temporary exhibition of Kristine Matthews' /
  Studio Matthews' design work, opened at the Jacob Lawrence Gallery at the
  University of Washington in Seattle in October 2023, designed by Studio
  Matthews.
description: >
  Spanning three galleries and over 2,000 square feet, the exhibition doubled
  as a case study in sustainable exhibition design, built largely from
  recycled and upcycled cardboard and prior exhibition components, with total
  fabrication costs held under $3,500. It received a 2024 SEGD Global Design
  Award (Merit, Exhibition).
