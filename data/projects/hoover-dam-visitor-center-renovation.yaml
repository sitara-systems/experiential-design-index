summary: >
  The Hoover Dam Visitor Center's exhibits, near Boulder City, Nevada,
  reopened in June 2025 after a $15 million renovation funded through the
  Southern Nevada Public Lands Management Act; exhibit design was by
  AldrichPears Associates, with kubik maltbie as prime exhibit contractor
  and AV installer and Northern Light Productions as media producer.
description: >
  The 5,700-square-foot renovated exhibit space includes thirteen
  interactive and immersive media experiences, including an immersive
  canyon passageway with panoramic media recreating 1920s dam construction,
  a "Build-a-Dam" interactive physical model, and media installations on
  worker history and Boulder City's development.
