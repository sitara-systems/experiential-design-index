summary: >
  A factory-tour and gallery renovation of the Louisville Slugger Museum &
  Factory in Louisville, Kentucky, completed in 2023 by Jack Rouse
  Associates (JRA), the museum's most extensive renovation since 2008,
  expanding the Bat Vault and adding new temporary exhibit space and a
  bat-sourcing film.
description: >
  Work began in late 2019 and paused during the COVID-19 pandemic before
  resuming and completing in 2023.
