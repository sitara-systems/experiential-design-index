summary: >
  A People's Contest: America's Civil War & Emancipation, a 13-minute
  orientation film for the Robins Theater at the American Civil War Museum
  in Richmond, VA, opened in 2020; produced by Solid Light with AV
  integration by CED.
description: >
  The capstone of the museum's 2019 core exhibit, developed with museum
  staff, historians, and scholars. Solid Light and CED developed a layered
  projection technique to portray the war's human dimensions through the
  perspectives of politicians, military leaders and soldiers, African
  Americans (enslaved and freed), women, and children.
