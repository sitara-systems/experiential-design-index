summary: >
  The wayfinding and storytelling program for the Seattle Convention
  Center's Summit Building, a 575,000-square-foot expansion in downtown
  Seattle designed by LMN Architects with Graham Baba Architects, opened in
  January 2023; Studio Matthews designed sculptural, content-filled floor
  numerals in the building's glass-enclosed stair that narrate Pacific
  Northwest industries (timber, maritime, aviation, music, technology) level
  by level.
