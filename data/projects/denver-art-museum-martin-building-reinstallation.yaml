summary: >
  The Denver Art Museum's Lanny and Sharon Martin Building reopened October
  24, 2021 after a renovation and campus reunification project, with
  architecture by Machado Silvetti and Fentress Architects and gallery-level
  exhibition design by more than a dozen firms, including Stephen Saitas
  Designs, credited on the European Art Before 1800, Photography, and
  Western American Art galleries.
description: >
  The $150 million renovation, marking the Martin Building's 50th
  anniversary since its 1971 opening by Gio Ponti and James Sudler
  Associates, added 33,328 square feet of new gallery and public space and
  reinstalled the museum's permanent collection galleries, each assigned to
  a different exhibition design firm.
sources:
