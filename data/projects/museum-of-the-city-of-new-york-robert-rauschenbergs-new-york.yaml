summary: >
  "Robert Rauschenberg's New York: Pictures from the Real World," an
  exhibition of the artist's photographs presented in partnership with the
  Robert Rauschenberg Foundation for his centennial, opened at the Museum
  of the City of New York in September 2025, designed by Isometric Studio.
description: >
  Isometric Studio's exhibition architecture centers on an H-shaped
  abstraction of a screen-printing screen as the central structural
  element, framing the artist's photographs, curated by Sean Corcoran.
