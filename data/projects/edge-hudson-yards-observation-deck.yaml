summary: >
  Edge, the Western Hemisphere's highest outdoor observation deck, opened
  atop 30 Hudson Yards in New York City on March 11, 2020; architecture by
  Kohn Pedersen Fox (KPF), with the "Journey to Edge" immersive entry
  experience and interior design by Rockwell Group's LAB studio.
description: >
  A 7,500-square-foot outdoor sky deck cantilevers 80 feet from the 100th
  floor of 30 Hudson Yards, more than 1,100 feet above street level, with a
  glass floor section and 360-degree Manhattan views; visitors reach it
  through an immersive multimedia sequence documenting Hudson Yards' history.
