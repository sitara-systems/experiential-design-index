summary: >
  "re: collections, Six Decades at the Rose Art Museum," a 13,000-square-foot
  reinstallation of the museum's Modernist building and Foster Wing marking
  its 60th anniversary, opened at the Rose Art Museum at Brandeis University
  in Waltham, Massachusetts, in June 2021, designed by Isometric Studio.
description: >
  The reinstallation spans the museum's bi-level building and includes
  22-ft-tall exhibition panels, curved walls, custom millwork for the lobby
  entrance, and a dichroic vinyl facade installation on the exterior that
  shifts color with sunlight and viewing angle. The Rose Art Museum also
  presented the concurrent temporary exhibition "Frida Kahlo: POSE" within
  the same design framework.
