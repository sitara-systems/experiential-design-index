summary: >
  The Jones Beach Energy & Nature Center, a mass-timber visitor and
  educational building at Jones Beach State Park in Wantagh, New York,
  opened in 2020, designed by nARCHITECTS with exhibition and graphic design
  by Tactile and AJA Architecture and Planning; it teaches coastal
  sea-level-rise resilience alongside its own sustainable design.
description: >
  Winner of the Spaces and Places category in Fast Company's 2024 Innovation
  by Design Awards. Landscape architecture by Starr Whitehouse is not
  captured as a project credit — the vocabulary has no landscape-architecture
  role (logged gap).
