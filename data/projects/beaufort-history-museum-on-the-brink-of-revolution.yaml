summary: >
  "Beaufort on the Brink of Revolution," a 225 sq ft animated immersive
  theater at the Beaufort History Museum in Beaufort, South Carolina,
  produced by Monadnock Media and funded in part by a $125,000 SC American
  Revolution Sestercentennial Commission (SC250) grant, was on public
  display by the museum's April 11, 2026 Family Day.
description: >
  The theater depicts the divisions between Patriots and Loyalists in
  Beaufort County in the years leading up to the American Revolution, tied
  to America's 250th-anniversary commemorations.
