technologies:
  - motion-sensor interactive lighting
summary: >
  Start an Evolution, a public interactive light installation of twenty
  motion-triggered triangular pillars at a pathway intersection on the
  University of British Columbia's Vancouver campus, was completed in 2015
  with lighting supply and integration by Eos Lightmedia for UBC's donor
  engagement office.
description: >
  Visitor movement triggers motion detectors that shoot a ripple of light
  through each acrylic pillar and its neighbors, evoking the ripple effect
  central to UBC's "Start an Evolution" fundraising campaign; the light
  palette combines UBC's brand blue with the campaign's magenta.
