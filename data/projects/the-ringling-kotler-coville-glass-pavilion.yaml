summary: >
  The Kotler-Coville Glass Pavilion, a 5,500-square-foot building housing
  the John and Mable Ringling Museum of Art's glass collection and serving
  as a reception lobby for the historic Asolo Theater, opened to the public
  January 22, 2018 in Sarasota, Florida, designed by Lewis + Whitlock with
  Sweet Sparkman Architects, and lighting design by Anita Jorgensen
  Lighting Design.
