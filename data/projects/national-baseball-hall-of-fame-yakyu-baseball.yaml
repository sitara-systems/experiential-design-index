summary: >
  Yakyu | Baseball, a 1,800 sq ft permanent exhibition at the National
  Baseball Hall of Fame and Museum in Cooperstown, NY, opened in 2025;
  exhibit design, interactive media, and fabrication by Solid Light.
description: >
  Explores more than 150 years of transpacific history and cultural exchange
  between American and Japanese baseball, developed in partnership with
  Keio University, Waseda University, and the Museum of Hanshin Koshien
  Stadium. Features hands-on activities, interactive media, bronze
  pitcher-grip casts, a video game (with Walt Disney Games), and an
  immersive fan-experience film.
