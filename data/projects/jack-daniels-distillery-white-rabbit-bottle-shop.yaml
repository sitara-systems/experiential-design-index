summary: >
  The White Rabbit Bottle Shop, a roughly 3,300 sq ft retail, bottle-
  customization, and visitor-gallery space at the Jack Daniel's Distillery
  Visitor Center in Lynchburg, Tennessee, opened in 2015, designed by
  Clickspring Design with architecture by Tuck-Hinton Architects and
  fabrication by 1220 Exhibits.
description: >
  The project blends brand storytelling with whiskey-making materials and
  was recognized with a "Best Permanent Corporate or Retail Installation"
  award.
