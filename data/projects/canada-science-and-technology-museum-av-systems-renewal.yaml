summary: >
  As part of the Canada Science and Technology Museum's three-year, $80.5
  million renewal in Ottawa, project integrator AVI-SPL (then CCS
  Southwest) delivered building-wide AV and collaboration systems —
  including an exterior LED canopy and projected façade show, auditorium,
  and classroom technology — for the museum's November 17, 2017
  reopening.
