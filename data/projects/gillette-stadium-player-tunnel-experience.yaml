summary: >
  Dimensional Innovations designed and installed a 130-foot player tunnel
  lighting experience at Gillette Stadium in Foxborough, Massachusetts,
  completed fall 2023, featuring a Traxon e:cue-controlled system of 180
  lights in six rows symbolizing the New England Patriots' six
  championships, with interchangeable banners for the stadium's two
  tenant teams.
