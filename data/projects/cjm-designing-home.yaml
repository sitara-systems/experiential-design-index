summary: >
  "Designing Home: Jews and Midcentury Modernism" opened April 4, 2014 at
  the Contemporary Jewish Museum in San Francisco, California, guest curated
  by Donald Albrecht, with exhibition and catalogue design by Pure+Applied.
description: >
  The first exhibition to examine Jewish designers', architects', patrons',
  and merchants' contributions to modern American domestic design, featuring
  work by Anni Albers, George Nelson, Richard Neutra, Alvin Lustig, and Saul
  Bass, among others; the exhibition later traveled to the Museum of Jewish
  Heritage in New York (through January 2016).
