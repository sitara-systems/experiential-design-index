summary: >
  Ellis Island Museum Reimagined, a $100 million, phased revitalization of
  the Ellis Island National Museum of Immigration in New York Harbor, is
  expected to complete in 2026; exhibit design is by Ralph Appelbaum
  Associates, with acoustic and audio consulting by SH Acoustics.
description: >
  The project expands the visitor journey across all three floors of the
  historic Main Building while integrating newly opened portions of the
  former Kitchen and Laundry Building; new exhibits include a cross-section
  of a 19th-century immigrant ship, a recreation of a Hester Street pushcart,
  and a 120-foot-wide video screen, alongside infrastructure upgrades
  (HVAC, electrical, Wi-Fi, restrooms).
