summary: >
  Rise of the Machines, a twelve-minute "artifact theater" multimedia
  exhibition on the microcomputer revolution, opened as part of the
  STARTUP gallery at the New Mexico Museum of Natural History and
  Science in Albuquerque around 2007, designed by Belle & Wissell and
  Weatherhead Design.
