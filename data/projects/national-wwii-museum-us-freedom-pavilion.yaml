summary: >
  US Freedom Pavilion: The Boeing Center, a new pavilion at The National
  WWII Museum in New Orleans housing large-artifact displays (B-17,
  Corsair, etc.), opened January 2013, with architecture by Voorsanger
  Architects, exhibit design by Gallagher & Associates, and lighting by
  Available Light. Distinct from the "Final Mission: USS Tang"
  installation already recorded, which sits inside this pavilion.
