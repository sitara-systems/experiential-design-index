summary: >
  Shakespeare Unauthorized, a temporary exhibition in the McKim Exhibition
  Hall of the Boston Public Library's Central Library in Copley Square,
  Boston, was designed by C&G Partners and ran October 14, 2016 through
  March 31, 2017, commemorating the 400th anniversary of Shakespeare's death.
description: >
  The three-years-in-the-making exhibition drew on the library's Shakespeare
  holdings, including a First Folio, using translucent stagecraft- and
  bookbinding-inspired scenic elements, printed theatrical scrims with
  projections, and interactive digital kiosks for exploring manuscripts,
  alongside infographics comparing early printed texts of plays such as
  Hamlet and The Merchant of Venice.
