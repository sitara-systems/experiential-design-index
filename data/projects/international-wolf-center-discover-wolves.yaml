summary: >
  Discover Wolves!, a renovated core exhibit at the International Wolf
  Center in Ely, Minnesota, opened June 28, 2019; exhibit design and
  fabrication by Split Rock Studios, with architecture by Alliiance.
description: >
  The renovation replaced the center's decades-old exhibits with
  interactive elements including an interactive map and a virtual plane
  ride experience, developed in collaboration with the center's wildlife
  biologists to interpret current wolf research for general audiences.
