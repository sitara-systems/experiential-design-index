summary: >
  The Rady Shell at Jacobs Park, a permanent 10,000-capacity outdoor
  amphitheater on San Diego Bay and summer home of the San Diego Symphony,
  opened August 2021, designed by Tucker Sadler Architects with a tensile
  fabric-and-steel performance shell by Soundforms (with Flanagan Lawrence
  and Expedition), fabricated and installed by Fabritecture, and theatre
  planning by Schuler Shook.
description: >
  Built on the Embarcadero Marina Park South site for roughly $85 million,
  the venue's irregular tensile-fabric canopy required close coordination
  between its shell designer (Soundforms), fabricator (Fabritecture), and
  theatre/AV consultants to integrate stage rigging, acoustics, and sound
  reinforcement within the structure. Landscape architecture was led by
  Burton Landscape Architecture Studio; acoustic, AV, and IT consulting by
  Charles M. Salter Associates; the onstage acoustic enhancement system by
  Meyer Sound and surround sound reinforcement by L-Acoustics; architectural
  lighting by HLB (Horton Lees Brogden), with theatrical lighting and
  rigging by Schuler Shook. Structural engineering was by Coffman Engineers,
  civil engineering by Moffat & Nichol, and MEP engineering by Robinson
  Engineering — not credited here as engineering is outside this index's
  role vocabulary. General contractor was Rudolph and Sletten.
