id: yvr-pier-d-mythical-island
name: "Pier D Expansion: Mythical Island"
venue: vancouver-international-airport
project_type: new-building
year_completed: 2020
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Developed the 360-degree lighting and visual-media experience for
      "Mythical Island," including layered lighting, digital display,
      projection, sensor, and networked-audio technologies integrated into
      the building architecture; collaborated with architects, marketing/
      branding personnel, creative consultants (Ken Heit Creative), and
      YVR Airport Authority.
  - firm: eos-lightmedia
    role: media-design
technologies:
  - motion sensors
  - transparent LED glasswork
  - projection
summary: >
  The Pier D expansion at Vancouver International Airport (YVR) in
  Richmond, British Columbia, Canada, the largest terminal expansion at YVR
  since 1996, opened in 2020 featuring "Mythical Island," a 360-degree
  lighting and media installation in a glassed-in forest, developed by Eos
  Lightmedia with creative direction from Ken Heit Creative.
description: >
  Passengers arrive via a suspended walkway where motion sensors trigger
  animal imagery on transparent LED glasswork, guiding them toward the
  Mythical Forest centerpiece, where choreographed sound-and-light shows
  immerse passengers; the lighting design won a 2022 IES Illumination
  Award of Merit and a 2022 LIT Design Awards Honorable Mention.
sources:
  - https://www.eoslightmedia.com/work/36
