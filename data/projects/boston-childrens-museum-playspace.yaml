summary: >
  PlaySpace, Boston Children's Museum's exhibit for children ages three and
  under, reopened in a reimagined and redesigned form in February 2020,
  with graphic design by Proun Design.
description: >
  The 4,000 sq ft exhibit features dimensional cut letters, children's
  poetry integrated with window illustrations, and a bilingual
  English/Spanish graphic system built around geometric shapes.
