name: Wickiup Hill Learning Center Children's Gallery
venue: wickiup-hill-learning-center
project_type: new-exhibition
year_completed: 2012
credits:
  - firm: taylor-studios
    role: exhibit-design
  - firm: taylor-studios
    role: fabrication
summary: >
  A 2,200-square-foot children's gallery at the Wickiup Hill Learning Center
  in Toddville, Iowa, completed in 2012 by Taylor Studios for the Linn
  County Conservation District, structured around a custom-written
  children's storybook.
description: >
  Each gallery section represents a chapter of the storybook, including a
  climbable large-scale frog, an eagle's nest with plush eggs, and a Native
  American thatched dwelling with a simulated fire-gathering area.
sources:
  - https://taylorstudios.com/our-work/wickiup-hill-learning-center/
