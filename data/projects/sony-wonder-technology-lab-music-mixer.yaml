summary: >
  Music Mixer, a multi-player interactive multi-touch table installation
  built around a remix of Alicia Keys' "Empire State of Mind (Part II),"
  opened at the Sony Wonder Technology Lab in New York on June 28, 2011;
  exhibit design by James Hollingsworth Design, interactive programming by
  Unified Field, and media hardware/systems integration by Three Byte
  Intermedia.
description: >
  Visitors manipulate three-dimensional "audio blocks" representing
  different instruments, effects, and musical genres to collaboratively
  remix the featured Alicia Keys track while learning about music
  production.
