name: "Forged in Freedom: The Bond of the Seward-Tubman Families"
venue: seward-house-museum
project_type: new-exhibition
year_completed: 2019
credits:
  - firm: peter-hyde-design
    role: exhibit-design
summary: >
  "Forged in Freedom: The Bond of the Seward-Tubman Families," an exhibit
  on the relationship between the Seward and Tubman families at the Seward
  House Museum in Auburn, New York, opened in 2019; exhibit design by
  Peter Hyde Design.
description: >
  Drawing on original historical research by the Seward House Museum, the
  exhibit centers on Margaret Stewart, Harriet Tubman's niece, who was
  brought to Auburn and cared for by the Seward family in 1862, and
  explores the interconnected histories of the two families.
sources:
