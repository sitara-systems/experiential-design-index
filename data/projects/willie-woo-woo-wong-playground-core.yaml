summary: >
  A comprehensive renovation of Willie "Woo Woo" Wong Playground, a 1927
  Chinatown neighborhood park in San Francisco, funded by the 2012 Clean and
  Safe Neighborhood Parks Bond and completed in 2021; led by CMG Landscape
  Architecture with Jensen Architects on the clubhouse remodel; a 2022
  Finalist, Fast Company Innovation by Design Awards, Urban Design category.
description: >
  CMG Landscape Architecture led the $14.5 million park-wide renovation
  (play areas, basketball court, landscape); Jensen Architects designed the
  clubhouse remodel. The project team also included InterEthnica, Urban
  Design Consulting Engineers, Pivot Structural Engineering, HRA Consulting
  Engineers, McGinnis Chen Associates, and M Lee Corporation (contractor).
  CMG Landscape Architecture is not credited here — no delivery-stack role
  in the schema vocabulary currently covers landscape architecture (see
  research-methodology.md's open vocab-gap note).
