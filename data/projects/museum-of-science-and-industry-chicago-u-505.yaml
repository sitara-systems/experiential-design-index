summary: >
  The U-505 Submarine exhibit, a new 27,000 sq ft underground pavilion
  built to house the restored WWII German submarine at the Museum of
  Science and Industry, Chicago, reopened June 5, 2005, exhibit design by
  Christopher Chadbourne & Associates and lighting by Available Light.
description: >
