summary: >
  Princeton International Atrium, a 7,200-square-foot floor installation
  with typography spanning three levels, was completed in 2019 at the
  Louis A. Simpson International Building at Princeton University in
  Princeton, New Jersey, designed by Isometric Studio.
description: >
  Isometric Studio applied silver vinyl lettering in a custom stencil
  typeface to porcelain floor tiles, sealed under epoxy and polyurethane
  coating, creating a concentric pattern that reveals quotations from
  global authors as visitors walk across the floor.
