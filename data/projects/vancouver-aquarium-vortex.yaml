summary: >
  Vortex, a 50,000-litre water installation depicting the Great Pacific
  Garbage Patch, was presented at the Vancouver Aquarium in 2018; Eos
  Lightmedia designed, supplied, installed, and programmed its specialty
  lighting and motion effects.
description: >
  Conceived by artist Douglas Coupland (individual credit, not recorded as
  a firm per this index's firms-and-projects-only scope), Vortex centers on
  a battered fishing boat lost in the 2011 Japanese tsunami and found on
  Haida Gwaii's shores, surrounded by marine debris collected from British
  Columbia shorelines, exploring ocean plastic pollution.
