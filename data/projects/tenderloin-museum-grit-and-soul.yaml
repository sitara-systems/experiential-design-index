summary: >
  Grit and Soul, the inaugural exhibition of the Tenderloin Museum in San
  Francisco, opened in June 2015 with exhibit design by West Office
  Exhibition Design.
description: >
  The Tenderloin Museum, founded by Uptown Tenderloin, Inc. under executive
  director Randy Shaw, tells the story of the San Francisco Tenderloin
  neighborhood from its rebuilding after the 1906 earthquake and fire
  through its history as a hub of jazz, LGBTQ+ refuge, and successive waves
  of housing reform.
