summary: >
  The First Division Museum at Cantigny Park in Wheaton, Illinois,
  reopened August 26, 2017 after an eight-million-dollar, ten-month
  renovation and expansion coinciding with the 100th anniversary of the
  1st Infantry Division; exhibit development and design by Luci Creative,
  with interactive and media content by Northern Light Productions and
  Unified Field.
description: >
  The renovation added the permanent "Duty First" exhibit and reimagined
  the "First in War" gallery, extending the museum's story from the
  Vietnam War to the present. Interactive features include a full-scale
  Black Hawk helicopter with VR headsets simulating a house raid in Iraq
  and a Bradley Fighting Vehicle simulation of a Gulf War tank battle,
  built with CGI using footage of actual First Division soldiers.
