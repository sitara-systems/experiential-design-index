summary: >
  The Beaufort Visitor Information Center for Cape Lookout National
  Seashore in Beaufort, North Carolina opened April 15, 2021 with
  interpretive and interactive exhibits orienting visitors to the park's
  barrier islands, designed by Wondercabinet Interpretive Design with
  graphics by Proun Design and fabrication by Mystic Scenic Studios.
description: >
  The exhibits provide an overview of the park's recreational offerings and
  transportation options between the mainland and the islands, emphasizing
  the barrier islands' natural landscape and cultural history.
