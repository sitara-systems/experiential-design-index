summary: >
  The Washington State History Museum's founding permanent exhibition,
  opened with the Tacoma museum on August 10, 1996, was designed by West
  Office Exhibition Design.
description: >
  The exhibition presents Washington's history through interactive
  theatrical vignettes combining artifacts, environmental settings,
  interactive exhibits, and multimedia presentations depicting the state's
  natural environment, the cultures of its inhabitants, and significant
  historical events.
