summary: >
  Seattle Children's Building Care, a 479,000-square-foot diagnostic and
  treatment facility designed by ZGF Architects, opened in June 2022 with a
  Pacific Northwest-themed wayfinding program (Forest, Mountain, River,
  Ocean zones) and murals designed by Studio SC.
description: >
  Studio SC simplified the hospital's navigation from six zones to four,
  each named and color-coded to a Pacific Northwest landscape, with
  floor-to-ceiling murals and an illustrated "Discovery Trail" map and
  3D diorama at the main entrance.
