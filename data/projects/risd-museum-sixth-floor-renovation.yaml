summary: >
  The RISD Museum's eight sixth-floor Radeke Building galleries, housing
  the museum's ancient Egyptian, Asian, and costume and textiles
  collections, reopened June 13, 2014 after a renovation designed by Ed
  Wojcik Architect with Stephen Saitas Designs and lighting design by
  Anita Jorgensen Lighting Design, the final stage of an $8.4 million
  overhaul of the building.
