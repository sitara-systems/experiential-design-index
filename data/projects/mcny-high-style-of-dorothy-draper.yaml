summary: >
  The High Style of Dorothy Draper opened May 2006 at the Museum of the City
  of New York, curated by Donald Albrecht, with exhibition design by
  Pure+Applied, lighting design by Anita Jorgensen Lighting Design, and
  fabrication by Voll Inc.
description: >
  The retrospective on interior designer Dorothy Draper drew more than
  300,000 visitors over six months and later traveled to the Women's Museum
  in Dallas (December 2006-July 2007). Installations included an oversized
  "Manor Rose" wallpaper pattern scaled to 4 feet and a 9-foot birdcage
  chandelier.
