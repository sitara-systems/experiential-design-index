summary: >
  The Deacon Gallery, a 1,500 sq ft interactive alumni gallery inside the
  Bowman Gray Center for Medical Education at Wake Forest University
  School of Medicine in Winston-Salem, North Carolina, opened September
  2016; interpretive plan by Peter Hyde Design.
description: >
  Three vertical touch walls let visitors search living alumni by
  specialty and location, browse a timeline of the school's history, and
  page through decades of yearbooks.
