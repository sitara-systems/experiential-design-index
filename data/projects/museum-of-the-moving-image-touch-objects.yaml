id: museum-of-the-moving-image-touch-objects
name: Touch Objects Program
venue: museum-of-the-moving-image
project_type: installation
year_completed: 2024
credits:
  - firm: prime-access-consulting
    role: technical-consulting
    note: >
      Ran a two-phase engagement (January–August 2024): a "Practice of
      Inclusion" staff workshop series, then establishment of a Disability
      Community Advisory Group and two rounds of community-led prototyping
      that produced nine accessible touch objects from the museum's
      collection (including a Hannibal Lecter stunt mask, Muppet
      construction materials, a Hound's Helm from Game of Thrones, and a
      Bell & Howell 8mm projector) plus an accessible microsite with
      tactile descriptions; the work evolved into a recurring monthly
      touch program.
technologies:
  - touch objects
summary: >
  The Museum of the Moving Image's Touch Objects Program, developed with
  Prime Access Consulting and a Disability Community Advisory Group in
  2024, produced nine accessible touch objects and a recurring monthly
  touch experience.
