summary: >
  The Gichi-ziibi Center for the Arts, a 1,200-seat proscenium performing
  arts center attached to Brainerd High School in Brainerd, Minnesota,
  opened May 26, 2021, designed by architect of record Widseth with theatre
  planning and lighting design by Schuler Shook and AV systems consulting by
  Peterson AV Consulting.
description: >
  Funded by Brainerd Public Schools' 2018 bonding referendum, the center
  fulfilled a decades-old vision dating to the high school's original 1960s
  construction. It houses a 1,200-seat proscenium theatre with an adjustable
  acoustic shell and ceiling clouds, an expanded orchestra pit and pit
  cover, a flexible black-box "Studio Stage," music ensemble and practice
  rooms, dressing rooms, and a scene shop. Community stakeholder Lakes Area
  Music Festival, which stages professional symphonic, chamber, ballet, and
  opera performances in the space, prompted taxpayer-approved features
  (expanded orchestra pit, adjustable acoustics) beyond a typical high
  school auditorium. Acoustical engineering was provided by Kvernstoen,
  Ronnholm & Associates. The venue is named "Gichi-ziibi" (Ojibwe for "big
  river," a name for the Mississippi River), acknowledging the region's
  Indigenous history.
