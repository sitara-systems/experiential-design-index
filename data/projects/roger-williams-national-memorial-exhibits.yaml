summary: >
  New and Dangerous Opinions, a 650 sq ft exhibition on Roger Williams's
  ideas about religious freedom and personal liberty at the Roger Williams
  National Memorial visitor center in Providence, Rhode Island, opened in
  2017, with exhibit design and fabrication by Mystic Scenic Studios and
  graphics by Proun Design.
description: >
  The exhibition uses bold graphics, current photography, and custom
  illustration to connect Roger Williams's 17th-century ideas on personal
  liberty and religious freedom to their influence on the Bill of Rights.
