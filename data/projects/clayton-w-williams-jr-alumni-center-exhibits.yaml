summary: >
  Interactive exhibits at the Clayton W. Williams, Jr. Alumni Center in
  College Station, Texas, home of Texas A&M's Association of Former
  Students, opened with the building's rededication in fall 2009, exhibit
  design by West Office Exhibition Design.
description: >
  The remodeled Alumni Center houses six interactive exhibits — Traditions,
  Spirit, Muster, Memories, Legacy, and Network — celebrating Texas A&M
  traditions and history, including stations where visitors can view Aggie
  yell demonstrations, record personal memories as students, and experience
  360-degree views of university traditions.
