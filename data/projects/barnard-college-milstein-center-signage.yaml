summary: >
  The Cheryl and Philip Milstein Center for Teaching and Learning at
  Barnard College in New York City opened September 2018 with wayfinding,
  identification, and donor-recognition signage designed by C&G Partners,
  for a building designed by Skidmore, Owings & Merrill.
description: >
  C&G Partners designed wayfinding, identification, and donor signage for
  the 128,000-square-foot Milstein Center, using a "fragmenting and
  framing" concept in black-framed directional signs with Barnard-blue
  accents, gender-inclusive restroom symbols, and a donor wall of blue
  panels arranged to form the Barnard College seal.
