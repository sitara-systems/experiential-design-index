summary: >
  You Are Here, a 3,100-sq-ft permanent exhibition at The History Museum
  at the Castle in Appleton, Wisconsin, opened April 26, 2024; exhibition
  design and development by Split Rock Studios.
description: >
  The exhibition presents four thematic areas exploring the relevance
  and interconnectivity of the Fox River Valley region's landscape,
  peoples, and cultures through time, including a topographic map,
  modular wall systems, and touch sensor interactives.
