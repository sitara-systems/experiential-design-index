id: storyeum-dinosaurs-in-gastown
name: Dinosaurs in Gastown
venue: storyeum
project_type: temporary-exhibition
year_completed: 2005
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: "Lighting and scenic design services (as Douglas Welch Design, since folded into Eos Lightmedia), per Eos Lightmedia's own project page."
technologies:
  - animatronics
  - video projection
summary: >
  Dinosaurs in Gastown, a temporary fossil and animatronic-dinosaur
  exhibition for client Infinity Entertainment, was staged in 2005 at
  Storyeum in Vancouver's Gastown neighbourhood (Storyeum closed in October
  2006); Eos Lightmedia (then operating as Douglas Welch Design) provided
  lighting and scenic design.
description: >
  The exhibition featured more than 100 prehistoric fossils, 11 dinosaur
  skeletons (eight authentic, including a Crichtonsaurus from Beipiao,
  China), a life-size animatronic T-Rex and Triceratops, and a
  twice-hourly actor-driven show.
sources:
