id: oregon-coast-aquarium-nature-play-and-lobby-renovation
name: "Nature Play Area, Amphitheater & Lobby Renovation (Capital Campaign Phase 1)"
venue: oregon-coast-aquarium
project_type: major-renovation
year_completed: 2022
credits:
  - firm: dangermond-keane-architecture
    role: architecture
  - firm: walker-macy
    role: landscape-architecture
    note: "Landscape design for the nature play area and site work; no firm record yet"
summary: >
  Phase 1 of the Oregon Coast Aquarium's capital-campaign renovation — a
  nature play area, outdoor amphitheater for educational programs, a
  headwaters feature, and a renovated lobby and cafe with a new moon
  jelly exhibit — opened at the aquarium in Newport, Oregon in 2022,
  designed by Dangermond Keane Architecture (now Bearing Architecture)
  with landscape design by Walker Macy.
description: >
  A later, unrelated Phase 2 (Sandy & Rocky Coast Galleries, opened
  October 2024, credited to Roto and EHDD) exists at the same venue but
  is not sourced as involving Dangermond Keane/Bearing Architecture.
