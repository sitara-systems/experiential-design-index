summary: >
  One Bryant Park (Bank of America Tower), a LEED Platinum-certified office
  tower in Manhattan developed by the Durst Organization, opened in 2010
  with a signage and environmental graphics program designed by C&G
  Partners for a building designed by Cook + Fox Architects.
description: >
  C&G Partners created a comprehensive architectural graphics and signage
  program for the complex, using recycled materials and energy-efficient
  lighting, applied across the Bank of America headquarters lobby, the
  restored Stephen Sondheim Theatre (formerly Henry Miller's Theatre), and
  the pedestrian arcade connecting the two properties.
