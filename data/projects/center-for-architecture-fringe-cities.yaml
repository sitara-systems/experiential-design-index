summary: >
  Fringe Cities: Legacies of Renewal in the Small American City, an
  exhibition on the aftermath of federal urban-renewal programs in small
  American cities, ran at the Center for Architecture in New York City from
  October 2019 through January 2020, curated and designed by MASS Design
  Group with graphic design by Beurskens Projects.
description: >
  The exhibition examined "Fringe Cities" — small, independently governed
  municipalities severely affected by mid-20th-century federal urban renewal
  programs — through case studies including Poughkeepsie, New York.
  Developed in partnership with the Center for Architecture (operated by AIA
  New York), it was on view October 2, 2019 through January 18, 2020.
