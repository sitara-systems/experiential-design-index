summary: >
  The East Gallery at Krannert Art Museum, the University of Illinois
  Urbana-Champaign's fine art museum in Champaign, Illinois, was renovated
  in 2015 with new LED lighting designed by Schuler Shook and architecture
  by Tilton, Kelly + Bell, to bring the museum's temporary/traveling
  exhibition space into visual consistency with its adjacent permanent
  galleries.
description: >
  The East Gallery serves as Krannert Art Museum's home for traveling and
  temporary exhibitions. Its 2015 renovation refinished the gallery's floors
  and replaced its lighting with an LED system, developed by Schuler Shook
  in collaboration with the University of Illinois Student Sustainability
  Committee to balance artwork-display quality with energy efficiency, as
  part of the university's campus-wide sustainability push. The project
  preceded a larger, separate 2016 renovation of the museum's Rosann Gelvin
  Noel Gallery, Light Court, and Asian Gallery (led by Rice+Lipka Architects
  with LCM Architects as architect of record), which did not include the
  East Gallery.
