summary: >
  The Congressman Alan Lowenthal Global Trade & Education Center, an
  11,000-square-foot corporate visitor center on the third floor of the
  Port of Long Beach's administrative headquarters in Long Beach,
  California, opened in 2019; interpretive planning by Lord Cultural
  Resources, exhibit design by Tessellate Studio, and architecture by
  Studio One Eleven with interiors by DyeLot.
description: >
  The visitor center features a large-scale 3D Port map, a digital map
  table, an innovation showcase with animated elements and 3D-printed
  models, a touchless interactive wall, large-scale photography, a
  timeline, and workforce stories, serving port tenants, business
  partners, dignitaries, students, and community members.
