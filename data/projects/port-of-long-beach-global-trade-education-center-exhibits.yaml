_comments: >
  Corrected 2026-07-20: year_completed changed from 2019 to 2024. The
  2019 date came from Studio One Eleven's page, which actually states
  the base Port Administration Building shell was "completed in July
  2019" — a different milestone from the exhibits/education center
  itself, which per the Long Beach Post's coverage of the $19M naming
  and opening (retired Rep. Alan Lowenthal) completed in 2024. The
  exhibits-specific id/scope of this record makes 2024 the correct
  completion year.

  sitara-systems credit added 2026-07-20. Re-verified 2026-07-22 against
  the live production https://www.sitara.systems/polb-experience-center/
  (site launched at DNS cutover, replacing the temp preview domain this
  record was originally drafted against) — the production page's
  credits block now clearly differentiates "Content production: Faculty"
  and "Fabrication: Cinnabar California" (previously listed together as
  unspecified-role "exhibit partners" on the preview), so both are now
  added as explicit credits above, resolving the prior "unresolved"
  flag. Not independently corroborated: Lord/Studio One Eleven/DyeLot's
  own project pages are all silent on Sitara, Faculty, and Cinnabar.
