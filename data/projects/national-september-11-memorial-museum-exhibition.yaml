summary: >
  The National September 11 Memorial Museum, an underground history museum
  at the World Trade Center site in New York City, was dedicated May 15,
  2014 and opened to the public May 21, 2014; architecture by Davis Brody
  Bond, exhibition design by Thinc Design and Layman Design, media design by
  Local Projects, and AV integration by Electrosonic.
