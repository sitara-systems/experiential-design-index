id: nmaahc-in-slaverys-wake
name: "In Slavery's Wake: Making Black Freedom in the World"
venue: nmaahc
project_type: traveling-exhibition
year_completed: 2024
credits:
  - firm: monadnock-media
    role: media-design
    note: "Media experience design and production and digital interactive design and development, including an interactive Abolition Map and single-user interactives, for the exhibition's Washington, DC debut"
