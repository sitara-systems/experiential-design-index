summary: >
  The Bruce Springsteen Center for American Music, a new 32,000-square-foot,
  approximately $50 million museum and performance venue on the campus of
  Monmouth University in West Long Branch, New Jersey, opened to the public
  June 13, 2026 as the repository for Bruce Springsteen and E Street Band
  archives and a hub for American music history; C&G Partners designed the
  eight galleries and wayfinding, with architecture by COOKFOX.
