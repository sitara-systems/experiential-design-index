summary: >
  Forest Net(work), a temporary zero-waste public installation honoring the
  Puget Lowlands Forest biome, was designed and built by NBBJ with landscape
  design by Berger Partnership for the 2022 Seattle Design Festival Block
  Party at Lake Union Park in Seattle; it gave away 600 native trees, shrubs,
  and ground covers to festival visitors and used mycelium-grown signage that
  was composted after the event.
