id: national-building-museum-justice-is-beauty
name: "Justice is Beauty: The Work of MASS Design Group"
venue: national-building-museum
project_type: temporary-exhibition
year_completed: 2021
credits:
  - firm: mass-design-group
    role: exhibit-design
    note: "Exhibition direction by Maggie Jacobstein Stern (MASS); design by Shuheng Fu"
technologies:
  - environmental graphic design
summary: >
  Justice is Beauty: The Work of MASS Design Group, a 3,000-square-foot
  monographic exhibition surveying the firm's first decade of projects, ran
  at the National Building Museum in Washington, DC, from April 2021 through
  September 2022, curated by Susan Piedmont-Palladino and Deborah Moore
  Sorensen with exhibition design by MASS Design Group.
description: >
  Organized around five themes — engaging, healing, fostering, conserving,
  and marking — the exhibition presented MASS Design Group's process through
  videos, material samples, models, diagrams, sketches, and photographs.
