summary: >
  The Abraham Lincoln Presidential Museum, dedicated April 19, 2005, in
  Springfield, Illinois, was designed, created, and produced by BRC
  Imagination Arts, combining historical artifacts and scholarship with
  theatrical storytelling technology.
description: >
  Designed under BRC founder Bob Rogers, the museum was widely described at
  opening as the first major "Experience Museum," combining interactive
  exhibits, theaters, a children's area, and a "Holavision" presentation. It
  has ranked as America's most-visited state-controlled presidential
  museum.
