summary: >
  An interactive-technology upgrade to the Dana-Farber Cancer
  Institute's Zebrafish Display, Boston, MA, completed February 2022
  with Shapeways — replacing custom capacitive-touch sensors on all
  477 3D-printed zebrafish with passive NFC tags, each surfacing a
  donor's personal message on a visitor's phone; technology by Sitara
  Systems, per BusinessWire's independent press release and
  independent trade coverage (SEGD, Yahoo Finance). The original
  477-fish donor-wall sculpture was designed by Small Design Firm in
  2012, distinct from Sitara's later technology work.
