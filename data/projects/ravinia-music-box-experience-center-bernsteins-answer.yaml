summary: >
  The Ravinia Music Box Experience Center, a new immersive theatrical venue
  celebrating Leonard Bernstein's legacy at Ravinia Festival in Highland
  Park, Illinois, opened August 7, 2021, created by BRC Imagination Arts.
description: >
  The centerpiece show, "Bernstein's Answer," uses 360-degree digital sound
  and immersive media to introduce younger audiences to classical music. It
  won the 2022 MUSE Creative Award (Gold, Immersive/Experiential) and a
  Skift IDEA Award for Physical Experience.
