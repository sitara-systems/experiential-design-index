summary: >
  A 2,800-square-foot full gallery renovation at the Indiana State Museum in
  Indianapolis, completed in 2016 by Taylor Studios, contrasting 1800s and
  modern-day Indiana landscapes.
description: >
  Immersive dioramas, crawl-through caves, animated projections, and
  tactile floor elements culminate in a conservation-focused comparison of
  historical versus contemporary environments, delivered on a compressed
  schedule with overlapping design and fabrication phases.
