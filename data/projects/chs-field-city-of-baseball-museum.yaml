summary: >
  City of Baseball Museum, a free permanent exhibit at CHS Field, home
  of the St. Paul Saints, opened May 16, 2019; exhibit design and
  fabrication by Split Rock Studios.
description: >
  The museum explores the historical connections between the St. Paul
  Saints and the city of St. Paul, covering neighborhood talent, Hall of
  Famers, and Negro league baseball history through historic replicas,
  custom artifact mounts, and a large-scale map of St. Paul, developed
  over an 11-month timeline with team owners and local historians.
