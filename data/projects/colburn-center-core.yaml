summary: >
  The Colburn Center, a 100,000 sq ft expansion of the Colburn School's
  downtown Los Angeles campus designed by Gehry Partners, broke ground
  April 2024 and topped out July 2025; its centerpiece 1,000-seat Terri
  and Jerry Kohl Hall has acoustic design by Nagata Acoustics and
  theatre consulting by TheatreDNA, with completion expected 2027.
