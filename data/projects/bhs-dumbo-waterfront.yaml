summary: >
  Waterfront, a long-term exhibition on Brooklyn's waterfront history,
  opened January 20, 2018 at the Brooklyn Historical Society's DUMBO
  location inside Empire Stores in Brooklyn, New York, curated by Julie
  Golia and Katie Lasdow, with exhibition design by Pure+Applied and media
  production by batwin + robin and Potion.
description: >
  The exhibition used operable drawers referencing the waterfront's
  historical storage function and incorporated multisensory elements
  (smell, touch, audio, video) documenting dockworkers and historical
  imports such as cochineal, jute, and saltpeter.
