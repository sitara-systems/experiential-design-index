summary: >
  The Seattle Asian Art Museum, in the city's Volunteer Park, reopened
  February 8, 2020 after a renovation and expansion by LMN Architects — its
  first major update since 1933 — with exhibit lighting design by Fisher
  Marantz Stone.
description: >
  The project restored the museum's original 1933 Art Deco structure,
  modernized galleries, and added a 13,905-square-foot wing containing a new
  gallery, community meeting room, and offices, while strengthening the
  building's connection to Volunteer Park through a new Park Lobby and an
  enhanced Fuller Garden Court.
