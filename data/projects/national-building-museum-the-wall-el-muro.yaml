summary: >
  The Wall/El Muro: What Is a Border Wall?, a bilingual temporary exhibition
  examining the US-Mexico border through artifacts, murals, sound, and data
  visualizations, opened at the National Building Museum in Washington, DC
  in November 2021 and ran for about a year; it was designed by mgmt. design
  with architecture by Matter Architecture Practice, curated by Sarah A.
  Leavitt.
