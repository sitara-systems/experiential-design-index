summary: >
  Ballast Island, a monumental installation of historic sandstone ballast
  stones interpreting the site's significance to Coast Salish peoples,
  opened 2026 at Colman Dock ferry terminal in Seattle for the Washington
  State Department of Transportation, designed by Studio Matthews.
description: >
  The installation addresses the displacement of Coast Salish peoples by
  industrial development in the 1800s and how Ballast Island became a
  crucial Indigenous gathering place despite systemic exclusion. Developed
  in consultation with the Muckleshoot, Suquamish, Tulalip, Snoqualmie, and
  Stillaguamish tribes and the Duwamish Tribal Organization.
sources:
