summary: >
  "Shaped by the Loom: Weaving Worlds in the American Southwest," a Focus
  Project exhibition of historic and contemporary Navajo (Diné) weaving
  curated by Hadley Jensen, was on view at the Bard Graduate Center Gallery
  in New York from February 17 through July 9, 2023.
description: >
  The exhibition paired historic Navajo textiles from the American Museum
  of Natural History with contemporary works by Diné weavers including
  Barbara Teller Ornelas and Lynda Teller Pete, organized around six themes
  (homeland and cosmology, ecology, dyeing and coloring, techniques and
  technologies, design elements, and value and exchange) and featured a
  commissioned soundscape by Navajo composer Connor Chee alongside artist
  interviews and interactive storytelling.
