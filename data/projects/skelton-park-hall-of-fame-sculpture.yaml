id: skelton-park-hall-of-fame-sculpture
name: Skelton Park African American Heritage Trail Hall of Fame Sculpture
venue: skelton-park
project_type: installation
year_completed: 2025
credits:
  - firm: taylor-studios
    role: fabrication
summary: >
  A 98-square-foot metal interpretive sculpture for the African American
  Heritage Trail in Skelton Park, Champaign, Illinois, completed in 2025 by
  Taylor Studios for Experience Champaign-Urbana, honoring 70 influential
  African American musicians.
description: >
  The sculpture depicts a musical staff with notes representing the honored
  artists and is sited near an existing Preston Jackson sculpture on the
  trail.
sources:
  - https://taylorstudios.com/our-work/skelton-park-hall-of-fame/
