summary: >
  AUTOPORTRAIT was a temporary exhibition at the Gallery at Cadillac House
  in New York City, presented by Visionaire, in which Tellart's ADA0002
  robot -- an industrial welding arm retrofitted for autonomous portrait
  drawing -- sketched visitors' portraits, running October 13 through
  November 4, 2016.
description: >
  ADA0002 (Advanced Drawing Automation, a nod to Ada Lovelace) was built
  from a repurposed ABB IRB1440 industrial welding robot. LeafLabs
  engineered the orchestration layer combining AI-driven computer vision,
  real-time motion control, and communication protocols to let the robot
  sketch a live portrait of each visitor to take home; visitors reportedly
  waited in line for over two hours for a turn.
