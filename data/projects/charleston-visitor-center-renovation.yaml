summary: >
  A $5.5 million, roughly yearlong renovation of the Charleston Visitor
  Center, housed in a former 1840s railroad depot on Meeting Street in
  Charleston, South Carolina, reopened in 2020; Glenn Keyes Architects led
  the building architecture and HealyKohler Design designed the exhibition,
  graphics, and media, including a double-sided video wall with interactive
  touchscreen portraiture.
