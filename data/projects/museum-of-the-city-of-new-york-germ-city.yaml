summary: >
  "Germ City: Microbes and the Metropolis," a 4,400-square-foot exhibition
  on the history of infectious disease in New York City produced with the
  New York Academy of Medicine and Wellcome Collection, opened at the
  Museum of the City of New York in 2018, designed by Isometric Studio.
description: >
  The exhibition design includes a curvilinear table display system,
  gradient-painted gallery walls, and four interactive "microbe tables" in
  a reading-room-style space.
