summary: >
  The South Carolina Historical Society Museum, housed in Charleston's
  1826 Fireproof Building, opened September 2018 after a $6.8 million
  renovation completed that June; Glenn Keyes Architects led the
  building restoration and HealyKohler Design designed the exhibits.
description: >
  The museum integrates exhibit design, interpretive graphics, and media
  with the Fireproof Building's Greek Revival architecture, using audio,
  film, and touch-screen interactives to present South Carolina history,
  with rotating casework for evolving content.
