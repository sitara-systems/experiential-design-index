summary: >
  "Ancient Olympia: Common Grounds," a mixed-reality exhibition digitally
  restoring the ancient site of Olympia, opened at the Athens Olympic
  Museum in Athens, Greece in October 2021 and ran there through October
  2023 before traveling; produced by immersive agency A_DA with Microsoft
  and the Hellenic Ministry of Culture and Sport, with experience
  strategy, HoloLens software development, and systems design by Glowbox,
  content and VFX by Invisible Thread, and 3D reconstruction by Iconem.
