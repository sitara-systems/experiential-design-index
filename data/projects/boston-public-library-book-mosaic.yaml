summary: >
  BPL Book Mosaic, a large wall mosaic in the Boston Public Library's
  renovated Central Library lobby in Copley Square, Boston, Massachusetts,
  made entirely from hardcover books and unveiled at the library's July
  2016 grand reopening; designed by Arrowstreet and fabricated by Mystic
  Scenic.
description: >
  The installation forms an interpretation of Boston created from hardcover
  books sourced from a local used bookshop or donated for the project.
  Arrowstreet developed the concept, scanned each book to complete an
  electronic layout, refined book positioning digitally, and supervised a
  full-sized hand layout before Mystic Scenic sealed, sprayed, and attached
  the books to backer panels for installation.
