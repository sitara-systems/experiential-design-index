summary: >
  The Remembrance Gallery, an immersive memorial and interactive exhibit
  honoring Japanese and Japanese American incarcerees at the Puyallup
  Assembly Center, opened in 2024 in the Washington State Fair grandstand in
  Puyallup, Washington, commissioned by the Puyallup chapter of the Japanese
  American Citizens League and designed by Belle & Wissell, Co.
description: >
  The gallery recreates Puyallup Assembly Center barracks and centers on a
  sculptural monument honoring over 7,500 incarcerees, with responsive
  lighting that illuminates individual name markers as visitors approach.
  Content partner Densho contributed historical material; oral histories
  were filmed by John Pai.
