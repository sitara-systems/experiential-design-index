summary: >
  The USC Shoah Foundation's global headquarters, occupying the top floor
  of USC's Leavey Library in Los Angeles, opened its public visitor center
  in November 2018 with architecture by Belzberg Architects, exhibition
  consulting by the Maude Group, and AV integration by MAD Systems.
description: >
  The visitor center's interactive exhibits include Waterfall (two 10-ft
  interactive displays sharing survivor testimonies), Fins (touchscreen
  information pillars), Pathways to Testimony (portrait touchscreens), and
  a 24-ft Mirror Wall of monitors combining survivor testimony with an
  interactive map of the exhibition's global impact.
