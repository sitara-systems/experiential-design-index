summary: >
  A 7,000 sq ft redesign of the DuPage Children's Museum in Naperville,
  Illinois, completed in 2015 after water-damage restoration; exhibit
  design by Architecture Is Fun with fabrication, installation, and
  project management by Chicago Scenic Studios.
description: >
  New spaces included "Creativity Connections" and "Big Lawn" with sliding
  hills, plus enhanced "Make it Move" exhibits and the award-winning
  Pyramid Puzzle interactive installation (2016 AIA Chicago Small Project
  award).
