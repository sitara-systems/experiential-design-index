summary: >
  "Gay Gotham: Art and Underground Culture in New York" was on view October
  7, 2016 through February 26, 2017 at the Museum of the City of New York,
  with exhibition design by Joel Sanders Architect and exhibition graphics
  and catalogue design by Pure+Applied.
description: >
  The exhibition traced three generations of New York City queer artistic
  networks from 1910 to 1993 across two gallery floors, curated by Donald
  Albrecht and Stephen Vider.
