summary: >
  A multimillion-dollar reimagining of the International Tennis Hall of Fame
  & Museum, housed in the historic Newport Casino in Newport, Rhode Island,
  reopened May 14, 2025; HealyKohler designed the exhibits, graphics, and
  media, including a life-size Roger Federer hologram and an interactive
  projection globe.
description: >
  The renovated museum experience integrates exhibit design with the historic
  Newport Casino building — the site of the first U.S. National Lawn Tennis
  Championship — across galleries including the Hall of Famers Gallery,
  Celebration Gallery, "The Majors" interactive journey (narrated by Roger
  Federer), Newport Tennis Traditions Gallery, and Legends Lounge, displaying
  over 2,000 artifacts.
