summary: >
  The Empire State Trail, a 750-mile multi-use state trail across New York
  spanning New York City to the Canadian border and Albany to Buffalo,
  was completed at the end of 2020 with a wayfinding master plan and
  signage system designed by C&G Partners for New York State Parks.
description: >
  C&G Partners designed a comprehensive wayfinding master plan for the
  Empire State Trail, including trailhead gateways built with local stone
  and galvanized metal, signage adapted to varying trail conditions,
  custom cartography, and interpretive displays sharing local history,
  tied to the Empire State Trail Brewery Passport mobile app.
