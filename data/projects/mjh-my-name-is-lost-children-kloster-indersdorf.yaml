summary: >
  "My Name Is... The Lost Children of Kloster Indersdorf" was on view
  January 18 through April 30, 2017 at the Museum of Jewish Heritage -- A
  Living Memorial to the Holocaust in New York, with exhibition design by
  Pure+Applied, its first presentation at a Holocaust museum.
description: >
  The traveling exhibition presents photographs of children liberated from
  Nazi camps and displaced-persons facilities, taken by UNRRA welfare
  officer Charles Lynn Sulzberger at Kloster Indersdorf in 1945.
