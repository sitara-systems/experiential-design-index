summary: >
  A $25 million (CAD) major renovation of the Harry J. Enns Wetland
  Discovery Centre at Oak Hammock Marsh Wildlife Management Area in
  Stonewall, Manitoba, reopened to the public May 24, 2025, after 18
  months of closure; interpretive planning by Lord Cultural Resources,
  exhibit design by WeatherstonBruer Associates, fabrication by kubik
  maltbie, multimedia design by NGX, and architecture by Number TEN
  Architectural Group, developed in partnership with Ducks Unlimited
  Canada and the Province of Manitoba.
description: >
  The renewal reimagined the centre's main exhibit hall into thematic
  zones on the ecological importance of wetlands, including a
  floor-to-ceiling "Wall of Species," alongside renewed visitor spaces
  (theatre, cafe, gift shop, rooftop observation deck), with Indigenous
  knowledge holders contributing perspectives and traditional knowledge
  throughout the exhibits.
