summary: >
  "Collecting Memories: Treasures from the Library of Congress," a
  permanent exhibition in the new David M. Rubenstein Treasures Gallery at
  the Library of Congress in Washington, DC, opened for press preview June
  10, 2024, with exhibition and graphic design by the Library's Graphics
  Office with Roger Westerman Design, linear media production by
  batwin+robin, interactive media by Upswell, AV systems by Ford AV,
  lighting design by Anita Jorgensen Lighting Design, and casework
  fabrication by Goppion.
description: >
  The gallery's 26-minute ambient film immerses the room with projections
  showcasing the richness and materiality of collection artifacts,
  including a panoramic 1909 image of Piccadilly Circus, details of the
  39-foot Naxi Funeral Scroll, and a 1944 jazz session film, set to an
  original soundscape.
