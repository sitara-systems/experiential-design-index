summary: >
  1917: How One Year Changed the World, an exhibition on America's entry into
  WWI, the Bolshevik Revolution, and the Balfour Declaration seen through
  American Jewish experience, opened September 8, 2017 at the American Jewish
  Historical Society in New York City, with two interactive film installations
  by Dome.
description: >
  Co-organized by the American Jewish Historical Society and the National
  Museum of American Jewish History, the exhibition featured nearly 125
  artifacts including original drafts of the Balfour Declaration and a
  decoded copy of the Zimmermann Telegram, alongside interactive media. Dome's
  two interactive film installations invited visitors to reflect and respond
  to questions drawn from the period.
