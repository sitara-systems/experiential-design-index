summary: >
  Olson Kundig designed the Lightcatcher, a 42,000-square-foot addition to
  the Whatcom Museum in Bellingham, Washington that opened in December 2009
  as Washington's first LEED Silver-certified museum building.
description: >
  The building's defining element is a 37-foot-tall, 180-foot-long
  translucent wall serving as backdrop to a central courtyard; the museum
  campus also includes the Old City Hall and Old Fire Station No. 1
  buildings.
