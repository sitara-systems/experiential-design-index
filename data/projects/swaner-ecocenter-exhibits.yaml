summary: >
  The Swaner EcoCenter, an environmental education facility on Utah State
  University's Swaner Preserve near Park City, Utah, opened in 2008 with
  exhibit design by West Office Exhibition Design.
description: >
  Situated within a 1,200-acre nature preserve in the Snyderville Basin, the
  EcoCenter houses interactive exhibits, classrooms, and observation
  structures intended to educate the community about the area's ecosystems
  and inspire conservation. The building achieved LEED Platinum
  certification in 2009, the first newly constructed building in Utah to do
  so.
