summary: >
  The International Spy Museum's original location, spanning six historic
  buildings at 8th and F Streets NW in Washington, DC, opened July 19,
  2002, with exhibition design by Gallagher & Associates and lighting
  design by Anita Jorgensen Lighting Design; the museum won the 2005
  Themed Entertainment Association Thea Award for Best Museum. The museum
  relocated to a new building at L'Enfant Plaza in 2019 (see the separate
  record for that building).
