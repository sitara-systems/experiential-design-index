summary: >
  Beyond the Battle Museum, the Adams County Historical Society's new
  history center and museum in Gettysburg, Pennsylvania, opened to the
  public April 15, 2023; HealyKohler Design designed the exhibits and
  media.
description: >
  The museum tells the stories of Adams County residents "caught in the
  crossfire" of the Civil War's Battle of Gettysburg, including a
  recreated Civil War-era farmhouse experience with 360-degree special
  effects and an introductory film projection-mapped onto a 12-foot
  scenic rock formation.
