summary: >
  The Nature Research Center, a new wing of the North Carolina Museum of
  Natural Sciences in Raleigh, opened in 2012 with exhibit design by Andrew
  Merriell & Associates; it includes the Daily Planet, a three-story
  spherical theater with a 42-foot screen used for live science
  broadcasting.
