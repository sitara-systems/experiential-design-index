summary: >
  "Chatbots Decoded: Exploring AI," an exhibition on the history and
  mechanics of conversational AI, opened November 20, 2024 at the Computer
  History Museum in Mountain View, California; exhibition design by Van
  Sickle & Rolleri, with Exhibit Concepts Inc. as architect of record and
  fabrication by Bowen Technovation.
description: >
  The exhibit's centerpiece is Ameca, a humanoid robot built by Engineered
  Arts with facial recognition, sensors, and an LLM backend, which converses
  live with visitors in multiple languages.
