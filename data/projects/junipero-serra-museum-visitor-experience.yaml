summary: >
  The Junípero Serra Museum Visitor Experience Transformation, a reinterpreted
  core exhibition at the Junípero Serra Museum in San Diego, California,
  opened in 2019 to coincide with the 250th anniversary of the founding of San
  Diego and the museum's 90th anniversary, designed by C&G Partners for the
  San Diego History Center.
description: >
  The redesign uses the San Diego River as an organizing narrative thread
  across Native Kumeyaay, Hispanic colonial, and contemporary histories of the
  Presidio site. A circular forum at the center of the Main Gallery features a
  12-foot hand-woven rug depicting the San Diego River watershed and three
  hand-crafted benches with greetings in Kumeyaay, Spanish, and English.
  Digital installations include the Rain Tryptic, the Watershed 360 Vista (a
  view of the city's watershed from source to ocean), and the River Oculus
  Well, alongside a commissioned textile tapestry by Rachel Ehlin-Smith and
  historic artifacts and photographs.
