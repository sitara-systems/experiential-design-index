summary: >
  EA Story, an interactive installation marking Electronic Arts' 40th
  anniversary, opened in 2022 at EA's headquarters in Redwood City,
  California; Dome designed and built the projection-mapped interactive wall
  visualizing more than 1,200 games from EA's history, with content
  production, illustration, and historical image restoration by Aimee
  Stevland Design.
description: >
  Visitors spotlight physical and digital game covers by browsing genre,
  year, and platform on a projection-mapped wall, and can scan physical game
  covers with a mobile device to access archival content; each cover links
  to EA's internal archive. An exterior "doodle" tribute illustration honors
  iconic titles and characters from EA's catalog. The project received an
  Honorable Mention in the Experience Design category of Fast Company's
  2023 Innovation by Design Awards, and was shortlisted (Environmental
  category) in Communication Arts' 2023 Interactive competition.
