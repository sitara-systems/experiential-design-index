id: ea-headquarters-ea-story
name: EA Story
venue: ea-headquarters
project_type: installation
year_completed: 2022
credits:
  - firm: dome-collective
    role: media-design
    note: "Interactive projection-mapped wall visualizing 1,200+ EA games for the studio's 40th anniversary"
  - firm: aimee-stevland-design
    role: content-production
    note: "Design, illustration, and restoration of 20,000+ historical game-cover images for the interactive wall; exterior wall tribute illustration; no firm record yet"
technologies:
