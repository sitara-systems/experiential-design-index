summary: >
  Powerhouse Arts, a 170,000-square-foot fabrication and exhibition hub in a
  converted 1904 power station in Brooklyn, New York, opened in 2023 with
  architecture by Herzog & de Meuron (with PBDW Architects) and brand
  identity and wayfinding signage by Entro.
description: >
  The adaptive reuse of the former Brooklyn Rapid Transit Power Station
  preserved existing graffiti; Entro's signage uses large-scale, open-channel
  dimensional letterforms that frame and reveal the graffiti rather than
  covering it, complementing the building's industrial character.
