summary: >
  Charles & Anne Morrow Lindbergh, a yearlong exhibition on the aviator
  couple's New Jersey connections, opened at Morven Museum & Garden in
  Princeton, New Jersey, in 2015, designed by Isometric Studio.
description: >
  The exhibition spans six galleries within the 18th-century historic
  building and includes full-wall vinyl graphics, custom mahogany display
  cases with brass rods, and projections.
