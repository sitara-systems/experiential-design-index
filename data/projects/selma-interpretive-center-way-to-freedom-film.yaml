summary: >
  "The Way to Freedom: Selma and the Making of a Movement," a 2020 park
  orientation film shown at the Selma Interpretive Center in Selma,
  Alabama, was produced by Northern Light Productions for the National
  Park Service's Selma to Montgomery National Historic Trail.
description: >
  The film tells the story of the 1965 Selma voting-rights movement through
  interviews with participants who were teenagers at the time, combined with
  archival footage. Northern Light Productions has also produced an earlier
  Selma to Montgomery Trail film, "Never Lose Sight of Freedom" (2006, credited
  to NPS Harpers Ferry Center), shown at the Lowndes Interpretive Center;
  that earlier film is a separate production and is not part of this record.
