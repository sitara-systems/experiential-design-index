technologies: []
summary: >
  A $34 million lakefront entry expansion and renovation of the Milwaukee
  Art Museum reopened November 24, 2015, adding a roughly 120,000 sq ft
  entry atrium, cafe, and sculpture galleries and modernizing the museum's
  historic Saarinen and Kahler wings; architecture by HGA.
description: >
  This project is distinct from the museum's Santiago Calatrava-designed
  Quadracci Pavilion (2001), which is not an HGA project and is not
  recorded here.
