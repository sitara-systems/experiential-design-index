id: louisville-science-center-the-world-around-us
name: The World Around Us
venue: louisville-science-center
project_type: new-exhibition
year_completed: 2005
credits:
  - firm: west-office
    role: exhibit-design
technologies:
  - interactive pinball-mechanism water-cycle simulator
summary: >
  The World Around Us, a 40-exhibit permanent gallery exploring earth and
  natural sciences across three themed zones (Atmosphere, Terrasphere,
  Aquasphere), opened at the Louisville Science Center in Louisville,
  Kentucky in September 2005, designed by West Office Exhibition Design.
description: >
  Visitors explore natural-science concepts through hands-on exhibits
  including "Go H2O," a giant pinball-style mechanism demonstrating water-cycle
  dynamics such as channeling flow, building dams, and simulating
  floods, alongside a crawl-through cave, a treetop-canopy observation area,
  and a simulated environmental-mission control room.
