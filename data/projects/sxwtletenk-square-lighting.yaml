summary: >
  šxʷƛ̓ənəq Xwtl'e7énḵ Square, a civic plaza in downtown Vancouver renewed
  by the City of Vancouver and completed in 2017, received an architectural
  and public-realm lighting scheme designed by Eos Lightmedia in
  collaboration with architect Nick Milkovich Architects and an unnamed
  landscape architect.
description: >
  The plaza's name, used by the Musqueam and Tsleil-Waututh peoples, refers
  to a place of cultural gathering; the lighting scheme includes linear
  grazing LEDs on the plaza's architectural fins with a dynamic light show
  played hourly.
