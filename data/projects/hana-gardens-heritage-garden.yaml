summary: >
  The interpretive Japanese Heritage Garden and public plaza at Hana
  Gardens, an affordable senior housing community in El Cerrito,
  California built on the site of the former Mabuchi Flower Shop, opened
  with the building's May 2019 grand opening; West Office Exhibition Design
  designed the interpretive elements, Van Meter Williams Pollack was
  architect of record for the building/site rehabilitation, and CREO
  Industrial Arts fabricated and installed the exhibits.
description: >
  Interpretive panels set in symbolic flower trays, timeline pavers, and
  monument panels document the site's history as a Japanese American-owned
  floriculture business, the forced internment of Japanese Americans during
  World War II, and the later rebirth of the community; developed with the
  Japanese American Citizens League and the El Cerrito Historical Society.
  The project received a California Governor's Historic Preservation
  Award.
