summary: >
  The RiverFront Revitalization, a 72-acre transformation of three parks
  along the Missouri River in downtown Omaha, Nebraska (Gene Leahy Mall,
  Heartland of America Park, and Lewis and Clark Landing), opened in phases
  through 2024, led by landscape architecture firm OJB with HDR and Gensler.
description: >
  Winner of the Urban Design category in Fast Company's 2024 Innovation by
  Design Awards. OJB Landscape Architecture served as design lead and
  master planner but is not captured as a project credit — the vocabulary
  has no landscape-architecture role (logged gap; this is OJB's primary
  credit on the project).
