summary: >
  The Slusser Aviation Learning Center, an addition to the Aviation Museum
  of New Hampshire in Londonderry that nearly quadrupled its exhibition
  space, opened in May 2011 with exhibit design by Wondercabinet
  Interpretive Design, graphics by Proun Design, and fabrication by WB Inc.
description: >
  The center showcases New Hampshire's aviation heritage from Civil War-era
  reconnaissance balloons through modern space exploration, with scale
  models, engines, flight simulators, and original drawings supported by
  interpretive graphics.
