summary: >
  "Dark Testament: A Century of Black Writers on Justice," a temporary
  exhibition at the American Writers Museum in Chicago, opened 2021,
  explores racial injustice in America through the works of Black writers
  from the end of the Civil War through the mid-1960s civil rights
  movement; exhibit design by Amaze Design, fabrication by Chicago Scenic
  Studios, and media design by Trivium Interactive.
description: >
  The exhibition features writers, musicians, and activists including
  Frederick Douglass, Frances Ellen Watkins Harper, Ida B. Wells, James
  Baldwin, and Langston Hughes, spanning gallery installations, online
  content, and public programming. Curatorial leadership by Dr. Keidrick Roy.
