id: pullman-nhp-visitor-center
name: Pullman National Historical Park Visitor Center
venue: pullman-national-historical-park-visitor-center
project_type: major-renovation
year_completed: 2021
credits:
  - firm: bauer-latoza-studio
    role: architecture
    note: "Restoration of the Pullman Clock Tower & Administration Building into the park visitor center; no firm record yet"
  - firm: northern-light-productions
    role: content-production
technologies:
  - triptych media installation
  - full-scale projection
  - archival soundscapes
summary: >
  Pullman National Historical Park's visitor center, created through the
  restoration of the historic Pullman Clock Tower & Administration
  Building in Chicago, opened Labor Day weekend, September 2021;
  architecture and restoration by Bauer Latoza Studio, with exhibit media
  by Northern Light Productions.
description: >
  Northern Light Productions created a three-monitor, triptych-style media
  installation about the 1894 Pullman Strike combining archival and
  contemporary graphics with narration, along with soundscapes, archival
  slideshows, animations, and original footage of daily activities on a
  restored Pullman train car projected at full scale.
sources:
