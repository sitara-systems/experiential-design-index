summary: >
  "Soul of Nashville," a 100-seat theater and redesigned backstage tour
  experience at the Ryman Auditorium in Nashville, Tennessee, unveiled June
  8, 2015, was designed and produced by BRC Imagination Arts.
description: >
  The theater frames the venue's history through the perspective of Lula C.
  Neff, an early Ryman promoter, and features archival footage and
  performances by artists including the Fisk Jubilee Singers. Results
  included a 300% increase in tour attendance.
