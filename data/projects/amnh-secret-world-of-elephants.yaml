summary: >
  The Secret World of Elephants, a traveling exhibition on elephant biology
  and conservation designed in-house by the American Museum of Natural
  History's Exhibition and Media & Interactives teams, debuted at AMNH in
  New York in November 2023 before touring to venues including the Denver
  Museum of Nature & Science and EcoTarium.
description: >
  The exhibition, in the LeFrak Family Gallery, combines hands-on interactive
  stations (including one letting visitors feel elephants' low-frequency
  communication rumbles) with a VR experience placing visitors inside an
  elephant's-eye view of its habitat.
