id: chinese-canadian-museum-core-exhibits
name: Chinese Canadian Museum Inaugural Exhibits
venue: chinese-canadian-museum
project_type: new-building
year_completed: 2023
credits:
  - firm: aldrichpears-associates
    role: exhibit-design
summary: >
  The Chinese Canadian Museum, Canada's first museum dedicated to Chinese
  Canadian history, opened in Vancouver's Wing Sang Building on July 1,
  2023 (the 100th anniversary of the Chinese Exclusion Act), with
  inaugural exhibits designed by AldrichPears Associates.
description: >
  Press coverage of the Wing Sang Building's earlier (2009) heritage
  renovation names architecture firms Francl Architecture and mcfarlane
  green biggar architects + design, but that renovation was for a private,
  pre-museum use of the building (Bob Rennie's collection space) and isn't
  clearly part of this 2023 museum-launch delivery stack — not credited
  here pending better information.
sources:
  - https://aldrichpears.com/project/chinese-canadian-museum/
  - https://dailyhive.com/vancouver/chinese-canadian-museum-vancouver-chinatown-opening-2023
