summary: >
  The American Story, the redesigned permanent core exhibition of the
  National Archives Museum in Washington, DC, opened November 21, 2025
  following a $40 million renovation of the museum; C&G Partners designed
  the nine-gallery exhibition — including the Cosmos gallery, home to an
  immersive "Moon Room" on Apollo-era innovation — in collaboration with
  Cortina Productions, ahead of the nation's 250th anniversary.
description: >
  Supersedes the museum's prior permanent exhibition. Reconciled from three
  C&G Partners project pages that describe the same redesign at different
  stages: an "in-progress" National Archives Museum (2025) page, the
  completed "American Story" opening announcement, and a page for "The Moon
  Room," which institutional press confirms is a themed space within the
  exhibition's Cosmos gallery rather than a separate installation.
