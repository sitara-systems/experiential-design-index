id: levi-strauss-co-headquarters-visitor-center
name: Visitor Center
venue: levi-strauss-co-headquarters
project_type: installation
year_completed: 2003
credits:
  - firm: west-office
    role: exhibit-design
  - firm: storyline-studio
    role: graphics-wayfinding
    note: >
      Storyline Studio's own portfolio separately credits "exhibit and
      graphics design" for a matching 150th-anniversary pavilion installation
      in the same public lobby; role assigned conservatively as graphics
      given West Office's own page claims overall exhibition design. No firm
      record yet for Storyline Studio.
summary: >
  Levi Strauss & Co. opened a 3,000-sq-ft visitor center in the public lobby
  of its San Francisco headquarters on May 7, 2003, marking the company's
  150th anniversary, with exhibition design by West Office Exhibition Design.
description: >
  The installation, styled internally as "Levi's - the Real Deal," filled the
  headquarters lobby with a series of museum-quality pavilions showcasing the
  company's historic clothing and advertising collection, corporate
  traditions, social-responsibility initiatives, and contemporary product
  lines.
