summary: >
  Secretariat: America's Horse, a 1,000 sq ft exhibit at the Kentucky Derby
  Museum in Louisville, KY, opened April 2023; exhibit design, media
  design, and fabrication by Solid Light.
description: >
  Celebrates the 50th anniversary of Secretariat's Triple Crown victory
  atop the Great Hall stairway, featuring five media installations
  alongside the museum's "The Greatest Race" 360-degree film; opened in
  time for the 149th Kentucky Derby.
