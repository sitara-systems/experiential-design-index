summary: >
  ReCovered: Chicago's Urban Tree Canopy, an immersive exhibition on tree
  canopy and urban equity, opened at the Chicago Architecture Center
  alongside ReFramed in April 2023, designed by Ross Barney Architects with
  graphics by Span Studio.
description: >
  Features an abstract tree-canopy installation with wall-sized
  illustrations, and examines the relationship between tree coverage and
  income, crime, and social vulnerability across Chicago.
