summary: >
  "Queer Justice: 50 Years of Lambda Legal and LGBTQ+ Rights," a traveling
  exhibition produced for the American LGBTQ+ Museum, opened at The Center in
  New York City in November 2023, designed by Isometric Studio, before
  touring to Atlanta, Los Angeles, Chicago, Dallas, and Washington, D.C.
  through 2024.
description: >
  The exhibition marks Lambda Legal's 50th anniversary and is designed as five
  moveable carts of layered panels on ash-wood posts, evoking protest picket
  signs, sized to fit through the elevators, hallways, and doorways of each
  touring venue. Isometric Studio also designed a custom typeface, Lambda
  Sans, based on a 1970s Gay Activists Alliance flyer. It received a 2024
  SEGD Global Design Award (Merit, Exhibition).
