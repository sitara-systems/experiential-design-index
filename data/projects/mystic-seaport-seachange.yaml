summary: >
  SeaChange, the inaugural exhibit in the Collins Gallery of Mystic Seaport
  Museum's Thompson Exhibition Building in Mystic, Connecticut, opened
  December 10, 2016; exhibit design by the McMillan Group, projection-mapped
  media by Trivium Interactive, and fabrication by Mystic Scenic Studios.
description: >
  SeaChange presented objects from Mystic Seaport's collections that speak
  to transformation in material, technology, and American culture over 200
  years, several displayed for the first time, each paired with a media
  presentation. A 20-foot sail at the exhibit's opening was
  projection-mapped by Trivium Interactive. The project won a 2018 Graphis
  Design Gold award in the Museum category.
