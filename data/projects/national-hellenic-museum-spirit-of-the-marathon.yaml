id: national-hellenic-museum-spirit-of-the-marathon
name: "The Spirit of the Marathon: From Pheidippides to Today"
venue: national-hellenic-museum
project_type: traveling-exhibition
year_completed: 2012
credits:
  - firm: peter-hyde-design
    role: exhibit-design
  - firm: chicago-scenic-studios
    role: fabrication
summary: >
  "The Spirit of the Marathon: From Pheidippides to Today," a traveling
  exhibition developed by the National Hellenic Society and the National
  Hellenic Museum in Chicago, Illinois, debuted at the 2012 Chicago
  Marathon and ran at the museum through March 2014 before touring to
  other marathon cities; exhibit design by Peter Hyde Design with
  fabrication by Chicago Scenic Studios.
description: >
  The exhibition traces the origins and cultural history of the marathon
  across four segments, from the legend of Pheidippides's run at the
  Battle of Marathon through Spyridon Louis's 1896 Olympic win, Stylianos
  Kyriakides's 1946 Boston Marathon victory, and the marathon's modern
  global reach; it subsequently traveled to Boston, Washington, DC, and
  San Francisco.
sources:
