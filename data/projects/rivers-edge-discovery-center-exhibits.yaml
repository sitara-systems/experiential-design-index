summary: >
  A 4,500-square-foot interactive water-cycle exhibit for families with
  young children at the River's Edge Discovery Center in Fort Dodge, Iowa,
  opened in 2024, designed and fabricated by Taylor Studios for the Webster
  County Conservation Board.
description: >
  Hands-on installations and game stations transform visiting children into
  water droplets guiding them through the sky, surface, and underground,
  teaching water conservation and environmental stewardship alongside
  forest-animal exhibits and crawl-through tunnels.
