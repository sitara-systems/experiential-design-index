summary: >
  Eternal Gandhi Museum Houston, a 4,800 sq ft museum in Houston, TX, opened
  August 2023; exhibit design, media design, and fabrication by Solid
  Light.
description: >
  The first museum of its kind in North America focused on Gandhi's story,
  featuring three interactive galleries tracing his life, global peace
  leaders he influenced, and principles of peaceful changemaking, including
  a Telly Award-winning orientation film shown in "A Force More Powerful
  Theater."
