summary: >
  The Frick Collection's Renovation and Enhancement Project, the museum's
  first comprehensive upgrade since its 1935 opening, reopened its 1 East
  70th Street mansion in New York on April 17, 2025, with design architecture
  by Selldorf Architects, executive architecture by Beyer Blinder Belle, and
  lighting design by L'Observatoire International (overall) and Anita
  Jorgensen Lighting Design (gallery lighting).
description: >
  The $220 million, four-year project opened up more of the historic house
  to the public, added new special exhibition galleries and dedicated
  education rooms, restored the 70th Street Garden, and added a 218-seat
  auditorium beneath it.
