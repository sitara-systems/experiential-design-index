summary: >
  The Indigenous Peoples Gallery, a 2022 permanent gallery at the Dallin
  Art Museum in Arlington, Massachusetts, features sculptor Cyrus Dallin's
  maquettes and sculptures honoring Indigenous peoples, with exhibit design
  by Proun Design and media by RLMG.
description: >
  The gallery pairs Dallin's sculptures with an audio program combining
  Dallin's own quotes with commentary from a Ute Tribe elder.
