summary: >
  The renovated Henry Luce III Center at the New-York Historical Society
  in New York, including the North Gallery, the Tiffany Gallery, and the
  Center for Women's History, reopened April 29, 2017, with architecture
  by PBDW Architects (with Eva Jiřičná on the Tiffany Gallery) and 17
  interactives and 5 videos designed by batwin + robin.
description: >
  batwin + robin's interactives and videos for the North Gallery
  reinforced the theme "Objects Tell Stories," covering subjects including
  the 1863 Draft Riots, slavery in colonial New York, master craftsman
  Duncan Phyfe, and the history of New York's street grid.
