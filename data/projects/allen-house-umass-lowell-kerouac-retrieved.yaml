summary: >
  Kerouac Retrieved, an exhibition of personal items from Jack Kerouac's
  final home in St. Petersburg, Florida, donated to the University of
  Massachusetts Lowell by the Kerouac estate, opened at Allen House on
  UMass Lowell's South Campus in 2015, with exhibit design by Proun Design
  and fabrication by Bluebird Graphic Solutions.
description: >
  The free, publicly open exhibit displays items including Kerouac's desk
  and desk chair, his Lowell Tech windbreaker, vinyl records, memorabilia,
  and his handmade cat carriers.
