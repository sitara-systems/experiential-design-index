summary: >
  Champion's Walk at Corey Ingram Circle, a civic sculpture and gateway
  marking the northern entrance to Poughkeepsie, New York, was dedicated in
  2024, designed by MASS Design Group with fabrication by Fourth State
  Metals.
description: >
  An illuminated ring of Corten steel bollards and "legacy lanterns" embedded
  with images and biographies of local civic leaders commemorate community
  activism and leadership in Poughkeepsie's Northside neighborhood. The
  roundabout is named for Petty Officer 1st Class Corey Ingram; the adjoining
  Champions Walk currently honors five community honorees selected by public
  nomination and vote. The project received a 2024 AIA New York State Design
  Pro Bono Project Citation.
