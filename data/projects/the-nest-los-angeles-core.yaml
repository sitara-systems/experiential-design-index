summary: >
  The Nest, a one-to-two-person immersive theater and interactive
  experience staged inside a repurposed storage building in Los Angeles,
  California, opened in September 2019, designed and produced by Scout
  Expedition Co.
description: >
  Guests explore a scenically dressed storage unit filled with the
  belongings of an absent protagonist, unlocking her story through hidden
  rooms and physical puzzles. The experience won a Thea Award for
  Outstanding Achievement (Connected/Immersive Storytelling) from the
  Themed Entertainment Association at the 27th Annual Thea Awards (2021).
