summary: >
  Wired to Wear, an 8,000 sq ft exhibition of wearable technologies from 15
  countries, opened at the Museum of Science and Industry, Chicago in 2019;
  fabrication by Chicago Scenic Studios and Ravenswood Studio, with lighting
  design by Lightswitch.
description: >
  Featured items include Gravity Industries' Jet Suit, Google's Smart
  Tattoo, and an interactive Jacquard Box by Google, plus a maker space
  called Makers United.
