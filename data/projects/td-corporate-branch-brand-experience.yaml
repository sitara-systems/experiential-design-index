summary: >
  TD Brand Experience, a 3,405-square-foot exhibit and learning hub at a
  TD Bank Group corporate branch in downtown Toronto, Ontario near the
  Toronto-Dominion Centre, opened in 2024 for both customers and
  employees; design-build by Reich+Petch and kubik maltbie.
description: >
  The exhibit explores four themes -- TD & Canada, TD & Toronto, Women at
  TD, and Children & TD -- through glazed display cases, pull-out drawers,
  and interactive multimedia stations drawing on TD's historical
  collections, organized around a central cabinet inspired by the
  Toronto-Dominion Centre's architecture.
sources:
