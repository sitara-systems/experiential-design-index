summary: >
  "Rivers to the Sea," a 60,000-sq-ft expansion of the National Mississippi
  River Museum & Aquarium in Dubuque, Iowa, opened in June 2010; exhibit
  design by Christopher Chadbourne & Associates with architecture by
  Esherick Homsey Dodge and Davis, media design by Monadnock Media, and
  fabrication by Hadley Exhibits and Dixon Studios.
description: >
  The expansion added the "Mississippi Journey" orientation theater, the
  projection-mapped "America's Rivers" display, the dome-projected "Our
  Blue Planet" theater, a 40,000-gallon Gulf of Mexico tank, and a
  35-foot waterfall centerpiece; it received an American Alliance of
  Museums MUSE Award.
