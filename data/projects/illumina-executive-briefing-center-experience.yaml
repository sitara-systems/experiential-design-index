summary: >
  The Illumina Executive Briefing Center, a hospitality and exhibition space
  on Illumina's San Diego, California campus, opened in 2023 with
  architecture, interior design, and environmental graphic design by ZGF
  Architects and exhibit design by Hyperquake.
description: >
  Formerly a storage building on Illumina's main campus quad, the center
  preserves much of the original structure while linking four stories with a
  central helical staircase evoking DNA structure. The exhibit gallery
  features laser-cut, DNA-molecule-inspired dimensional walls that allow
  airflow for large LED panels. The center won GACEP's 2026 World Class
  Center Award and Innovation in the Center recognition.
