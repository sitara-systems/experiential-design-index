summary: >
  The Reichstag Dome, a public glass cupola with a spiral ramp leading to
  an observation deck above the German Bundestag's debating chamber in
  Berlin, opened in 1999 as part of Foster + Partners' rebuilding of the
  Reichstag; it is a free public visitor attraction drawing roughly 3
  million visitors a year.
