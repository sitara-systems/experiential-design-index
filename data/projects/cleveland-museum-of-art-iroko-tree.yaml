summary: >
  A 100-square-foot, fully fabric-covered, life-sized Iroko tree sculpture
  fabricated by Taylor Studios for a performance installation at the
  Cleveland Museum of Art in 2019, engineered as a modular structure for
  disassembly, shipping, and reassembly.
description: >
  The piece served as a focal point for the performance space, evoking a
  sense of home for the performing artist.
