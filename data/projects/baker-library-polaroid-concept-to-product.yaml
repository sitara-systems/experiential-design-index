summary: >
  "From Concept to Product: Meroë Morse and Polaroid's Culture of Art and
  Innovation, 1945-1969," an exhibition drawing on the Polaroid Corporation
  Collection, opened in Baker Library's north lobby at Harvard Business
  School in 2024, with exhibit design by Proun Design, fabrication by WB
  Inc., and media production by Northern Light Productions.
description: >
  The exhibition, curated by Melissa Banta, celebrates Meroë Morse, an art
  history graduate of Smith College who became a key contributor to the
  development of Polaroid's instant black-and-white photography, working
  closely with founder Edwin Land and consultant Ansel Adams.
