summary: >
  A 2,400-square-foot suite of indoor and outdoor exhibits for the newly
  built visitor center at Pinnacle Mountain State Park in Little Rock,
  Arkansas, completed in 2023 by Taylor Studios for Arkansas State Parks.
description: >
  A faceted design inspired by the park's rugged terrain integrates with
  the building's architecture, orienting visitors to safe recreation
  practices and regional flora, fauna, geology, and history.
