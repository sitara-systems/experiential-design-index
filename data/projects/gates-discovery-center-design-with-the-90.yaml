summary: >
  Design with the 90%, an exhibition of international design projects
  improving life in marginalized communities, opened at the Bill & Melinda
  Gates Foundation Discovery Center in Seattle in 2019, built from
  sustainable and recyclable materials; it was a 2019 SEGD Global Design
  Awards finalist.
description: >
  A collaboration with Cooper Hewitt, Smithsonian Design Museum. Project
  management by Jill Randerson Exhibition Management.
