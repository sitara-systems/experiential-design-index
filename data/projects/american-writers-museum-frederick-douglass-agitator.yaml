summary: >
  Frederick Douglass, Agitator!, a temporary exhibition at the American
  Writers Museum in Chicago, opened in 2018; exhibit design by Amaze
  Design, exhibit graphics by Proun Design, and fabrication by Chicago
  Scenic Studios, focused on the final three decades of Douglass's life
  and his oratory and writing.
description: >
  The exhibition features a photographic mosaic wall and an interactive
  vintage camera station where visitors can photograph themselves before
  an oversized Douglass portrait, plus a media component with local
  performing-arts students delivering excerpts of his speeches.
