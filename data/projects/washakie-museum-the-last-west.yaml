summary: >
  "The Last West," a permanent exhibition on the social history of Wyoming's
  Big Horn Basin at the Washakie Museum & Cultural Center in Worland,
  Wyoming, was designed by Studio Tectonic with architecture by CTA
  Architects Engineers and fabrication by Hadley Exhibits.
description: >
  The exhibition covers the region's cattle wars, lawlessness, and
  pioneering heritage from the 1800s through the 1920s, including the
  Johnson County War and the Spring Creek Raid; its Cattle Branding
  interactive won a Gold Award from the Association of Marketing and
  Communication Professionals.
