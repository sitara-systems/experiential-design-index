summary: >
  New exhibits at the Falls of the Ohio State Park Interpretive Center in
  Jeffersonville, IN, opened January 2016 after a 13-month renovation;
  exhibit design, media design, and fabrication by Solid Light.
description: >
  An 8,900 sq ft redesign of the interpretive center located on 200 acres
  containing the world's largest accessible Devonian fossil beds, funded by
  an $6 million, eight-year fundraising effort by the Falls of the Ohio
  Foundation with the Indiana DNR Division of State Parks. Includes an
  all-new orientation film and hands-on exhibits spanning 390 million years
  of natural and human history.
