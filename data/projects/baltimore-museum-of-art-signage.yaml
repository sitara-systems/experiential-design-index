summary: >
  Baltimore Museum of Art Signage, an interior, exterior, banner, and donor
  graphics program for the Baltimore Museum of Art's centennial renovation,
  was designed by C&G Partners and unveiled with the November 2014 reopening
  of the museum's historic Merrick Entrance and ceremonial steps, closed for
  nearly 30 years.
description: >
  The wayfinding program uses cropped photographic "glimpses" of works from
  the collection and sculpture gardens to guide visitors to notable
  galleries such as the Cone Collection, integrating new signage with both
  the historic John Russell Pope building and the museum's contemporary
  wings.
