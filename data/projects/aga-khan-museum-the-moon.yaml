summary: >
  "The Moon: A Voyage Through Time," a 9,400-square-foot temporary
  exhibition at the Aga Khan Museum in Toronto, Ontario, opened in 2019
  with loans from the Royal Ontario Museum, Harvard Art Museums, the
  Victoria and Albert Museum, the Oxford Museum for the History of
  Science, and the Wereldmuseum; exhibit design by Reich+Petch, featuring
  a 5-meter scale moon sculpture by artist Luke Jerram.
