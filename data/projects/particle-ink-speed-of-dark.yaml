summary: >
  "Particle Ink: Speed of Dark," an hourlong immersive live theatrical
  experience staged in a converted warehouse in the Las Vegas Arts
  District, opened April 16, 2022 and closed December 4, 2022, created by
  entertainment-technology firm Kaleidoco; it won the 2022 (29th Annual)
  Thea Award for Outstanding Achievement in Immersive Live Experience.
description: >
  A live, walkthrough immersive theater production built around a
  fictional "Particle Ink Metaverse," combining live performance, laser
  and projection-mapped visual effects, and augmented reality to blend a
  converted warehouse space with a staged 2.5-dimensional narrative world.
  Originally scheduled for a 12-week run, the engagement was extended
  three times before closing.
