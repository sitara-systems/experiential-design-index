summary: >
  Duck, Duck, Goose: Waterfowl of the Mississippi Flyway, a permanent
  exhibit at Discovery Park of America in Union City, TN, opened 2023;
  exhibit design, media design, and fabrication by Solid Light.
description: >
  Explores waterfowl conservation along the Mississippi Flyway from the
  1930s "duck drought" through the collaboration of hunters, landowners,
  scientists, and conservationists, with interactive displays and a
  Mississippi Flyway interactive kiosk.
