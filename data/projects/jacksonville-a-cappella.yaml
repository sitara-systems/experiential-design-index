summary: >
  A Cappella, an interactive public artwork remixing lyrics from 84 songs by
  60+ Jacksonville artists across four dichroic-panel garden zones, was
  installed in the Music Heritage Garden along the St. Johns River near the
  Jacksonville Symphony in May 2026 by The Urban Conga for the City of
  Jacksonville and the Jacksonville Downtown Investment Authority.
