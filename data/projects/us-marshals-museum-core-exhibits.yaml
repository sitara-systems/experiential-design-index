summary: >
  The U.S. Marshals Museum, a 53,000 sq ft museum on the Arkansas River in
  Fort Smith, Arkansas telling the history of the U.S. Marshals Service
  since 1789, opened to the public July 1, 2023; concept and exhibit design
  by CambridgeSeven with Polk Stanley Wilcox as architect of record, and
  guest-experience media design and technology integration by TAIT (via its
  Thinkwell Group studio).
