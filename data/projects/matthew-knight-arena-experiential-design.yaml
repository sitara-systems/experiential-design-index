id: matthew-knight-arena-experiential-design
name: Matthew Knight Arena Experiential Design
venue: matthew-knight-arena
project_type: new-building
year_completed: 2011
credits:
  - firm: downstream
    role: media-design
    note: >
      All experiential design and branding elements in the arena, plus AV
      design, custom content, and content management system. The
      later-added "O-Hub" 360-degree LED environment on the recruiting
      path is undated in public sources (reported circa 2020) and is
      covered under this record's description rather than a separate
      record.
technologies:
  - arena-wide media and branding environments
  - content management system
summary: >
  Matthew Knight Arena, the University of Oregon's 12,364-seat basketball
  and events arena in Eugene, Oregon, opened in January 2011 with
  arena-wide experiential design, branding, AV design, and content
  systems by Downstream.
description: >
  Downstream later added the O-Hub, a 360-degree LED media environment
  outside the locker rooms whose content is broadcast to fans pre-game
  (reported in trade press around December 2020; no public source states
  its completion year, so it is not recorded as a separate dated project).
sources:
  - https://www.unispace.com/projects/universityoforegon
  - https://www.svconline.com/markets/education/case-study-matthew-knight-arena-oregon
  - https://en.wikipedia.org/wiki/Matthew_Knight_Arena
