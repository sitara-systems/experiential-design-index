summary: >
  Yankee Stadium in the Bronx, New York, opened April 2009 with a
  stadium-wide signage and graphics program of more than 3,000 components
  designed by C&G Partners, selected through a national competition, in
  collaboration with stadium architect Populous.
description: >
  C&G Partners designed all stadium graphics, sign systems, sculptural
  installations, and retail systems for the new Yankee Stadium, spanning
  monumental rear-illuminated lettering atop the scoreboard, the ceremonial
  Gate 4 facade, and back-of-house wayfinding, incorporating the Yankees'
  pinstripe and interlocking-NY identity throughout.
