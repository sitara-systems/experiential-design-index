summary: >
  Heaven Hill Bourbon Experience, a 30,000+ sq ft visitor destination at
  Heaven Hill Distillery in Bardstown, KY, opened June 2021; master
  planning, architectural concept design, exhibit design, media design, and
  fabrication by Solid Light.
description: >
  A $19 million flagship bourbon visitor center featuring tasting rooms,
  retail, a restaurant and bar, hands-on "You Do Bourbon" learning
  experiences, and theatrical media installations tracing more than 80 years
  of the Shapira family's whiskey-making heritage. Won the 2022 Icon Awards
  Global Visitor Attraction of the Year from Whisky Magazine.
