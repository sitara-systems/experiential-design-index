summary: >
  The Dot Experience, a 20,000 sq ft accessible museum at the American
  Printing House for the Blind in Louisville, KY, is expected to open 2026;
  planning, media design, and fabrication by Solid Light.
description: >
  A museum designed to dismantle barriers between blind and sighted
  visitors, centered on APH's 160-year history and Helen Keller's legacy,
  exploring assistive technologies and the Braille writing system.
  Engagement began fall 2021.
