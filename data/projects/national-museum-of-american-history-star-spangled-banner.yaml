summary: >
  The Star-Spangled Banner Gallery, a permanent exhibition at the
  Smithsonian's National Museum of American History in Washington, DC
  displaying the flag that inspired the U.S. national anthem behind a
  35-foot glass enclosure with a life-size interactive "Flag Table," opened
  November 21, 2008 with the museum's renovation reopening; C&G Partners led
  exhibition design, with architecture by SOM, AV design by RBH, and
  interactive table technology by Potion.
description: >
  Includes the "Flag Table," a 15-foot interactive media table within the
  gallery that lets visitors explore a projected, full-scale image of the
  flag — confirmed by C&G Partners as a component of this exhibition, not a
  separate installation.
