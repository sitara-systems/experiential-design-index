summary: >
  The Sioux City Public Museum's current 55,000 sq ft downtown facility, a
  converted former J.C. Penney department store in Sioux City, Iowa,
  opened in 2011; Monadnock Media produced the museum's media and
  interactive exhibits with exhibit design by Hilferty & Associates.
description: >
  Exhibits include "Disaster and Recovery," a rear-projection presentation
  across a three-story building facade depicting fires, floods, and the
  crash of United Airlines Flight 232, and an immersive theater echoing the
  city's 19th-century corn palaces. The museum won an American Alliance of
  Museums MUSE Award.
