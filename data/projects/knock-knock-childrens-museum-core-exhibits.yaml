summary: >
  Knock Knock Children's Museum, a new museum building in Baton Rouge,
  Louisiana, opened in September 2017; exhibits designed by Cambridge
  Seven Associates, with experience design and media production by
  Northern Light Productions.
description: >
  Northern Light Productions developed twelve integrated media programs
  throughout the museum, including the Storybook Stage with 3D and 2D
  animations, the B.R. Star Studio with filmed dance tutorials, the Video
  Harbor's virtual tugboat tour of the Mississippi River, and the Pelican
  Pantry's educational checkout system with product-origin videos.
