summary: >
  Capitol Park Museum, a 2006 branch of the Louisiana State Museum in Baton
  Rouge, Louisiana, presents Louisiana's natural and cultural history
  across two floors, with exhibit design by Christopher Chadbourne &
  Associates, fabrication by Explus, and exhibit graphics by Proun Design.
description: >
  The 32,000 sq ft exhibition covers state history, Mardi Gras, music, and
  culture, with distinct graphic design approaches on each floor.
