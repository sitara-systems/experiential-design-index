summary: >
  The World Forestry Center's Discovery Museum in Portland, Oregon, a
  13,000-square-foot renovation that reopened June 30, 2005 after a $7
  million project, was designed by West Office Exhibition Design.
description: >
  The redesigned 13,000-square-foot museum features immersive environmental
  exhibits exploring forest diversity, ecological significance, and
  sustainable management, with a focus on Pacific Northwest forestry and its
  global context. The renovation followed a six-month closure.
