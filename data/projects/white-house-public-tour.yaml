summary: >
  A redesigned public tour experience for the White House in Washington, DC,
  unveiled by First Lady Dr. Jill Biden in October 2024, added interpretive
  signage, digital and tactile "reader rails," and an interactive
  architectural model, designed by ESI Design in collaboration with the
  National Park Service and The History Channel.
description: >
  The first substantial revamp of the White House public tour in decades
  opened previously roped-off rooms (the Vermeil Room, the Library, the China
  Room) and the Diplomatic Reception Room to visitors for the first time, adds
  new interpretive reader rails with tactile features, and includes an
  interactive 3D model in the East Garden Room illustrating the building's
  architectural evolution since 1792.
