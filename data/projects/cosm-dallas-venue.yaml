summary: >
  Cosm Dallas, a 65,000-square-foot immersive "shared reality" entertainment
  venue built around an 87-foot, 12K+ LED dome at the Grandscape development
  in The Colony, Texas, opened August 31, 2024, designed by HKS.
description: >
  The three-level venue comprises the Dome (an 87-foot-diameter LED dome
  auditorium), the Hall, and the Deck, and hosts live sports broadcasts and
  immersive content produced by Cosm, the venue's operator. It is the second
  Cosm venue to open, following Cosm Los Angeles.
