summary: >
  The Cherokee National History Museum, created through the renovation of
  the historic Cherokee National Capitol building in Tahlequah, Oklahoma,
  opened to the public in August 2019, with media content by Northern
  Light Productions, exhibit design by Ralph Appelbaum Associates, and
  fabrication by Capitol Museum Services.
description: >
  Northern Light Productions produced an ambient soundscape narrating
  Cherokee origin stories, audio programs featuring first-person removal
  accounts, three short films using archival imagery, and "We Remain," a
  three-screen production created from interviews with ten Cherokee Nation
  members, from the principal chief to children at the Cherokee Nation
  Immersion School.
