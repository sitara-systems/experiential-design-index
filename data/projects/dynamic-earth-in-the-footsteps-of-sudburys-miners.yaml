id: dynamic-earth-in-the-footsteps-of-sudburys-miners
name: In the Footsteps of Sudbury's Miners
venue: dynamic-earth
project_type: exhibition-refresh
year_completed: 2015
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Engaged by Science North to program the three-universe lighting
