      update to the underground demonstration-mine guided tour.
technologies:
  - lighting/audio/video show-control system
summary: >
  In the Footsteps of Sudbury's Miners, an updated underground guided-tour
  exhibit in Dynamic Earth's demonstration mine in Sudbury, Ontario, was
  completed in 2015 with lighting design and show-control programming by
  Eos Lightmedia for operator Science North.
description: >
  A guided tour descending seven storeys through a demonstration mine
  tracing the evolution of Sudbury-region mining; the show-control system
  Eos programmed governs lighting, audio, video/photo capture triggers, and
  traffic flow for multiple concurrent tour groups.
