summary: >
  "Liquid Stone: New Architecture in Concrete" ran June 2004 through January
  2006 at the National Building Museum in Washington, D.C., curated by
  Martin Moeller, with exhibition design by Tod Williams Billie Tsien
  Architects and exhibition graphics by Pure+Applied.
description: >
  The exhibition showcased 30 contemporary architectural projects using
  concrete, with fields of exposed rebar set into concrete plates forming
  the exhibition's visual spine and safety-orange type referencing
  construction sites.
