summary: >
  Cosm Los Angeles, a 65,000-square-foot immersive "shared reality"
  entertainment venue built around a 90-foot, 280-degree LED dome at
  Hollywood Park in Inglewood, California, opened to the public June 29,
  2024, designed by HKS as the company's first public venue.
description: >
  Located adjacent to SoFi Stadium and YouTube Theater within the Hollywood
  Park development, the venue was HKS's first built Cosm project and
  established the architectural typology later repeated at Cosm Dallas.
