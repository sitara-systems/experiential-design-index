summary: >
  The Tekαkαpimək Contact Station, a 7,900-sq-ft visitor center atop
  Lookout Mountain in Katahdin Woods and Waters National Monument near
  Stacyville, Maine, opened to the public August 17, 2024; architecture
  by Saunders Architecture, with exhibit fabrication by Split Rock
  Studios.
description: >
  Developed through a multi-year process between the Elliotsville
  Foundation, representatives of the Wabanaki Nations, and the National
  Park Service, the station's integrated architecture and exhibition
  design showcases Penobscot Nation connections to the region's
  watersheds, plants, and animals. It received the National Association
  for Interpretation's 2025 Juror's Choice Award for Interpretive Media.
