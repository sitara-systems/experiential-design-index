summary: >
  Woman Life Freedom, a participatory public art installation of 600 yards
  of green, white, and red ribbon inviting visitors to inscribe human
  rights, was displayed in the Cruess Building courtyard at the University
  of California, Davis from November 2022 to January 2023 in solidarity
  with protesters in Iran; it was designed by Niloufar Abdolmaleki as her
  MFA thesis project.
