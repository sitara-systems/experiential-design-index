summary: >
  Perplexiplex, a permanent four-scene interactive forest installation within
  Meow Wolf's Convergence Station in Denver, Colorado, opened in 2021,
  co-created by Meow Wolf and Moment Factory.
description: >
  A surreal interactive forest/arboretum built across four connected scenes
  over a black-and-white mural by Nathaniel Gutierrez, combining
  floor-and-wall projection mapping, motion tracking, and an ambient score
  that responds to visitor movement. Built by a combined Meow Wolf/Moment
  Factory team of 60+ over roughly seven months. Won the Communication Arts
  Interactive Design Annual 2022 (Environmental category).
