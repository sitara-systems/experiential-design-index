summary: >
  The Graceland Mobile Tour, an iBeacon-enabled iPad guided-tour app for
  Elvis Presley's Graceland mansion, launched in Memphis, Tennessee during
  Elvis Week in August 2014; developed and designed by Unified Field.
description: >
  The app delivers location-based audio, video, and archival photo content
  as visitors move through the mansion and grounds, including 360-degree
  panoramic views of normally restricted rooms, an augmented-reality
  "Elvis Photobomb" camera tool, and trivia. Content is available in nine
  languages and narrated by John Stamos.
