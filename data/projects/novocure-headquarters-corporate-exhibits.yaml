summary: >
  Novocure's North American headquarters in Portsmouth, New Hampshire opened
  corporate lobby exhibits in 2024 exploring the science behind its Tumor
  Treating Fields cancer treatment technology and company history, designed
  by Proun Design with media by Trivium Interactive, fabrication by Mystic
  Scenic Studios, and AV integration by Electrosonic.
description: >
  The exhibits include illuminated kiosks displaying artifacts, a digital
  touch table, a wall-mounted screen with company information, and
  large-format flatscreens with patient portraits.
