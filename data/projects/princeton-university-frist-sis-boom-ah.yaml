summary: >
  Sis Boom Ah!, an exhibition marking 50 years of undergraduate coeducation
  at Princeton University, opened in the dining area of the Frist Campus
  Center in Princeton, New Jersey, during the 2019-20 academic year,
  designed by Isometric Studio with Princeton's Women*s Center and Mudd
  Manuscript Library.
description: >
  The design uses a collage-style arrangement of banner-like supergraphics
  featuring quotations and archival images of Princeton alumnae.
