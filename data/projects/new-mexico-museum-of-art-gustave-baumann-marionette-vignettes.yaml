summary: >
  A three-screen animated marionette-show introduction to Gustave Baumann,
  The Artist's Environment exhibition opened August 15, 2025, at the New
  Mexico Museum of Art in Santa Fe, with digital animation by Ideum and
  fabricated display frames by Stark Raven Fabrication.
description: >
  Along the entry corridor to the Baumann exhibition, three custom-built
  displays styled as miniature proscenium stages play sequential animated
  scenes recreating Baumann's whimsical marionette performances. Ideum's 3D
  artists recreated each puppet character digitally, referencing Baumann's
  original handcrafted marionettes and archival recordings, using script and
  audio content provided by the museum.
