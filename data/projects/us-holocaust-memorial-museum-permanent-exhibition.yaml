technologies:
  - archival video
  - survivor testimony theaters
summary: >
  The Permanent Exhibition at the United States Holocaust Memorial Museum in
  Washington, DC, designed by architect James Ingo Freed (Pei Cobb Freed)
  with exhibition design by Ralph Appelbaum Associates, opened April 22,
  1993; SH Acoustics designed the acoustical treatment and audio systems.
description: >
  A three-floor, chronological exhibition on the Holocaust organized into
  three sections (Nazi Assault 1933-1939; The Final Solution 1940-1945; Last
  Chapter), with over 900 artifacts, video screens, and four theaters
  showing archival footage and survivor testimony.
