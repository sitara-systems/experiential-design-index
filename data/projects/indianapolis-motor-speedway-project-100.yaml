summary: >
  Project 100, a wayfinding and environmental-graphics program at the
  Indianapolis Motor Speedway including a redesigned Turn 1 entrance gate,
  was delivered by Section 127 in 2016 ahead of the track's 100th running of
  the Indianapolis 500, comprising 500+ wayfinding elements, facility
  signage, and exterior road mapping.
description: >
  Design palette references the Marmon Wasp, the speedway's first
  Indianapolis 500-winning car (1911). Part of a broader Project 100
  renovation program (concessions, restrooms, grandstand/suite upgrades,
  pylon videoboards) managed by AECOM Hunt, which is not credited here as
  that scope falls under the corpus's general-contracting exclusion.
