summary: >
  A comprehensive wayfinding system for the Boston Public Library's Central
  Library in Copley Square, Boston, Massachusetts, designed by Arrowstreet
  and unveiled in June 2014 to unify navigation across the library's
  historic McKim building and modern Johnson building.
description: >
  The Central Library had relied on ad hoc, staff-devised signage across two
  architecturally divergent buildings. Arrowstreet developed a coordinated
  directional system using color, typography, and formal space naming,
  along with custom mounting systems designed to respect the historic
  architecture, plus printed and online maps.
