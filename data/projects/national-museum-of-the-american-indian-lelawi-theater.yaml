summary: >
  The Lelawi Theater, a 360-degree theater experience introducing visitors
  to Native American life and storytelling, opened with the National
  Museum of the American Indian in Washington, DC in 2004, designed by
  Jones & Jones Architects and Hilferty & Associates with media design by
  batwin + robin, whose "Creation's Journey" program there won the
  American Muse Award for Technical Excellence.
description: >
  batwin + robin traveled to 11 locations around the world and worked with
  people from 13 different tribes to produce the theater's media program.
