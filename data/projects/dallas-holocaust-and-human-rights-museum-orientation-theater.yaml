summary: >
  The Orientation Theater, the signature multimedia entry exhibit of the
  Dallas Holocaust and Human Rights Museum, opened with the museum's new
  facility in 2019; Omniplan was architect of the building, Pacific Studio
  led exhibit design, Cortina produced the media, BBI Engineering designed
  and installed the theater's synchronized projection and lighting system,
  and Schuler Shook designed the building's interior and exterior lighting.
