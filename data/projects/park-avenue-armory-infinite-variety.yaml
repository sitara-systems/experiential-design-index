    role: exhibit-design
technologies:
  - large-scale suspended display
summary: >
  Infinite Variety: Three Centuries of Red and White Quilts, a temporary
  exhibition of 651 quilts from the Joanna S. Rose collection, was on view
  March 25-30, 2011 at the Park Avenue Armory in New York, NY, designed by
  Thinc Design.
description: >
  The 55,000-square-foot installation arranged the quilts in six 30-foot-high
  cylinders surrounding a 50-foot-high central spiral. The exhibition set a
  weekly attendance record for an Armory show and received design recognition
  from Core77, IDSA, SEGD, Azure Magazine, and the Chicago Athenaeum.
sources:
