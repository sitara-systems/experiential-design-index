summary: >
  A 1,430-square-foot suite of interactive exhibits at the Oakwoods
  Metropark Nature Center in New Boston, Michigan, completed in 2020 by
  Taylor Studios for the Huron-Clinton Metropolitan Authority, honoring
  local Wyandot heritage.
description: >
  Features include a live turtle enclosure, a fully themed nature diorama,
  and flexible, mobile animal displays with changeable graphics and movable
  seating for reconfigurable programming.
