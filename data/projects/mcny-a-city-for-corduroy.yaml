id: mcny-a-city-for-corduroy
name: "A City for Corduroy: Don Freeman's New York"
venue: museum-of-the-city-of-new-york
project_type: temporary-exhibition
year_completed: 2018
credits:
  - firm: full-point-graphics
    role: fabrication
    note: "graphics production"
summary: >
  "A City for Corduroy: Don Freeman's New York," the first major exhibition
  devoted to illustrator Don Freeman's depictions of New York City and his
  Corduroy the bear children's books, was on view at the Museum of the City
  of New York from November 21, 2018 through June 23, 2019.
description: >
  The exhibition presented roughly 50 works by Freeman, including oil
  paintings, lithographs, drawings, watercolors, and issues of his magazine
  Newsstand, organized across three sections: "City Life," "Stage Life,"
  and "Corduroy and Friends."
