summary: >
  "Jewels of the Sea: The Jellyfish Experience," an 18-aquarium jellyfish
  exhibit built inside a repurposed ride building at SeaWorld San Diego in
  San Diego, California, opened March 15, 2025; design by PGAV Destinations
  with AV integration (360-degree LED video wall and show control for the
  Medusa Gallery) by AVI-SPL's XTG team.
description: >
  The exhibit spans three galleries -- Realm of the Jellies, Jellyfish
  Passage, and the central Medusa Gallery -- featuring nine jellyfish
  species across 18 aquariums, including 10 circular tanks integrated
  directly into curved LED video walls. The Medusa Gallery combines a
  three-sided LED video wall with a custom show-control system
  synchronizing video, audio, and live-tank lighting. The exhibit drew more
  than 100,000 visitors in its first 90 days.
