summary: >
  The Pittsburgh Steelers Hall of Honor Museum, a museum chronicling 90 years
  of Steelers history located above the Pro Shop at Acrisure Stadium in
  Pittsburgh, Pennsylvania, opened in November 2022; architecture, exhibit
  design, environmental and interpretive graphics by PGAV Destinations, with
  AV integration by Mad Systems.
description: >
  The museum honors 57 Hall of Honor inductees via bronze/steel footballs,
  biographies, photos, and touch-screen kiosks, alongside life-sized player
  mannequins, game-worn uniform pieces, replicated offices of founder Art
  Rooney Sr. and chairman Daniel M. Rooney, the team's six Super Bowl rings,
  a radio-booth replica for recording historical play calls, and a rotating
  exhibition space.
