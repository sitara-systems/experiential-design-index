summary: >
  "Emma Stebbins: Carving Out History," the first museum exhibition devoted
  to sculptor Emma Stebbins, opened September 28, 2025 at the Heckscher
  Museum of Art in Huntington, New York, curated by Karli Wurzelbacher, with
  exhibition and catalogue design by Pure+Applied.
description: >
  Stebbins (1815-1882), sculptor of Central Park's "Angel of the Waters"
  atop Bethesda Fountain, was the first woman to receive a public art
  commission in New York City; the exhibition ran through March 15, 2026.
