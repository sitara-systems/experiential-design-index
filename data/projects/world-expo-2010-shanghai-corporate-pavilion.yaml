_comments: >
  World Expo-class pavilion, in scope per the precedent set by the
  Expo 2020 Dubai / Expo 2025 Osaka records despite the pavilion being
  dismantled after the expo. Client was the Shanghai Corporate Community
  (a consortium of Shanghai companies). SEGD's award page also names
  Shanghai Guosheng Company Limited for construction — omitted from
  credits as a general-contractor role, per policy.
