summary: >
  The Dream Cube, the Shanghai Corporate Pavilion at World Expo 2010 in
  Shanghai, China, opened in May 2010 with experience design by ESI Design
  and architecture by Atelier FCJZ — a 40,000-square-foot pavilion whose
  recycled-polycarbonate LED facade responded to the gestures of visitors
  inside its 360-degree participatory theater, drawing over four million
  visitors during the expo's run.
