summary: >
  "Not an Ostrich: & Other Images from America's Library," an exhibition of
  photographs from the Library of Congress's collection, opened March 23,
  2022 in Washington, D.C., with exhibit design by Proun Design.
description: >
  The exhibition drew roughly 400 images from the Library's collection of
  more than 15 million photographs, organized into sections including
  portraits, the arts, sports, and politics.
