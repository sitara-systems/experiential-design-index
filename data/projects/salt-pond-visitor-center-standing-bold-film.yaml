summary: >
  "Standing Bold — Cape Cod National Seashore," a 15-minute park orientation
  film that premiered June 1, 2018 at the Salt Pond Visitor Center in
  Eastham, Massachusetts (and also shown at the Province Lands Visitor
  Center in Provincetown), was produced by Northern Light Productions of
  Boston for the National Park Service — the seashore's first new
  orientation film since the 1980s.
