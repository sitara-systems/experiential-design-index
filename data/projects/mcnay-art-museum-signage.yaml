summary: >
  McNay Signage, an interior, exterior, and donor recognition signage program
  for the Jane and Arthur Stieren Center for Exhibitions at the McNay Art
  Museum in San Antonio, Texas, was designed by C&G Partners to accompany the
  2008 expansion designed by architect Jean-Paul Viguier.
description: >
  The signage program was designed in harmony with the new wing's
  architecture, including a new identity system and printed graphics
  inspired by the building's architectural patterns.
