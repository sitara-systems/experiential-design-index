summary: >
  A 6,900 sq ft permanent exhibition at the Delta Blues Museum in
  Clarksdale, MS, opened August 2022; exhibit design, media design, and
  fabrication by Solid Light.
description: >
  Traces the origins and legacy of Delta blues through first-person
  storytelling, imagery, sound, and artifacts, covering Clarksdale's New
  World District, juke joints, Alan Lomax's first recording of Muddy
  Waters, early blues radio, and the Great Migration.
