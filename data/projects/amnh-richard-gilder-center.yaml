summary: >
  The Richard Gilder Center for Science, Education, and Innovation, a
  230,000-square-foot expansion of the American Museum of Natural History in
  New York, opened May 4, 2023, designed by Studio Gang with executive
  architect Davis Brody Bond and exhibition design by Ralph Appelbaum
  Associates.
description: >
  A 2024 Fast Company Innovation by Design Awards finalist in the Spaces and
  Places category. The immersive theater "Invisible Worlds" was designed by
  Tamschick Media+Space (Berlin) with Boris Micka Associates (Seville);
  Arup served as structural/acoustical engineer and contributed to
  audiovisual design for the exhibits (engineering credit, not captured as a
  design-stack role per this schema).
