id: choctaw-cultural-center-core-exhibits
name: Choctaw Cultural Center Core Exhibits
venue: choctaw-cultural-center
project_type: new-building
year_completed: 2021
credits:
  - firm: monadnock-media
    role: media-design
    note: "Media experience design and production across a 24,500 sq ft footprint, including the Moundville Model animated projection, the We Are Choctaw orientation theater, Hickory Grove AR/VR stations, Treaty Theater, and Creation Stories projected-shadow sculptures"
  - firm: design-division
    role: exhibit-design
    note: "no firm record yet"
  - firm: kubik-maltbie
    role: fabrication
    note: "Fabricated the Luksi (Turtle) Children's Activity Center, a 60,000 sq ft component of the cultural center, completed 2019 per Eos Lightmedia's own project page (distinct completion date from the venue's 2021 overall opening)"
  - firm: eos-lightmedia
    role: lighting-design
    note: "Supplied and integrated specialty lighting (angled graphic panel lighting, modular LED systems, flexible track lighting) for the Luksi Children's Activity Center, contracted by Kubik Maltbie"
technologies:
  - projection mapping
  - AR/VR interactive
  - GIS mapping
  - immersive theater
summary: >
  The Choctaw Cultural Center, a 100,000+ sq ft ground-up cultural center
  for the Choctaw Nation of Oklahoma in Durant, opened July 23, 2021, with
  media experiences produced by Monadnock Media and exhibit design by
  Design Division, Inc.
description: >
  The center tells the 14,000-year history of the Choctaw (Chahta) people
  "from their own perspective," per Chief Gary Batton, through installations
  including a 3D-scanned Moundville Model, an AR/VR Hickory Grove habitat
  experience, and a Treaty Theater chronicling historical treaties.
sources:
