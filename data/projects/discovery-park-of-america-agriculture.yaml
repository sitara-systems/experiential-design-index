summary: >
  AgriCulture: Innovating for Our Survival, an 8,900 sq ft permanent
  exhibition at Discovery Park of America in Union City, TN, opened December
  2020; exhibit design, media design, and fabrication by Solid Light.
description: >
  Transformed an agricultural center into an interactive exhibit addressing
  agricultural misinformation, comparing traditional farming techniques with
  modern innovations such as drones and precision-ag tools, supported by
  partners including Nutrien Ag Solutions and Simmons Bank.
