summary: >
  "Bob Dylan: Electric," a temporary exhibition at the American Writers
  Museum in Chicago, opened 2018, explores Bob Dylan's 1965 transition
  from acoustic to electric music; exhibit design by Amaze Design, with
  fabrication by Chicago Scenic Studios.
description: >
  The exhibition features artifacts including a rediscovered Fender
  Stratocaster, original manuscripts, photography, film, and recordings
  documenting Dylan's controversial electric performance at the Newport Folk
  Festival and subsequent England tour.
