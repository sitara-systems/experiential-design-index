technologies: []
summary: >
  Olson Kundig rehabilitated the last remaining 350-foot section of
  Tacoma's historic Balfour Dock, a heavy-timber warehouse built in 1900,
  into the 40,000-square-foot Foss Waterway Seaport maritime heritage and
  education center, reopening May 11, 2013.
description: >
  The project added a new glass-faced north facade revealing the building's
  historic 150-foot timber trusses, along with indoor program space and
  docks and floats supporting recreational and educational boating.
