summary: >
  Educational exhibits for the World Food Prize Foundation's Dr. Norman E.
  Borlaug Hall of Laureates in Des Moines, Iowa opened in 2011, designed by
  West Office Exhibition Design.
description: >
  The exhibits, inside the restored former Des Moines Public Library
  building, recognize Dr. Norman Borlaug's role in ending world hunger,
  honor Iowan John Ruan's role in bringing the World Food Prize to Iowa, and
  present the achievements of Prize laureates and Iowa humanitarians.
  Graphics, interactive exhibits, and multimedia programs present the
  history of agriculture and world hunger.
