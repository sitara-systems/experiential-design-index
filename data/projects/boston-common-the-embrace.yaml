summary: >
  The Embrace, a bronze memorial to Martin Luther King Jr. and Coretta Scott
  King, was unveiled on Boston Common in Boston, Massachusetts, in 2023;
  designed by artist Hank Willis Thomas with MASS Design Group as
  architect/landscape designer, bronze fabrication by Walla Walla Foundry, and
  stone fabrication by Quarra Stone Company.
description: >
  The Embrace is a 20-foot-tall, 25-foot-wide bronze sculpture depicting four
  interlocking arms, inspired by a photograph of Martin Luther King Jr. and
  Coretta Scott King embracing after King learned he had won the Nobel Peace
  Prize. MASS Design Group designed the surrounding 1965 Freedom Plaza,
  including inscribed pavers naming 65 local civil rights leaders. The bronze
  was cast and installed by Walla Walla Foundry; plaza stonework, benches, and
  wall elements were fabricated by Quarra Stone Company.
