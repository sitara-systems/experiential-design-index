summary: >
  Radical Return, an exhibition spotlighting Chinese and Chinese American
  graphic designers, opened at Boston University's Faye G., Jo, and James
  Stone Gallery in November 2021 (shown simultaneously at IS A GALLERY in
  Shanghai), with exhibition design by Open Rehearsal.
description: >
  Curated by Mary Y. Yang (BU) and Zhongkai Li (IS A GALLERY) under the
  Radical Characters study group, featuring work by 36 Chinese and Chinese
  American artists and designers; a Chinese calligraphic grid connected the
  two simultaneous gallery presentations. Won a 2022 Communication Arts
  Design Award (Environmental / Art-Design category).
