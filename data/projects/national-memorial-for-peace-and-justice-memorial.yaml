summary: >
  The National Memorial for Peace and Justice, a six-acre memorial to victims
  of racial terror lynching, opened in Montgomery, Alabama in 2018, developed
  by the Equal Justice Initiative with architecture by MASS Design Group and
  environmental graphic design by Small Stuff and afreeman; it received the
  2020 SEGD Global Design Award Best of Show.
