summary: >
  Curiosity Hall, a 60-foot immersive projection theater, opened May 22,
  2024, as part of the DaVinci Science Center's new downtown Allentown,
  Pennsylvania building, designed and built by Ideum with architecture by
  MKSD Architects.
description: >
  Eight Christie projectors combine for a 36-million-pixel, 130,000-lumen
  image across a 60-by-60-foot wall. Nine Ideum touch kiosks let visitors
  submit creations to three rotating interactive applications modeled on the
  science center's areas of study — art, engineering, and the human body —
  supporting an estimated 400,000 annual visitors.
