summary: >
  "New York, Now: Home," an exhibition featuring steel-and-oak roof
  trusses and temporary exhibition walls, opened at the Museum of the City
  of New York in 2023, designed by Isometric Studio, with a secondary
  outpost at JFK Airport Terminal 4.
description: >
  Isometric Studio designed the exhibition's roof-truss architecture and
  typography featuring the words "New York" in a centripetal, lens-like
  configuration; a companion installation at JFK Terminal 4 played
  animations on supergraphic screens.
