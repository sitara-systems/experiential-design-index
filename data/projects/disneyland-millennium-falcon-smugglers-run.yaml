summary: >
  Millennium Falcon: Smugglers Run, a motion-simulator attraction inside
  the Star Wars: Galaxy's Edge land at Disneyland Park in Anaheim,
  California, opened May 31, 2019, creatively led by Walt Disney
  Imagineering (an in-house Disney design unit, not credited as an
  independent firm in this index), with audio systems installed by
  Technomedia. It received a 2020 Thea Award for Outstanding Achievement in
  the Attraction category.
