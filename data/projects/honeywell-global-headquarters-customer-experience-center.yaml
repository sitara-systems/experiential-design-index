summary: >
  Honeywell's Global Headquarters, designed by HOK, opened in uptown
  Charlotte, North Carolina in December 2021; the 23rd-floor Customer
  Experience Center, including a four-wall audiovisual Immersion Room,
  showcases Honeywell's products and technologies to visitors.
description: >
  HOK relocated Honeywell's main lobby to the 23rd floor to create a Sky
  Lobby with panoramic downtown views, adjacent to the Customer Experience
  Center (CXC). The CXC's centerpiece Immersion Room offers a customizable
  audiovisual experience projected across all four walls; the floor also
  houses an Accelerator Cafe and Learning Center. Named an honoree of the
  Experience Design category in Fast Company's 2023 Innovation by Design
  Awards.
