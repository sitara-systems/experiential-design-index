summary: >
  The BWH Time Capsule exhibit, displaying the contents of a 1963 time
  capsule created by Peter Bent Brigham Hospital for its 50th anniversary,
  opened in a four-story atrium at Brigham and Women's Hospital in Boston,
  Massachusetts in 2013, with exhibit design by Proun Design and
  fabrication by Mystic Scenic Studios.
description: >
  Objects including plastic medical supplies and letters from doctors to
  their future counterparts are shown in internally lit display cases,
  accompanied by a large photo mural spanning the atrium.
