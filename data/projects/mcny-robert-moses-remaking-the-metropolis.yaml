summary: >
  "Robert Moses and the Modern City: Remaking the Metropolis" opened January
  27, 2007 at the Museum of the City of New York, curated by Hilary Ballon,
  with exhibition design by Pure+Applied.
description: >
  The Museum of the City of New York installment was one of three concurrent
  exhibitions on Robert Moses' legacy, alongside "The Road to Recreation" at
  the Queens Museum and "Slum Clearance and the Superblock Solution" at
  Columbia University's Wallach Art Gallery. The design clad walls, floors,
  and furniture in homasote as a material metaphor for Moses's citywide
  interventions, centered on a large vintage model of the proposed
  Mid-Manhattan Expressway.
