summary: >
  A digital map-and-print explorer accompanying "Promoting America: Maps of
  the Colonies and the New Republic," a temporary exhibition that ran
  October 17, 2020 through March 27, 2022 at the Art Museums of Colonial
  Williamsburg in Williamsburg, Virginia, was designed and developed by
  Ideum.
description: >
  The interactive lets visitors pan and zoom historical maps and prints from
  the colonial and early-Republic periods, exploring curator-added
  points-of-interest. Ideum's Inline open-frame touch displays were housed
  in custom period-styled tables built by Colonial Williamsburg's own museum
  design and operations group.
