summary: >
  Interactive exhibits at the Albany Pine Bush Discovery Center in Albany,
  New York, opened 2007, interpreting the Albany Pine Bush Preserve's
  ecology and history; exhibit design by Amaze Design, with architecture
  by Envision Architects and fabrication by Taylor Studios.
description: >
  The exhibits explain the region's glacial origins, its rare flora and
  fauna including the endangered Karner blue butterfly, and the preserve's
  environmental significance.
