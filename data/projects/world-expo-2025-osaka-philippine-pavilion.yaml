summary: >
  The Philippine Pavilion at World Expo 2025 in Osaka, Japan, featured a
  rattan facade animated by weaving scenes, AI-powered portraits, and an
  interactive dance installation celebrating Filipino culture and
  biodiversity, opened April 2025; architecture by Carlo Calma with Cat
  Inc. as executive architect, lead guest experience design by Tellart,
  commissioned by the Philippine Tourism Promotions Board and Department
  of Tourism.
