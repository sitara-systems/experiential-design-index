name: Hopkins Bloomberg Center Donor Recognition & Wayfinding
venue: hopkins-bloomberg-center
project_type: major-renovation
year_completed: 2023
credits:
  - firm: ashton-design
    role: graphics-wayfinding
    note: >
      Donor recognition and wayfinding strategy: pin-mounted muntz-metal
      signage, 25-foot donor wall, QR-coded art labels.
summary: >
  Ashton Design developed the donor-recognition and wayfinding strategy
  for Johns Hopkins University's Hopkins Bloomberg Center, a $275 million
  conversion of the former Newseum building in Washington, DC, dedicated
  in October 2023.
description: >
  Ashton's own page states "2024"; the independently-sourced October 2023
  dedication date is used instead. Other firms (Ennead Architects,
  SmithGroup, Rockwell Group — some already in the dataset) worked on the
  broader $650M renovation but are not credited alongside Ashton on
  Ashton's own page, so are not credited here.
