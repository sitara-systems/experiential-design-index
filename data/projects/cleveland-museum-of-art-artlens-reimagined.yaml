summary: >
  ArtLens Reimagined, the Cleveland Museum of Art's next-generation
  gallery experience in Cleveland, Ohio, opens to the public July 28,
  2026, with gallery experience design by Design I/O and systems
  architecture, a new content-management system, and real-time
  infrastructure by Sitara Systems.
description: ""
_comments: >
  Delivery stack completed 2026-07-21 from CMA's own exhibition page
  (Design I/O re-roled to media-design per CMA's "lead interactive
  design" wording + AI-tagged for the generative-AI interactives; Dpt.,
  Dome (= Dome Collective, CMA's ArtLens app partner since Gallery One),
  Prime Access Consulting, Zenith Systems added). Harvard FAS CAMLab
  (content partner, academic unit) and the "generous support" providers
  (BlueBridge, think[box], LightSight AI, RealNose.ai — funders/sponsors)
  deliberately not credited.
  Re-verified 2026-07-22 against the live production
  https://www.sitara.systems/cleveland-artlens/ (site launched at DNS
  cutover) — credits, exhibit description, and the systems-architecture
  framing all match what was drafted from the Firebase preview, no
  changes needed. Still NOT independently corroborated: CMA's own site
  (including a page built specifically to list 20+ named digital-
  innovation partners) does not name Sitara as of the last check
  (2026-07-20); worth re-checking CMA's site again close to or after the
  July 28, 2026 opening, since Jane Alexander at CMA had separately
  offered Sitara credit on the exhibition page per the sitara-website
  corpus.
sources:
