summary: >
  Arctic Adventure: Exploring with Technology, a permanent interactive
  exhibition simulating Arctic field research, opened December 2020 at the
  Museum of Science, Boston, designed by Moment Factory.
description: >
  Visitors pass through a multisensory ice cave into a "phygital" Arctic
  environment built on a Unity game engine synced to immersive soundscapes
  and dynamic lighting for a day/night cycle. Interactive stations let
  visitors use analog and digital tools — drones, hydrophones, ground-penetrating
  radar, ice-core drills — to analyze climate data, and a virtual
  ice-field crossing gives real-time feedback on footing. The exhibition
  marked the first phase of the museum's Blue Wing renovation and won an
  SEGD 2021 Honor Award in the Interactive Experiences category.
