summary: >
  Interpretive exhibits at the Seneca Art & Culture Center at Ganondagan in
  Victor, New York, a historic 17th-century Seneca town site; exhibit design
  by Amaze Design, with architecture by François de Menil and fabrication by
  Explus.
description: >
  Ganondagan was once the principal and largest town of the Seneca people,
  with approximately 4,500 residents and 150 bark structures; the center
  provides year-round programming, education, and interpretation of Seneca
  and Iroquois heritage.
