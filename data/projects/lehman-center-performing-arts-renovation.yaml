summary: >
  A $15.4 million renovation of the Lehman Center for the Performing Arts
  at Lehman College, adding a new glazed entrance pavilion, was completed
  in the Bronx, New York in 2019, designed by Michielli + Wyetzner
  Architects with lighting design by Anita Jorgensen Lighting Design; the
  project won a 2020 American Architecture Award for Design Excellence.
