summary: >
  Amazon Visitor Landing, an interactive visitor experience on the ground
  floor of the Merlin building at Amazon's HQ2 Metropolitan Park campus in
  Arlington, Virginia, opened in September 2023; Luci Creative led exhibit
  design with exhibit architecture by ZGF Architects, media design by Belle
  & Wissell, fabrication by Chicago Scenic Studios, and AV integration by
  BBI Engineering.
description: >
  The exhibit introduces neighbors and visitors to Amazon's culture, people,
  and innovations through a biophilic environment featuring undulating
  copper and plywood forms inspired by the nearby Potomac River, a live
  botanical wall, and interactive displays including "Voices of Amazon" and
  "By The Numbers."
