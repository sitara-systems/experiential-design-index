summary: >
  Profiles in Innovation, a display exhibit at Worcester Polytechnic
  Institute's George C. Gordon Library in Worcester, Massachusetts,
  celebrating WPI alumni including rocketry pioneer Robert Goddard and
  aerodynamicist Richard Whitcomb, opened in 2012 with exhibit design by
  Proun Design.
description: >
  The exhibit features display cases with models and personal artifacts
  from featured alumni, plus a changing-exhibit component for current
  subjects.
