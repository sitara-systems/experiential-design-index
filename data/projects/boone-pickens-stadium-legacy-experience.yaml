summary: >
  The Boone Pickens Legacy Experience, a 10,000 sq ft museum in the West End
  Zone of Boone Pickens Stadium at Oklahoma State University in Stillwater,
  Oklahoma, opened to the public in June 2025; interactive experience design
  by Trivium Interactive, exhibit design by Amaze Design, fabrication by
  Southern Custom Exhibits, AV systems design by AVL Systems Design, and
  lighting design by Available Light.
description: >
  The museum honors the life and philanthropy of T. Boone Pickens through
  interactive installations including a six-screen quote wall, a room of
  western art, coverage of the Pickens Plan renewable-energy initiative,
  archival-footage displays, and an augmented-reality exploration of his
  office bookshelf, alongside recreated settings from his life such as his
  childhood home and a replica of his 1955 Ford station wagon mobile office.
