summary: >
  The Fred W. Smith National Library for the Study of George Washington, a
  45,000 sq ft archive, research, and education building on 15 acres near
  Mount Vernon, VA, opened September 27, 2013, designed by Ayers Saint Gross
  and built by the Mount Vernon Ladies' Association.
description: >
  A national archive for George Washington's books and letters and a center
  for scholarly research and education, sited within walking distance of
  Washington's Mount Vernon estate. LEED Gold certified.
