summary: >
  "We Return Fighting: The African American Experience in World War I," a
  temporary exhibition in the Special Exhibitions Gallery at the
  Smithsonian's National Museum of African American History and Culture in
  Washington, DC, was on view December 13, 2019 through June 14, 2020, with
  film content by Northern Light Productions.
description: >
  Northern Light Productions created four short films exploring African
  American soldiers' experiences during World War I, two additional films
  addressing the war's post-war impacts, archival footage projections, and
  an interactive touchscreen featuring historical family photographs, for
  an exhibition that filled more than 4,000 square feet with photographs,
  original uniforms and weapons, and historic film footage.
