summary: >
  "First Ladies of Arkansas: Women of Their Times," a renovated permanent
  exhibition at the Old State House Museum in Little Rock, Arkansas, held
  its grand reopening September 14, 2018, with exhibit and graphic design
  by HealyKohler Design.
description: >
  The gallery displays what is described as the largest collection of
  Arkansas first ladies' gowns outside the Smithsonian, alongside
  motion-activated lighting, temperature-controlled cases, touch-screen
  kiosks, and video interviews highlighting the first ladies' public
  accomplishments.
