summary: >
  The 1904 World's Fair, a reimagined permanent exhibit on the 1904
  Louisiana Purchase Exposition at the Missouri History Museum in St.
  Louis, Missouri, reopened April 27, 2024, after a renovation; exhibit
  design, interpretive planning, and fabrication of a 1:400 scale model of
  the 1,200-acre fairgrounds by PGAV Destinations.
description: >
  The exhibit recreates the 1904 fairgrounds with more than 300 3D-printed
  sculptures of the exposition's Beaux Arts-style buildings, built from
  historical maps and photographs since no blueprints survive. The 2024
  reopening added more than 200 artifacts and expanded the exhibit's
  storytelling to include the Fair's segregation and exploitation of
  "living exhibits," alongside its architectural grandeur.
