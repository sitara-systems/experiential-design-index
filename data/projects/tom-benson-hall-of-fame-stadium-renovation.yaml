id: tom-benson-hall-of-fame-stadium-renovation
name: Tom Benson Hall of Fame Stadium & Johnson Controls Hall of Fame Village (Phase I-II)
venue: tom-benson-hall-of-fame-stadium
project_type: major-renovation
year_completed: 2017
credits:
  - firm: hks
    role: architecture
  - firm: hks
    role: master-planning
    note: site plan for the Johnson Controls Hall of Fame Village surrounding the stadium
summary: >
  A ground-up reconstruction of the Pro Football Hall of Fame's stadium in
  Canton, Ohio (renamed for donor Tom Benson), completed in 2017 as the
  centerpiece of the HKS-planned Hall of Fame Village mixed-use district;
  the 23,000-seat venue includes an in-field stage used for Hall of Fame
  enshrinement ceremonies.
description: >
  HKS's scope covered the stadium's architecture and the Hall of Fame
  Village site/urban-design plan; the adjoining Pro Football Hall of Fame
  museum building itself predates this project and is not an HKS credit.
sources:
  - https://www.archpaper.com/2017/08/pro-football-hall-fame-village/
