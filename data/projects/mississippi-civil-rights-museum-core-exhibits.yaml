summary: >
  The Mississippi Civil Rights Museum, a 20,000 sq ft museum in Jackson
  opened as part of the Two Mississippi Museums on December 9, 2017, with a
  27-component media program produced by Monadnock Media and exhibit design
  by Hilferty & Associates.
description: >
  Developed "with the participation of local people who were part of the
  struggle," per Monadnock's own account, the museum won an American
  Alliance of Museums MUSE Award.
