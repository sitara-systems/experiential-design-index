summary: >
  "Different by Design: The Styling of Edsel Ford," a 2009 exhibition at
  the Edsel & Eleanor Ford House in Grosse Pointe Shores, Michigan,
  featured three of Edsel Ford's personally customized automobiles, with
  exhibit design by Museumcroft/Snodgrass Design and exhibit graphics by
  Proun Design.
description: >
  The 2,000 sq ft exhibit displayed a 1934 Brewster Town Car, a 1938
  Lincoln K Brunn Brougham, and a 1941 Lincoln Continental Cabriolet
  alongside interpretive displays on Edsel Ford's influence on automotive
  design and interactive elements letting visitors design vehicles or play
  racing games.
