_comments: >
  Independently sourced beyond Sitara's own site by three sources:
  Communication Arts (commarts.com/project/35154, full credits list
  naming Sitara Systems), SEGD (segd.org/projects/in-love-with-the-world/,
  explicitly crediting "Sitara Systems, Las Vegas — aerobe behaviour
  design and development"), and AKA Media System's own site
  (aka.farm/in-love-with-the-world/, crediting Sitara by name). The
  strongest-sourced Sitara credit found to date. Re-verified 2026-07-22
  against the live production
  https://www.sitara.systems/tate-in-love-with-the-world/ (site launched
  at DNS cutover, replacing the temp preview domain this record was
  originally drafted against) — full delivery stack (Anicka Yi Studio,
  AKA Media System, Airstage, KitMapper, Sitara) confirmed unchanged.
