summary: >
  In Love With The World, Anicka Yi's 2021 Hyundai Commission for Tate
  Modern's Turbine Hall in London, featured an ecosystem of autonomous
  soft-robotic aerial machines called aerobes, each with individually
  simulated behavior; Sitara Systems designed and developed the
  artificial-life system governing aerobe behavior, working with
  technical lead AKA Media System and fabricator Airstage.
