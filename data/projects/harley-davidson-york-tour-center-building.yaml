summary: >
  A 70,000 sq ft public factory-tour facility at Harley-Davidson's Vehicle
  Operations assembly plant in York, Pennsylvania, opened in 2002 with
  architecture by Kubala Washatko Architects (TKWA), exhibit design by
  Jeremy Hoffman Design, and fabrication/installation by kubik maltbie,
  including an entry lobby, exhibit space, theater, Kids Corner, and retail
  store; distinct from the Harley-Davidson Museum in Milwaukee.
