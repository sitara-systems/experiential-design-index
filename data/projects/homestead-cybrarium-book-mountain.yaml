id: homestead-cybrarium-book-mountain
name: Book Mountain
venue: homestead-cybrarium
project_type: installation
year_completed: 2021
credits:
  - firm: taylor-studios
    role: fabrication
summary: >
  A 320-square-foot interactive sculpture of oversized books, topped with a
  space-themed astronaut figure, at the Homestead Cybrarium public library
  in Homestead, Florida, completed in 2021 by Taylor Studios.
description: >
  Interactive screens are embedded within the oversized books at varying
  angles, intended to make the physical library space as engaging as its
  digital resources.
sources:
