summary: >
  Crayola IDEAworks: The Creativity Exhibition, a 17,000 sq ft traveling
  interactive exhibition on creativity produced with Agency808, premiered
  at The Franklin Institute in Philadelphia on February 13, 2021, with AV
  integration by MAD Systems, before touring North America.
description: >
  A 30+ exhibit touring installation in which each visitor receives a
  personalized experience via an RFID keepsake wristband scanned at
  stations throughout the exhibition; the AV system was built entirely on
  a wireless version of MAD Systems' QuickSilver platform to simplify
  load-out and setup between touring venues.
