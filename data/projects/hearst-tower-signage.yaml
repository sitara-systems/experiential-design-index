summary: >
  Hearst Tower, the Foster + Partners-designed addition to the landmarked
  Hearst Building in Manhattan, opened in 2006 with a building-wide
  signage system designed by C&G Partners (a project begun at Chermayeff &
  Geismar) for the Hearst Corporation; the work received an SEGD Merit
  Award in 2007.
description: >
  C&G Partners designed a building-wide network of lit signage, glass
  films, and elevator-call totems for Hearst Tower. Freestanding glass and
  steel totems integrate directional information, security cameras, and
  elevator keypads, using typefaces aligned with Hearst's corporate and
  magazine identity.
