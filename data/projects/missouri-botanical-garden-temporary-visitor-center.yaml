summary: >
  The Temporary Visitor Center, a 13,500 sq ft interim visitor-services
  building at the Missouri Botanical Garden in St. Louis, opened December
  2020 as Phase One of the three-phase Jack C. Taylor Visitor Center
  project; designed by Ayers Saint Gross (architecture, interiors, and
  graphic design) to house ticketing, gift shop, dining, and educational
  outreach while the permanent visitor center was under construction.
