summary: >
  Worlds of Puppetry Museum, a 15,000 sq ft new wing at the Center for
  Puppetry Arts in Atlanta housing the Jim Henson Collection and a Global
  Collection gallery, opened November 14, 2015, with building architecture
  by Clark Patterson Lee, exhibit design by TAIT (via its Thinkwell Group
  studio), and fabrication by kubik maltbie.
description: >
  The museum includes a recreation of Jim Henson's office alongside
  original puppets and artifacts from The Muppets and Fraggle Rock and a
  replica Sesame Street set, plus a Global Collection gallery with more
  than 170 puppets from around the world and interactive exhibits including
  a shadow-puppet theater.
