summary: >
  Ask Dalí (Via Artificial Intelligence), a permanent installation letting
  visitors pick up a Lobster Phone-styled handset and ask questions of a
  recreated "Salvador Dalí," opened April 11, 2024 at the Salvador Dalí
  Museum in St. Petersburg, Florida, built by Goodby Silverstein & Partners.
description: >
  A generative voice AI trained on Dalí's writings and archival audio
  answers visitor questions live, rather than matching to pre-recorded
  clips.
