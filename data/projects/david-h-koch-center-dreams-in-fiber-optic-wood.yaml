project_type: installation
year_completed: 2020
credits:
  - firm: c-and-g-partners
    role: media-design
summary: >
  Dreams in Fiber Optic Wood, a lobby installation at the David H. Koch Center
  for Cancer Care, Memorial Sloan Kettering's outpatient facility in New York
  City, opened with the building in January 2020, designed by C&G Partners.
description: >
  Thousands of tiny perforations in the lobby's wood surfaces carry fiber
  optic light, animating nature-inspired imagery — koi fish, butterflies,
  flowers, and bonsai trees — that shifts with the seasons, conceived as a
  meditative, welcoming distraction for patients and visitors arriving at the
  facility.
