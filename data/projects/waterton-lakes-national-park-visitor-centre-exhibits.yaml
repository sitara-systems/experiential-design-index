id: waterton-lakes-national-park-visitor-centre-exhibits
name: Waterton Lakes National Park Visitor Centre Exhibits
venue: waterton-lakes-national-park-visitor-centre
project_type: new-building
year_completed: 2021
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Worked with Metrographics through design-bid-build to develop modern
      exhibits and interpretive kiosks, then completed turn-key
      installation and programming of all front-of-house lighting and AV
      technologies.
  - firm: eos-lightmedia
    role: av-integration
technologies:
  - immersive projection
  - interactive kiosks
summary: >
  The new Visitor Centre at Waterton Lakes National Park in Alberta,
  Canada, described by Eos Lightmedia as the most significant investment in
  the park's visitor facilities in over 50 years, opened in 2021 with
  exhibit development by Metrographics and lighting/AV design, supply, and
  integration by Eos Lightmedia.
description: >
  The Centre features immersive projections, interactive exhibits, and
  theaters and stages introducing the UNESCO World Heritage Site's
  wilderness; Eos Lightmedia also provided training and technical support
  to Parks Canada staff.
sources:
  - https://www.eoslightmedia.com/work/163
