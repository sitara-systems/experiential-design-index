summary: >
  "Les Paul, The Wizard of Waukesha," a permanent 2,000 sq ft exhibit on
  guitarist and inventor Les Paul at the Waukesha County Museum in
  Waukesha, Wisconsin, opened in 2013; exhibit design by Peter Hyde Design
  with fabrication by Chicago Scenic Studios and media by RBH Multimedia.
description: >
  A multi-level exhibit told in six chapters covering aspects of Les Paul's
  life and career, using graphics, narrative text, video, and artifacts,
  including interactive comparisons of guitar sounds, audio clips of Paul
  discussing his inventions, and a visitor "Dream Wall."
