summary: >
  Stage 48: Script to Screen, a 25,000 sq ft interactive showcase covering
  the film production lifecycle at Warner Bros. Studio Tour Hollywood in
  Burbank, California, opened in 2016, designed and produced by TAIT (via
  its Thinkwell Group studio).
description: >
  The exhibit covers screenwriting through post-production, including
  original screen tests, costumes and props from films such as Casablanca
  and The Dark Knight, a green-screen interactive where visitors fly a
  virtual broom, and the original Central Perk set from Friends.
