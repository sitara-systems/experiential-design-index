summary: >
  The Lewis Latimer House Museum's permanent exhibition, a reinstallation of
  the historic Flushing, New York home of inventor Lewis Latimer, opened in
  June 2024, designed by Isometric Studio with a custom typeface called
  Filament.
description: >
  Isometric Studio developed a visual identity and an architectural
  framework for the historic house, working with Brocade Studio on
  strategic planning, writer Josh Epperson, KASA Collective on interactive
  stations, and Latimer's descendants and local community members.
