summary: >
  CosmoKids, an interactive space-themed STEAM play and learning area for
  children ages 2-7 at the Cosmosphere in Hutchinson, Kansas, opened in
  2020; West Office Exhibition Design designed the space.
description: >
  A hands-on play area for young children built around space-exploration
  themes, including activities such as building a Mars habitat and a
  gravity-well installation, intended to introduce astronaut-training
  concepts through play.
