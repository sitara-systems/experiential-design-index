summary: >
  The Willowbrook / Rosa Parks Station Improvement Project, a $129 million
  modernization of a Los Angeles Metro A/C Line transfer station, opened
  November 2020, with environmental graphic and wayfinding design by SKA
  Design and LA Metro's Arts + Design team.
description: >
  The renovation extended platforms, added a new pedestrian crossing and
  expanded mezzanine, and introduced digital real-time-arrival signage and
  enhanced security systems. Three separate environmental graphic design
  packages were coordinated for continuity across the station's expanded
  footprint, including platform destination markers, tactile Braille
  identifiers, and canopy-mounted entrance signage. The project won a 2021
  SEGD Global Design Award Merit Award in the Placemaking and Identity
  category.
