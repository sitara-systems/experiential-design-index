summary: >
  SPROUTS Learning Lab, an interactive early-childhood science exhibit at
  the Burpee Museum of Natural History in Rockford, Illinois, opened in
  2018; design by Architecture Is Fun with fabrication, installation, and
  project management by Chicago Scenic Studios.
description: >
  Centered on a U-shaped "Conversation Pit" with accessible cubbies of
  touchable artifacts, a "Dino Wall" for customizing a T-Rex silhouette,
  and a "Cloud of Wonder" of suspended taxidermy animals, all built low to
  the ground for child accessibility.
