summary: >
  Made in Japan: 20th-Century Poster Art, a 73-work exhibition on modern
  Japanese poster design, was on view at Poster House in New York City from
  March 2 through September 10, 2023, with exhibition design by KUDOS Design
  Collaboratory.
description: >
  Exhibition design took inspiration from geometric shapes in Ikko Tanaka's
  poster Nihon Buyo; an oversized title-wall triptych unfurls like a folding
  fan at the entrance, and section backdrops shift in color and scale to
  guide visitors chronologically through the collection. Curated by Nozomi
  Naoi and Erin Schoneveld; fabrication credited to Poster House's in-house
  team (Rob Leonardi) rather than an outside fabrication firm.
