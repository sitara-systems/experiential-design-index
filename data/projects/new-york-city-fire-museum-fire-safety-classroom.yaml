summary: >
  The New York City Fire Museum's mock-apartment fire safety education
  space was renovated into the Fire Safety Learning Center in 2018;
  exhibit concept design by Peter Hyde Design upgraded the fire safety
  apartment with new interactive fire-prevention exhibits, with fabrication
  by M. Catton & Co. and media by Moey.
description: >
  Funded by Turner Construction Company, Carnegie Corporation, FM Global,
  and the NY Community Trust. The classroom pairs video-based fire safety
  instruction with a simulated apartment tour where firefighters
  demonstrate household fire hazards.
