summary: >
  Entangled, three aluminum drums modeled on traditional Rada battery drums
  and connected by a communal bench, was installed at the Little Haiti
  Cultural Complex in Miami, FL in 2019 by The Urban Conga with the City of
  Miami and local Haitian artist Serge Toussaint, through participatory
  design workshops with Little Haiti residents.
