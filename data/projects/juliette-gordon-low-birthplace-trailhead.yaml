summary: >
  A renovation of the Juliette Gordon Low Birthplace museum in Savannah,
  GA, completed 2021; architecture by Greenline Architecture with
  visitor-experience design by Solid Light.
description: >
  Reimagined the entry/ticketing area, visitor orientation and tour
  experience, and retail spaces at the National Historic Landmark
  birthplace of the Girl Scouts USA founder, adding an accessible
  elevator-equipped connector building, to create what Solid Light
  describes as a "Trailhead for Girl Scouts USA."
