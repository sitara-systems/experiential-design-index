id: anisipi-water-discovery-route
name: Anisipi
venue: anisipi
project_type: installation
year_completed: 2022
credits:
  - firm: moment-factory
    role: media-design
    note: >
      Design, technical design, music, sound, lighting, scenography, and
      large-scale pre-rendered content for four immersive stations
      (Pikogan teepee video projection, the Amos municipal well
      light/sound/projection route, an interactive Refuge Pageau ecosystem
      experience, and a floating-LED-screen lakeside show), developed
      collaboratively with the Abitibiwinni First Nation (Pikogan).
technologies:
  - projection mapping
  - lighting design
  - sound design
summary: >
  Anisipi, a four-station water-themed immersive tourist route co-created
  by the town of Amos and the Abitibiwinni First Nation (Pikogan) with
  design and production by Moment Factory, opened in the Amos-Harricana
  territory of Québec in summer 2022.
