summary: >
  Space Race, the renovated Hall of Space gallery displaying the
  Cosmosphere's American and Soviet spaceflight artifacts (including the
  Apollo 13 command module) in Hutchinson, Kansas, was completed in
  September 2025 as part of a 105,000 sq ft renovation and expansion; West
  Office Exhibition Design led exhibit design with Verner Johnson as
  architect and kubik maltbie as fabricator.
description: >
  A renovation of the Cosmosphere's core Hall of Space galleries chronicling
  the Cold War space race between the United States and Soviet Union,
  combining the museum's artifact collection with new interactive and
  participatory exhibits and immersive media spaces, alongside a new
  entrance, Kids Discovery Room, and Current & Future Technology Gallery.
