summary: >
  Star Wars - Galactic Starcruiser, a purpose-built two-night immersive
  hotel experience adjacent to Disney's Hollywood Studios in Lake Buena
  Vista, Florida, opened March 2022 (closed permanently September 2023);
  Walt Disney Imagineering (Disney's in-house design unit, not an
  independent firm with its own record in this index) led the creative,
  architecture, and interior/show design, with Adirondack Studios
  (Adirondack Scenic, Inc.) as fabrication contractor for the themed show
  sets. It won the 2022 (29th Annual) Thea Award for Outstanding
  Achievement in Brand Experience from the Themed Entertainment
  Association.
description: >
  A standalone resort building designed as the "Halcyon" starship, with
  guest cabins as starship staterooms, live cast-driven storylines running
  the length of a two-night stay, a bridge with a real-time space-window
  visual-effects display, and themed dining and lounge spaces. Design work
  was led internally by Walt Disney Imagineering (Ann Morrow Johnson,
  executive producer/creative director; Gregory Ashton, concept architect;
  Tami Empero and Bryce Schulte, interior design), an in-house unit rather
  than an independent firm, so it does not carry its own firm record in
  this index per this index's convention for Disney in-house design credit
  (see the EPCOT Guardians of the Galaxy: Cosmic Rewind record for the same
  treatment). Adirondack Scenic, Inc. (Adirondack Studios) is named as the
  fabrication/installation contractor on Walt Disney Imagineering's public
  building permits for the project's themed show sets.
