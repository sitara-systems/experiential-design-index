id: biogen-headquarters-corporate-exhibits
name: Biogen Corporate Headquarters Exhibits
venue: biogen-headquarters
project_type: new-exhibition
year_completed: 2014
credits:
  - firm: proun-design
    role: exhibit-design
  - firm: mystic-scenic
    role: fabrication
summary: >
  Biogen Idec opened permanent corporate exhibits at its Kendall Square
  headquarters in Cambridge, Massachusetts in February 2014, marking the
  company's return to Cambridge and celebrating its work in
  neurodegenerative, hematologic, and autoimmune treatments through a
  kinetic sculpture, interactive displays, and video interviews; exhibit
  design by Proun Design with fabrication by Mystic Scenic Studios.
description: >
  The 2,000 sq ft exhibits include a kinetic sculpture simulating order
  from chaos, interactives on the company's drug therapies and history, and
  video interviews with people affected by its treatments.
sources:
