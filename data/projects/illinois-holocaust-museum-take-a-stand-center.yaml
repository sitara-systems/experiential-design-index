summary: >
  Take a Stand Center, a permanent exhibition at the Illinois Holocaust
  Museum & Education Center in Skokie, Illinois, opened October 29, 2017,
  concept-developed by BRC Imagination Arts in collaboration with USC Shoah
  Foundation.
description: >
  The exhibition includes the Abe & Ida Cooper Survivor Stories Experience
  (a 66-seat holographic theater using USC Shoah Foundation's Dimensions in
  Testimony technology), the Goodman Upstander Gallery, and a Take a Stand
  Lab; it won a 2018 MUSE Gold Award for Interpretive Interactive
  Installations.
