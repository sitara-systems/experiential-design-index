summary: >
  "Sleeping Beauties: Reawakening Fashion," a Costume Institute exhibition
  reactivating fragile garments from the Metropolitan Museum of Art's
  collection through multisensory technology, was on view at the Anna
  Wintour Costume Center in New York from May 10 through September 2, 2024,
  curated by Andrew Bolton with exhibition design by Leong Leong.
description: >
  The exhibition, exploring themes of sea, land, and sky across roughly 250
  objects, combined conservation research and AI/CGI reconstructions with
  traditional formats including x-rays, video animation, light projection,
  and soundscapes to "reawaken" garments too fragile for display on
  mannequins. Nick Knight served as Creative Consultant, with his company
  SHOWstudio developing technological activations; researcher and artist
  Sissel Tolaas developed accompanying scent design.
