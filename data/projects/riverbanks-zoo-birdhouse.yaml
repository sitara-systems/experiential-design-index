id: riverbanks-zoo-birdhouse
name: The Birdhouse at Riverbanks
venue: riverbanks-zoo
project_type: new-building
year_completed: 2001
credits:
  - firm: hadley-exhibits
    role: fabrication
    note: "on other credits; per Hadley's own portfolio"
summary: >
  The Birdhouse at Riverbanks, a 12,000+ sq ft aviary building at Riverbanks
  Zoo and Garden in Columbia, South Carolina, opened in 2001 replacing the
  zoo's original 1974 birdhouse, with fabrication by Hadley Exhibits.
description: >
  Recognized with a AZA Significant Achievement Award as one of the best new
  zoo exhibits in the United States. Public sources document the opening
  year and scope but do not name an architect or exhibit designer of record;
  only Hadley's own portfolio documents its fabrication role.
sources:
