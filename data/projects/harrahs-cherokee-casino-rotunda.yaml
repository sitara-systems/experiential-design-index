summary: >
  The rotunda at Harrah's Cherokee Casino Resort in Cherokee, North Carolina,
  a themed entry centerpiece with twin 68-foot waterfalls and eight 60-foot
  illuminated tree columns, opened in 2012 as part of a multi-year resort
  expansion; Cuningham Group was architect, Lexington was design/build
  fabricator, and Candela Controls engineered the lighting control systems.
