summary: >
  "Cecil Beaton: The New York Years" was on view late October 2011 through
  February 20, 2012 at the Museum of the City of New York, curated by Donald
  Albrecht, with exhibition design by Pure+Applied.
description: >
  The exhibition presented photographs, drawings, and costumes by
  British-born artist and designer Cecil Beaton (1904-1980), documenting his
  impact on New York's cultural life from the 1920s through the 1960s,
  featuring a Beaton-designed rose wallpaper.
