summary: >
  SuperReal, an immersive digital art experience by Moment Factory built
  into the landmarked Cipriani 25 Broadway event venue in Lower Manhattan,
  New York, opened August 2019.
description: >
  Produced in partnership with venue operator Cipriani, SuperReal transforms
  the 12,000-square-foot Great Hall of the former Cunard Building — a
  neo-Renaissance landmark with 30-foot vaulted ceilings — into a 45-minute,
  five-scene journey using 360-degree projection mapping, mirrored floors,
  interactive visuals that respond to visitor movement, and immersive sound.
  The installation's projection and lighting infrastructure was permanently
  built into the historic interior; the ticketed experience has run in
  recurring seasonal editions since its 2019 debut.
