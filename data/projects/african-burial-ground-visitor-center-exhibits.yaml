summary: >
  Interpretive exhibits at the African Burial Ground Visitor Center, a
  National Monument in lower Manhattan, New York; exhibit design by Amaze
  Design, with architecture by Roberta Washington Associates, fabrication by
  Southern Custom Exhibits, lighting design by Available Light, and film
  production by Firethorn Productions.
description: >
  The 7-acre National Monument is the final resting place for as many as
  15,000 free and enslaved African men, women, and children who lived during
  the 17th and 18th centuries; the exhibits honor those buried there and
  elevate awareness of African contributions to New York City's history.
