summary: >
  The Stacks, five sculptural emission-vent flues topped with programmable
  LED "fingernail" light fixtures, was completed in 2009 at the Southeast
  False Creek Neighbourhood Energy Utility in Vancouver, BC; Pechet and Robb
  designed the sculptural treatment and Eos Lightmedia, working with lighting
  supplier CDM2 Lightworks, provided the controls and programming.
description: >
  The Neighbourhood Energy Utility is Vancouver's first sewage
  heat-recovery district energy system; the five 22-metre stacks were
  reimagined by Pechet and Robb as a sculptural "hand," each flue topped by
  an LED fixture programmed to change color in response to the facility's
  green-energy output.
