summary: >
  The Woody Guthrie Center, a 12,000-square-foot museum and archive in the
  Brady/Tulsa Arts District of Tulsa, Oklahoma, opened April 27, 2013, a
  historic renovation of the Mathews Warehouse (Tulsa Paper Company
  building) funded by the George Kaiser Family Foundation, with architecture
  by Kinslow, Keith & Todd (now Ethos Architects), exhibit design and
  interpretive planning by Gallagher & Associates, and lighting design by
  Schuler Shook.
description: >
  The center houses the Woody Guthrie Archives — acquired by the Tulsa-based
  George Kaiser Family Foundation in 2011 and relocated from Mount Kisco, New
  York — including thousands of manuscript pages, notebooks, photographs,
  and recordings, centered on a display case holding the handwritten
  manuscript of "This Land Is Your Land." The building also includes
  rehearsal rooms used by the Tulsa Symphony and theatrical groups and
  climate-controlled archive storage. Permanent-exhibit curation was led by
  Mike Buday (Gallagher & Associates), Robert Santelli (The Grammy Museum),
  and Nora Guthrie and Tiffany Colannino of The Woody Guthrie Archives.
