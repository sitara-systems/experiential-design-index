summary: >
  The Museum Experience Center, a $33 million reimagining of Conner
  Prairie's welcome and exhibit building in Fishers, Indiana, reopened to
  the public on April 3, 2026, with a new 3,150 sq ft immersive theater
  tracing the White River's history from its glacial origins to the
  present, designed and produced by Monadnock Media and Luci Creative.
description: >
  The theater is organized into three sections -- "Power of Place"
  (glacial landscape formation), "Arrivals" (early inhabitants), and
  "Oasis" (contemporary voices) -- using immersive imagery and soundscape.
  The broader $33 million capital project, funded through the Prairie
  Pathways Campaign, also added new exhibit and programming space and an
  immersive play space; a Smithsonian-developed Spark!Lab and a "Wellspring"
  art installation by artist Wes Bruce and The Curious Life were part of
  the same reopening but are not credited to Monadnock Media.
