summary: >
  Antler Hill Village, an $18.6 million pedestrian village at the Biltmore
  Estate in Asheville, North Carolina, opened in 2010, physically and
  thematically joining Biltmore House and the Biltmore Winery with an
  exhibition space, village green, dining, shopping, an Outdoor Adventure
  Center, and an enhanced winery tour and tasting area; master planning,
  architecture, exhibit design, interpretive planning, and environmental
  graphics by PGAV Destinations.
description: >
  PGAV Destinations' scope covered master planning, architectural design,
  exhibit design, interior design, interactive experience design,
  environmental and interpretive graphic design, interpretive writing,
  landscape design, brand development, and on-site construction
  administration and art direction. The project also included a historic
  barn, kitchen garden, and farmyard.
