summary: >
  Impact Simulator and Galactic Explorer, two theme-park-style interactive
  experiences, opened in 2022 at the International UFO Museum and Research
  Center in Roswell, New Mexico, designed and built by Ideum.
description: >
  The Impact Simulator uses five edge-to-edge 86" 4K displays combined into
  a single 10800x3840 viewport, with 3.1 surround sound and DMX lighting, to
  simulate an alien spaceship crash landing based on the Roswell Incident.
  Galactic Explorer, on three 65" touch displays, is a search game where
  visitors look for clues about life beyond Earth using NASA-sourced
  research and archival footage.
