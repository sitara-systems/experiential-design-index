summary: >
  Oakmont Country Club, host of more U.S. Opens than any other course, in
  Oakmont, Pennsylvania, opened a new exhibit on its U.S. Open history
  timed to its ninth hosting in 2016; content developed by golf historian
  David Normoyle of Normoyle Historical Consulting, with exhibit design and
  graphics by Peter Hyde Design and fabrication by M. Catton & Co.
description: >
  Nine trophy cases display historic artifacts from each of the U.S. Opens
  held at Oakmont.
