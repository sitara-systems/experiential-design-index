summary: >
  Chrome Web Lab, a year-long exhibition making the mechanics of the
  internet physically tangible through giant robotic experiments, opened
  July 19, 2012 at the Science Museum in London, produced by Tellart with
  Google Creative Lab.
description: >
  Visitors interacted with five large-scale physical machines — including
  a giant Etch A Sketch-style drawing arm and a mechanical orchestra — each
  driven in real time by web activity from around the world; the
  exhibition drew roughly 500,000 visitors over its year-long run.
