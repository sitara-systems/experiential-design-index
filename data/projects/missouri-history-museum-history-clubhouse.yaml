summary: >
  History Clubhouse, a 5,000 sq ft children's exhibit on St. Louis history
  at the Missouri History Museum, opened in 2015; exhibit design by
  Kraemer Design+Production with fabrication, installation, and project
  management by Chicago Scenic Studios.
