summary: >
  OMSI's Coastal Discovery Center at Camp Gray, a 20-acre outdoor
  science-education campus in Newport, Oregon, opened March 12, 2016,
  designed by Siegel & Strain Architects as design architect with
  Dangermond Keane Architecture (now Bearing Architecture) serving as
  executive architect.
description: >
  Siegel & Strain's own project page states "year completed 2017,"
  conflicting with the March 2016 opening reported by two independent
  local-news sources; 2016 (direct opening-date reporting) is used here.
