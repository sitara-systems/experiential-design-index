summary: >
  Olson Kundig designed the Jordan Schnitzer Museum of Art at Washington
  State University in Pullman, a $15 million, 14,000-square-foot exhibit
  space nicknamed the "Crimson Cube" for its crimson-glass facade, which
  opened April 6, 2018.
description: >
  The museum, Washington's largest public fine-arts facility east of the
  Cascades, has seven galleries and free public admission.
