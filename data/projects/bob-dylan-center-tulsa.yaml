summary: >
  The Bob Dylan Center, a museum and archive in Tulsa, Oklahoma holding more
  than 100,000 items from the Bob Dylan Archive, opened May 10, 2022, with
  architecture and exhibit design by Olson Kundig inside an adaptively
  reused early-20th-century warehouse.
description: >
  59 Productions designed an interactive recording-studio environment
  letting visitors remix layers of Dylan recordings, projected onto a
  three-dimensional model built in forced perspective. Art Processors
  developed the exhibit's immersive, location-aware interactive audio guide.
