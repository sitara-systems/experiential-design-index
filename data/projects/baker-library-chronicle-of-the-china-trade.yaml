summary: >
  "A Chronicle of the China Trade," an exhibition on the Boston trading
  house Augustine Heard & Co.'s 19th-century China trade records, was on
  view at Baker Library, Harvard Business School, in 2012, with exhibit
  design by Proun Design, fabrication by WB Inc., and media production by
  Northern Light Productions.
description: >
  The exhibit drew on Baker Library's Augustine Heard & Co. archive (800
  volumes, 272 boxes, and 103 cartons) documenting the company's China
  trade in tea, silk, and porcelain from 1840 to 1877, complemented by
  artifacts on loan from Hong Kong and Shanghai.
