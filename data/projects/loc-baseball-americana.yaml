summary: >
  Baseball Americana opened June 29, 2018 at the Library of Congress in
  Washington, D.C., curated by Susan Reyburn, with exhibition design by
  Pure+Applied, including a built stadium-section gallery intervention.
description: >
  The exhibition explored the cultural history of baseball in America
  through Library of Congress collection items, including "Laws of Base
  Ball," Babe Ruth's shoes, and Jackie Robinson's letters.
