summary: >
  GulfQuest National Maritime Museum of the Gulf Coast, a 120,000 sq ft
  museum in Mobile, Alabama (renamed National Maritime Museum of the Gulf
  in 2024), opened September 26, 2015, with roughly 90 interactive
  exhibits; Monadnock Media produced the media and interactive experiences
  with exhibit design by Lyons/Zaremba Inc.
description: >
  Installations credited to Monadnock Media include a virtual-submersible
  "Deep Explorer" interactive, a panoramic orientation theater, and a
  multiplayer "Great Gulf Challenge" game.
