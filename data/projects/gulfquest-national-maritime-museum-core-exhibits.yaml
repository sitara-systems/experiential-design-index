    note: "Media master planning, exhibit design collaboration, media experience design and production, digital interactive design and development, and technical systems oversight across the 35,000 sq ft museum, including the Port of Victory Theater, Deep Explorer virtual-submersible interactive, GulfQuest panoramic theater, Great Gulf Challenge multiplayer game, and Take the Helm simulator"
