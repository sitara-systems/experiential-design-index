summary: >
  Black Power to Black People: Branding the Black Panther Party, an
  exhibition on the Black Panther Party's graphic identity, was on view at
  Poster House in New York City from March 2 through September 10, 2023,
  with exhibition design by KUDOS Design Collaboratory.
description: >
  The exhibition design opens outside the gallery with two oversized
  protest-sign forms and a custom typeface evoking 1960s civil-rights
  protest-sign lettering, then follows the development of Black Panther
  Party branding through six chronological sections inside. Fabrication
  credited to Poster House's in-house team (Rob Leonardi) rather than an
  outside fabrication firm.
