summary: >
  Cyclorama: The Big Picture opened February 22, 2019 at the Atlanta History
  Center in Atlanta, housing the restored 1886 "Battle of Atlanta" cyclorama
  painting in a new custom-built rotunda; exhibit design by Shibui Design,
  A/V design-build by CEI, and diorama and exhibit fabrication by Building
  Four Fabrication, Malone Design/Fabrication, and Avyve. Cortina
  Productions' companion "Rotunda Film," projected onto the painting itself,
  won a 2020 AAM MUSE Award.
