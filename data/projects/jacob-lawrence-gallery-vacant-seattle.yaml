summary: >
  Vacant Seattle, a self-initiated participatory installation inviting the
  public to reimagine pandemic-vacant Seattle storefronts, debuted at the
  2021 Seattle Design Festival before being exhibited at the Jacob Lawrence
  Gallery at the University of Washington.
description: >
  Drew on UW Architecture professor Elizabeth Golden's research on "The
  Great Vacancy."
