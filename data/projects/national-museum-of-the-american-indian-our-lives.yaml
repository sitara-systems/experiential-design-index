summary: >
  "Our Lives: Contemporary Life and Identities," one of three inaugural
  permanent exhibitions at the Smithsonian's National Museum of the
  American Indian in Washington, DC, opened September 21, 2004 and ran
  through July 6, 2015; Hadley Exhibits provided custom exhibit casework.
description: >
  The exhibition presented the self-representation of eight Native
  communities from the Arctic to the Caribbean, including the Campo Band of
  Kumeyaay Indians, the urban Indian community of Chicago, the Yakama
  Nation, Igloolik, Kahnawake Mohawk, Saint-Laurent Metis, the Kalinago of
  Dominica, and the Pamunkey.
