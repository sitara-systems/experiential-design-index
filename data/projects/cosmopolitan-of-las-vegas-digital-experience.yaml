summary: >
  The Cosmopolitan Digital Experience, eight LED-wrapped columns and
  coordinated digital surfaces in the lobby of The Cosmopolitan of Las
  Vegas, opened with the resort in December 2010; Digital Kitchen created
  the digital experience and content within Rockwell Group's lobby
  design, and the program won the 2011 Cannes Lions Design Grand Prix.
description: >
  Additional column content was later commissioned from artists through
  Bitforms Gallery and Art Production Fund, and Float4 has produced
  subsequent content refreshes for the lobby displays.
