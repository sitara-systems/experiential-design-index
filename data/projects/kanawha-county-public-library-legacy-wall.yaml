summary: >
  The renovated and expanded Kanawha County Public Library in Charleston,
  West Virginia, reopened in February 2022 with a donor Legacy Wall and
  exterior identity signage designed by RSM Design, architecture by Silling
  Architects, and fabrication by Design Communications Limited.
description: >
  The Legacy Wall commemorates community donors who supported the library's
  $24–27 million renovation and expansion; RSM Design also designed the
  building's exterior identity signage.
