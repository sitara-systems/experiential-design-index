summary: >
  The Cody Firearms Museum at the Buffalo Bill Center of the West in Cody,
  Wyoming, reopened in July 2019 after a $12.5 million, 40,000-square-foot
  renovation with exhibit design by Gallagher & Associates, architecture by
  Cushing Terrell, fabrication and installation by Creo Industrial Arts,
  lighting design by Schuler Shook, AV integration by MODE Systems, and
  orientation films produced by Videobred.
description: >
  The renovation reorganized the museum's collection of more than 7,000
  firearms and 30,000 related artifacts around 800 years of firearms history,
  adding 25 new interactive exhibits and framing the collection through an
  explicitly apolitical, historically comprehensive lens developed with
  curator Ashley Hlebinsky. Construction ran May 2018 through April 2019 while
  the facility remained open to visitors; the renovated museum reopened to the
  public in July 2019.
