summary: >
  "Tablescapes: Designs for Dining" was on view October 1, 2018 through
  April 14, 2019 at Cooper Hewitt, Smithsonian Design Museum in New York,
  curated by Matilda McQuaid, Sarah Coffin, and Cara McCarthy, with
  exhibition design by Pure+Applied.
description: >
  The exhibition presented three dining "moments" across three galleries,
  centered on a newly conserved Pierre-Philippe Thomire surtout de table
  and featuring historic textiles by Marguerita Mergentime alongside
  contemporary work by National Design Award winners Joe Doucet and Mary
  Ping.
