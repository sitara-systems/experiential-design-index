technologies:
  - large-format projection
summary: >
  Rivers of Ice, a 3,500-square-foot temporary exhibition on Himalayan
  glacier change based on mountaineer David Breashears' GlacierWorks
  photography, was on view at the MIT Museum in Cambridge, MA from April
  2012 to March 2013, designed by Thinc Design.
description: >
  The exhibition juxtaposed historic and contemporary photographs taken from
  identical vantage points up to a century apart, combined with maps,
  large-format prints, and personal climbing artifacts. It received a
  Spark: Spaces Bronze Award.
sources:
