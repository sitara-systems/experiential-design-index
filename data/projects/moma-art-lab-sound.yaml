summary: >
  Art Lab: Sound is an ongoing hands-on installation in the Samuel and
  Ronnie Heyman Family Art Lab at the Museum of Modern Art in New York,
  inviting visitors to explore sound-making materials, construct sound
  sculptures, and interact with color-and-sound digital displays.
description: >
  Located on MoMA's first floor near the Sculpture Garden, the installation
  is designed for individual visitors and families, with sensory kits and
  noise-reduction headsets available for accessibility.
