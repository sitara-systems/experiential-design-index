summary: >
  The National Museum of Industrial History, a Smithsonian affiliate housed
  in a converted 100-year-old former Bethlehem Steel facility in Bethlehem,
  Pennsylvania, opened August 2016; Metcalfe Architecture & Design designed
  the exhibits (with interpretive planning by Drexel University's Center for
  Cultural Partnerships) and Art Guild fabricated and installed them, on a
  nine-month compressed timeline.
description: >
  The 13,000-square-foot exhibit program tells the story of American
  industrial history and innovation through the 19th and 20th centuries,
  including steel, silk, and propane manufacturing, set within one of the
  largest former Bethlehem Steel brownfield buildings.
