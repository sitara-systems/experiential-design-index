summary: >
  The Armor and Cavalry Gallery, a 3,500-square-foot permanent gallery at the
  National Infantry Museum & Soldier Center in Columbus, Georgia, opened in
  December 2013 with exhibit, graphic, and media design by HealyKohler,
  tracing the history of Armor and Cavalry regiments through artifacts,
  interactive media, and dioramas.
description: >
  HealyKohler's broader collaboration with the National Infantry Museum also
  covers two additional galleries on its own project page — "Securing Our
  Freedom, Defining the Nation: 1775 to 1898" and "A Global Presence: 1989 to
  Present" — but independent completion dates for those two galleries could
  not be confirmed from public sources, so they are not recorded as separate
  entries here.
