summary: >
  "Latin Jazz: La Combinación Perfecta," a Smithsonian Institution
  Traveling Exhibition Service show chronicling the development of Latin
  jazz, opened October 17, 2002 at the Smithsonian's Arts and Industries
  Building in Washington, D.C., beginning a 15-city, four-year US and
  Caribbean tour, with exhibit design by Museum Design Associates and
  exhibit graphics by Proun Design.
description: >
  The 2,000-3,000 sq ft traveling exhibition used a portable tube and
  fabric kiosk system designed for easy transport and assembly at
  multiple venues.
