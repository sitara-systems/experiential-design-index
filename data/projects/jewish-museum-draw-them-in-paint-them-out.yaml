summary: >
  Draw Them In, Paint Them Out, an exhibition of artist Trenton Doyle
  Hancock's work, opened at The Jewish Museum in New York City in November
  2024, with exhibition architecture by Isometric Studio.
description: >
  Isometric Studio designed the gallery's architectural framework,
  including playful cubic pavilions arranged around a central cylinder
  containing an inverted Ku Klux Klan hood, using bright colors and
  semi-reflective metallic panels, curated by Rebecca Shaykin.
