summary: >
  Flyway City: Architecture for a Flourishing Ecosystem, an exhibition on
  bird-friendly and wildlife-friendly urban design, opened at the Chicago
  Architecture Center's Skyscraper Gallery on June 11, 2026 and runs
  through January 3, 2027, designed and co-curated by Studio Gang with
  graphic identity and environmental graphics by Span Studio.
description: >
  The exhibition combines architectural models, building material mockups,
  photography, original illustrations, interactive media, and
  community-sourced artifacts to introduce visitors to five regional
  ecosystems (wetland, prairie, dunes and swales, woodland, and urban
  wildlife) and to Studio Gang projects incorporating bird-safe design,
  including the Aqua Tower and the David Rubenstein Treehouse at Harvard
  University.
