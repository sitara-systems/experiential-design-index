summary: >
  Explore & More – The Ralph C. Wilson, Jr. Children's Museum opened its
  new 43,000-square-foot building at Buffalo's Canalside waterfront in
  2019, with exhibit design by Gyroscope, Inc. and fabrication by Art
  Guild across its seven play zones.
description: >
  The four-story building features a two-story waterfall, a water table
  demonstrating Erie Canal locks, a working water wheel, and a landlocked
  canal boat among its hands-on construction, farming, and water-play
  zones.
