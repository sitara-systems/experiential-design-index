summary: >
  Future Energy Chicago, an interactive exhibit on energy generation and
  Chicago's future transportation and power systems, opened at the Museum
  of Science and Industry, Chicago in 2013; exhibit design by Evidence
  Design, AV design development by Electrosonic, and fabrication,
  installation, and project management by Chicago Scenic Studios.
description: >
  Visitors power displays through physical activity, including stationary
  bikes generating light effects and hand cranks activating plasma trees,
  plus facilitated design competitions for energy-efficient vehicles,
  homes, and neighborhoods.
