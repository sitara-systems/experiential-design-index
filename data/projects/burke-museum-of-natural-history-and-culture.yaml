summary: >
  The Burke Museum of Natural History and Culture, the University of
  Washington's natural history museum in Seattle, reopened in a new,
  purpose-built building on October 12, 2019, with architecture by Olson
  Kundig and exhibition design by Evidence Design.
description: >
  The $99 million, ground-up building replaced the museum's previous 1962
  facility and increased usable exhibition and research space by 66%,
  including visible-storage "open" research and fossil-preparation labs.
  Design and exhibit planning involved extensive collaboration with a Native
  American Advisory Board of statewide Tribal leaders. Fabrication was led
  by Pacific Studio with fossil-mount fabrication by Treibold Paleontology;
  interactive/AV elements were produced by Trivium Interactive; landscape
  architecture was by GGN and lighting design by Niteo Lighting Design;
  museum programming was led by Walter Crimm Associates.
