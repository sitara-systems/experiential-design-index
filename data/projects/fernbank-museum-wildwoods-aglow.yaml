summary: >
  WildWoods: AGLOW, a nighttime immersive light and sound experience across
  the 10-acre WildWoods natural habitat behind the Fernbank Museum of
  Natural History in Atlanta, opened in 2022, designed and produced by TAIT
  (via its Thinkwell Group studio) in partnership with Fernbank's science
  team.
description: >
  The experience transforms the wooded habitat into an open-environment
  attraction using trees, roots, and other natural elements as the canvas
  for projected imagery and interactive light, including oversized glowing
  seed forms and mushrooms that trigger sound based on guest movement.
