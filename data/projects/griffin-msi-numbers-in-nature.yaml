summary: >
  "Numbers in Nature: A Mirror Maze," a 7,500 sq ft permanent exhibition at
  the Griffin Museum of Science and Industry in Chicago, opened October 8,
  2014; Luci Creative designed the exhibition, an 1,800 sq ft all-LED mirror
  maze exploring mathematical patterns in nature, with lighting design by
  Lightswitch and fabrication by Ravenswood Studio.
description: >
  The exhibition was the museum's first all-LED installation, using roughly
  30,000 LEDs embedded in the maze floor and shatter-resistant, prison-grade
  mirrors to withstand heavy daily visitor traffic. A traveling version of
  the exhibition later toured to other science museums, including the
  Museum of Science, Boston. It received Event Design Magazine's Best Museum
  Environment (Silver) award and an IES Illumination Award of Merit for
  interior lighting.
