id: rockefeller-university-pearl-meister-greengard-prize-exhibit
name: Pearl Meister Greengard Prize Exhibit
venue: rockefeller-university
project_type: installation
year_completed: 2021
credits:
  - firm: c-and-g-partners
    role: exhibit-design
technologies:
  - dichroic film
  - etched portraits
summary: >
  The Pearl Meister Greengard Prize Exhibit, honoring women biomedical
  researchers in the Abby Aldrich Rockefeller Lounge near Caspary Auditorium
  at The Rockefeller University in New York City, was designed by C&G
  Partners and unveiled in July 2021.
description: >
  A hexagonal aluminum lattice spans a panoramic glass wall, holding
  changeable translucent panels laminated with dichroic film that shifts
  color with viewing angle and light, evoking butterfly wings or seashell
  interiors. Each panel carries a "hedcut"-style stipple portrait and
  citation for one of the prize's laureates (22 as of unveiling), rendered by
  the same illustration studio used for the Wall Street Journal's hedcut
  portraits.
sources:
