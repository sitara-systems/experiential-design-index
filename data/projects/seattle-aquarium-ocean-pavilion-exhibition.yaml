summary: >
  The Ocean Pavilion, a 50,000-square-foot aquarium expansion at the Seattle
  Aquarium in Seattle, WA, opened August 29, 2024, with exhibition design by
  Thinc Design and architecture by LMN Architects.
description: >
  The pavilion houses three marine habitats with nearly 500,000 gallons of
  water and roughly 3,500 animals and plants, spanning Salish Sea species to
  Coral Triangle biodiversity, developed in collaboration with aquarium
  staff and Indigenous advisors. This record covers the aquarium's interior
  exhibition design; see the related record for the rooftop park's
  interpretive signage (Studio Matthews).
