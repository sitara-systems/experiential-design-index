summary: >
  Explore Nature, a master plan and renovation of the North Museum of
  Nature and Science in Lancaster, Pennsylvania, was completed in 2015 with
  design by West Office Exhibition Design.
description: >
  West Office designed and implemented a new master plan transforming the
  North Museum into a more contemporary science and nature museum,
  including a new full-dome digital theater planetarium that doubles as an
  event space, a new Nature Explorer Gallery and Live Animal Room, and
  large-scale crawl-through scenic elements alongside live animal exhibits.
