summary: >
  Piranesi Circus, a sculptural installation by Tokyo-based Atelier
  Bow-Wow for the 2015 Chicago Architecture Biennial, was installed at the
  Chicago Cultural Center in 2015; Woodhouse Tinucci Architects served as
  architect of record, with fabrication, installation, and project
  management by Chicago Scenic Studios.
description: >
  Featured bridged stairways, a ladder, swing, and balcony elements visible
  from the historic building's interior windows; required specialized
  rigging to avoid damage to the protected landmark structure.
