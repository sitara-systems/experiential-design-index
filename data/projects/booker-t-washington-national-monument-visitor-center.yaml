summary: >
  The Booker T. Washington Visitor Center, a permanent exhibition at
  Booker T. Washington National Monument in Hardy, Virginia, opened in
  2013; exhibit design by Wondercabinet Interpretive Design with exhibit
  graphics by Proun Design and fabrication by Mystic Scenic Studios,
  focused on Washington's early life as an enslaved child on the site's
  tobacco plantation.
description: >
  Illustrated graphic murals and interactive exhibits convey the
  hardships of enslavement and Washington's early life before his later
  achievements as an educator and orator.
