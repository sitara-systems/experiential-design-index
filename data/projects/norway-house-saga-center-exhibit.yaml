summary: >
  The Saga Center, an interactive exhibit within Norway House's Haugo
  Bibliotek in Minneapolis, opened in October 2025 with a grand opening
  celebration October 20, 2025 attended by Crown Prince Haakon of
  Norway; exhibit design and fabrication by Split Rock Studios, with
  media components by Trivium Interactive.
description: >
  The exhibit invites visitors to explore connections to Norway through
  hands-on experiences and immersive environments, including a
  hand-carved Wood Wall, alongside the Haugo Bibliotek's Norwegian
  genealogical research library.
