summary: >
  "Nirvana: Taking Punk to the Masses," a long-running exhibition on the
  band's history and cultural impact, opened at the Museum of Pop Culture
  (then EMP Museum) in Seattle on April 16, 2011, and ran for 14 years
  before closing in September 2025; Belle & Wissell designed the exhibition
  graphics and interactive experiences, with 3D exhibit design by Curious
  Beast.
