summary: >
  "Resistance & Resilience: Slavery and Freedom in Marblehead," a 1,000 sq ft
  exhibition in the restored 1760s Jeremiah Lee Mansion brick kitchen and
  slave quarters at the Marblehead Museum in Marblehead, Massachusetts,
  opened June 1, 2026, with exhibit design by Proun Design.
description: >
  The exhibit recovers the lives of people enslaved by Marblehead families,
  including individuals held in the Lee household, presented in one of only
  three surviving detached slave quarters owned by a historic site in New
  England.
