id: civil-rights-memorial-center-redesign
name: Civil Rights Memorial Center Redesign
venue: civil-rights-memorial-center
project_type: major-renovation
year_completed: 2022
credits:
  - firm: monadnock-media
    role: media-design
    note: "Media and exhibit design across the 5,000 sq ft center's redesign, including a projected film over a photo-montage mural, a stained-glass interactive martyrs table, a nine-screen orientation theater, and a single-user interactive featuring a community poem by Kwame Alexander"
technologies:
  - projection mapping
  - multi-user interactive
  - single-user interactive
summary: >
  A redesign of the Southern Poverty Law Center's 5,000 sq ft Civil Rights
  Memorial Center in Montgomery, Alabama, reopened in January 2022 after a
  21-month closure, with new media exhibits produced by Monadnock Media.
description: >
  New elements include a nine-screen orientation theater on the civil
  rights movement's legacy and a single-user interactive presenting a
  community poem assembled by poet Kwame Alexander from more than 1,000
  public submissions.
sources:
  - https://monadnock.org/project/splc
  - https://www.splcenter.org/resources/stories/civil-rights-memorial-center-reopens-splcs-redesigned-crmc-has-new-exhibits-and-updates/
