summary: >
  The Medal of Honor Museum at Patriots Point, located aboard the USS
  Yorktown in Mount Pleasant, South Carolina, reopened May 25, 2024
  following a $3.5 million, 25,000 sq ft renovation; exhibit design by
  M. Catton & Co., media production by Wide Awake Films, Nanonation, and
  Interactive Knowledge, fabrication by Sleet Custom Cabinets, AV
  integration by Bowen Technovation.
description: >
  Distinct from the separately recorded National Medal of Honor Museum
  (Arlington, TX) and Charles H. Coolidge National Medal of Honor
  Heritage Center (Chattanooga, TN).
