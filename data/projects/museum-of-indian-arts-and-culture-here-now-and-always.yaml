id: museum-of-indian-arts-and-culture-here-now-and-always
name: "Here, Now and Always"
venue: museum-of-indian-arts-and-culture
project_type: exhibition-refresh
year_completed: 2022
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Design, supply, and integration of lighting, AV, and control systems
      for the renovated 10,300 sq ft permanent exhibition. No firm record
      yet (Vancouver, BC headquartered; non-US, per editorial policy
      geographic scope).
  - firm: eos-lightmedia
    role: av-integration
    note: "Same scope as the lighting-design credit above."
technologies:
  - lighting control system
summary: >
  "Here, Now and Always," the Museum of Indian Arts & Culture's permanent
  exhibition on the Native Southwest in Santa Fe, New Mexico, reopened in
  late 2022 following a renovation with lighting, AV, and controls design,
  supply, and integration by Eos Lightmedia.
description: >
  Over 60 Native advisers worked with museum curators to conceptualize each
  thematic area of the renovated exhibition, which was made more accessible
  to visitors while incorporating art and artifacts reflecting key
  historical and cultural changes among the diverse peoples of the Native
  Southwest.
sources:
  - https://www.eoslightmedia.com/work/127
  - https://www.indianartsandculture.org/current
