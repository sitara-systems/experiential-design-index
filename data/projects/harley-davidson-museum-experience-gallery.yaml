summary: >
  The Experience Gallery, a 3,500 sq ft gallery at the Harley-Davidson
  Museum in Milwaukee, Wisconsin, opened July 12, 2022; Luci Creative
  designed the exhibit, with fabrication by Ravenswood Studio.
description: >
  The gallery, called "The Road," immerses visitors in the Harley-Davidson
  riding community through media pillars, choreographed and reactive
  lighting, and interactive community pinboards sharing rider stories.
  Visitors can sit on featured motorcycles as part of the interactive
  experience.
