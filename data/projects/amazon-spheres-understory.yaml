summary: >
  Understory, a free public visitor center inside Amazon's Spheres in
  Seattle, opened 2017, uses a fully immersive 360-degree experience of
  media, models, and rotating plant exhibits to explain the workspace
  project; it won the 2019 Digital Signage Award and was a 2019 SEGD
  Global Design Award finalist.
description: >
  Media and interactive design by Belle & Wissell; interior architecture by
  Graham Baba Architects; fabrication by Dillon Works; lighting design by
  Niteo; exhibition management by Jill Randerson Exhibition Management.
