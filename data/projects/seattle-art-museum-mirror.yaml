summary: >
  Mirror, a permanent architectural media artwork by artist Doug Aitken on
  the facade of the Seattle Art Museum, was unveiled March 24, 2013; AV&C
  collaborated with Aitken on the design, programming, and installation of
  the system, which algorithmically recombines footage of Seattle using
  live weather, tide, and pedestrian data.
