summary: >
  The Frederic V. Malek West Point Visitors Center at the U.S. Military
  Academy in Highland Falls, New York, reopened in late 2017 after a
  renovation, with media experiences produced by Monadnock Media and
  exhibit design by Steve Feldman Design.
