summary: >
  A 4,600-square-foot redesign of the children's section at Thayer Public
  Library in Braintree, Massachusetts, by Arrowstreet, completed in 2019.
description: >
  Arrowstreet redesigned the children's room with a color-based zoning
  system (five dominant colors drawn from the library's existing
  stained-glass windows, warmer near the youngest-reader areas and cooler
  toward the tween section), modular seating for flexible programming, and
  a full-length mural combining Braintree history, the alphabet, and
  storybook characters as an all-ages scavenger hunt. The project received
  an award in 2021.
