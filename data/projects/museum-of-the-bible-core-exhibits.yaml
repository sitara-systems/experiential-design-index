id: museum-of-the-bible-core-exhibits
name: Museum of the Bible Core Exhibits
venue: museum-of-the-bible
project_type: new-building
year_completed: 2017
credits:
  - firm: electrosonic
    role: av-integration
    note: More than 40 AV-driven exhibits across the museum's seven public floors
  - firm: c-and-g-partners
    role: exhibit-design
    note: "Designed Bible Now, the reactive media gallery on the Floor 2 'Impact of the Bible' exhibit; content developed in consultation with scholarly advisors led by Gordon Campbell, Ph.D. and Byron R. Johnson, Ph.D."
  - firm: the-prd-group
    role: exhibit-design
    note: "Directed a team of a dozen creative firms in developing 100,000 sq ft of exhibitions across the museum, including three galleries of artifacts from the Vatican Library and the Israel Antiquities Authority"
  - firm: design-and-production-incorporated
    role: fabrication
  - firm: available-light
    role: lighting-design
    note: "Exhibit lighting designer for the Impact Gallery, per Eos Lightmedia's own project page."
  - firm: kubik-maltbie
    role: fabrication
    note: "Exhibit fabricator for the Impact Gallery specifically, per Eos Lightmedia's own project page."
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Supplied, installed, focused, and programmed the overhead and integral
      lighting of the Impact Gallery's 9-foot-high, 180-foot-long narrative
      tapestry (gobo projection).
  - firm: sh-acoustics
    role: acoustics
    note: >
      Sole exhibit-based acoustics consultant, providing acoustical design
      services for all four primary exhibit galleries and exhibit
      audio-design/calibration services for two of the four galleries.
technologies:
  - interactive touchscreens
  - 360-degree panoramic projection
  - handheld personalized tour devices
summary: >
  The Museum of the Bible, a 430,000 sq ft museum in Washington, DC, opened
  November 17, 2017; The PRD Group directed exhibit design and content
  development across the building, Electrosonic designed, built, and
  integrated AV systems for more than 40 exhibits, C&G Partners designed the
  Bible Now reactive media gallery on the Floor 2 "Impact of the Bible"
  exhibit, and Design and Production Incorporated fabricated the exhibits.
description: >
  Bible Now, part of the Floor 2 "Impact of the Bible" exhibit, is a
  360-degree, full-height, constantly-changing panorama of digital
  information exploring Scripture's contemporary impact in real time — live
  social media feeds, aggregated data from Bible app users, a 24-hour
  time-lapse of Jerusalem, and interactive tables where visitors contribute
  their own responses.
