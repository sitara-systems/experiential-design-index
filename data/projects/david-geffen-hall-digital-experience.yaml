summary: >
  David Geffen Hall at Lincoln Center in New York reopened October 8, 2022
  after a $550 million renovation; ESI Design and AV&C designed and
  implemented a 22-element digital experience layer across the renovated
  lobby, Welcome Center, and Sidewalk Studio, alongside architecture by Tod
  Williams Billie Tsien Architects (public spaces) and Diamond Schmitt
  (concert hall).
