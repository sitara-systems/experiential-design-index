summary: >
  The opening exhibition halls of the Perot Museum of Nature and Science in
  Dallas, Texas, in its new 180,000-square-foot Thom Mayne/Morphosis
  building, opened in 2012; exhibit design by Amaze Design, architecture by
  Morphosis, fabrication by Group Delphi and Roto, and lighting design by
  Available Light.
description: >
  Amaze Design created five exhibition halls at the museum's 2012 opening:
  Discovering Life, Dynamic Earth, and Expanding Universe (life sciences,
  earth sciences, and astronomy), Life: Then & Now (paleontological
  collections), and the Rose Hall of Birds.
