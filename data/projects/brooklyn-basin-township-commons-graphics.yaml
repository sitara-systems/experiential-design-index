summary: >
  Township Commons, an 8-acre public park at Brooklyn Basin on the Oakland,
  California waterfront, opened November 2020 with environmental graphics
  and wayfinding by Volume Inc. for prime landscape architect EinwillerKuehl.
description: >
  The park is an adaptive reuse of a former shipping terminal, preserving
  industrial elements — walls, trusses, loading-dock geometry — for new
  public uses. Volume Inc.'s large-scale environmental graphics,
  interpretive moments, and wayfinding reference the site's industrial
  history with a modern twist. This was named 1 of 4 honorees in
  Communication Arts' 62nd Design Annual (2021), Environmental Graphics
  category.
