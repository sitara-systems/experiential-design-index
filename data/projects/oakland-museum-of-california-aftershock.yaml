technologies:
  - motion-simulation platform
summary: >
  Aftershock! Voices from the 1906 Earthquake and Fire, a temporary
  exhibition at the Oakland Museum of California in Oakland, California,
  opened in 2006 for the earthquake's centennial, exhibit design by West
  Office Exhibition Design.
description: >
  Commemorating the 100th anniversary of the April 18, 1906 San Francisco
  Bay Area earthquake, the exhibition combined personal stories and
  artifacts with a re-created Victorian house offering a simulated
  earthquake experience (pitch, roll, and rumble effects), conveying how
  communities endured and recovered from the disaster. It received the
  Charles Redd Center for Western Studies Award for Excellence.
