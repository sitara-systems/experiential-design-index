technologies: []
summary: >
  "City of Faith: Religion, Activism, and Urban Space," an exhibition on the
  intersection of religion and public space with a focus on South Asian
  American communities, opened at the Museum of the City of New York in
  November 2022, designed by Isometric Studio.
description: >
  Isometric Studio designed bold, colorful exhibition graphics and
  multilingual typography incorporating Urdu, Bangla, Arabic, and Hindi
  scripts inspired by immigrant neighborhood signage, curated by Mellon
  Curatorial Fellow Azra Dawood.
