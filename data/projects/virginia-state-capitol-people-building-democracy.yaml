summary: >
  "People. Building. Democracy.", a permanent interactive exhibit at the
  Capitol Visitor Center of the Virginia State Capitol in Richmond, was
  unveiled by the Virginia General Assembly on January 13, 2026 ahead of the
  nation's 250th anniversary; C&G Partners designed the exhibit's three
  components, including a gallery of nearly 250 digital watercolor
  legislator portraits, a 3D-printed LED model of Capitol Square, and an
  eight-foot ball machine illustrating the legislative process.
