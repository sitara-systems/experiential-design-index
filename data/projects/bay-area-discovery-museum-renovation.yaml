summary: >
  Olson Kundig led a campus-wide master plan and renovation of the Bay Area
  Discovery Museum, a children's museum in Sausalito, California, completed
  in 2021, adding STE(A)M-based learning exhibits including a Tot Spot
  infant/toddler area and a Try It Studio with digital fabrication tools.
