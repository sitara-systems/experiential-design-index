summary: >
  Gateway Through Time, a permanent exhibition tracing 125 years of the
  history of the former Robert Emmet Elementary School through its
  conversion into the Aspire Center for Workforce Innovation, opened in
  Austin, Texas on Juneteenth 2025 (June 19, 2025), with exhibition design
  by Span Studio.
description: >
  A modular, ascending timeline of archival images and community voices
  spanning the building's three eras — education, closure, and rebirth —
  developed with Austin Coming Together and Westside Health Authority.
