summary: >
  Three floors of interactive media and digital signage for Edward P. Evans
  Hall, home of the Yale School of Management in New Haven, Connecticut,
  opened with the building in January 2014; architecture by Foster +
  Partners, digital signage and data-visualization design by Unified Field.
description: >
  The narrow-cast display network shares school-wide agendas, class and
  conference schedules, announcements, and dynamic economic
  data-visualizations across classrooms and common areas, along with
  photography and content contributed by students, staff, and guest
  speakers.
