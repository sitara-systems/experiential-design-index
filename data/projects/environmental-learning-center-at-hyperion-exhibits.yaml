summary: >
  Interpretive exhibits at the Environmental Learning Center at the Hyperion
  Water Reclamation Plant in Playa del Rey, California, an educational
  facility created by the City of Los Angeles; exhibit design by Amaze
  Design, with architecture and engineering by CDM Smith.
