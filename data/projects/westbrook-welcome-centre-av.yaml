id: westbrook-welcome-centre-av
name: Westbrook Welcome Centre Lighting & AV Design-Build
venue: westbrook-welcome-centre
project_type: new-building
year_completed: 2021
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Design-build lighting and audiovisual services, including light art,
      large-format touchscreens, projection systems, a full-range
      integrated audio system, and a custom control system for dimming and
      exhibit power/standby scheduling. General contractor: Etro
      Construction.
  - firm: eos-lightmedia
    role: av-integration
technologies:
  - large-format touchscreens
  - integrated audio/lighting control
summary: >
  The Westbrook Welcome Centre, a 2,000-square-foot community and visitor
  hub on the University of British Columbia campus in Vancouver, Canada,
  opened in 2021 with lighting and audiovisual design-build by Eos
  Lightmedia, under general contractor Etro Construction.
description: >
  Described by Eos Lightmedia as more than a welcome centre, it hosts
  campus events (from movie nights to yoga classes) alongside interpretive,
  audiovisual-driven storytelling about the university. Note: independent
  public corroboration of this exact facility name/location beyond Eos
  Lightmedia's own project page was not found during sourcing; UBC operates
  multiple similarly named visitor/community facilities (e.g. the UBC
  Welcome Centre at the Robert H. Lee Alumni Centre, opened 2015, and the
  Wesbrook Community Centre, opened 2015) with different completion dates
  than the 2021 date given here, so this may reflect a later UBC facility
  not yet indexed elsewhere, or a variant name for one of them.
sources:
  - https://www.eoslightmedia.com/work/71
