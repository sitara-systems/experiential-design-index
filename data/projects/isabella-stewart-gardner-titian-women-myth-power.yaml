summary: >
  "Titian: Women, Myth & Power," an exhibition reuniting Titian's cycle of
  mythological "poesie" paintings, was on view at the Isabella Stewart
  Gardner Museum in Boston from August 12, 2021 through January 2, 2022 —
  its only United States venue — with exhibition design by Stephen Saitas
  Designs and lighting design by Anita Jorgensen Lighting Design.
