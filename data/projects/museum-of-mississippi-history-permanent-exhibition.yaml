summary: >
  The Museum of Mississippi History, a new building on the state's
  bicentennial-era Two Mississippi Museums campus in Jackson, Mississippi,
  opened December 9, 2017; the building was designed by a coalition of
  Mississippi architecture firms in association with The Freelon Group
  (Perkins&Will), exhibits by The Design Minds, with media production by
  Northern Light Productions.
description: >
  Northern Light Productions produced 45 audiovisual programs for the
  museum, including multi-screen theater films featuring contemporary
  Mississippians such as Myrlie Evers and Morgan Freeman, interactive
  exhibits, and a visitor reflection booth with a custom content
  management system.
