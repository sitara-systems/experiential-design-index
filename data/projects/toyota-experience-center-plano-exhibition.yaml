summary: >
  The Toyota Experience Center, a 44,000 sq ft visitor and briefing facility
  at Toyota Motor North America's Plano, Texas headquarters, opened in
  August 2019, designed by Jack Rouse Associates (JRA) with architecture by
  Corgan and fabrication by Group Delphi.
description: >
  The center hosts guided visits for customers, dealers, media, and other
  business guests (access is by appointment/escort rather than open walk-in
  public admission) through galleries covering Toyota's history, current
  operations, and mobility-company positioning.
