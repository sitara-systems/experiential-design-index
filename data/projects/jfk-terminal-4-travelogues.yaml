summary: >
  Travelogues, a permanent public-art commission for two "sterile
  corridor" passages linking arrival gates to passport control at JFK
  International Airport's Terminal 4 in Queens, New York, opened in
  2001; Diller Scofidio + Renfro designed 33 backlit lenticular screens
  spanning 1,800 linear feet, displaying motion-triggered animated
  sequences built from X-ray images of travelers' suitcases.
