summary: >
  The FDNY Fire Zone, a fire and life-safety learning center at Rockefeller
  Center in New York, reopened at a new location in October 2020, with
  media design and creative direction by batwin + robin, exhibit design by
  Ashton Design, architecture by LB Architects, lighting design by David
  Weiner Design, AV integration by Synapse Audio Visual Designs, and
  fabrication by Cigar Box Studios.
description: >
  Visitors can try on turnout gear, sit in the jumpseat of a full-scale
  fire engine, and experience an immersive educational theater with eight
  fire scenarios using projection mapping, lighting, special effects, and
  surround sound, culminating a state-of-the-art fire and life-safety
  education experience run by the FDNY Foundation.
