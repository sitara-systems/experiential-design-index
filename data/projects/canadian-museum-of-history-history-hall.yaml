summary: >
  The Canadian History Hall, a 40,000 sq ft permanent exhibition at the
  Canadian Museum of History in Gatineau, Quebec, opened July 1, 2017 for
  Canada's sesquicentennial; lead architect Douglas Cardinal developed the
  hall's architectural concept, exhibit design was by gsm Project, and
  acoustic/audio design was by SH Acoustics.
description: >
  Three chronological galleries covering eighteen chapters of Canadian
  history, opening from a central "Hub" space with a large-scale satellite
  image of Canada.
