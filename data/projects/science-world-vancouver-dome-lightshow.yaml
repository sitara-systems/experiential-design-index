name: Science World Dome Lightshow
venue: science-world-vancouver
project_type: installation
year_completed: 2010
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Commissioned the controls and developed creative content for the
      dome's 391 full-color LED luminaire retrofit, including custom
      pixel-mapping software and a wireless smartphone/tablet app letting
      visitors select pre-programmed dome light shows.
technologies:
  - custom LED pixel-mapping software
  - wireless interactive smartphone/tablet app
summary: >
  Following Science World's 2009 exterior retrofit of its geodesic dome with
  391 full-color LED luminaires, Eos Lightmedia created and programmed,
  completed 2010, custom pixel-mapping software and an interactive
  smartphone/tablet app for the dome at TELUS World of Science in
  Vancouver, BC, delivering ten dynamic light shows including holiday and
  event-specific displays.
