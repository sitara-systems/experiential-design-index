summary: >
  Queen Maud's Album Exhibition, a two-year royal exhibition using
  photogrammetry and 3D audiovisual animation to bring Queen Maud of
  Norway's photo albums and dresses to life, opened July 4, 2017 at the
  Queen Sonja Art Stable at the Royal Palace in Oslo, media design by
  Tellart, in partnership with the National Museum of Art, Architecture
  and Design and The Royal Collection.
description: >
  The exhibition ran through July 2019 inside the former Royal Stables.
