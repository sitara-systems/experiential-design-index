summary: >
  Cyrus Tang Hall of China, a permanent exhibition of 350 Chinese artifacts
  across five galleries at the Field Museum in Chicago, opened October
  2015; the museum's own design team was joined by Chicago Scenic Studios
  for fabrication and installation, including a gas-sealed, pressurized
  case for a priceless ship artifact.
