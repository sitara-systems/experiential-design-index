technologies: []
summary: >
  The Lodge Museum of Cast Iron, a branded museum in South Pittsburg,
  Tennessee celebrating Lodge Cast Iron's heritage and American food
  culture, opened October 8, 2022; HealyKohler Design designed the
  exhibits and media.
description: >
  Exhibition galleries dispel cast iron misconceptions, recreate a
  foundry setting with live production demonstrations, and display the
  World's Largest Cast Iron Skillet (18 feet handle-to-handle, 14,360
  pounds).
