  The McCormick Tribune Freedom Museum, a 10,000 sq ft museum dedicated to
  First Amendment freedoms in Chicago's Tribune Tower complex, opened April
  11, 2006 and closed in 2009; exhibit design was by Gallagher & Associates,
  architecture by VOA Associates, and Second Story built the interactive
