summary: >
  Death Is Not the End, a 3,135-square-foot exhibition exploring Tibetan
  Buddhist and Christian perspectives on death and the afterlife through 58
  objects, opened at the Rubin Museum (now Rubin Museum of Himalayan Art)
  in New York City in 2023, designed by Isometric Studio.
description: >
  The exhibition design features a suspended monumental scrim, custom
  casework, neon and backlit graphic panels, and interactive components
  including a sand table and reflection cards.
