summary: >
  OMSI's Turbine Hall — a 1920s former PGE power station on the
  National Register of Historic Places — was renovated into the
  STEAM-focused "Center for Innovation," including a sensor-triggered
  interactive staircase experience, reopening at the Oregon Museum of
  Science and Industry in Portland, Oregon in 2019, designed by
  Dangermond Keane Architecture (now Bearing Architecture) in
  partnership with Felt Hat.
description: >
  Distinct from the already-recorded omsi-epicenter, omsi-soundstack,
  and omsi-the-greg-chaille-curium project records — those are
  individual exhibits placed inside this renovated hall, sourced
  separately, and none of their own project pages credit this firm, so
  no credits were added to them.
