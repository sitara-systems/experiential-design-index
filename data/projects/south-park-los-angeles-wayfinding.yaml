summary: >
  South Park Wayfinding, a neighborhood wayfinding system in the South Park
  district of Los Angeles, opened in 2019 with design by RIOS for the South
  Park Business Improvement District; it was a finalist in the Communication
  Arts 2020 Design Competition, Environmental Graphics category (entered
  under the firm's former name, RCH Studios).
description: >
  The system reuses the surface area of existing utility boxes across the
  neighborhood: one face gives pedestrian-scaled directions to nearby
  destinations, another maps South Park's businesses and landmarks, and a
  third situates the neighborhood within a 5- and 15-minute walk of Downtown
  Los Angeles landmarks.
