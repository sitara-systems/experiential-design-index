summary: >
  The Interactive Ebbets Field Model, the cornerstone exhibit of the Jackie
  Robinson Museum in New York City, opened in July 2022, fabricated and AV-
  integrated by Ideum with interactive software design by Gensler DXD.
description: >
  The scale model of Ebbets Field, home of the Brooklyn Dodgers, has
  controllable illuminated features including a period-style scoreboard,
  bullpens, press box, and dugouts, and is projection-mapped from above to
  turn the field into a storytelling surface. An LED tile wall behind the
  model and 34" reading-rail touch displays let visitors navigate stories
  about Jackie Robinson's baseball career and civil-rights activism. Ideum
  also worked with Zubatkin on the installation (role not covered by the
  roles vocabulary — construction/project management).
