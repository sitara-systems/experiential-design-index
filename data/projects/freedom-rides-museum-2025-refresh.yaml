summary: >
  A 2025 refresh of the Freedom Rides Museum in the historic Montgomery,
  Alabama Greyhound bus station, completed July 2025, fabricated by 1220
  Exhibits (neon signage, recreated bus benches, illuminated route map,
  ticketing counter, environmental graphics, VR component).
description: >
  This is a refresh of the museum's exhibits, distinct from the original
  2011 museum build, which was designed by Cohen Carnaggio Reynolds
  (architecture) and Warner Museums (exhibit design) — those firms are not
  credited on this 2025 refresh per 1220's own page and are not included
  here.
