summary: >
  The Naismith Memorial Basketball Hall of Fame in Springfield, Massachusetts
  completed a multimillion-dollar renovation of its galleries, reopening in
  2020; CambridgeSeven served as master planner and architect, with media
  design by Northern Light Productions and RLMG.
description: >
  Sources differ on whether Northern Light Productions or CambridgeSeven
  held the exhibit-design role of record on this project; Northern Light
  Productions' own project page lists itself as exhibit designer, while
  press coverage of CambridgeSeven's work describes that firm as "Master
  Planner, Architect and Exhibit Designer." This record credits
  CambridgeSeven with architecture only and both media firms with
  media-design, the uncontested roles across sources.
