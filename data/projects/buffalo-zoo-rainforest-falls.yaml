summary: >
  M&T Bank Rainforest Falls, a South American rainforest exhibit building at
  the Buffalo Zoo in Buffalo, New York, opened September 8, 2008, with
  architecture by Foit-Albert Associates, exhibit design by PJA Architects +
  Landscape Architects, and interpretive design by Hadley Exhibits.
description: >
  Phase II of a $75 million zoo overhaul, budgeted at $16 million and
  described as the biggest single project in the zoo's redesign at the time.
  The building's roof uses inflated ETFE membrane pillows for insulation and
  UV transmission. Structural engineering was by Jansen/Kiener Consulting
  Engineers, mechanical engineering by M/E Engineering, life-support-system
  design by TJP Inc., and general contracting by Manning Squires Hennig Co.
  — none of which map to a role in the current delivery-stack vocabulary and
  so are not recorded as credits here.
