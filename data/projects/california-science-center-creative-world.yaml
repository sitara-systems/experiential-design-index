summary: >
  Creative World, one of two core hands-on science galleries that opened at
  the California Science Center in Los Angeles in February 1998, was
  designed by West Office Exhibition Design.
description: >
  Creative World explores the impact of technology on daily life and the
  creative process through interactive experiences: racing solar-powered
  vehicles, communicating via video technology with other Los Angeles
  residents, designing transportation solutions, and participating in
  simulated earthquake building tests. The gallery emphasizes collaborative
  problem-solving in technological design.
