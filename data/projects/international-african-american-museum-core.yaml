summary: >
  The International African American Museum, a 40,000-square-foot museum at
  Charleston, South Carolina's historic Gadsden's Wharf, opened June 27,
  2023; Solomon Group served as project consultant, exhibit fabricator, and
  AV integrator during late-stage design development and installation.
description: >
  The museum received a 2025 Thea Award for Outstanding Achievement from the
  Themed Entertainment Association.
