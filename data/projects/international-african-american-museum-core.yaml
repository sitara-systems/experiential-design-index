summary: >
  The International African American Museum, a 40,000-square-foot museum at
  Charleston, South Carolina's historic Gadsden's Wharf, opened June 27,
  2023, with architecture by Pei Cobb Freed & Partners and Moody Nolan,
  exhibition design and interpretive planning by Ralph Appelbaum Associates,
  and Solomon Group serving as project consultant, exhibit fabricator, and
  AV integrator during late-stage design development and installation.
description: >
  The museum received a 2025 Thea Award for Outstanding Achievement from the
  Themed Entertainment Association, and was a 2024 Fast Company Innovation
  by Design Awards finalist in the Spaces and Places category (credited to
  Ralph Appelbaum Associates). Landscape design by Hood Design Studio is not
  captured as a project credit — the vocabulary has no landscape-architecture
  role (logged gap).
