summary: >
  "Lehman Brothers: A History, 1850-2008," an exhibition tracing the
  investment bank's rise and 2008 collapse through Harvard Business
  School's Lehman Brothers Collection, was on view in Baker Library's
  north lobby, Boston, Massachusetts, through July 2019, with exhibit
  design by Proun Design, fabrication by WB Inc., and media production by
  Northern Light Productions.
description: >
  Drawing on records Lehman Brothers donated to Baker Library in 2002 and
  2008 (including over 1,200 deal books from 1925-1991), the exhibit
  traces the firm's evolution from an Alabama general store through its
  growth into a major investment bank and its 2008 collapse amid the
  subprime mortgage crisis.
