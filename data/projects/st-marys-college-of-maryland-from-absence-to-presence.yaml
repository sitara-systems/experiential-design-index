summary: >
  From Absence to Presence, a commemorative structure shaped like a slave
  cabin and inscribed with erasure poetry drawn from historical plantation
  records, was dedicated on the St. Mary's College of Maryland campus in St.
  Mary's City, Maryland in November 2020; it was designed by RE:site with
  fabrication by Merge Studios.
