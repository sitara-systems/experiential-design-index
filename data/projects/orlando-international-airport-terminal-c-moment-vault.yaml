summary: >
  Moment Vault, a 360-degree circular LED media environment in Orlando
  International Airport's Terminal C, opened January 2023, executive
  produced by MRA International Group with creative direction by Sardi
  Design, content by Gentilhomme Studio, and technology by Smart Monkeys.
description: >
  A proprietary AI-powered markerless motion-capture system generates a
  real-time 3D pose estimate of each passenger walking through the space,
  converting their silhouette and motion into a digital wireframe/avatar
  integrated live into the surrounding generative content.
