summary: >
  Journey Through the Human Brain, a 2,500-square-foot permanent
  exhibition on brain science, opened in 2019 at the Cox Science Center
  and Aquarium (then South Florida Science Center and Aquarium) in West
  Palm Beach, Florida, designed by Anthony Lualdi Design with interactive
  media by Ideum and fabrication by Art Guild.
description: >
  Developed with Florida Atlantic University's Brain Institute, Max
  Planck Florida Institute for Neuroscience, and Scripps Florida, the
  exhibit includes 30 interactive stations exploring the brain from the
  molecular to the whole-organ level, including a curved 14-foot
  projection wall navigated via custom console and a six-display lifespan
  video wall.
