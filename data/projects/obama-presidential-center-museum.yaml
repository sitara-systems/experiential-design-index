id: obama-presidential-center-museum
name: Obama Presidential Center Museum
venue: obama-presidential-center
project_type: new-building
year_completed: 2026
credits:
  - firm: tod-williams-billie-tsien-architects
    role: architecture
    note: "Lead campus architect"
  - firm: interactive-design-architects
    role: architecture
    note: "Chicago-based architect of record, joint design/engineering lead. No firm record yet"
  - firm: ralph-appelbaum-associates
    role: exhibit-design
    note: "Led exhibition experience design across the museum's four exhibition levels (~35,000 sq ft)."
  - firm: civic-projects-architecture
    role: exhibit-design
    note: "Chicago-based exhibit design and documentation partner. No firm record yet"
  - firm: normal-studio
    role: graphics-wayfinding
    note: "Exhibit graphic design partner. No firm record yet"
  - firm: pentagram
    role: graphics-wayfinding
    note: >
      "Words of Hope" typographic installation on the museum tower's
      facade: 103 words and 458 letters from President Obama's 2015 Selma
      speech, cast in concrete panels.
  - firm: prime-access-consulting
    role: accessibility-consulting
    note: >
      Embedded inclusive design and accessibility across campus navigation,
      the museum's built environment/cases/furniture, content and digital
      graphic design, time-based media and wayfinding, and community/remote
      engagement (April 2018 – June 2026); developed the Universal
      Experience Point (UXP) accessibility interface, an evolution of the
      Universal Keypad/Universal Access Point PAC developed for the
      Canadian Museum for Human Rights.
  - firm: sh-acoustics
    role: acoustics
    note: >
      Comprehensive exhibit acoustics, audio system design, and sound
      isolation consulting throughout the museum; led final audio tuning and
      calibration.
  - firm: cortina-productions
    role: media-design
  - firm: bbi-engineering
    role: av-integration
  - firm: kubik-maltbie
    role: fabrication
technologies: []
summary: >
  The Obama Presidential Center Museum, a new building on the 19.3-acre
  Obama Presidential Center campus in Chicago designed by Tod Williams
  Billie Tsien Architects with Interactive Design Architects, opened to the
  public June 19, 2026, with exhibition design led by Ralph Appelbaum
  Associates alongside Civic Projects Architecture and Normal Studio, and a
  facade typographic installation by Pentagram.
