summary: >
  The Obama Presidential Center Museum, a new building on the 19.3-acre
  Obama Presidential Center campus in Chicago designed by Tod Williams
  Billie Tsien Architects with Interactive Design Architects, opened to the
  public June 19, 2026, with exhibition design led by Ralph Appelbaum
  Associates alongside Civic Projects Architecture and Normal Studio, and a
  facade typographic installation by Pentagram.
