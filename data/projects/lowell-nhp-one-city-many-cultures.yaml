summary: >
  "One City, Many Cultures," a permanent exhibition on Lowell's immigrant
  history at the Mogan Cultural Center within Lowell National Historical
  Park, opened to the public September 23, 2023; exhibit design by Design
  Minds, with interactive media and content production by Northern Light
  Productions.
description: >
  The exhibition includes an interactive dining table, video stations
  featuring interviews with Lowell community members, and a story booth
  where visitors can record their own personal narratives. Northern Light
  Productions filmed performances from more than a dozen dance ensembles,
  music ensembles, and artists from Lowell's immigrant communities to
  incorporate into the exhibit's media content.
