summary: >
  "Becoming Jane: The Evolution of Dr. Jane Goodall," a temporary exhibition
  on the life and work of primatologist Jane Goodall, opened November 22,
  2019, at the National Geographic Museum in Washington, D.C.; Falcon's
  Creative Group produced its six multimedia and interactive experiences for
  organizers National Geographic Society and the Jane Goodall Institute.
description: >
  Developed with National Geographic Society and the Jane Goodall Institute,
  the exhibition ran through September 7, 2020, before touring to other US
  venues. It won a Thea Award for Outstanding Achievement (Museum Exhibit
  Design, Limited Budget) from the Themed Entertainment Association at the
  27th Annual Thea Awards (2021).
