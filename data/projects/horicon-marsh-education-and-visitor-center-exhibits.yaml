summary: >
  A 5,573-square-foot exhibit experience (updated 2019) at the Horicon
  Marsh Education & Visitor Center in Horicon, Wisconsin, completed in 2014
  by Taylor Studios for the Wisconsin Department of Natural Resources.
description: >
  A life-sized mammoth sculpture outside draws visitors inside to immersive
  environments and realistic sculptures documenting the marsh's history,
  including a crawl-through muskrat lodge and an airboat replica staged
  before a video screen.
