summary: >
  Interpretive exhibits across the ten-story Maritime Lighthouse Tower
  addition to the Door County Maritime Museum in Sturgeon Bay, Wisconsin,
  opened 2019; exhibit design and interpretive planning by Nomad Studio, with
  fabrication by Southern Custom Exhibits.
description: >
  The tower addition's exhibits span all ten floors, covering the geology of
  the Door County peninsula, regional shipbuilding, Great Lakes maritime
  commerce, shipwrecks, Native peoples and early settlers, and the area's
  wildlife and ecosystems.
