summary: >
  The John F. Wolfe Aquarium, a planned new aquarium facility for the
  Columbus Zoo and Aquarium in Powell, OH, is targeted to open in 2029, with
  exhibit design by Thinc Design and architecture by LMN Architects.
description: >
  The $175 million project will showcase Ohio's native species and
  ecological systems alongside conservation storytelling; Thinc Design
  previously designed the Perkins Wildlife Center at the Cleveland Museum of
  Natural History.
