summary: >
  New interpretive exhibits at the Hoh Rain Forest Visitor Center in Olympic
  National Park, Washington, unveiled April 20, 2018, replaced the original
  1963 installation with interpretive planning, exhibit design, and graphics
  by HealyKohler Design.
description: >
  Touchable displays and topographic maps portray the Pacific Northwest's
  biodiversity from forest canopy to soil ecosystems, with custom
  illustrations and murals depicting region-specific species from the
  banana slug to the Roosevelt elk.
