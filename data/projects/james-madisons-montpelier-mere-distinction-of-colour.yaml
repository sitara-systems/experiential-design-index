summary: >
  The Mere Distinction of Colour, a 13,800-square-foot permanent exhibition
  on slavery at James Madison's Montpelier in Montpelier Station, Virginia,
  opened in June 2017; exhibit design by Proun Design with Neal Mayer,
  fabrication by Mystic Scenic Studios, and media production by Northern
  Light Productions.
description: >
  The exhibition includes five interactive stations, a multi-screen
  presentation, an immersive projection experience, and two audio
  programs, including "Fate in the Balance," a first-person narrative in
  a storeroom setting, and "Legacies of Slavery," a five-screen film. It
  received the National Council on Public History's 2018 Outstanding
  Public History Project award and two 2018 AAM MUSE Silver awards.
