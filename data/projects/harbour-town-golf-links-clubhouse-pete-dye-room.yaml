summary: >
  The Pete Dye Room, a 550-700 sq ft exhibition on golf course architect
  Pete Dye and his design of Harbour Town Golf Links, opened inside the
  Harbour Town Clubhouse at The Sea Pines Resort in Hilton Head Island,
  South Carolina on February 22, 2018; exhibit design by Peter Hyde
  Design.
description: >
  Three short films cover Dye's career, his notable holes, and Harbour
  Town; an augmented-reality "sand table" lets visitors explore how
  grading and elevation shape a golf course, alongside artifacts including
  Dye's World Golf Hall of Fame trophy and an animated model of the
  tractor he used to shape greens.
