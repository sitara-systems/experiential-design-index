id: levine-museum-new-south-charlotte-moving-forward-looking-back
name: "Charlotte: Moving Forward, Looking Back"
venue: levine-museum-of-the-new-south
project_type: temporary-exhibition
year_completed: 2024
credits:
  - firm: monadnock-media
    role: media-design
    note: "Media experience design and production, digital interactive design and development, and technical systems design and oversight for two 2,000 sq ft media experiences on immigration and unequal treatment of Charlotte neighborhoods"
  - firm: metcalfe-and-associates
