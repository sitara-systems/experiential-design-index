summary: >
  "Charlotte: Moving Forward, Looking Back," a 2,000 sq ft exhibition on
  immigration and racial inequity in Charlotte, North Carolina neighborhoods,
  opened at the Levine Museum of the New South's interim Uptown location on
  March 9, 2024, with media design by Monadnock Media and exhibit design by
  Metcalfe and Associates.
description: >
  The exhibition ran through the museum's May 4, 2025 vacancy of its
  interim Uptown space.
