summary: >
  The Bourne Stuntacular, a stunt show built around a 130-foot LED screen of
  real-time-rendered CG environments synchronized with live stunts, opened
  June 30, 2020, at Universal Studios Florida in Orlando; show equipment
  design by TAIT, CG content by Cinesite, and writing/production by
  Renaissance Entertainment.
description: >
  The 20-minute show blends live stunts, practical set pieces, and
  photorealistic projected environments (including 50+ square kilometers of
  CG desert scouted from reference photography in Turkey and Morocco),
  rendered in real time in Unreal Engine to stay synchronized with the
  moving stage. It won a Thea Award for Outstanding Achievement (Live
  Attraction Spectacular) from the Themed Entertainment Association at the
  27th Annual Thea Awards (2021).
