technologies: []
summary: >
  A series of interpretive panels documenting African American history
  along the Clipper City Rail Trail in Newburyport, Massachusetts, designed
  by Arrowstreet for the City of Newburyport's Black History Initiative,
  with the first panel unveiled in February 2023.
description: >
  The panels explore contributions of Black residents of Newburyport across
  generations, beginning with "A Black Neighborhood in Historic
  Newburyport," installed along the trail near the Low Street bridge.
  Arrowstreet designed the panel series and an accompanying map and
  brochure connecting the panels along a walking path, extending an earlier
  four-panel interpretive program the firm designed for Brown Square.
