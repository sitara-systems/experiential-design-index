summary: >
  "In This Place," a 1,500 sq ft permanent gallery at the National
  Underground Railroad Freedom Center in Cincinnati, Ohio, opened May 23,
  2025, with exhibition design by Ralph Appelbaum Associates, architecture
  by Moody Nolan, lighting design by Technical Artistry, linear media
  production by batwin + robin, and interactive media production by
  Upswell.
description: >
  The gallery grounds visitors in the historic and contemporary
  significance of the Freedom Center's location on the Ohio River,
  featuring artifacts spanning the 1800s to the 2020s and an interactive
  digital river that lets visitors "pull" moments of history from a
  virtual current. It marked the Freedom Center's first major exhibit
  addition in 15 years, opening as a kickoff to the museum's 30th
  anniversary Freedom Festival.
