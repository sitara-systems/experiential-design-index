summary: >
  The Research Campus Sign System, a campus-wide wayfinding and identity
  program for The Rockefeller University in New York City extending to the
  Stavros Niarchos Foundation-David Rockefeller River Campus that opened in
  2019, was designed by C&G Partners.
description: >
  The program built on the university's existing sign system with a new
  hand-painted-style campus map designed to be easily updated, a slimmer and
  more open sign structure, a digital wayfinding module, donor recognition
  signage, and navigation for the campus's underground tunnel network
  connecting research buildings.
