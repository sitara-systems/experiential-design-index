summary: >
  Glacier Run, a roughly $21 million Arctic-themed exhibit at the
  Louisville Zoo in Louisville, Kentucky, opened April 26, 2011; designed
  by PGAV Destinations, housing polar bears, grizzly bears, seals, and sea
  lions in a "story-rich mining town" setting with overhead bridges letting
  bears traverse above visitors.
description: >
  The exhibit is themed as an imaginary Arctic gold-mining town modeled on
  Churchill, Manitoba, and pairs immersive habitat design (overhead bridges,
  underwater viewing) with conservation-focused interpretive messaging. It
  received the Association of Zoos & Aquariums' Top Honor in Exhibit Design
  in 2012.
