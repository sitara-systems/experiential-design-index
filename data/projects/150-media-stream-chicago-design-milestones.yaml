summary: >
  Chicago Design Milestones, a public digital-media installation surveying a
  century of Chicago design history, ran throughout July 2019 on the 150
  Media Stream LED video wall in Chicago; design by Sharon and Guy in
  collaboration with the University of Illinois Chicago's Electronic
  Visualization Laboratory and the Chicago Design Archive. It won a
  Communication Arts Award of Excellence (2020 Design Competition,
  Environmental Graphics category).
description: >
  Source material was drawn from the Chicago Design Archive's collection of
  over 3,200 works by more than 1,100 designers and 400 firms, spanning the
  1920s to the present. Daria Tsoupikova of UIC's Electronic Visualization
  Laboratory collaborated on the piece; individual collaborators are not
  recorded as separate credits per the index's firms-and-projects-only
  policy.
