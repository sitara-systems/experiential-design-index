summary: >
  The Ulysses S. Grant Presidential Library and Williams Lincolniana
  Collection, housed in Mitchell Memorial Library at Mississippi State
  University in Starkville, Mississippi, opened to the public November 30,
  2017 with exhibit, graphic, and media design by HealyKohler.
description: >
  The gallery explores four periods of Grant's life — childhood, military
  leadership, presidency, and post-presidential service — through life-size
  cast figures, video presentations, interactive displays, and artifacts
  including a plaster death mask, with digital interfaces addressing common
  historical misconceptions about Grant's legacy.
