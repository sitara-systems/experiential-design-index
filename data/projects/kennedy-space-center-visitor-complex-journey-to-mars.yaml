id: kennedy-space-center-visitor-complex-journey-to-mars
name: "Journey to Mars: Explorers Wanted"
venue: kennedy-space-center-visitor-complex
project_type: installation
year_completed: 2015
credits:
  - firm: brc-imagination-arts
    role: content-production
    note: >
      Strategic planning, concept development, design detail, production,
      immersive media production, fabrication, technical systems, and
