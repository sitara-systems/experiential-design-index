summary: >
  "Journey to Mars: Explorers Wanted," a 10,000-square-foot interactive
  exhibit at the Kennedy Space Center Visitor Complex in Merritt Island,
  Florida, opened in 2015, designed by BRC Imagination Arts.
description: >
  The exhibit features hands-on interactives including a landing simulator
  and an orbital docking simulator, along with a live show describing
  future human life on Mars; included with daily admission.
