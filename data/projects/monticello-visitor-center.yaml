summary: >
  The David M. Rubenstein Visitor Center and Smith Education Center, a 42,000
  sq ft gateway complex at Monticello in Charlottesville, VA, opened in 2008;
  designed by Ayers Saint Gross (architecture, interiors, and signage/
  wayfinding) with landscape architecture by Michael Vergason Landscape
  Architects.
description: >
  Five pavilions organized around a courtyard house ticketing, an orientation
  theater, an exhibition gallery, the Griffin Discovery Room (a hands-on
  family gallery), classrooms, a cafe, and retail. LEED Gold certified, with a
  geothermal heating/cooling system and stormwater green infrastructure.
