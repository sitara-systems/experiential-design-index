summary: >
  Brooklyn Abolitionists / In Pursuit of Freedom, an exhibition on Brooklyn's
  19th-century anti-slavery movement, opened January 2014 in the Shellens
  Gallery of the Brooklyn Historical Society (now the Center for Brooklyn
  History) in Brooklyn, New York, with exhibition design by Matter
  Architecture Practice, interactive media by Potion, and design contributions
  from Pure+Applied.
description: >
  Produced as part of the "In Pursuit of Freedom" public history initiative,
  a partnership of Brooklyn Historical Society, Weeksville Heritage Center,
  and Irondale Ensemble Project.
