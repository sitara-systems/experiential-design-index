summary: >
  Weeksville Transforming Community: In Pursuit of Freedom, the second
  exhibition in the "In Pursuit of Freedom" partnership, opened during Black
  History Month (February) 2022 at the Weeksville Heritage Center in
  Brooklyn, New York, with exhibition design by Matter Practice and graphics
  by Pure+Applied.
description: >
  Curated by Tia Powell Harris, the collection-based exhibition traces
  Weeksville's origins as one of America's first free Black communities,
  through its founders, residents, and 1970s-80s preservation movement,
  installed on the first floor of a reconstructed Hunterfly Road House.
