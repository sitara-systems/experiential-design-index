summary: >
  "Revealed: The Hunt for Bin Laden," a 2,900 sq ft temporary exhibition at
  the National September 11 Memorial & Museum in New York, opened in 2019
  with exhibition design by C&G Partners and media production by
  Batwin+Robin; it won a Communication Arts Award of Excellence (2020 Design
  Competition, Environmental Graphics category) and was C&G Partners' second
  special exhibition for the museum after its permanent wayfinding, signage,
  and site maps (2011/2014).
description: >
  The exhibition retells the decade-long forensic manhunt for Osama bin
  Laden as a procedural crime story, built from tall angled "shards" of raw
  plywood, no two alike, that can be read as a mountain canyon, a military
  field office, or a residential compound depending on the scene.
