summary: >
  Imagining New Technology, an exhibit marking the centennial of MIT's
  relocation from Boston to Cambridge, opened at the MIT Museum in
  Cambridge, Massachusetts in 2016, with exhibit design by Proun Design
  and fabrication by Bluebird Graphic Solutions.
description: >
  The exhibit showcases the vision, design, and lasting impact of MIT's
  move to Cambridge while prompting visitors to imagine the following
  century of technological advancement.
