summary: >
  More Than a Game, a 3,000 sq ft exhibition on African American sports
  history in Jacksonville, Florida from 1900-1975 at the Ritz Theatre and
  LaVilla Museum, opened in 2011 with exhibit design by Proun Design and
  fabrication by 1220 Exhibits; it won a 2011 Cultural Heritage
  Preservation Award.
description: >
  The exhibition explores how segregation-era high school athletics
  produced college and professional athletes who became leaders in
  education, business, and civic service, featuring memorabilia including
  Olympic sprinter Bob Hayes's shoes alongside community-contributed
  photographs and yearbooks.
