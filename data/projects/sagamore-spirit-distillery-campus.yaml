summary: >
  Sagamore Spirit Distillery, a 60,000 sq ft, three-building whiskey
  distillery and visitor campus on a former brownfield site in Baltimore, MD,
  opened in 2016; architecture by Ayers Saint Gross with the visitor
  experience (interpretive graphics, interactive media, and fabrication)
  designed by Solid Light.
description: >
  Comprises a working distillery, a processing building with a tasting room,
  retail, and an immersive visitor experience on Maryland's distilling
  heritage, and a waterfront restaurant. Attracts an estimated 100,000
  visitors annually.
