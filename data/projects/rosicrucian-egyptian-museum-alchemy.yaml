summary: >
  Alchemy, a permanent exhibit on the ancient Egyptian roots of alchemy,
  opened at the Rosicrucian Egyptian Museum in San Jose, California in June
  2015, designed by West Office Exhibition Design.
description: >
  West Office was enlisted by the Rosicrucian Egyptian Museum, which holds
  the largest collection of Egyptian artifacts on exhibit in the western
  United States, to design a permanent exhibit on the ancient art of
  alchemy. The exhibit opened over the museum's Summer Solstice weekend,
  June 20-22, 2015.
