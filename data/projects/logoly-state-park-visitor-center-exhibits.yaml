summary: >
  A 1,200-square-foot environmental-education exhibit at Logoly State Park's
  visitor center in Magnolia, Arkansas, completed in 2017 by Taylor Studios,
  narrated through the perspective of an ancient beech tree.
description: >
  The multisensory installation incorporates audio, scent, and tactile
  stations alongside a live animal aquarium wall, discovery drawers, and an
  active bee hive to deepen visitor understanding of forest ecosystems and
  conservation.
