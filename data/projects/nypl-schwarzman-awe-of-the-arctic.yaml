summary: >
  "The Awe of the Arctic: A Visual History," a survey of 500 years of Arctic
  visual imagery drawn from the Library's collections, was on view March 15
  through July 13, 2024 across four galleries of the Stephen A. Schwarzman
  Building in New York, with exhibition design by Pure+Applied.
description: >
  Curated by Elizabeth Cronin, Robert B. Menschel Curator of Photography, and
  Assistant Curator Maggie Mustard, the exhibition traced Arctic imagery from
  16th-century exploration accounts to contemporary work addressing climate
  change.
