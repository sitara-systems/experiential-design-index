summary: >
  CineSational: A Symphonic Spectacular, a nightly 22-minute lagoon show at
  Universal Studios Florida in Orlando, opened June 2024 with projection
  mapping, choreographed fountains, a synchronized drone show, and
  pyrotechnics designed and engineered by TAIT alongside Universal Orlando's
  in-house entertainment creative team, on a custom real-time adaptive
  control system.
description: >
  The show combines 228 fountains reaching up to 131 feet, 4K projection
  mapping across surrounding building facades, more than 600 synchronized
  drones (a first for a Universal park), lasers, and pyrotechnics, set to an
  original orchestral score, all coordinated through a custom adaptive
  control system that adjusts effects in real time to wind, humidity, and
  weather conditions. A finalist in Fast Company's 2025 Innovation by Design
  Awards (Experience Design category).
