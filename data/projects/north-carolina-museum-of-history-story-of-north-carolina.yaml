summary: >
  The Story of North Carolina, a 21,000 sq ft permanent exhibition tracing
  North Carolina's history at the North Carolina Museum of History in
  Raleigh, opened November 5, 2011, with exhibit design by Christopher
  Chadbourne & Associates, graphics by Proun Design, and fabrication by
  1220 Exhibits, on a design/build budget of $5.6 million.
description: >
  The exhibition covers North Carolina's history from ancient peoples
  through contemporary times, encompassing agriculture, industry, slavery,
  war, and politics through artifacts, media, scenic recreations, and
  interactive elements organized by geographic and temporal chapters.
