id: fort-york-transforming-grief-loss-and-togetherness
name: Transforming Grief, Loss, and Togetherness in COVID-19
venue: fort-york-national-historic-site
project_type: temporary-exhibition
year_completed: 2022
credits:
  - firm: prime-access-consulting
    role: technical-consulting
    note: >
      Designed, produced, and launched a fully multimodal, tri-lingual,
      community co-created exhibition for the City of Toronto in an
      8-month engagement (September 2022 – March 2023), including audio
      description, tactile graphics, touch objects, visual description,
      wayfinding, sensory rooms, and digital accessibility. Curated by
      Armando Perla and Raven Spiratos with guest Indigenous curator
      Heather George; featured the Passion Fruit Collective and artist
      Gloria C Swain.
technologies:
  - tactile graphics
  - audio description
  - sensory rooms
summary: >
  "Transforming Grief, Loss, and Togetherness in COVID-19," a
  community-co-created exhibition for the City of Toronto at Fort York
  National Historic Site, opened in 2022 with a fully multimodal
  accessible design by Prime Access Consulting; it won a Bronze award from
  the International Design Awards and was a Society for Experiential
  Graphic Design finalist.
