summary: >
  Art of Signage, a wayfinding and architectural graphics program for the
  Wadsworth Atheneum Museum of Art in Hartford, Connecticut, was designed by
  C&G Partners to accompany the museum's $33 million renovation, which
  celebrated its grand reopening on September 19, 2015.
description: >
  The program spans existing and newly renovated galleries covering the
  museum's collections from Ancient and Baroque to Contemporary art,
  including new bilingual interior and exterior signage; a planned second
  phase would add an interactive welcome center with exhibit, event, and
  membership information.
