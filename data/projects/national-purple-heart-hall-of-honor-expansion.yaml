summary: >
  A $17 million, 4,300-square-foot expansion of the National Purple Heart
  Hall of Honor in New Windsor, New York, reopened to the public on
  Veterans Day, November 11, 2020; architecture by ikon.5 architects, with
  media content by Northern Light Productions.
description: >
  The expansion added new and refurbished exhibit space emphasizing the
  personal stories of Purple Heart recipients through integrated
  audio-visual presentations, interactive exhibits, and large-scale
  graphic displays. Northern Light Productions produced 20 media programs
  across the hall's original exhibits and this expansion, including four
  films on evacuation, deployment, and sacrifice, 14 interactive programs
  such as "The Purple Heart Journey" stations and an interactive timeline,
  an audio program, and an updatable welcome sign.
