summary: >
  A permanent outdoor photography installation on the exterior of the
  Athens City Parking Garage in Athens, Ohio, opened October 27, 2018,
  displaying rotating Athens Photo Project artist work; exhibit design
  by Hilferty & Associates, fabrication/installation by Exhibit 3
  Fabrications and Robin Imaging.
description: >
  A partnership between the City of Athens and Athens Photo Project,
  realized as an outcome of the city's 2014 "Essence of Athens"
  public-art plan. Content (photographs) rotates on a biennial basis;
  the physical site and installation are permanent.
