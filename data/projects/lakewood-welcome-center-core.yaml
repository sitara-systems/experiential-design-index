summary: >
  The Lakewood Welcome Center, a net-zero-energy-ready visitor and
  administrative building for Lakewood Cemetery, opened in Minneapolis,
  Minnesota in 2024, designed by Snow Kreilich Architects with Miller
  Dunwiddie and landscape architect TEN x TEN, with lighting design by
  Schuler Shook.
description: >
  The stone-clad pavilion, with a two-story colonnade, serves as Lakewood
  Cemetery's new front door — orienting and welcoming visitors, hosting
  gatherings, and housing the cemetery's administrative offices. It achieves
  net-zero energy through a geothermal exchange system, rooftop solar, and
  native/pollinator-friendly landscaping, and received a 2024 AIA Minnesota
  Commendation for Excellence in Design for Energy. JE Dunn Construction was
  general contractor (not a credited role in this index's delivery-stack
  vocabulary).
