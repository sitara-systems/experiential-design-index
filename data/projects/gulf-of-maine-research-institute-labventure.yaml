summary: >
  LabVenture, a hands-on marine-science learning experience for Maine middle
  schoolers at the Gulf of Maine Research Institute's Cohen Center for
  Interactive Learning in Portland, Maine, reopened in a comprehensive
  renovation in September 2018, with fabrication by Art Guild.
description: >
  The renovated space uses NASA satellite data and local fishery information
  to teach ocean science, including multi-touch collaborative tables, 4K
  video projection, a renovated live biodiversity tank, and a
  bathymetric-inspired dimensional wall map; content and technology platform
  design was led by the experience-design firm Upswell.
