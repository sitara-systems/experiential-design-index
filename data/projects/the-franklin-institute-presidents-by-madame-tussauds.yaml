summary: >
  "The Presidents by Madame Tussauds," a temporary exhibition of 56
  life-size wax figures of U.S. presidents and other historical figures,
  opened September 2020 at The Franklin Institute in Philadelphia
  (running through January 3, 2021), designed with Alusiv and
  fabricated/installed by Art Guild, with lighting by The Lighting
  Practice.
description: >
  Each figure is staged in a themed setting mixing images and props; the
  installation was built with COVID-19-era socially distanced spacing
  between figures.
sources:
