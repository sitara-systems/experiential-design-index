id: upper-canada-village-discovery-centre
name: Upper Canada Village Discovery Centre
venue: upper-canada-village
project_type: new-building
year_completed: 2011
credits:
  - firm: reich-petch
    role: architecture
    note: "In association with NORR Limited."
  - firm: reich-petch
    role: exhibit-design
    note: >
      4,500 sq. ft. exhibit on the St. Lawrence River's role in the War of
      1812 and the Battle of Crysler's Farm, including a giant touch table
      and an immersive fog-wall projection.
  - firm: norr-limited
    role: architecture
    note: "Associate architect. No firm record yet."
technologies:
  - touch table
  - projection
summary: >
  The Upper Canada Village Discovery Centre, a new 8,000-square-foot,
  LEED Silver visitor centre and exhibit gallery at the living-history
  village in Morrisburg, Ontario, opened to the public in August 2011 for
  the bicentennial of the War of 1812; architecture and exhibit design by
  Reich+Petch Architects Inc. in association with NORR Limited.
description: >
  The project also included a new gateway to the village and a renovation
  of the village's store and eatery, commissioned by the St. Lawrence
  Parks Commission.
