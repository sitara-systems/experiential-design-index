summary: >
  SportsZone, a 3,600-square-foot permanent exhibition on the science of
  sports, opened at The Franklin Institute in Philadelphia on October 24,
  2015, fabricated by Art Guild with the centerpiece "The Run" interactive
  race installation produced by 900lbs of Creative.
description: >
  The exhibit features 21 interactive experiences exploring how the human
  body, laws of motion, and technology interact in sports, including an
  augmented-reality race against professional athletes, a pitching skill
  tester, a surfboard simulator, and impact-force models comparing protected
  and unprotected human heads.
