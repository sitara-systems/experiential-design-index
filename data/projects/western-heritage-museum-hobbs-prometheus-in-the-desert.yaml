summary: >
  Prometheus in the Desert, a temporary exhibition on the Manhattan Project,
  ran March 31 through October 18, 2025, at the Western Heritage Museum in
  Hobbs, New Mexico, designed, fabricated, and built by Ideum.
description: >
  Timed to the 80th anniversary of the Manhattan Project's completion, the
  exhibit combines an interactive digital timeline on a 65" touch table with
  27 large-scale interpretive panels, props and costumes from the film
  Oppenheimer, and a full-scale replica of Los Alamos' historic East Main
  Gate.
