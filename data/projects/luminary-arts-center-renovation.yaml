summary: >
  The Luminary Arts Center, a 224-seat performing arts venue in Minneapolis's
  North Loop neighborhood owned and operated by Minnesota Opera, reopened in
  September 2022 following a $6 million renovation led by Shelter Architecture
  with theatre planning and lighting design by Schuler Shook.
description: >
  Originally built in 1988 as the Guthrie Theater's second stage and later
  known as the Lab Theater, the 8,000-square-foot stone building was acquired
  by Minnesota Opera in 2019 and renovated beginning July 2021. The project
  reoriented the theatre to improve performer stage access and backstage
  space, redesigned the lobby and restrooms for accessibility and inclusivity
  (including gender-neutral restrooms and dressing rooms), added a freight
  elevator, replaced the pipe grid with a tension wire grid, and installed a
  redesigned LED lighting system. General contractor was LS Black
  Constructors; Kirkegaard served as acoustics and audiovisual consultant;
  NTH served as owner's representative. The renovation won a 2024 AIA
  Minneapolis Merit Award and a 2025 ASID Minnesota Design Excellence Award
  (First Place, Commercial Institutional).
