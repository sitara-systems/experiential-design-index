summary: >
  The Mosaic Templars Cultural Center in Little Rock, Arkansas completed
  Phase I of a multi-year renovation in 2021, adding new lobby exhibitry, a
  museum store, a children's gallery, and a 360-degree immersive theater
  experience exploring African American history in Arkansas; exhibit design
  was by Exhibit Concepts, interpretive planning by Mercer Associates,
  architecture by Clements & Associates, and the theater experience was
  produced by Northern Light Productions.
