id: treasure-hunt-the-ride
name: "Treasure Hunt: The Ride"
venue: treasure-hunt-monterey
project_type: installation
year_completed: 2023
credits:
  - firm: sally-dark-rides
    role: media-design
    note: "Interactive dark-ride design, including onboard 'Treasure Collector' interactive devices and storyline; no firm record yet"
  - firm: daniels-wood-land
    role: fabrication
    note: "Themed set pieces and animatronics fabrication; no firm record yet"
  - firm: alterface
    role: media-design
    note: "Multimedia interactivity and onboard gameplay systems, appointed separately from Sally Dark Rides' ride design; no firm record yet"
technologies:
  - interactive onboard gameplay devices
  - animatronics
  - special effects (light mist, scent, themed lighting)
summary: >
  Treasure Hunt: The Ride, an interactive dark ride themed around the
  pirate history of Monterey, opened in 2023 on Cannery Row in Monterey,
  California, with ride design by Sally Dark Rides, set/animatronics
  fabrication by Daniels Wood Land, and multimedia interactivity by
  Alterface.
description: >
  Winner of a 2025 Thea Award, TEA Recognition of Merit (New), Attraction
  (Limited Budget), from the Themed Entertainment Association.
