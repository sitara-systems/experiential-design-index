summary: >
  The Long Beach Police and Fire Department Memorial, a monument honoring
  29 police employees and 14 firefighters who died in service, opened
  February 2020 in the Long Beach Civic Center in Long Beach, California,
  designed by Skidmore, Owings & Merrill.
description: >
  The memorial's form is drawn from the folded American flag ceremony
  performed for fallen officers, rendered abstractly enough to allow
  individual interpretation while accommodating the addition of future
  names. It replaced an earlier memorial as part of SOM's broader Long Beach
  Civic Center master plan and won a 2021 SEGD Global Design Award Merit
  Award in the Public Installation category, and was named 1 of 4 honorees in
  Communication Arts' 62nd Design Annual (2021), Environmental Graphics
  category.
