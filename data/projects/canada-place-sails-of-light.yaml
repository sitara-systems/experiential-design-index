id: canada-place-sails-of-light
name: Sails of Light at Canada Place
venue: canada-place
project_type: installation
year_completed: 2014
status: completed
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Contracted by the Port of Vancouver in 2014 to provide new visual
      effects and updated equipment for the Sails of Light program on
      Canada Place's five 90-foot sail structures (installation originally
      conceived for the 2010 Olympics).
technologies:
  - architectural LED lighting
  - animated light show
summary: >
  Sails of Light, a recurring illuminated light-show program on Canada
  Place's five 90-foot sail structures in Vancouver, British Columbia, was
  updated in 2014 with new visual effects and equipment by Eos Lightmedia
  for operator Port of Vancouver.
description: >
  The Sails of Light program, originally conceived for the 2010 Winter
  Olympics, is visible from Stanley Park, the Coal Harbour Seawall, the
  Vancouver Convention Centre West, the North Shore, and local waterways.
