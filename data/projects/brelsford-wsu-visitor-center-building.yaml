summary: >
  Olson Kundig designed the Brelsford WSU Visitor Center, a 4,277-square-foot
  campus-gateway building in Pullman, Washington that opened October 12,
  2013, with exhibits on Washington State University's research in animal
  health, agriculture, and clean technologies.
description: >
  The building itself showcases WSU-developed materials, including
  cross-laminated timber, oriented strand board, and pine-beetle-kill wood.
