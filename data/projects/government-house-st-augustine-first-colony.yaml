summary: >
  "First Colony: Our Spanish Origins," a bilingual exhibition on the first
  floor of Government House in St. Augustine, Florida, opened in 2013 as
  part of a $1.2 million renovation of the historic building, produced by
  the Florida Museum of Natural History and UF Historic St. Augustine, Inc.
  with exhibit design by HealyKohler Design.
description: >
  The exhibit uses a film, touch tables, tablets, QR codes, and a
  create-your-own-collage feature to tell the story of St. Augustine's 1565
  Spanish founding, timed to coincide with preparations for Florida's 500th
  anniversary of Ponce de Leon's arrival. Colonial-era finishes and
  installation techniques were used to minimize impact on the historic
  fabric of the building.
