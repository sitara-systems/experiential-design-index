id: minnetrista-bob-ross-experience
name: The Bob Ross Experience
venue: minnetrista-museum-and-gardens
project_type: new-exhibition
year_completed: 2020
credits:
  - firm: taylor-studios
    role: exhibit-design
summary: >
  A 900-square-foot immersive exhibit preserving the actual studio where
  Bob Ross filmed "The Joy of Painting," opened October 31, 2020 at
  Minnetrista Museum & Gardens in Muncie, Indiana, designed by Taylor
  Studios.
description: >
  The exhibit preserves the studio as a time capsule, from untouched decor
  to the canvas left on the easel, combined with touchable elements,
  Ross's artwork, and recorded narration.
sources:
  - https://taylorstudios.com/our-work/the-bob-ross-experience/
  - https://www.travelindiana.com/muncies-minnetrista-opens-bob-ross-experience/
