summary: >
  TELUSCAPE Exploration Plaza, an outdoor science exhibition at the
  Ontario Science Centre, Toronto, opened 2006; exhibit design by
  Reich+Petch, landscape architecture by EDA Collaborative, per
  savesciencecentre.com, an independent OSC advocacy/history site. The
  Ontario Science Centre's main building (770 Don Mills Rd.) closed
  permanently in June 2024 for structural failure and remains shuttered
  as of 2026 pending a planned 2029 waterfront replacement; TELUSCAPE
  still physically exists but is currently inaccessible.
