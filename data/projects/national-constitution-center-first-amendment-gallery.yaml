summary: >
  The First Amendment Gallery, a 1,500-sq-ft permanent exhibition at the
  National Constitution Center in Philadelphia, opened September 6, 2023;
  developed in-house by the Center with architectural design by Metcalfe
  Architecture & Design, media and digital interactives by Two Left Hands,
  and fabrication by Hadley Exhibits.
description: >
  The gallery displays more than 20 artifacts related to the five First
  Amendment freedoms — religious liberty, free speech, free press, assembly,
  and petition — including a Justice Brandeis draft opinion, a Tinker
  family anti-war armband, the Pentagon Papers, and a March on Washington
  pennant, alongside interactives testing visitor knowledge of First
  Amendment protections.
