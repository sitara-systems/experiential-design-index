summary: >
  Cooper Hewitt, Smithsonian Design Museum reopened in New York in December
  2014 after a renovation and expansion of the Andrew Carnegie Mansion, with
  architecture by Gluckman Mayner Architects (design architect) and Beyer
  Blinder Belle (executive architect), casework and display design by Diller
  Scofidio + Renfro, interactive media by Local Projects, and a new graphic
  identity, signage, and wayfinding program by Pentagram.
