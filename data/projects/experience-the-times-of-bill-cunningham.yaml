summary: >
  "Experience the Times of Bill Cunningham," an 18,000-square-foot immersive
  exhibition celebrating the life and work of fashion photographer Bill
  Cunningham, opened at The Seaport in New York on September 12, 2021 during
  New York Fashion Week, designed by ESI Design.
description: >
  Spanning six spaces across two stories, the ticketed exhibition combined
  photo galleries, video and audio interviews, recreated elements of
  Cunningham's Carnegie Hall studio apartment, and interactive features
  including a motion-activated staircase and an AI-driven street-style
  matching gallery.
