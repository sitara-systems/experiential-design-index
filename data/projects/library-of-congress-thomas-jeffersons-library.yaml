summary: >
  Thomas Jefferson's Library, a permanent exhibition displaying the
  surviving books of Jefferson's personal library in a spiral glass tower
  in the Library of Congress's Thomas Jefferson Building in Washington, DC,
  opened April 12, 2008 as part of the Library of Congress Experience,
  commemorating the Library's bicentennial; it was designed by Chermayeff &
  Geismar, Inc. (now C&G Partners) and, though originally conceived as
  temporary, was made permanent due to its popularity.
