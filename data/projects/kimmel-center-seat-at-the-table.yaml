summary: >
  Seat at the Table, a temporary exhibition marking the centennial of the 19th
  Amendment, opened March 2020 at the Kimmel Center for the Performing Arts in
  Philadelphia, designed by Dome Collective for Drexel University's Institute
  for Women's Health & Leadership and Vision 2020.
description: >
  Visitors encountered seven public seating areas of custom-built furniture
  and large floor typography, sitting within human-scale infographics that
  embody the uneven ratios of women to men in work, government, and society.
  Six interactive screens featured dynamic quotes, portraits, and
  contributions of eighteen pioneering women since 1920, alongside a "What's
  Your Vision?" visitor poll on gender-equity issues. The project won SEGD's
  2021 Sylvia Harris Award for social impact, and was named 1 of 4 honorees
  in Communication Arts' 62nd Design Annual (2021), Environmental Graphics
  category.
