summary: >
  The Bluegrass Music Hall of Fame & Museum, a new $15 million, three-floor
  museum on the Ohio River in Owensboro, Kentucky, celebrated its grand
  opening October 18-20, 2018, with exhibition, graphic, and media design by
  HealyKohler Design.
description: >
  The visitor journey begins at the Picking Parlor, an interactive space
  where guests can play stringed instruments, and progresses through
  recreated environments including a festival setting and a radio station,
  plus an oral-history section with firsthand accounts from musicians and
  fans.
