summary: >
  "River Reflections," Dinosaur National Monument's park orientation film
  shown at the Quarry Visitor Center in Jensen, Utah, was produced by
  Northern Light Productions and made publicly available in 2023.
description: >
  The film explores the Green and Yampa rivers' role in shaping the
  monument's geology, fossils, and human history, and was accompanied by a
  five-part webisode series covering geology, ecology, Native culture,
  history, and paleontology.
