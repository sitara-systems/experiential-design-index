summary: >
  Adaptive reuse of a derelict Chelsea cargo pier into a mixed
  public/commercial campus, including the roughly 2-acre Sky Park (New
  York City's largest public rooftop park), a food hall, and the Chelsea
  View Theater event space, opened April 2022 in New York; architecture
  by Diller Scofidio + Renfro with HLW International. Excludes Google's
  private office space on the same pier, which is outside this index's
  scope.
