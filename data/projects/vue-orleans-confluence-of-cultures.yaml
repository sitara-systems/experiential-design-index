summary: >
  Confluence of Cultures, a suite of digital exhibits exploring New Orleans'
  history and culture, opened in March 2022 as part of the Vue Orleans
  observation-deck attraction atop the Four Seasons tower in New Orleans;
  exhibit design and architecture by Cambridge Seven Associates, with
  interactive media by Cortina Productions.
description: >
  The Confluence of Cultures exhibits include the "Do You NOLA" digital
  interactive wall of city trivia, a personal-stories interactive on figures
  from 18th- and 19th-century New Orleans, the Story Café interactive
  featuring on-camera hosts preparing signature NOLA dishes, and the "Rising
  Up" multi-screen film on the city's free Black community, narrated by
  Henry Louis Gates Jr.
