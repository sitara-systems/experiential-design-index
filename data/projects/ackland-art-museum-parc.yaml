summary: >
  pARC, a public spatial installation of an aluminum-and-backlit-dichroic-
  panel structure forming a programmable community gathering space outside
  the Ackland Art Museum at the University of North Carolina at Chapel Hill,
  opened in June 2022; it was designed and fabricated by The Urban Conga
  through participatory workshops with the museum and community
  stakeholders.
