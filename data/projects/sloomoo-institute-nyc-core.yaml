summary: >
  Sloomoo Institute, an immersive slime-themed sensory attraction in New
  York's SoHo neighborhood, opened as a pop-up in October 2019 and became a
  permanent fixture; the space was designed by Method Design with
  fabrication by David G. Flatt Furniture Ltd.
description: >
  A multi-room sensory attraction where visitors interact with slime and
  color-based installations; Method Design's spatial design used organic
  forms and fluid curves, realized through David G. Flatt Furniture's
  custom CNC-cut walls and casework built for high visitor interaction.
  Named an honoree of the Experience Design category in Fast Company's 2023
  Innovation by Design Awards.
