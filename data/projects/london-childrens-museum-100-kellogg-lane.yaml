summary: >
  The London Children's Museum in London, Ontario relocated into a
  36,000-square-foot space on Level 4 of the former Kellogg's factory
  building at 100 Kellogg Lane, opening January 25, 2025, with exhibit
  design by Reich+Petch and architecture by Skolnick Architecture and
  Design.
description: >
  The new location nearly doubled the museum's exhibit square footage over
  its previous home, with eight new interactive exhibits developed with
  input from over 500 children, families, and community members.
