summary: >
  Interpretive exhibits at the Davis Bayou Visitor Center in Ocean Springs,
  Mississippi, part of Gulf Islands National Seashore, opened 2021,
  developed with the National Park Service; exhibit design by Amaze
  Design, with fabrication by Color-Ad and lighting design by Available
  Light.
description: >
  Indoor exhibits address the park's history, resources, and geography,
  including lighthouses, island artifacts, fishing, and the ecological
  diversity of the seashore's five habitats; the design applies universal
  accessibility principles for visitors of all ages and abilities.
