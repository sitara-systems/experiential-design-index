summary: >
  The Portico Gallery for Decorative Arts and Sculpture, The Frick
  Collection's first new exhibition space in nearly 35 years, opened
  December 13, 2011 in New York, enclosing the museum's original open-air
  Fifth Avenue portico in glass, with architecture by Davis Brody Bond,
  exhibition design by Stephen Saitas Designs, and lighting design by
  Renfro Design Group.
description: >
  Davis Brody Bond transformed the covered walkway designed by original
  Frick mansion architect Thomas Hastings into an enclosed gallery for
  sculpture and decorative arts while preserving its limestone walls, Ionic
  columns, and ceiling. The gallery opened with an inaugural presentation of
  Jean-Antoine Houdon sculptures and Meissen porcelain from Henry Arnhold's
  promised gift.
