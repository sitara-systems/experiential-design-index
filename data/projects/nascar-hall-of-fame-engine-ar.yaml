summary: >
  Engine AR, installed in 2020 in the "Inside NASCAR" exhibit at the NASCAR
  Hall of Fame in Charlotte, NC, is a tablet-based augmented reality
  interactive by Cortina Productions that overlays a real Ford FR9 EFI V8
  engine with real-time animation of its internal combustion process; it won
  a 2020 AAM MUSE Award.
