summary: >
  Foundry Field, a new community baseball field at Southeast Community Park
  in South Bend, Indiana honoring the Foundry Giants (a Black team from the
  Studebaker foundry, active in the 1920s-30s), opened in September 2024 with
  outfield murals, player cutouts, and historical markers designed by Clinton
  Carlson Design with artist Thomas "Detour" Evans, architecture by
  Buccellato Design, for South Bend Venues Parks & Arts and the Sappy Moffitt
  Field Foundation.
