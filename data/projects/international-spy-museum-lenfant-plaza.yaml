summary: >
  The International Spy Museum's new 140,000 sq ft building at L'Enfant
  Plaza in Washington, DC opened May 12, 2019, designed by Rogers Stirk
  Harbour + Partners with exhibit design by Gallagher & Associates,
  fabrication by Kubik/Maltbie, and AV integration by Electrosonic. Its
  "Red Team" interactive in the "Making Sense of Secrets" gallery won a
  2020 AAM MUSE Award (Onsite Digital Experience, bronze).
