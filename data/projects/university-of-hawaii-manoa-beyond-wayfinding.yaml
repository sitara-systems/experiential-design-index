summary: >
  Beyond Wayfinding, a bilingual Hawaiian-English wayfinding and signage
  system across the University of Hawaiʻi at Mānoa campus in Honolulu, opened
  in 2022; it was conceived by UH faculty Brian Strawn and Karla Sierralta
  (Strawn Sierralta) with graphic and textile design by Sig Zane Kaiao and
  fabrication by Two Twelve and CRĒO Industrial Arts, incorporating Native
  Hawaiian navigational and cultural frameworks throughout the campus
  signage.
