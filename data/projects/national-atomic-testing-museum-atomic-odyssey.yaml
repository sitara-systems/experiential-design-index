summary: >
  Atomic Odyssey, a 2,100-square-foot permanent gallery at the Atomic
  Museum (National Atomic Testing Museum) in Las Vegas, Nevada, opened in
  January 2025; Chick Russell & Company led concept and project
  management, Beaudry Interactive developed the gallery's four
  interactive exhibits, and The Producers Group, D.C. Hibbs, and Cryptic
  Industries handled production and fabrication, with commissioned
  lenticular artworks by Las Vegas artist James Stanford.
