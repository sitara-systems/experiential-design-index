summary: >
  The Chickasaw Cultural Center, a museum, research, and education campus
  for the Chickasaw Nation in Sulphur, Oklahoma, opened in 2010; the
  campus was designed by Frankfurt Short Bruza (FSB), with 5,300 sq ft of
  exhibits designed by Hilferty and Andrew Merriell & Associates, with
  media design by batwin + robin.
description: >
  Hilferty and Andrew Merriell & Associates' exhibit work included
  recreating a thatch and timber council house that serves as an
  orientation theater, where a projection screen rises to reveal a hidden
  exit through a limestone cave leading into the Spirit Forest, an
  immersive environment using light and sound.
