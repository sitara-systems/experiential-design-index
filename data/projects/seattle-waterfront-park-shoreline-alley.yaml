summary: >
  Shoreline Alley, an interpretive installation in Seattle's Pioneer Square
  reconnecting residents to the city's original shoreline, was completed
  in 2025, designed by Studio Matthews for client MIG as part of the
  Waterfront Park program.
description: >
  Features custom paving patterns tracing the historical shoreline, native
  plantings with etched wooden kick rails, and interpretive panels on
  Indigenous plant technologies. Landscape architecture by MIG; fabrication
  by Knight Signs.
