summary: >
  A 1,100-square-foot suite of non-electronic interpretive exhibits at
  Pokagon State Park in Angola, Indiana, completed in 2022 by Taylor
  Studios for the Indiana Department of Natural Resources, developed with
  tribal representatives to ensure the authenticity of a recreated wigwam.
description: >
  The exhibits use rustic and contemporary design elements — a winding
  discovery path, recreated wigwam, oversized natural elements, and
  artifact displays — to highlight the park's ecological significance and
  its historical importance to the Potawatomi Tribe, within a limited
  budget and no-electronic-media constraint.
sources:
