summary: >
  King Eddy Interactive Illumination, a temporary interactive light
  installation on the exterior of the vacant, historic King Edward Hotel in
  Calgary, Alberta, was completed in 2008 as part of the city's Rivers
  District revitalization launch; Eos Lightmedia designed the lighting,
  custom touchscreen software, and AV systems.
description: >
  Passersby could digitally "paint" on the closed hotel's exterior via a
  42-inch touchscreen mapped to the building's architecture, while automated
  lighting fixtures illuminated the sides of the building in dynamic colors
  and patterns.
