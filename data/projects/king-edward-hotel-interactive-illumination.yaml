id: king-edward-hotel-interactive-illumination
name: King Eddy Interactive Illumination
venue: king-edward-hotel-calgary
project_type: installation
year_completed: 2008
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: Automated lighting fixtures programmed to illuminate the building exterior in dynamic colors and patterns.
  - firm: eos-lightmedia
    role: media-design
    note: Custom software allowing passersby to digitally "paint" on the hotel facade via a touchscreen kiosk.
  - firm: eos-lightmedia
    role: av-integration
    note: Touchscreen interface, projection, and video-scaling systems for the interactive facade.
technologies:
  - interactive touchscreen
