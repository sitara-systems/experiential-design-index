summary: >
  The Yale Peabody Museum of Natural History in New Haven, Connecticut
  reopened March 26, 2024 after a renovation and 57,631-square-foot
  addition designed by Centerbrook Architects & Planners with exhibition
  design by Reich+Petch — the first major changes to the museum since it
  opened in 1925.
description: >
  The 172,355-square-foot project added a new floor of anthropology
  galleries, restored historic dioramas in place while relighting them, and
  tripled the museum's classroom space.
