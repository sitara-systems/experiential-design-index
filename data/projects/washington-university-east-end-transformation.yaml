summary: >
  The East End Transformation at Washington University in St. Louis, an
  18-acre campus expansion converting surface parking into new academic
  buildings and green space, opened in 2019 with sitewide interior/exterior
  signage, wayfinding, environmental graphics, and donor recognition by
  Kuhlmann Leavitt and architecture by KieranTimberlake; it was a finalist in
  the Communication Arts 2020 Design Competition, Environmental Graphics
  category.
description: >
  The transformation added the Anabeth and John Weil Hall, Gary M. Sumers
  Welcome Center, an expansion of the Mildred Lane Kemper Art Museum, the
  Craig and Nancy Schnuck Pavilion, the East End Garage (790-space
  underground parking), and Tisch Park above it. Kuhlmann Leavitt's scope
  spanned the district; wayfinding for the Lewis Collaborative building
  within the same expansion used neighborhood-derived super-graphics to
  navigate its interior.
