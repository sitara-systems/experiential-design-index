summary: >
  The Highmark Mann Center for the Performing Arts (formerly the Mann Center),
  an outdoor performing-arts venue in Philadelphia's Fairmount Park, reopened
  in June 2026 after a campus-wide renovation for its 50th-anniversary season,
  including a 4,900 sq ft LED storytelling wall (the Satell Centennial Wall
  East) on the TD Pavilion, a Music Hall of Fame, a Wall of Fame, twelve
  interactive visitor experiences, campus wayfinding, and a reimagined
  entrance plaza; Crafted Action led the Experiential Master Plan and exhibit
  and media design, with architecture by EwingCole, custom fabrication by Art
  Guild, and AV integration by Electrosonic.
description: >
  The transformation was funded in part by The Satell Family Foundation and
  Ed Satell, and included a 42,000 sq ft reimagined entrance plaza. The
  Philadelphia Art Commission and Signage Commission unanimously approved the
  LED wall on the condition that it never display advertising.
