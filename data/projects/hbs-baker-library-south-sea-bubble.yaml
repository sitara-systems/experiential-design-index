summary: >
  "The South Sea Bubble, 1720: Narratives of the First International
  Crash," a exhibition drawn from Baker Library's Bancroft Collection at
  Harvard Business School in Boston, opened February 2023, with exhibit
  design by Proun Design.
description: >
  Installed in the north lobby of Baker Library, the exhibition displays
  satirical prints, parliamentary acts, correspondence, books, broadsides,
  and ballads documenting the 1720 collapse of the South Sea Company.
