summary: >
  Moments of Happiness, a six-minute opening film at the World of Coca-Cola
  in Atlanta, Georgia, premiered March 27, 2014, created by BRC Imagination
  Arts as part of a broader visitor-experience master plan.
description: >
  The film shows people from different cultures and life stages sharing
  everyday moments of happiness, without narration or celebrities, serving
  as an emotional gateway to the rest of the attraction. The refresh
  contributed to a 2016 Themed Entertainment Association Thea Award for
  Best Corporate Visitor Center Experience.
