summary: >
  The Hub (Copper River), a 128,000-square-foot crew operations facility for
  Alaska Airlines, opened July 2020 near Sea-Tac Airport in SeaTac,
  Washington, with architecture and environmental graphics by NBBJ.
description: >
  The six-story building houses Alaska Airlines' 24/7 systems operations
  control and other crew-facing functions for roughly 600 employees. NBBJ's
  environmental graphic system uses fir-plank brand elements tied to the
  building's architecture, a full-scale 737 fuselage graphic on a central
  connective stairway, and iconography-driven wayfinding throughout. The
  project won a 2021 SEGD Global Design Award Merit Award in the Placemaking
  and Identity category.
