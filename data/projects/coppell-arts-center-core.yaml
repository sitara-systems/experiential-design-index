summary: >
  The Coppell Arts Center, a two-theatre performing arts center in Coppell,
  Texas, opened in spring 2020, designed by Corgan with theatre planning and
  lighting design by Schuler Shook.
description: >
  The roughly $20 million, 32,425-square-foot facility in Coppell's Old Town
  Pavilion Park houses a 442-445-seat proscenium Main Hall and a 160-196-seat
  flexible Black Box theatre, along with a grand entry hall and art gallery,
  a multi-purpose room, an art studio, and an outdoor community grove. Schuler
  Shook's architectural lighting design for the Main Hall integrates house
  lighting within acoustic reflectors and wood sidewall illumination, with
  color-changing lighting used throughout the hallways. The center opened one
  month into the COVID-19 lockdown and pivoted to drive-in movies and use as a
  voting station during its first year. It was later recognized by the Dallas
  Morning News as Best Live Theatre Venue in DFW.
