summary: >
  Lenses on the Sky, a permanent environmental installation outside the
  renovated Kendall Planetarium at the Oregon Museum of Science and
  Industry in Portland, Oregon, was installed with the planetarium's
  November 2017 reopening; five cedar-wrapped vessels pair analog sky
  interpretations with stop-motion animations of star stories from
  Shasta, Namaqua Khoikhoi, and Maya cultures, designed by Plus And
  Greater Than, developed with content advisors including the
  Confederated Tribes of Grand Ronde, and funded through a NASA grant.
