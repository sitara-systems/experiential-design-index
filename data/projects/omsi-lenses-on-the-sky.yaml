  planetarium-reopening article documenting the newly installed
  multicultural sky exhibits at the planetarium; SEGD (2019 Merit) calls
  the installation permanent and lists the design team. A Glowbox firm
  credit was removed: SEGD credits Thomas Wester (a Glowbox principal) as
  an individual for technical direction, and no public source credits the
  firm — inferring the firm from the individual fails the sourcing bar.
