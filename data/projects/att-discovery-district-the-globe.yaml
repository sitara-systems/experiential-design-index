summary: >
  The Globe, a 30-foot-tall walk-through interactive sculpture with over
  300,000 LEDs, opened in 2021 as the centerpiece of the AT&T Discovery
  District in downtown Dallas; architecture by Gensler, interactive content
  by Float4, audio by Made Music Studio, and AV/ICT systems integration by
  Electrosonic.
description: >
  Visitors walking through The Globe's 15 steel ribs trigger lidar sensors
  that reshape a generative light and sound show in real time, responding to
  visitor speed, movement, and the number of people present; the piece is
  inspired by the AT&T logo.
