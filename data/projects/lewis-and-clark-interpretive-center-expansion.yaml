summary: >
  A 2,700-square-foot, three-gallery phased expansion of the Lewis & Clark
  Interpretive Center in Washburn, North Dakota, completed in 2012, led by
  Taylor Studios for the Lewis & Clark Fort Mandan Foundation.
description: >
  Taylor Studios developed the interpretive plan and then designed and
  constructed three gallery spaces featuring layered interactives,
  touchable artifacts, an Earthlodge diorama, custom casework, life-cast
  figures, and large-scale backlit graphics and murals.
