id: national-wwi-museum-the-volunteers
name: "The Volunteers: Americans Join World War I, 1914-1919"
venue: national-wwi-museum-and-memorial
project_type: traveling-exhibition
year_completed: 2016
credits:
  - firm: peter-hyde-design
    role: exhibit-design
technologies:
  - ambulance simulator
summary: >
  "The Volunteers: Americans Join World War I, 1914-1919," a 3,000 sq ft
  traveling exhibition produced in collaboration with AFS Intercultural
  Programs, opened at the National WWI Museum and Memorial in Kansas City,
  Missouri in April 2016 before touring to other institutions; exhibit
  design by Peter Hyde Design.
description: >
  The exhibition traces the stories of American volunteers who served as
  ambulance and truck drivers, hospital workers, flyers, doctors, and
  nurses before the United States entered World War I, including an
  ambulance simulator and media presentations, and examines how small
  volunteer groups pioneered later models of international humanitarian
  organizations.
