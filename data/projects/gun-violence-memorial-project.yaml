summary: >
  The Gun Violence Memorial Project, four glass-block "houses" honoring
  victims of gun violence, debuted at the Chicago Cultural Center
  September 19, 2019 as part of the Chicago Architecture Biennial
  before touring to other venues; design by MASS Design Group with
  artist Hank Willis Thomas, fabrication by Ravenswood Studio, audio
  installation by Sam Stubblefield.
