id: wanuskewin-heritage-park-interpretive-centre
name: Wanuskewin Heritage Park Interpretive Centre Renewal
venue: wanuskewin-heritage-park
project_type: major-renovation
year_completed: 2021
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Contracted with exhibit design firm AldrichPears Associates to create
      the lighting, audiovisual, and control-systems design, then awarded
      the build contract by the Wanuskewin Heritage Park Authority; Eos
      Lightmedia Principal Douglas Welch designed the original 1992
      interpretive-centre lighting.
  - firm: eos-lightmedia
    role: av-integration
technologies:
  - concentric projection rings
  - immersive environmental audio
summary: >
  Wanuskewin Heritage Park, a National Historic Site and UNESCO World
  Heritage Site candidate near Saskatoon, Saskatchewan celebrating First
  Nations communities of the area, reopened a reimagined interpretive
  centre in 2021 following exhibit design by AldrichPears Associates and
  lighting, audiovisual, and controls design-build by Eos Lightmedia.
description: >
  The park originally opened in June 1992; after a major fundraising
  effort, the interpretive centre was reimagined in 2016-2021 with
  concentric projection rings, immersive environmental lighting and audio,
  and interactive exhibits and displays; the lighting design won a 2022 IES
  Illumination Award of Merit and a 2022 LIT Design Awards Honorable
  Mention.
sources:
  - https://www.eoslightmedia.com/work/67
