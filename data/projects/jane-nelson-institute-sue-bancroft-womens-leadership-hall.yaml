summary: >
  The Sue S. Bancroft Women's Leadership Hall, a permanent exhibition at
  Texas Woman's University's Jane Nelson Institute for Women's Leadership in
  Denton, Texas, presents galleries on Texas women in politics and civic
  life; exhibit design by Amaze Design, with architecture by Sterling Barnett
  Little, fabrication by Takeform, and media design by Trivium Interactive.
description: >
  The "Pioneering Women" gallery profiles 12 accomplished Texas women in
  politics and policy; the Learning Gallery and Civics Center highlight women
  who shaped the 2018 midterm elections and include interactive civic
  programs; an additional gallery honors Justice Sandra Day O'Connor, and a
  rotating exhibition covers Minnie Fisher Cunningham's contributions to
  Texas women's suffrage.
