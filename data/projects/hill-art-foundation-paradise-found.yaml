summary: >
  A dedicated display for Valentin Bousch's 1533 stained-glass window "The
  Creation and the Expulsion from Paradise," acquired by Janine and J.
  Tomilson Hill in 2018, opened at the Hill Art Foundation in New York as
  part of the exhibition "Lux and Lumen: Spencer Finch" (September 16,
  2022-March 4, 2023), with a display system designed by Stephen Saitas
  Designs and lighting by Anita Jorgensen Lighting Design.
