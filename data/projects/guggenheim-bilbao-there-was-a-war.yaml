summary: >
  There Was A War, a four-sided kinetic LED sign by Jenny Holzer
  carrying 131 eyewitness accounts of Syria's civil war, was created for
  Holzer's 2019 retrospective at the Guggenheim Museum Bilbao, Spain,
  with kinetic design and engineering by Hypersonic and Sitara Systems
  as technical production partner.
