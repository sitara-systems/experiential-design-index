summary: >
  Gorilla Forest, a 4-acre western lowland gorilla habitat at the Louisville
  Zoo in Louisville, Kentucky, opened in 2002 with architecture by Schmidt
  Associates (then operating as Arrasmith) and fabrication by Hadley
  Exhibits.
description: >
  The exhibit features three multi-level indoor habitats and two outdoor
  habitats, a viewing shelter with underwater hippo views, a sanctuary trail
  with eye-level primate viewing, gorilla-activated interactive sound
  buttons, and infrared heaters positioned to draw gorillas toward visitor
  viewing points. It received the AZA's 2003 Exhibit Award.
