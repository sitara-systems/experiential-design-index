summary: >
  KCP&L Connect, a customer-facing energy solutions center on Kansas City's
  East Side, opened May 22, 2018; HOK designed the space's experience and
  interiors, including hands-on energy-efficiency demonstrations and a
  children's learning area.
description: >
  The retail-style space combines in-person account services with
  interactive education about energy-saving products: self-service account
  kiosks, mockups of living rooms and kitchens demonstrating efficient
  lighting, thermostats, and electric vehicles, a demonstration classroom, a
  community room, and a children's learning area.
