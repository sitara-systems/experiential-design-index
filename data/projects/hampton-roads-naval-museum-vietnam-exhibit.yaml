summary: >
  The Ten-Thousand-Day War at Sea, a permanent exhibit on the US Navy's role
  in the Vietnam War, opened at the Hampton Roads Naval Museum in Norfolk,
  Virginia on October 9, 2019; HealyKohler Design designed the exhibition,
  organizing the story by naval operation type with veteran oral histories,
  a tactile POW diorama, and a VR experience.
