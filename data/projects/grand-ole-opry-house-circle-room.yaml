summary: >
  The Circle Room, a custom-built theater and reconfigurable event space
  that opens the Grand Ole Opry House backstage tour in Nashville,
  Tennessee, debuted in July 2019, designed and produced by BRC Imagination
  Arts as the capstone of a $12 million Opry House expansion.
description: >
  The 11-minute immersive film, hosted by Garth Brooks and Trisha Yearwood,
  introduces guests to the Opry's history before the space reconfigures into
  a VIP lounge and event venue.
