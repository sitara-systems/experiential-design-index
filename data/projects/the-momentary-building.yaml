summary: >
  The Momentary, a satellite contemporary-art and performing-arts space of
  the Crystal Bridges Museum of American Art in Bentonville, Arkansas,
  opened February 22, 2020, converting a decommissioned 63,000-square-foot
  Kraft Foods cheese-processing plant into galleries and performance venues;
  designed by Wheeler Kearns Architects with theatre planning by Schuler
  Shook.
description: >
  The adaptive-reuse project transformed the former cheese plant into
  24,000 square feet of gallery space plus four performance venues: The
  RØDE House (a 350-seat flexible space for music, dance, and theatre in
  the former Milk Intake Room), the Fermentation Hall (variable-acoustic
  performance space), the Tower, and an outdoor music venue accommodating
  over 4,000 people. Wheeler Kearns Architects led design, with Thornton
  Tomasetti (structural), McClelland Engineers (civil), McGuire Engineers
  (MEP/FP/IT), Howell & Vancuren (landscape architecture), Lux Populi
  (lighting), Schuler Shook (theatre planning), Threshold Acoustics
  (acoustic and AV design), Edge Associates (kitchen design), and FODA
  (interiors/branding/signage); Flintco was general contractor. Exterior
  glass panels feature a frit pattern by Osage artist Addie Roanhorse
  inspired by Osage ceremonial weaving. The project won a 2021 AIA Chicago
  Distinguished Building Honor Award and a 2020 Architect's Newspaper Best
  of Design Editors' Pick for Adaptive Reuse.
