id: san-jose-museum-of-art-interactive-sound-installation
name: Interactive Sound Installation (Rina Banerjee companion piece)
venue: san-jose-museum-of-art
project_type: installation
year_completed: 2019
credits:
  - firm: dome-collective
    role: media-design
    note: "Interactive sound experience using RFID technology, built as a companion piece to artist Rina Banerjee's exhibition"
technologies:
