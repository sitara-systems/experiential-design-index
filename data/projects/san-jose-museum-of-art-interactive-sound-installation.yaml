summary: >
  An interactive sound installation at the San José Museum of Art in San
  Jose, California, opened in 2019 alongside artist Rina Banerjee's
  exhibition "Make Me a Summary of the World," designed and built by Dome
  using RFID technology.
description: >
  Visitors build their own sequence of words into an audio version of
  magnetic poetry, translated into English, Spanish, and Vietnamese, inspired
  by Banerjee's concurrent exhibition.
