id: american-family-field-selig-experience
name: The Selig Experience
venue: american-family-field
project_type: installation
year_completed: 2015
credits:
  - firm: brc-imagination-arts
    role: content-production
    note: >
      Story and concept development, design, immersive media production,
      fabrication, technical systems, and installation for the multimedia
      tribute exhibit.
technologies:
  - multimedia presentation
  - three-dimensional projection/hologram effect
summary: >
  The Selig Experience, a multimedia tribute to former Milwaukee Brewers
  owner and MLB commissioner Bud Selig at American Family Field in
  Milwaukee, Wisconsin, opened in 2015, created by BRC Imagination Arts.
description: >
  Located on the ballpark's Loge Level, the free exhibit tells the story of
  Selig bringing Major League Baseball back to Milwaukee and building the
  stadium, culminating in a three-dimensional encounter with Selig inside a
  reproduction of his County Stadium office.
sources:
  - https://www.brcweb.com/project/the-selig-experience/
