_comments: >
  Moment Factory also produced "Soul of the Ocean" at the same venue and
  year, a nightly multimedia spectacle with a live-performer/acrobatics
  component (choreography by Les 7 Doigts). Held out of the corpus rather
  than added — it sits closer to the theatrical/live-performance exclusion
  (rule 9) than a pure media installation despite its permanent fixed
  infrastructure. Flagged for a future editorial call rather than decided
  unilaterally.
