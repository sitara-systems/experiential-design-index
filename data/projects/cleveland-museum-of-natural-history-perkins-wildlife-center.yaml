summary: >
  The Perkins Wildlife Center and a set of new interior galleries at the
  Cleveland Museum of Natural History in Cleveland, OH, opened in phases
  beginning September 2016, designed by Thinc Design with architecture by
  AECOM.
description: >
  The project added roughly 20,000 square feet of interior galleries and a
  two-acre outdoor Wildlife Center, including suspended animal trails that
  let visitors move through habitats alongside animals rather than viewing
  from fixed positions, plus interactive play elements such as slides and
  balance lines.
