summary: >
  "Ethel Reed: I Am My Own Property," an exhibition on the 1890s poster
  artist Ethel Reed, opened at Poster House in New York City in 2022,
  designed by Isometric Studio with a custom variable typeface called
  Ethel.
description: >
  The exhibition design features cascading, curvilinear mirrors and
  hand-painted linework, combining graphic design, typography, and
  architectural elements.
