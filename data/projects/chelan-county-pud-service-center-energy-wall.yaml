project_type: installation
year_completed: 2023
credits:
  - firm: ideum
    role: media-design
    note: Custom illustrated interactive touch wall covering energy and water conservation, with a Directus-based CMS
  - firm: ideum
    role: av-integration
    note: Computer and AV system integrated with touch-sensor screens supplied by TSI Touch
