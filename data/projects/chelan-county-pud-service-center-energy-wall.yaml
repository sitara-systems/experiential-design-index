summary: >
  A permanent interactive touch wall on energy and water conservation opened
  October 7, 2023, at the new Chelan County Public Utility District Service
  Center in Wenatchee, Washington, designed and built by Ideum.
description: >
  A large-scale touch wall presents a custom illustrated map of Chelan
  County that changes with the seasons; adults are directed to information
  on energy savings and utility rebate programs, while a lower section
  offers children three mini-games about home energy use and conservation,
  including a coloring game and an energy-and-water-saving game.
