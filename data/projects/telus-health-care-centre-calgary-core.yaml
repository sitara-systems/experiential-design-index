summary: >
  The TELUS Health Care Centre in Calgary, Alberta, a preventive-care
  clinic that relocated to 685 Centre St S in June 2025, features an
  immersive patient experience — including a street-visible LED welcome
  wall and curved projection-mapped MRI environments — designed by
  Gensler with AV integration by Diversified, winning the 2025 Commercial
  Integrator Award for Best Healthcare Project.
