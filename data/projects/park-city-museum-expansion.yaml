summary: >
  The Park City Historical Society & Museum in Park City, Utah completed a
  major expansion in 2009 with architecture by Mark Cavagnero Associates,
  exhibit design by West Office Exhibition Design, fabrication by Pacific
  Studio, and lighting design by Auerbach Glasgow French.
description: >
  The $9 million expansion added new construction to the museum's historic
  buildings and introduced reimagined permanent exhibits on Park City's
  transformation from a boom-and-bust silver mining town to a ski resort
  destination. A signature element is a re-created "mine wall" running the
  full three-story height of the museum, revealing a mining landscape of
  tunnels and equipment.
