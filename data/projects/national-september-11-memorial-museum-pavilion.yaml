id: national-september-11-memorial-museum-pavilion
name: National September 11 Memorial Museum Pavilion
venue: national-september-11-memorial-museum
project_type: new-building
year_completed: 2014
credits:
  - firm: snohetta
    role: architecture
    note: "Design architect for the above-ground glass entry pavilion (distinct from the underground museum exhibition, see national-september-11-memorial-museum-exhibition)"
  - firm: adamson-associates
