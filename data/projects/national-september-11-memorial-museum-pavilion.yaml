    note: "Associate architect; no firm record yet"
technologies: []
summary: >
  The National September 11 Memorial Museum Pavilion, the glass-and-steel
  above-ground entry structure at the World Trade Center site in New York
  City, was dedicated May 15, 2014 and opened to the public May 21, 2014;
  Snøhetta was design architect, with Adamson Associates as associate
  architect.
description: >
  The Pavilion houses two structural steel tridents salvaged from the
  original Twin Towers and serves as the visitor entrance and orientation
  space above Davis Brody Bond's underground Memorial Museum.
