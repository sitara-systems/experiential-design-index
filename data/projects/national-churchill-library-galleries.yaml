name: National Churchill Library and Leadership Center
venue: national-churchill-library-and-center
project_type: new-exhibition
year_completed: 2016
credits:
  - firm: ayers-saint-gross
    role: architecture
    note: "Also interiors and graphic design, in-house scope"
technologies:
  - touch-screen interactive exhibit
summary: >
  The National Churchill Library and Leadership Center, a 5,800 sq ft research
  and exhibit space within The George Washington University's Estelle and
  Melvin Gelman Library in Washington, DC, opened in October 2016; designed by
  Ayers Saint Gross as the first US research facility dedicated to the study
  of Winston Churchill.
description: >
  Houses Churchill memorabilia and a research collection, with a touch-screen
  interactive exhibit (modeled on a 2012 Morgan Library exhibition) letting
  visitors explore photographs and documents from Churchill's life across his
  youth, wartime experience, and political career.
