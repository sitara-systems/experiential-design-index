summary: >
  The Polonsky Exhibition of The New York Public Library's Treasures, the
  Library's first permanent exhibition showcasing items from its research
  collections, opened September 24, 2021 in Gottesman Hall of the Stephen A.
  Schwarzman Building in New York, with exhibition design by Pure+Applied,
  architecture by Mecanoo and Beyer Blinder Belle, and display cases by
  Goppion.
description: >
  Made possible by a $12.5 million gift from Dr. Leonard Polonsky CBE, the
  exhibition presents more than 250 items drawn from the Library's research
  centers, curated by a team led by Declan Kiely, Director of Special
  Collections and Exhibitions.
