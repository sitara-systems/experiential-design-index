    role: architecture
    note: Architect of record.
  - firm: alfred-waugh-architects
    role: architecture
    note: Design collaborator with Ratio Architecture.
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Designed a lighting system flexible for daytime, evening, and event
