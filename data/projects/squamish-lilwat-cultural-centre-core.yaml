technologies:
  - programmable architectural lighting
summary: >
  The Squamish Lil'wat Cultural Centre, a 30,000 sq ft cultural centre in
  Whistler, BC representing the Squamish and Lil'wat First Nations, opened
  in June 2008; Ratio Architecture (architect of record) worked with Alfred
  Waugh Architects on the building design, and Eos Lightmedia designed the
  interior lighting system for the Great Hall, museum, and gift shop.
description: >
  The three-storey complex includes a multi-use gallery, Great Hall, an
  80-seat theatre, gift shop, and museum space, with a form evocative of a
  Squamish Nation longhouse and a Lil'wat istken (earthen pit house).
