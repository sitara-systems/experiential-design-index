summary: >
  The State Library, Archives and Museum (SLAM), housing the Alaska State
  Museum in a new 118,000 sq ft building in Juneau, opened in 2016; ECI/Hyer
  Architects of Anchorage was project architect, with architectural
  lighting by AMC Engineers and exhibit lighting design by Eos Lightmedia.
  The combined lighting design received an IES Award of Merit at the
  international level in 2017.
description: >
  The building combines Alaska's state library, archives, and museum
  functions into a single facility, consolidating more than 32,000
  artifacts, including Alaska Native materials, fine art, and objects
  covering mining, fishing, forestry, tourism, the Russian-American period,
  and World War II.
