summary: >
  The Pride & Glory Theater, a 10-minute immersive show at the Rock & Roll
  Hall of Fame Annex NYC in Manhattan's SoHo district, opened with the
  annex on November 18, 2008, with media design by batwin + robin; the
  annex closed January 3, 2010.
description: >
  Designed to feel like the live rock clubs New York City is famous for,
  the theater surrounded visitors with images and moving lights,
  immersing them in pivotal moments of rock & roll history from
  performers including Jimi Hendrix, Bob Dylan, The Beatles, Led Zeppelin,
  and U2.
