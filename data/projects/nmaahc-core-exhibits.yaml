summary: >
  The Smithsonian's National Museum of African American History and
  Culture, a new building on the National Mall in Washington, DC designed by
  the Freelon Adjaye Bond/SmithGroup team (lead designer David Adjaye),
  opened September 24, 2016, with exhibition design by Ralph Appelbaum
  Associates, exhibit fabrication by Design and Production Incorporated, and
  acoustic/audio design by SH Acoustics.
description: >
  Over 350,000 sq ft of permanent exhibits covering African American history
  across community, arts, religion, civil rights, slavery, and segregation
  themes. The design-build architectural team also included The Freelon
  Group and Adjaye Associates (both not yet recorded in this index).
