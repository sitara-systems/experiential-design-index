summary: >
  Dogs! A Science Tail, a 9,000-square-foot traveling exhibition on the
  science and history of dogs, opened at the California Science Center in
  Los Angeles on March 16, 2019; exhibit design by Evidence Design, digital
  interactives and media by Unified Field, fabrication by Pacific Studios,
  and AV integration by Electrosonic.
description: >
  The bilingual (English/Spanish), ADA-accessible exhibition combines
  physical and digital interactives exploring canine science, history, and
  human-dog relationships; it later returned to the California Science
  Center as part of a national tour.
