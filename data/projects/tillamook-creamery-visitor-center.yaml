summary: >
  Tillamook Creamery, a visitor center at the Tillamook County Creamery
  Association's flagship facility on the Oregon coast, opened to the public
  June 20, 2018, with architecture and interactive exhibits by Olson Kundig
  showcasing dairy-farming operations and a factory viewing gallery.
description: >
  The visitor experience accommodates roughly 1.3 million visitors annually
  and includes exhibits on the product lifecycle, a factory viewing
  gallery, retail space, and a restaurant with outdoor dining pavilion.
