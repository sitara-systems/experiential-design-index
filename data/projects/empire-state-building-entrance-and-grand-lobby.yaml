id: empire-state-building-entrance-and-grand-lobby
name: Observatory Entrance & Grand Lobby Renovation
venue: empire-state-building
project_type: major-renovation
year_completed: 2018
credits:
  - firm: diversified
    role: av-integration
    note: >
      Technology integrator for the new observatory entrance at 20 West
      34th Street and grand lobby, including LED displays, large-format
      LCD screens, and projection systems with automatic failover/backup
  - firm: kubik-maltbie
    role: fabrication
    note: >
      Fabricated the celestial entry ceiling, two-story architectural
      building model and curved model backdrop, digital wayfinding, and
      lightboxes as part of "The Project Dream" reimagining of the
      Empire State Building visitor experience.
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Supplied and integrated lighting for the reconfigured entry level,
      working with Kubik Maltbie on "The Project Dream," including the
      celestial entry ceiling, exhibit cases, and the architectural
      building model, per Eos Lightmedia's own project page.
technologies:
  - LED displays
  - large-format LCD
  - projection mapping
summary: >
  The Empire State Building's new dedicated Observatory entrance at 20 West
  34th Street and redesigned grand lobby, phase one of the building's
  $165 million observatory redevelopment, opened August 22, 2018, in New
  York City, with audiovisual systems integration by Diversified.
