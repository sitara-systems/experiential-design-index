summary: >
  Railyard Park, a five-acre civic park with an amphitheater, promenade, and
  railroad-themed playground built around an active freight line in downtown
  Rogers, Arkansas, opened in 2021, designed by Ross Barney Architects with
  associate architect AFHJ Architects; Winner, Fast Company's 2022 Innovation
  by Design Awards, Urban Design category.
description: >
  Funded by the Walton Family Foundation, the park reuses the city's rail
  history as its organizing motif, with playground components fabricated
  from salvaged railroad equipment (a freight crane, tanker car parts) by
  Landscape Structures. Lighting design and lighting fabrication were led
  by Schuler Shook; branding and environmental graphics were designed by
  SPAN (formerly Thirst); AV consulting by Crowne Group; general contractor
  Nabholz Construction.
