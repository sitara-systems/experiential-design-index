summary: >
  "Transcendients: Heroes at Borders," a contemporary art exhibition by
  artist Taiji Terasaki using mist projection, opened February 1, 2020 at
  the Japanese American National Museum in Los Angeles, with AV integration
  by MAD Systems.
description: >
  The exhibition honored individuals who advocate for those facing
  discrimination and inequality at physical and psychological borders,
  using video projected onto mist alongside photographic weavings and
  audience-participation elements.
