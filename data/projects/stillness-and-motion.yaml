id: stillness-and-motion
name: stillness & motion
venue: river-green-richmond
project_type: installation
year_completed: 2013
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Supplied and programmed the specialty lighting and controls for the
      three-part public artwork's translucent glass-facade imagery.
technologies:
  - programmable LED lighting
summary: >
  stillness & motion is a three-part public artwork by artists Nancy Chew
  and Jacqueline Metz, installed on the glass facades of a pedestrian bridge
  at the terminus of River Green (Village Green), a development west of the
  Richmond Olympic Oval in Richmond, BC, completed in 2013; Eos Lightmedia
  supplied and programmed the artwork's specialty lighting.
description: >
  The artwork is informed by the local landscape, by mythologies of
  landscape, and by how culture interprets and is shaped by land — visitors
  move through the translucent, graphic imagery on the bridge's glass
  facades.
sources:
