summary: >
  A Trip Around the Solar System, the renovated von Kármán Visitor Center at
  NASA's Jet Propulsion Laboratory in Pasadena, California, debuted at JPL's
  Open House in May 2010, with exhibit design by C&G Partners and fabrication
  by Cinnabar.
description: >
  The exhibition structures the visitor center as a tour through the solar
  system, pairing planetary displays with full-scale models of JPL-built
  instruments and spacecraft including Voyager, Galileo, Cassini, and the Mars
  Exploration Rovers, designed to be modular and updateable for open houses
  and official visits while emphasizing durability for high public traffic.
