summary: >
  The National Mascot Hall of Fame, a 25,000 sq ft interactive children's
  museum in Whiting, Indiana, opened December 26, 2018; Electrosonic
  designed and integrated AV systems across its 18 interactive exhibit
  areas, Jack Rouse Associates served as exhibit designer, Chicago Scenic
  handled fabrication and installation, and Northern Light Productions was
  the prime media vendor. The museum closed in 2024.
