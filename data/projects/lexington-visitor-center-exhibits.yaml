summary: >
  New exhibits at the Lexington Visitor Center in Lexington, Massachusetts,
  interpreting the April 19, 1775 battle on Lexington Green, opened in
  2020 with graphics by Proun Design and fabrication by Mystic Scenic
  Studios.
description: >
  The exhibition features a miniature diorama depicting the skirmish on
  Lexington Green along with displays on the war's causes and global
  consequences; an iPad-based interactive offers detailed perspectives on
  the battle scene.
