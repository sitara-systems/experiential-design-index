summary: >
  "TIME - The March," an immersive exhibit created by TIME Studios that
  places visitors via virtual reality at the 1963 March on Washington,
  debuted February 28, 2020 at the DuSable Museum of African American
  History in Chicago; exhibit design by Local Projects with AV integration
  by MAD Systems.
description: >
  The experience begins with an audio introduction to the origins of the
  civil rights movement before inviting visitors to don VR headsets and
  attend the 1963 March on Washington, witnessing Martin Luther King Jr.'s
  "I Have a Dream" speech. The project was co-created by TIME's Mia Tramz
  and Alton Glass, with Viola Davis as executive producer and narrator.
