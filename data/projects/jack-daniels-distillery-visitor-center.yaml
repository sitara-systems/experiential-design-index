id: jack-daniels-distillery-visitor-center
name: Jack Daniel's Distillery Visitor Center
venue: jack-daniels-distillery
project_type: new-building
year_completed: 2000
credits:
  - firm: hok
    role: architecture
    note: >
      Designed under HOKe, HOK's themed-environment design studio (active
      1995 through the early 2000s), not HOK's core practice.
technologies: []
summary: >
  The Jack Daniel's Distillery Visitor Center in Lynchburg, Tennessee opened
  June 26, 2000, designed by HOKe (a themed-environment offshoot of HOK) with
  a Postmodern design referencing Tennessee's rural vernacular building
  traditions, including a truss roof sheathed with barrel-slat-like planks.
description: >
  The Visitor Center serves as the gateway for tours of the Jack Daniel's
  Distillery, housing a theater, retail space, and displays on barrel-making
  and whiskey production. It has since been supplemented by additional
  visitor-facing installations on the distillery grounds, including Barrel
  House 1-14 (2016) and the White Rabbit Bottle Shop (c. 2015).
