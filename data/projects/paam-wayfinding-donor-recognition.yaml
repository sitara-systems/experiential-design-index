summary: >
  Interior and exterior wayfinding signage and donor recognition design for
  the Provincetown Art Association and Museum (PAAM) in Provincetown,
  Massachusetts, by Arrowstreet, completed alongside Machado and Silvetti
  Associates' museum renovation and expansion in 2006.
description: >
  The renovation and expansion, led by Machado and Silvetti Associates,
  replaced the museum's 1942 Hawthorne Annex with the new Alvin Ross Wing,
  roughly doubling the museum's exhibition and storage space and making it
  the first LEED-rated art museum in the United States. Arrowstreet designed
  the accompanying wayfinding signage and donor recognition program to be
  "equally appropriate to the Museum's historic and contemporary
  architecture."
