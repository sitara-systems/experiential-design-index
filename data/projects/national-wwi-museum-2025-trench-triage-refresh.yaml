summary: >
  A 4,000-square-foot gallery refresh at the National WWI Museum and
  Memorial in Kansas City, Missouri, completed in 2025 by Taylor Studios,
  redesigning the replica trench, creating a new triage hospital exhibit,
  and adding AV interactive elements throughout the gallery.
description: >
  Distinct from the museum's 2006 renovation and expansion
  (`national-wwi-museum-renovation`) and the 2024 interactive-media refresh
  RLMG names on its own portfolio (`national-wwi-museum-2024-media-refresh`),
  this is a later 2025 gallery-fabrication refresh Taylor Studios names on
  its own portfolio, transforming static trench and hospital displays into
  immersive, interactive experiences.
