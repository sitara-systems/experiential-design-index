summary: >
  The North Kansas City Schools Early Education Center, an adaptive reuse of
  a former big-box retail store (a Hobby Lobby and Price Chopper) into an
  early-childhood and special-education facility in Gladstone, Missouri,
  opened in January 2021; DLR Group led architecture, interior design, and
  experiential graphic design, organizing the building into seven
  biophilic-themed "neighborhoods" for wayfinding and scale reduction.
