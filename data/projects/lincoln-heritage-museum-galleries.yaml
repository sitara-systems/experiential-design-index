summary: >
  Taylor Studios designed and constructed two floors of gallery space,
  totaling 4,000 square feet, for the Lincoln Heritage Museum on the Lincoln
  College campus in Lincoln, Illinois, completed in 2014.
description: >
  The first floor features custom artifact cases engineered for safe
  rotation of exhibits; the second floor centers on an immersive
  installation placing visitors in Lincoln's seat at Ford's Theatre at the
  moment of his assassination, combining historic artifacts with theatrical
  techniques.
