summary: >
  "Crafting Memory: The Art of Community in Peru," an exhibition of
  contemporary Peruvian folk art addressing the country's 1980s political
  conflict, opened December 3, 2017 at the Museum of International Folk
  Art in Santa Fe, New Mexico (running through July 2019), with exhibit
  design by Andrew Merriell & Associates — one of six exhibitions Merriell
  has designed for the museum since 2011.
