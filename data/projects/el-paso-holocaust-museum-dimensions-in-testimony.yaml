summary: >
  Dimensions in Testimony, an interactive exhibit developed by the USC
  Shoah Foundation that lets visitors converse with recorded Holocaust
  survivor testimonies, opened at the El Paso Holocaust Museum and Study
  Center on October 5, 2024, with AV integration by MAD Systems.
description: >
  The El Paso installation features interactive biographies of four
  Holocaust survivors, including one in Spanish, and a WWII liberator,
  using natural-language processing so visitors can ask questions and hear
  responses drawn from recorded testimony.
