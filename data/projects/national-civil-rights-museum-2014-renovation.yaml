summary: >
  The National Civil Rights Museum at the Lorraine Motel in Memphis reopened
  April 5, 2014 after an 18-month, $27.5 million renovation; exhibit design
  was by Howard+Revis Design Services, architecture by Self Tucker
  Architects, fabrication by 1220 Exhibits, and Second Story produced
  animated films and interactive installations for the Slavery gallery and
  civil rights history galleries.
