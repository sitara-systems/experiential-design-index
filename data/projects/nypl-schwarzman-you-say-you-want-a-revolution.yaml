summary: >
  "You Say You Want a Revolution: Remembering the 60s" was on view January
  19 through September 1, 2018 at the New York Public Library's Stephen A.
  Schwarzman Building in New York, curated by Isaac Gewirtz, with exhibition
  design by Pure+Applied.
description: >
  The exhibition presented over 125 books, artifacts, and documents drawn
  exclusively from the Library's collections exploring 1960s counterculture,
  including Timothy Leary's notes, Woodstock footage, and Vietnam War protest
  posters.
