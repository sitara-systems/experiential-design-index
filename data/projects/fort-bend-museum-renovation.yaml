summary: >
  A complete 2,750-square-foot renovation of the Fort Bend Museum in
  Richmond, Texas, completed in 2021 by Taylor Studios, spanning over two
  centuries of Texas history.
description: >
  The renovation includes a centrally located mobile exhibit area with
  wheeled artifact cases, platforms, and benches that staff can reconfigure
  between a single stage and individual display plinths, plus interactive
  elements such as a period-clothing photo trunk and a wagon-loading
  activity.
sources:
