summary: >
  Hagrid's Magical Creatures Motorbike Adventure, a launch coaster attraction
  in the Wizarding World of Harry Potter at Universal's Islands of Adventure
  in Orlando, Florida, opened June 13, 2019, creatively led by Universal
  Creative (Universal's in-house design division, not credited as an
  independent firm in this index) with a ride system by Intamin
  (Switzerland-based; outside this index's North America firm-record scope
  and outside the roles vocabulary, which does not cover ride-system
  manufacturing) and audio/lighting systems by Technomedia. It received a
  2020 Thea Award for Outstanding Achievement in the Attraction category.
description: >
  Designed under the creative direction of the Wizarding World's original
  Harry Potter film production designer Stuart Craig and art director Alan
  Gilmore, working with Universal Creative.
