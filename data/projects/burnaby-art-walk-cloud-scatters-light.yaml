summary: >
  A Cloud Scatters Light, a site-specific interactive light artwork on
  Burnaby, British Columbia's Art Walk, was completed in 2015 with lighting
  design, media design, and custom control software by Eos Lightmedia,
  commissioned by Polygon Real Estate.
description: >
  A 4-by-30-foot steel artwork of 3,000 individually controllable LED pixels
  renders digital "clouds" that form and grow as passersby linger, shaped in
  color by live local weather data pulled from an internet weather service.
