id: burnaby-art-walk-cloud-scatters-light
name: A Cloud Scatters Light
venue: burnaby-art-walk
project_type: installation
year_completed: 2015
credits:
  - firm: eos-lightmedia
    role: media-design
    technology_tags:
      - artificial-intelligence
    note: >
      Created the custom control software (reads live weather data, tracks
      passersby via embedded cameras) and designed/supplied the 3,000-pixel
      LED lighting system.
  - firm: eos-lightmedia
    role: lighting-design
technologies:
  - interactive LED lighting
  - computer vision tracking
technology_tags:
  - interactive-installation
  - artificial-intelligence
