summary: >
  The Waḳaŋ Ṭípi Center, a 7,500-sq-ft Native-led cultural and
  environmental interpretive center on Saint Paul's East Side, opened
  May 29, 2026; architecture by Full Circle Indigenous Planning +
  Design, interpretive planning by 106 Group, and exhibit fabrication by
  Split Rock Studios.
description: >
  The $14.3 million center honors Waḳaŋ Ṭípi Cave, a Dakota sacred site,
  and highlights the area's interconnected history, ecology, and
  cultural significance from a Dakota perspective through an exhibit
  hall, community gathering space, teaching kitchen, and teaching
  gardens.
