summary: >
  The Minerva Award Exhibit, a permanent-gallery installation at The
  California Museum in Sacramento honoring recipients of the Minerva Awards
  (founded 2004 by then-California First Lady Maria Shriver), ran from 2005
  to 2011 and was designed by West Office Exhibition Design.
description: >
  The Minerva Awards honor women who have "stepped forward and changed our
  world with their courage, strength and wisdom." Founded by Maria Shriver
  and named for the Roman goddess on California's state seal, the awards
  were presented at The Women's Conference. The California Museum housed a
  companion exhibition celebrating the honorees' legacies, sponsored by The
  Women's Conference and Lifetime Networks.
