summary: >
  The David H. Koch Center for Cancer Care, Memorial Sloan Kettering's
  750,000-square-foot outpatient cancer treatment facility in New York City,
  opened January 2020; architecture by Perkins Eastman with Ennead
  Architects, and experience design by ICRAVE.
description: >
  A 25-floor freestanding outpatient facility organized into repeating sets
  of Restoration, Recreation, and Activation floor typologies so patients
  are never far from each, aimed at restoring a sense of control for cancer
  patients and families; ICRAVE led the experience-design strategy for
  public spaces and patient rooms within Perkins Eastman and Ennead
  Architects' building design.
