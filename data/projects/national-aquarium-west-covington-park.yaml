summary: >
  West Covington Park, a 12.2-acre former Baltimore City Department of
  Transportation brownfield converted into a waterfront conservation
  demonstration park by the National Aquarium's Center for Aquatic Life and
  Conservation, opened in 2015 with landscape design and interpretive
  signage by Ayers Saint Gross.
description: >
  Features migratory-bird and native-insect habitat, a recreational pier, a
  gateway, a trail network, and educational signage; the site design
  addresses stormwater management, brownfield remediation, and habitat
  restoration.
