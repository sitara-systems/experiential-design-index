summary: >
  Follow the Green Book, an interactive kiosk exhibit at the Smithsonian
  National Museum of African American History and Culture in Washington,
  DC, has visitors sit in a re-created 1949 Buick sedan and use a touchscreen
  dashboard to choose stops for gas, food, and lodging, watching
  windshield-projected dramatized scenes illustrating how African Americans
  navigated segregation-era America using guides like the Negro Motorist
  Green Book; produced by Cortina Productions.
description: >
  Completion year is not stated unambiguously by any single source found:
  NMAAHC opened September 24, 2016 and this exhibit is part of its
  permanent opening-day exhibition floor, so 2016 is used here; Cortina
  Productions' own site and Communication Arts' project page cite later
  years (2017/2018) that read as award-cycle rather than completion dates.
