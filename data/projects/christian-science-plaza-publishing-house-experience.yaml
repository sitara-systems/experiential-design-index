summary: >
  "How Do You See the World?," a 21,000-square-foot visitor experience inside
  the historic Christian Science Publishing House at the Christian Science
  Plaza in Boston, opened in 2021; Luci Creative led exhibit design around
  the landmark Mapparium globe, with media design by Winikur Productions,
  fabrication by Ravenswood Studio, and lighting by Available Light.
description: >
  The project combined historic preservation with new interpretive content,
  including a Welcome Hall with projection, circadian lighting, and an
  original score; smart-glass vitrines displaying Christian Science Monitor
  and Mary Baker Eddy Library archives with digital page animations; and an
  augmented-reality book about Mary Baker Eddy. The centerpiece is the
  three-story stained-glass Mapparium, built in 1935, where visitors cross a
  glass bridge through the center of the globe during a synchronized
  audio-light presentation.
