id: hispanic-society-museum-sucuri-el-cid
name: "Sucuri (El Cid)"
venue: hispanic-society-museum-and-library
project_type: installation
year_completed: 2025
credits:
  - firm: adirondack-studios
    role: fabrication
    note: >
      Designed, fabricated, and installed the site-specific fiberglass
      sucuri (anaconda) sculpture wrapping the museum's 1927 bronze El Cid
      statue, using LiDAR scans for seamless integration; artist Adriana
      Varejão invited ADK to execute the piece.
summary: >
  Sucuri (El Cid), a site-specific fiberglass sculpture by artist Adriana
  Varejão coiling around the Hispanic Society's 1927 bronze equestrian
  statue of El Cid, opened as part of the exhibition "Don't Forget, We Come
  From the Tropics" (March 27 – June 22, 2025) at the Hispanic Society
  Museum & Library in New York City, fabricated and installed by Adirondack
  Studios.
