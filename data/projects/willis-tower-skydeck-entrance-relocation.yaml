summary: >
  Skydeck Chicago at Willis Tower relocated its entrance and queue to
  the opposite side of the building, repurposing existing exhibits,
  graphics, and branding; the project ran November 2016 through
  completion in September 2017. Exhibit design by Peter Hyde Design,
  fabrication and project management by Chicago Scenic Studios,
  architecture by Gensler, AV integration by Creative Technology.
  Distinct from the venue's later 2022 renovation.
