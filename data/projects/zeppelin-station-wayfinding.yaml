summary: >
  Zeppelin Station, an adaptive-reuse food hall and transit stop along
  Denver's RTD A Line, opened in 2018 with a modular vendor-signage and
  wayfinding system by Wunder Werkz and architecture by Stephen Dynia
  Architects; it was recognized in the Communication Arts Design Competition,
  Environmental Graphics category.
description: >
  The signage system uses a custom steel pegboard with interchangeable plates
  so vendor pricing and offerings can be updated without visual clutter
  across nine food vendors, two bars, and three retail concepts; a 25-foot
  exterior LED screen displays train times and notifications.
