summary: >
  Great River Children's Museum, a 31,000-sq-ft children's museum
  created by merging three historic buildings (including the former
  Liberty Bank building) in downtown St. Cloud, Minnesota, opened June
  10, 2025; architecture by GLT Architects, exhibit design by Haizlip
  Studios and Split Rock Studios, fabrication by Split Rock Studios,
  and media design for the Headwaters exhibit by Native Skywatchers
  Design Studio.
description: >
  The museum's eight interactive exhibit areas include Headwaters (a
  Mississippi River immersion space), Climber to the Clouds (a
  three-story weather-themed atrium), Community Connections, an
  Everyday Engineering tinker workspace, and a 35-foot Great Big River
  water table.
