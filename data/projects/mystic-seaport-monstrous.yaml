summary: >
  "Monstrous: Whaling and Its Colossal Impact," a 5,000 sq ft exhibition in
  Mystic Seaport Museum's Collins Gallery in Mystic, Connecticut, opened in
  2025 with lighting design by Eos Lightmedia (Abernathy Lighting Design),
  developed with the museum's in-house exhibition staff.
description: >
  Centered on a large scratch-board illustration of a whale with embedded
  imagery, the exhibition explores humanity's historical and modern impact
  on the sea through the lens of whaling.
