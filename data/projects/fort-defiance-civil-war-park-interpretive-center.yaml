summary: >
  Fort Defiance Civil War Park & Interpretive Center, a 4,722 sq ft visitor
  center in Clarksville, Tennessee, opened April 2011 with architecture by
  Rufus Johnson Associates and interior/exterior exhibit and graphic design
  by HealyKohler Design.
description: >
  Galleries move visitors through three eras -- Early Civil War, Union
  Occupied Clarksville, and Post Civil War -- combining an original film
  production with immersive recreations of the fort's earthworks and
  exterior signage interpreting the site's role defending the Cumberland
  River Waterway.
