summary: >
  Water Challenge, a 3,700 sq ft exhibition on California's water
  infrastructure at the SMUD Museum of Science and Curiosity in Sacramento,
  opened with the museum in November 2021; West Office Exhibition Design
  designed the gallery.
description: >
  An interactive exhibition exploring water storage, delivery, use,
  conservation, and waste treatment across California's water management
  systems, developed with input from the California Department of Water
  Resources, Regional Water Authority, Sacramento Sewer, Farm Water
  Coalition, and Ducks Unlimited.
