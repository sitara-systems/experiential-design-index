summary: >
  The Glorya Kaufman Performing Arts Center, a 10,550-square-foot adaptive
  reuse of a mid-century temple into a performing-arts and therapeutic
  program space for Vista Del Mar Child and Family Services in Los Angeles,
  opened in 2022, designed by AUX Architecture; Honorable Mention, Fast
  Company's 2022 Innovation by Design Awards, Spaces and Places category.
description: >
  AUX Architecture preserved the building's original wood structural
  diaphragm and concrete foundation while clad the expansion in polycarbonate
  panels. The center supports Vista Del Mar's therapeutic performing-arts
  program for neurodiverse and autistic youth. General contractor: Shawmut
  Design and Construction. Landscape design: SQLA. Architectural lighting:
  KGM Architectural Lighting.
