year_completed: 2021
credits:
  - firm: studio-matthews
    role: exhibit-design
  - firm: belle-and-wissell
    role: media-design
summary: >
  Take Flight, a modernized gallery examining the societal impact of the
  airline industry and the legacy of the Boeing 727, opened at the Museum
  of Science and Industry, Chicago in 2021, designed by Studio Matthews.
description: >
  The gallery features an actual 727 aircraft with three connected cabins
  and a 100-foot mural depicting plane building and airport operations.
  Media design by Belle & Wissell; fabrication by Roto; project management
  by Jill Randerson Exhibition Management.
sources:
