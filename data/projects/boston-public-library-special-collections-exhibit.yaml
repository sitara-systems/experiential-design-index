summary: >
  A flexible exhibit and graphic display system for the Boston Public
  Library's Special Collections Department at the Central Library in Copley
  Square, Boston, Massachusetts, designed by Arrowstreet and opened with the
  department's renovated space in September 2022.
description: >
  The $15.7 million, City-funded renovation of the Special Collections
  Department (architecture by Finegold Alexander Architects) reopened in
  September 2022 with a new reading room and lobby. Arrowstreet designed the
  accompanying exhibit system for curated artifacts — rare books, artwork,
  and historical items — using bold color panels to anchor cases, a "Staff
  Spotlight" section, and QR codes linking to extended content, plus
  wayfinding recommendations for the adjoining elevator lobby.
