summary: >
  Cretaceous Crossroads, a 2,300-square-foot permanent paleontology
  exhibition at the Museum of the Rockies in Bozeman, Montana, opened
  July 2, 2025, the museum's first new primary paleontology exhibition in
  over a decade; interpretive planning by Lord Cultural Resources, with
  Bluewater Studio leading design-build (exhibit design, media, and
  fabrication) alongside gallery designer WeatherstonBruer Associates.
description: >
  The exhibition explores three Montana geologic formations (Two Medicine,
  Judith River, and Bearpaw) spanning roughly 72 to 82 million years ago,
  using real fossil material, 3D prints, casts, murals, an augmented
  reality piece, and discovery drawers, featuring specimens including a
  mounted Maiasaura and a 30-foot Daspletosaurus horneri.
