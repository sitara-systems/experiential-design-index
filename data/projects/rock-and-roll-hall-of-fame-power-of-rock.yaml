id: rock-and-roll-hall-of-fame-power-of-rock
name: "Power of Rock"
venue: rock-and-roll-hall-of-fame
project_type: major-renovation
year_completed: 2017
credits:
  - firm: brc-imagination-arts
    role: exhibit-design
    note: >
      Strategic master plan reconceiving the visitor experience at every
      guest engagement point: Rock Plaza with "Long Live Rock" signature
      lettering, brand ID, campus lighting/audio, and the Hall of Fame
      gallery / New Inductee exhibit.
  - firm: brc-imagination-arts
    role: media-design
    note: >
      "Power of Rock" immersive concert-experience theater, created in
      collaboration with director Jonathan Demme (a 12-minute film across
      five moving screens, plus a three-act pre-show), opened July 1, 2017.
technologies:
  - multi-screen immersive film
  - three-act pre-show staging
summary: >
  "Power of Rock," an immersive concert-experience theater and campus-wide
  visitor-experience master plan at the Rock & Roll Hall of Fame in
  Cleveland, Ohio, opened July 1, 2017, designed by BRC Imagination Arts
  in collaboration with director Jonathan Demme.
description: >
  BRC's engagement (ongoing per its own site) also included the Rock Plaza
  exterior redesign, campus lighting/audio, and the Hall of Fame gallery /
  New Inductee exhibit; distinct from the separately recorded 2026
  architecture-led museum expansion.
