summary: >
  The new 137,000-square-foot Tennessee State Museum building on
  Nashville's Bicentennial Mall opened in October 2018; architecture by
  EOA Architects and HGA, exhibit design by Gallagher & Associates,
  fabrication by Design and Production, and media production by Northern
  Light Productions.
description: >
  Northern Light Productions produced five linear films, seven interactive
  installations, four listening stations, a multiplayer interactive music
  table, and seven zoned soundscapes across the museum's Early Tennessee,
  Change and Challenge, and Music Gallery exhibits, including a curvilinear
  theater film on Tennessee's geological history and musical heritage.
