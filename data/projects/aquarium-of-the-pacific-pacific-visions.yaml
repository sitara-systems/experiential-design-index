summary: >
  Pacific Visions, a $53 million, 29,000-square-foot wing of the Aquarium
  of the Pacific in Long Beach, California, opened May 24, 2019, with
  architecture and exhibit design by EHDD.
description: >
  The wing includes an immersive theater experience exploring
  human-driven environmental change and a series of interactive gallery
  exhibits on climate, food, and energy choices.
