  - single-user interactive
summary: >
  Enhanced core exhibitions at the Orange County Regional History Center in
  Orlando, Florida, unveiled January 9, 2024, added interactive and media
  elements -- including a sinkhole-formation interactive and a Timucua
  language interactive -- produced by Monadnock Media.
description: >
  The renovation increased bilingual content across the fourth-floor core
  exhibition and added projected sky animations depicting centuries of
  regional history.
