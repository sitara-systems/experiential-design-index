id: orange-county-regional-history-center-enhanced-core-exhibitions
name: Enhanced Core Exhibitions
venue: orange-county-regional-history-center
project_type: exhibition-refresh
year_completed: 2024
credits:
  - firm: monadnock-media
    role: media-design
    note: "Media master planning, exhibit design collaboration, and technical systems design and oversight for the Sinkholes digital-mechanical interactive, the Timucua: A Rediscovered Language single-user interactive, and the First Contact narrative video"
technologies:
  - projection mapping
