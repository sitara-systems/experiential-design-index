id: henry-ford-museum-fueled-by-passion
name: '"Fueled by Passion" (Driven to Win: Racing in America)'
venue: henry-ford-museum-of-american-innovation
project_type: new-exhibition
year_completed: 2021
credits:
  - firm: brc-imagination-arts
    role: media-design
    note: >
      Strategic planning, story and concept development, design detail,
      architectural coordination, schematic design, immersive media
      production, production, installation and integration, and technical
      programming and training for the 15-minute immersive media
      experience.
technologies:
  - multi-channel audio (78 speakers)
  - acoustically transparent screens
summary: >
  "Fueled by Passion," a 15-minute immersive media experience within the
  "Driven to Win: Racing in America presented by General Motors" exhibition
  at the Henry Ford Museum of American Innovation in Dearborn, Michigan,
  opened March 27, 2021, produced by BRC Imagination Arts.
description: >
  The experience follows five racing teams across disciplines (IndyCar,
  NASCAR pit crew, Pikes Peak, Top Fuel drag racing, and Bonneville
  land-speed racing), using a multi-channel audio system with 78 individually
  tuned speakers; won a 2022 MUSE Creative Award (Platinum,
  Experiential/Immersive).
sources:
  - https://www.brcweb.com/project/fueled-by-passion-the-henry-ford/
  - https://www.thehenryford.org/explore/blog/the-making-of-fueled-by-passion-behind-the-scenes-of-driven-to-win
  - https://www.prweb.com/releases/driven-to-win-racing-in-america-presented-by-general-motors-to-open-march-27th-inside-henry-ford-museum-of-american-innovation-882746774.html
