summary: >
  Barclays Center in Brooklyn, New York, opened in September 2012 with
  architecture by SHoP Architects and an integrated "street to seat" media
  system by ESI Design, including a 360-degree LED "oculus" display in the
  arena's public plaza.
description: >
  ESI Design's media strategy for Barclays Center, home to the Brooklyn Nets
  and New York Liberty, spans from the public plaza's oculus display through
  interior and in-bowl displays; ESI has continued as Barclays' media design
  partner since 2012.
