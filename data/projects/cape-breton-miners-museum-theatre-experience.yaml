id: cape-breton-miners-museum-theatre-experience
name: Cape Breton Miners Museum Multi-Sensory Theatre Experience
venue: cape-breton-miners-museum
project_type: new-exhibition
year_completed: 2021
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Lighting and audiovisual design, and supply/integration of all
      technologies within the new theatre experience and the visitor-facing
      lobby.
  - firm: eos-lightmedia
    role: av-integration
technologies:
  - 270-degree projection
  - motion/vibration effects
  - scent effects
summary: >
  The Cape Breton Miners Museum in Glace Bay, Nova Scotia opened a new
  multi-sensory theatre experience in 2021 simulating a mine-cart ride,
  developed with exhibit design firm AldrichPears Associates, creative
  partner Vista Collaborative Arts, and lighting/AV design, supply, and
  integration by Eos Lightmedia.
description: >
  The simulator experience combines light, sound, scents, wind, rumbling
  vibrations, and 270-degree projections around visitors, telling the story
  of the region's coal-mining history and the miners and families who lived
  it.
sources:
  - https://www.eoslightmedia.com/work/147
