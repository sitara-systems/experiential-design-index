summary: >
  Roots of Wisdom: Native Knowledge. Shared Science., an NSF-funded
  traveling exhibition pairing indigenous knowledge with western science,
  developed by OMSI with the Indigenous Education Institute and tribal
  and community partners, opened at the Oregon Museum of Science and
  Industry in Portland, Oregon in 2014; a banner version later toured
  with the Smithsonian NMAI's Traveling Exhibition Service.
