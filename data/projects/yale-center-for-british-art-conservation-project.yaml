summary: >
  The Yale Center for British Art in New Haven, Connecticut completed a
  three-year building conservation project and reopened to the public May
  11, 2016, with architecture by Knight Architecture and conservation
  architecture by Peter Inskip + Peter Jenkins Architects, exhibition design
  by Stephen Saitas Designs, and lighting design by Hefferan Partnership
  Lighting Design.
description: >
  The project conserved Louis I. Kahn's original 1969-1974 building,
  addressing building envelope, mechanical systems, and life-safety
  infrastructure while reinstalling the museum's permanent collection
  galleries.
sources:
