summary: >
  The $46 million, 115,000-square-foot Richard B. Russell Jr. Special
  Collections Libraries Building at the University of Georgia in Athens,
  dedicated February 17, 2012, houses three gallery spaces with exhibit,
  graphic, and media design by HealyKohler and architecture by Collins
  Cooper Carusi Architects.
description: >
  The building's three galleries are the Hargrett Rare Book and Manuscript
  Library Gallery (colonial-era Georgia through the twentieth century, with
  custom conservation-grade artifact cases), the Richard B. Russell Library
  for Political Research and Studies Gallery (a thirty-foot biographical
  mural and a recreated Senator's office), and the Walter J. Brown Media
  Archives & Peabody Awards Collection Gallery (broadcasting history through
  moving-image and sound materials). Brasfield & Gorrie was the general
  contractor; no delivery-stack role in the index's vocabulary currently
  covers general contracting, so that credit is not recorded here.
