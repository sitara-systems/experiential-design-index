summary: >
  "Departing Impressions," a 34-panel lenticular digital art installation in
  the departures hall of Delta Air Lines' new Terminal C at LaGuardia
  Airport in New York, opened with the terminal in June 2022, designed by
  ESI Design with StandardVision and Dimensional Worldwide.
description: >
  The data-driven mural draws on live Delta flight data to depict the
  airline's North American destinations, updating in real time as flights
  depart; it welcomes passengers into Terminal C's main departure hall as
  part of Delta's $4 billion terminal rebuild at LaGuardia.
