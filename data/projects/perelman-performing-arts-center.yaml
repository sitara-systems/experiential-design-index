summary: >
  The Perelman Performing Arts Center (PAC NYC), a three-theater
  performing arts venue wrapped in translucent marble at the World
  Trade Center site in Lower Manhattan, New York City, opened
  September 13, 2023, designed by REX (Joshua Ramus) as design
  architect with Davis Brody Bond as executive architect, interior
  design by Rockwell Group, and lighting design by Tillotson Design
  Associates.
description: >
  The 129,000-sq-ft cube houses three flexible venues (50-950 seats,
  60+ configurations) for theater, dance, music, opera, and film.
