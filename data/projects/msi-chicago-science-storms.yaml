summary: >
  Science Storms, a 26,000 sq ft exhibition of seven core exhibits on
  natural phenomena including sunlight, opened at the Museum of Science
  and Industry, Chicago in 2010; lead design by Evidence Design, media
  production by Cortina Productions, AV systems design by MAD Systems, and
  fabrication, engineering, and installation by Chicago Scenic Studios.
description: >
  The Sunlight exhibit demonstrates sunlight's scientific properties via
  large-scale, repeatable visual experiments including a heliostat array.
