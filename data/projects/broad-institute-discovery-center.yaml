id: broad-institute-discovery-center
name: Broad Discovery Center
venue: broad-institute
project_type: new-exhibition
year_completed: 2022
credits:
  - firm: cambridgeseven
    role: architecture
    note: "Reimagined an under-utilized lobby area as an immersive exhibit space; also exhibit designer."
  - firm: cambridgeseven
    role: exhibit-design
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Selected by general contractor GC Shawmut as lighting supplier and
      integrator for the 6,000 sq ft exhibit, including a multi-zone track
      control system and retrofit ceiling-cove color control.
technologies:
  - moving scenic walls
  - multi-zone lighting control
summary: >
  The Broad Discovery Center, a 6,000-square-foot public educational exhibit
  space in the lobby of the Broad Institute of MIT and Harvard in Cambridge,
  Massachusetts, opened in 2022, designed by architect and exhibit designer
  CambridgeSeven with lighting design, supply, and integration by Eos
  Lightmedia.
description: >
  The original space was an under-utilized lobby that occasionally hosted
  special events; CambridgeSeven reimagined it into an open-concept exhibit
  with physically moving scenic wall elements and media, highlighting the
  Broad Institute's genomic-medicine research. Eos Lightmedia designed
  focus-heavy lighting to avoid glare and reflection off glass curtainwalls
  and a polished terrazzo floor.
sources:
  - https://www.eoslightmedia.com/work/150
