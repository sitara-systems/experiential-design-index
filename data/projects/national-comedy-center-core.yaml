summary: >
  The National Comedy Center, a 37,000-sq-ft, $50 million museum dedicated
  to the art of comedy, opened August 1, 2018 in Jamestown, New York, with
  exhibit design by Jack Rouse Associates (JRA), media design by Cortina
  Productions, AV integration by Electrosonic, and fabrication by
  Adirondack Studios.
