summary: >
  The Bubble Tower, a 26-foot motion-capture interactive centerpiece of the
  Toy Halls of Fame exhibit (home to the National Toy Hall of Fame and Toy
  Industry Hall of Fame), opened at The Strong National Museum of Play in
  Rochester, New York on September 19, 2015; interactive media design by
  Unified Field.
description: >
  Guests step up to a pillar of monitors and use motion capture to create
  and manipulate virtual soap bubbles, making streams and whirlwinds and
  popping toys out of bubbles, with automatic photo capture built into the
  environment. The installation marked the induction of bubbles into the
  National Toy Hall of Fame in 2014.
