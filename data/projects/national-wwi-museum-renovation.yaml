summary: >
  The National WWI Museum and Memorial in Kansas City, Missouri, reopened in
  December 2006 after a major renovation and 80,000-square-foot expansion,
  with exhibition design by Ralph Appelbaum Associates, architecture by ASAI
  Architects and Group One Architects, and interactive media including
  touchscreen displays by Second Story Interactive Studios and an interactive
  table engineered by Potion Inc.
