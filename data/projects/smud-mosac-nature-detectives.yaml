summary: >
  Nature Detectives, a hands-on nature gallery for children ages 4-8 at the
  SMUD Museum of Science and Curiosity in Sacramento, opened with the
  museum in November 2021; West Office Exhibition Design designed the
  gallery.
description: >
  A tactile, kid-centric gallery inviting young visitors to use their five
  senses and basic science tools to investigate the natural world, including
  live animals and sensory, discovery-based activities.
