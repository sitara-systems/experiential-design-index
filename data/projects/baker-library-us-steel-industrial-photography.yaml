summary: >
  "Photography and Corporate Public Relations: The Case of U.S. Steel,
  1930-1960," an exhibition on U.S. Steel's use of commissioned
  photography as a public-relations tool, opened in Baker Library's north
  lobby at Harvard Business School, Boston, Massachusetts, in November
  2019, with exhibit design by Proun Design, fabrication by WB Inc., and
  media production by Northern Light Productions.
description: >
  Drawing on roughly 1,200 photographs by more than twenty-five
  photographers, the exhibit examines how U.S. Steel used photography of
  its plants, workers, and manufacturing processes from the Great
  Depression through the postwar boom to shape public opinion about the
  company's size, labor practices, and profits.
