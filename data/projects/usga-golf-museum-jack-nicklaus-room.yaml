summary: >
  The Jack Nicklaus Room, a 1,200 sq ft permanent gallery at the USGA Golf
  Museum in Far Hills, New Jersey honoring golfer Jack Nicklaus, opened May
  27, 2015; exhibit design by Peter Hyde Design.
description: >
  The gallery joined existing USGA Museum galleries honoring Bob Jones, Ben
  Hogan, Arnold Palmer, and Mickey Wright. It contains more than 80
  artifacts, many on loan from the Jack Nicklaus Museum in Columbus, Ohio,
  nine short films, and 27 "Ask Jack" video vignettes organized around six
  themes tied to Nicklaus's four U.S. Open victories (1962, 1967, 1972,
  1980): competitive spirit, integrity, self-belief, commitment,
  perseverance, and vision.
