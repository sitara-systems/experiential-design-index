summary: >
  Sensing Chicago, an interactive children's gallery at the Chicago History
  Museum exploring the city's history through multiple senses; exhibit
  design by Amaze Design, with fabrication by Proto Productions and media
  design by Monadnock Media.
description: >
  The gallery, developed as part of the museum's broader facility renovation,
  features a high-wheel bicycle tactile experience over simulated wooden
  brick streets, a tabletop map with olfactory interactives, and a soft-sculpture
  hot dog bun installation.
