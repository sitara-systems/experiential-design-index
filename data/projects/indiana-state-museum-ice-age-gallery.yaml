summary: >
  A 2,800-square-foot Ice Age Gallery at the Indiana State Museum in
  Indianapolis, completed in 2017 by Taylor Studios, centered on a
  sub-glacial ice tunnel diorama depicting the Wisconsinan Continental Ice
  Sheet's retreat roughly 17,000 years ago.
description: >
  The museum commissioned Taylor Studios on the strength of its prior
  Natural Regions Gallery work; the multi-sensory environment includes
  icy wind effects, textured flooring, a trickling stream, layered "dirty"
  ice formations, taxidermy specimens (musk ox, snowy owl, snowshoe hare),
  and a mammoth-sinking diorama scene.
