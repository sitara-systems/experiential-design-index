summary: >
  New exhibits at the North Bridge Visitor Center, part of Minute Man
  National Historical Park in Concord, Massachusetts, interpreting the
  April 19, 1775 battle at the Old North Bridge, opened in 2012 with
  exhibit design by Wondercabinet Interpretive Design, graphics by Proun
  Design, and fabrication by Mystic Scenic Studios.
description: >
  Interpretive graphics styled as historic murals integrate narrative
  elements with the visitor center's historic setting, including full-scale
  portraits by artist Don Troiani alongside artifacts and documents.
