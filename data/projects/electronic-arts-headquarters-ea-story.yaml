summary: >
  EA Story, an interactive gallery installation at Electronic Arts headquarters
  in Redwood City, California, opened in 2022 for the company's 40th
  anniversary, with strategy, creative direction, and design by Dome and
  exterior tribute illustration by designer Aimee Stevland.
description: >
  The installation features an interactive wall displaying box artwork from
  more than 1,200 games released across EA's four-decade history, letting
  visitors filter by genre, year, platform, or title and scan physical game
  covers with a mobile device to access archival content. Dome processed an
  inventory of more than 20,000 historical images for the piece. The project
  received an Honorable Mention in the Experience Design category of Fast
  Company's 2023 Innovation by Design Awards.
