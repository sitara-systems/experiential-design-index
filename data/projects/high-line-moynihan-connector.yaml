summary: >
  The High Line – Moynihan Connector, two elevated pedestrian bridges linking
  the High Line to Manhattan West and Moynihan Train Hall over Dyer Avenue
  and West 30th Street in New York, opened in 2023, designed by Skidmore,
  Owings & Merrill with landscape by Field Operations and lighting design by
  Tillotson Design Associates.
description: >
  An honorable mention in the Urban Design category of Fast Company's 2024
  Innovation by Design Awards. A $50 million public-private partnership
  among Empire State Development, Brookfield Properties, and Friends of the
  High Line. Landscape architecture by Field Operations is not captured as a
  project credit — the vocabulary has no landscape-architecture role (logged
  gap).
