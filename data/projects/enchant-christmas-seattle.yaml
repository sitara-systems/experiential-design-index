id: enchant-christmas-seattle
name: Enchant Christmas Seattle
venue: t-mobile-park
project_type: installation
year_completed: 2019
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Designed, installed, and programmed a 100-foot-tall Christmas tree
      composed of over 40,000 independently controllable color-changing
      lights choreographed to dynamic light shows, as the maze's focal
      feature.
technologies:
  - color-changing LED
  - remote lighting control
summary: >
  Enchant Christmas, a ticketed holiday light maze produced by Enchant,
  staged at T-Mobile Park (Safeco Field) in Seattle, Washington in 2019,
  featured a 100-foot Christmas tree light feature designed, installed, and
  programmed by Eos Lightmedia.
description: >
  Eos Lightmedia delivered a reliable, easy-to-maintain system, trained
  local crews on maintenance and operation, and provided remote access
  support for the multi-month seasonal run.
sources:
  - https://www.eoslightmedia.com/work/21
