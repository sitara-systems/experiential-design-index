summary: >
  Dimensions in Testimony, a permanent interactive exhibit developed by the
  USC Shoah Foundation featuring interactive Holocaust survivor biographies,
  opened November 1, 2024 at the Virginia Holocaust Museum in Richmond in
  the newly built Alan and Halina Zimm Theater of Remembrance, with exhibit
  design and AV integration by MAD Systems.
description: >
  The permanent exhibition, on the museum's second floor, features five
  rotating survivor biographies that visitors can question in real time,
  including Richmond resident Halina Zimm, whose testimony was recorded
  over 15 hours in response to nearly 1,000 questions.
