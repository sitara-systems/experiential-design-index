summary: >
  Dance to Belong: A History of Dance at 92NY, a permanent exhibition
  marking 92NY's 150th anniversary, opened in the 92nd Street Y in New York,
  NY in March 2024, designed by Thinc Design.
description: >
  The second-floor exhibition uses suspended graphic elements evoking dancer
  forms, interactive use of the space's architectural columns, and projected
  and printed surfaces combining historic dance footage with archival
  footage of related social movements.
