summary: >
  Sit Spot – Reconnecting with the Living World is an immersive audio-visual
  installation designed by Tellart within OMSI's Nancy Stueber Natural
  Sciences Hall in Portland, Oregon, opening April 25, 2026 as part of the
  hall's Climate of Change/Clima de Cambio exhibition.
description: >
  The installation cycles through five Pacific Northwest environments in a
  ten-minute loop; motion-responsive projection makes visitors' stillness
  and movement part of the experience, drawing on the Indigenous practice of
  a "sit spot" as a model of patient observation of the land.
