summary: >
  Revealing Krishna: Journey to Cambodia's Sacred Mountain, an exhibition
  presenting the restoration and mixed-reality reinterpretation of the
  Cleveland Museum of Art's Krishna Lifting Mount Govardhan sculpture in
  Cleveland, Ohio, opened November 14, 2021, with digital media strategy,
  creative direction, and UX/UI design by Dome and mixed-reality development
  by the Interactive Commons at Case Western Reserve University.
