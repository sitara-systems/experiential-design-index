summary: >
  The Southern Ute Cultural Center and Museum, a tribally-funded museum in
  Ignacio, Colorado, opened in 2011 with architecture by Jones & Jones
  Architects and Landscape Architects and exhibit design by West Office
  Exhibition Design.
description: >
  Developed to preserve and interpret Ute cultural knowledge, values, and
  artifacts for future generations, the museum's design — including its
  sun-wise circulation path, interpretive methodology, tipi construction
  specifications, and graphic messaging — was developed collaboratively
  among West Office, architects Jones & Jones, museum staff, tribal
  leadership, and community members. The $38 million facility overlooks the
  Los Pinos River.
