summary: >
  The Pulse, a building-wide digital communication and wayfinding platform
  for the Sandra Day O'Connor College of Law's Beus Center for Law and
  Society, opened with the building in downtown Phoenix on August 15, 2016;
  architecture by Ennead Architects, platform and app development by
  Unified Field, and AV integration by Level3 AV.
description: >
  The Pulse aggregates user-generated, live data to connect students,
  faculty, and guests throughout the six-story, 280,000-square-foot
  building, supporting wayfinding, alerts, group formation, event
  scheduling, space booking, and access to institutional knowledge across
  more than 30 displays, including a street-facing nano display and a
  media mesh in the building's breezeway.
