summary: >
  "Dr. Pauline Austin: Radar Pioneer," an exhibit honoring Pauline Austin's
  leadership of the MIT Radar Laboratory (1956-1979) and her contributions
  to radar meteorology, opened in MIT's Green Building in Cambridge,
  Massachusetts in 2016, with exhibit design by Proun Design and
  fabrication by Advanced Imaging, Inc.
description: >
  The display is installed in the Green Building, home of MIT's Program in
  Atmospheres, Oceans and Climate, and highlights Austin's role advancing
  electromagnetic theory and radar technology and leading the field's
  transition from analog to digital radar analytics.
