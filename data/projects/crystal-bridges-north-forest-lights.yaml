summary: >
  North Forest Lights, a seasonal nighttime exhibition of five interactive
  light-and-sound installations along the mile-long North Forest trail at
  Crystal Bridges Museum of American Art in Bentonville, Arkansas, opened in
  October 2019, designed and produced by Moment Factory.
description: >
  Commissioned as a nighttime attraction for the museum's forest trail
  bordering the Ozark National Forest, the exhibition comprised five
  installations — Crystal Grove, Forest Frequencies, The Hearth, Whispering
  Tree, and Memory of Water — combining projection, interactive lighting, and
  sound, run on Moment Factory's X-Agora media-control platform. It ran its
  first season October 2019 - February 2020, drew more than 108,000 visitors,
  and won the 2020 Prix Mondo*dr Americas Award in the Parks & Attractions
  category. Distinct from the museum's later "Listening Forest" exhibition
  (2022, Rafael Lozano-Hemmer) sited in the same North Forest trail.
