summary: >
  An expansion of Special Collections & Galleries at the Ina Dillard Russell
  Library at Georgia College & State University in Milledgeville, Georgia,
  including a new Rare Book Room, was dedicated February 13, 2023, with
  exhibit, graphic, and media design by HealyKohler.
description: >
  The student-focused gallery explores the university's history through
  education, research, and alumni contributions, housing southern literary
  works and historical archives with large-scale interpretive graphics,
  social gathering spaces, and digital interfaces for examining rare book
  pages.
