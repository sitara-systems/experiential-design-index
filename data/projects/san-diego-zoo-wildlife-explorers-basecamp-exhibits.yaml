summary: >
  More than 20 interactive exhibits across the herpetology and invertebrate
  buildings of the Denny Sanford Wildlife Explorers Basecamp, which opened
  March 11, 2022, at the San Diego Zoo, were designed, fabricated, and built
  by Ideum with architecture by HGW Architecture.
description: >
  Highlights include a full-dome Migration projection experience (with
  dome-projection assistance from Elumenati) immersing visitors among
  animated insects; the Living River, a 3,245-LED animated sculpture
  spanning 1,330 feet of strip lighting through the herpetology building;
  custom-fabricated microscope stations; a two-screen stick-insect
  camouflage game; docent-led and self-guided volunteer stations with RFID
  card switching; and a zoo-wide digital signage system.
