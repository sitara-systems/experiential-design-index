id: statue-of-liberty-museum
name: Statue of Liberty Museum
venue: statue-of-liberty-museum-venue
project_type: new-building
year_completed: 2019
credits:
  - firm: fxcollaborative
    role: architecture
    note: "no firm record yet"
  - firm: esi-design
    role: exhibit-design
    note: "15,000 sq ft exhibition across three galleries: Immersive Theater, Engagement Gallery, Inspiration Gallery"
  - firm: esi-design
    role: media-design
    note: "Immersive theater and the 450 sq ft crowdsourced 'Becoming Liberty' digital mural"
  - firm: diversified
    role: av-integration
    note: >
      AV and digital signage technology across the Immersive Theater
      (8 laser-phosphor projectors), Star Mural Donor Wall, Engagement
      Gallery, and the 40'x11' Becoming Liberty LED video wall
  - firm: sh-acoustics
    role: acoustics
    note: >
      Established the museum's acoustic environments, mitigated noise
      factors, and designed/calibrated the audio systems; implemented custom
      "activated sound" technology turning exhibit surfaces into virtual
      speakers, engineered to withstand 4M+ annual visitors.
technologies:
  - immersive theater
  - interactive touchscreens
  - crowdsourced digital mural
summary: >
  The Statue of Liberty Museum, a 26,000-square-foot new visitor museum on
  Liberty Island in New York, opened May 16, 2019, with architecture by
  FXCollaborative and exhibition/interactive media design by ESI Design.
description: >
  Commissioned by the Statue of Liberty-Ellis Island Foundation, the museum
  gives all Liberty Island visitors access to the statue's original torch and
  a non-linear, three-gallery exhibition (Immersive Theater, Engagement
  Gallery, Inspiration Gallery) covering the statue's history and global
  symbolism, including more than 150 historic artifacts, 29 interactive
  touchscreens, and the "Becoming Liberty" crowdsourced digital mural.
