id: nypl-schwarzman-abc-of-it
name: "The ABC of It: Why Children's Books Matter"
venue: nypl-schwarzman-building
project_type: temporary-exhibition
year_completed: 2013
credits:
  - firm: pure-and-applied
    role: exhibit-design
technologies:
  - motion-activated interactive figure
summary: >
  "The ABC of It: Why Children's Books Matter" opened June 21, 2013 at the
  New York Public Library's Stephen A. Schwarzman Building in New York,
  curated by Leonard S. Marcus, with exhibition design by Pure+Applied
  featuring a motion-activated Alice figure and theatrical, book-based
  display environments.
description: >
  Drawing nearly 250 items from the Library's collections, the exhibition
  became the most highly attended in the Library's history, drawing over
  half a million visitors over its 14-month run.
