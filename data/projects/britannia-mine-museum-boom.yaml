summary: >
  BOOM! is a live-action, multi-sensory special-effects show inside the
  historic Mill No. 3 building at Britannia Mine Museum in Britannia Beach,
  British Columbia, which opened in 2019; Vista Collaborative Arts designed
  and produced the show, with lighting and special-effects design,
  installation, and programming by Eos Lightmedia.
description: >
  The show dramatizes the 1920s heyday of the Britannia copper mine's Mill
  No. 3, once one of the largest copper mills in the world, using lighting,
  special effects, and a moving ore-skip finale to recreate the historic
  mill's operation for visitors.
