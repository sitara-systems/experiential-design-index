summary: >
  Heart of Africa, a 43-acre mixed-species savanna expansion at the
  Columbus Zoo and Aquarium in Powell, Ohio, opened May 22, 2014; architect
  and planner PGAV Destinations, habitat construction and theming by The
  Nassal Company, and interpretive design by Roto, with construction by
  Messer Construction Co. (management) and Smoot Construction Co. of Ohio.
description: >
  The exhibit is a rotating, mixed-species savanna habitat featuring lions,
  cheetahs, giraffes, and other African wildlife, with a cheetah run,
  cooling stations for eye-level lion viewing, and an elevated walkway for
  giraffe interactions. It won Top Honor in Exhibit Design from the
  Association of Zoos & Aquariums.
