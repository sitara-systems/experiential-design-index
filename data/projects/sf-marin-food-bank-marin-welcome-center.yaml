summary: >
  The Marin Welcome Center, a public-facing exhibit and graphics program
  within the San Francisco-Marin Food Bank's relocated Marin distribution
  facility, opened April 2020 in San Rafael, California, designed by
  Skidmore, Owings & Merrill.
description: >
  Located within a nondescript business-park warehouse that restricted
  exterior branding, the welcome center uses large-scale graphics and
  exhibits inside the building to create a sense of place and build
  visitor understanding of and empathy for food insecurity. The project won
  a 2021 SEGD Global Design Award Merit Award in the Placemaking and
  Identity category.
