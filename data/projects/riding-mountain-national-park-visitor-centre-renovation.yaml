id: riding-mountain-national-park-visitor-centre-renovation
name: Riding Mountain National Park Visitor Centre Renovation
venue: riding-mountain-national-park-visitor-centre
project_type: major-renovation
year_completed: 2020
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: >
      Design-build lighting and audiovisual services for new digital and
      interactive exhibit displays, working with exhibit design firm W3
      Design Group, per Eos Lightmedia's own project page.
  - firm: eos-lightmedia
    role: av-integration
technologies:
  - digital interactive displays
summary: >
  Riding Mountain National Park's Visitor Centre in Onanole, Manitoba,
  Canada completed a $3.6 million federally funded renovation in 2020,
  adding new digital and interactive exhibits themed "Riding Mountain is
  Home," with exhibit design by W3 Design Group and lighting/AV
  design-build by Eos Lightmedia.
description: >
  New exhibits address the park's relationship to the Anishinabe
  (Anishinabe Homeland), forest and parkland ecosystems (Wilderness Home),
  park residents (Home Away from Home), generations of visitors (Historic
  Home), and Parks Canada's ecological stewardship (Good Housekeeping).
sources:
  - https://www.eoslightmedia.com/work/259
