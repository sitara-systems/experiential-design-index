summary: >
  Bird Song, a permanent sound-reactive installation in the eighth-floor
  atrium of The Nines hotel in Portland, Oregon, was completed in 2016;
  dotdotdash added more than 13,000 addressable LEDs, generative Pacific
  Northwest bird-call soundscapes, and control software to artist Melody
  Owen's eleven-strand glass sculpture.
