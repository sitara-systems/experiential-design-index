summary: >
  Synovus Park, a restored 100-year-old ballpark (originally Golden Park) in
  Columbus, Georgia, reopened in 2025 as the home of the Columbus Clingstones
  (Atlanta Braves Double-A affiliate), with a signage and wayfinding program
  designed by Populous alongside its architectural renovation.
description: >
  Populous restored the park's original brick facade and 1926-era arches at
  the Legacy Gateway entrance while adding premium seating, suites, and
  modern amenities. The signage and wayfinding system, led by Populous
  designer Nick Abele, drew on baseball ephemera (tickets, scoresheets) and
  a recurring pattern of three circles referencing baseball's numerology,
  fabricated by Identity Group and DCL.
