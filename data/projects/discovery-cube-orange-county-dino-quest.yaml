summary: >
  Dino Quest, the interactive dinosaur attraction at Discovery Cube Orange
  County in Santa Ana, California, reopened in May 2024 after a complete
  interactive reimagining by Beaudry Interactive, which replaced the
  original 2006 wand system with a bespoke Dino Tracker handheld device
  and four interactive games, with theming by Cinnabar and media by the
  science center's in-house studio.
