summary: >
  "Cost of Revolution: The Life and Death of an Irish Soldier," a
  temporary exhibition on Richard St. George, ran October 2019 through
  March 17, 2020 at the Museum of the American Revolution in
  Philadelphia, designed by Steve Feldman Design and fabricated by Art
  Guild.
description: >
  Custom archival casework with integral LED lighting, wall murals,
  graphic panels, reader rails, and flipbook interactive stations display
  St. George's own artwork and artifacts collected from multiple
  countries.
sources:
