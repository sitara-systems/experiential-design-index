summary: >
  A Century of Care, a centennial exhibit in the main lobby of Children's
  Medical Center Dallas (now Children's Health), opened in 2013, with
  architecture by WHR Architects and exhibit design by West Office
  Exhibition Design.
description: >
  The renovated lobby exhibit celebrates the hospital's 100-year history,
  from its 1913 founding as the Dallas Baby Camp to its present-day status
  as a major pediatric hospital and academic medical center. Informational
  displays are framed by graphics depicting the Dallas skyline and local
  natural environment. A permanent donor recognition wall is paired with an
  updatable video wall that animates donor names for annual contributors.
