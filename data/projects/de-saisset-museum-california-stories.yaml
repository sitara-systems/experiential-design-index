summary: >
  "California Stories from Thámien to Santa Clara," a permanent history
  exhibition at the de Saisset Museum at Santa Clara University, opened in
  January 2020; West Office Exhibition Design and Pacific Studio
  collaborated on exhibit design, with fabrication by Pacific Studio.
description: >
  A permanent exhibition on Ohlone heritage, the Mission era, Californio
  culture, and early Santa Clara College history, developed collaboratively
  with Ohlone community members, university faculty, and regional experts,
  and featuring murals and a reconstructed tule house and tule boat.
