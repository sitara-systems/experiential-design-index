id: hale-family-clinical-building-experiential-design
name: Hale Family Clinical Building Experiential Design
venue: boston-childrens-hospital-hale-family-building
project_type: new-building
year_completed: 2022
credits:
  - firm: arthouse-design
    role: graphics-wayfinding
    note: >
      Experiential graphic design program: 40-foot thematic walls with
      interactive, motion-sensor-driven automatons on multiple floors,
      designed as a screen-free, tech-light distraction for pediatric
      patients. No firm record yet.
technologies:
  - motion sensors
  - electromechanical automatons
summary: >
  An experiential graphic design program for the 11-story, 575,000-square-foot
  Hale Family Clinical Building at Boston Children's Hospital, opened 2022,
  features motion-sensor-triggered interactive automatons along themed
  patient-floor walls; designed by ArtHouse Design.
description: >
  Each of several public floors carries its own theme (Garden, Underwater,
  Harbor, City, Forest, Lake, Mountain, Space, Treetop), with 40-foot-long
  walls of multi-layer automatons under 8-foot arches that move via motion
  sensors and electric motors as patients and visitors pass by, intended to
  distract and entertain without screens.
