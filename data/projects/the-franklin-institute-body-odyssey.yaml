summary: >
  Body Odyssey, an 8,500-sq-ft permanent exhibition on the human body built
  around the Franklin Institute's Giant Heart, opened November 23, 2024 in
  Philadelphia, designed by MDSX with fabrication credited to Adirondack
  Studios.
description: >
  One named interactive within the exhibition uses motion-capture cameras
  to track visitors in real time in front of three large-format displays,
  processed via onsite computers so visitors see their own skeletal,
  circulatory, and muscular systems moving with them on screen; interactive
  development and hardware integration by Houdini Interactive.
