id: childrens-museum-at-saratoga-relocation
name: Children's Museum at Saratoga Relocation
venue: childrens-museum-at-saratoga
project_type: major-renovation
year_completed: 2022
credits:
  - firm: peter-hyde-design
    role: exhibit-design
summary: >
  The Children's Museum at Saratoga relocated into the historic Lincoln
  Bathhouse in Saratoga Spa State Park, Saratoga Springs, New York,
  reopening in a 16,000 sq ft space in July 2022; Peter Hyde Design led
  the new exhibit design and integration of exhibits carried over from the
  museum's previous, smaller location.
description: >
  The $3.1 million relocation, supported by private donors and a $600,000
  Empire State Development grant, expanded the museum from 8,000 to
  16,000 square feet, including a 4,000 sq ft interior courtyard, and
  brought the space into full ADA accessibility.
