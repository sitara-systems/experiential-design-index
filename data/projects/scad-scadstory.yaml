summary: >
  SCADstory, an immersive theatrical experience celebrating SCAD founder
  Paula Wallace at the Savannah College of Art and Design in Savannah,
  Georgia, opened in April 2019, created by BRC Imagination Arts.
description: >
  The experience guides visitors through vignettes spanning four decades of
  the institution's history, incorporating work from 25 SCAD degree
  programs. It won a CODAworx Top 100 Projects recognition (2021).
