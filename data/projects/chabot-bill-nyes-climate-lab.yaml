summary: >
  "Bill Nye's Climate Lab," a permanent and traveling exhibition on climate
  change at Chabot Space and Science Center in Oakland, California, developed
  with scientific advisor Bill Nye; exhibit design by Amaze Design, with
  fabrication by General Graphics and lighting design by Available Light.
description: >
  Visitors participate as "climate scouts" conducting experiments and
  meeting scientists, collecting an arsenal of climate-change solutions
  through floor exhibits and an online platform, concluding with real-world
  success stories in sustainable practices.
