summary: >
  The Santa Monica North Beach Trail Improvements, a redesign of a two-mile
  stretch of the coastal promenade in Santa Monica, California, opened in
  2021 with wayfinding and environmental graphics by SWA Group for the City
  of Santa Monica.
description: >
  SWA Group introduced "Metrics of Nature," a series of six large-format
  pavement graphics marking promenade crossings, each depicting a local
  species (snowy plover, Catalina mariposa lily, El Segundo blue butterfly,
  coast horned lizard, sea turtle, kelp) at up to 70 feet across, paired
  with trilingual (English, Spanish, Braille) informational signage. New
  wayfinding signs elsewhere on the trail direct visitors to destinations
  including the Santa Monica Pier, Annenberg Community Beach House, and
  Muscle Beach. This was named 1 of 4 honorees in Communication Arts' 62nd
  Design Annual (2021), Environmental Graphics category.
