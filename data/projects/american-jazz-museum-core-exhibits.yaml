summary: >
  The American Jazz Museum, a 10,000 sq ft interactive museum in Kansas
  City's Historic 18th & Vine Jazz District, opened September 5, 1997, with
  exhibit design by Joseph A. Wetzel Associates.
description: >
  The museum combines listening stations, touch-screen interactives, and
  custom mixing boards with jazz artifacts and commissioned artwork,
  including Charlie Parker's saxophone, Louis Armstrong's trumpet, and Ella
  Fitzgerald's gown. It also houses the Blue Room jazz club and the Jazz
  Discovery hands-on instrument area.
