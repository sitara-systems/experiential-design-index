summary: >
  Cherish Nebraska, a renovation of the fourth floor of Morrill Hall at the
  University of Nebraska State Museum in Lincoln, Nebraska, opened
  February 16, 2019; museum planning and exhibit design by Gallagher &
  Associates with Kenneth Hahn Architects, and media production by
  Northern Light Productions.
description: >
  Northern Light Productions produced a five-foot digital projection globe
  with three films on global warming (using data from NOAA and NASA), an
  eight-foot interactive "Parasite Table" touchscreen, and a total of 15
  linear films, 2 audio programs, and 5 interactives across the renovated
  floor.
