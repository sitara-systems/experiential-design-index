summary: >
  A 3,120-square-foot interpretive plan and exhibit fabrication for the
  Wildlife Center at Sinnemahoning State Park in Austin, Pennsylvania,
  completed in 2013 by Taylor Studios for the Pennsylvania Department of
  Conservation and Natural Resources.
description: >
  The installation spans the building's galleries, lobby, and classrooms
  with dioramas, lifelike animal models, interactive crawl-through tunnels,
  and a large topographic map educating visitors about regional wildlife
  and conservation.
