summary: >
  "GAME ON! Science, Sports & Play," a 17,000 sq ft exhibition at the
  California Science Center in Los Angeles, opened May 15, 2025; Luci
  Creative designed the exhibit, with media design and production by
  Cortina Productions, AV integration by Electrosonic, and fabrication by
  Ravenswood Studio.
description: >
  The exhibition features three Skills Labs (force, balance, motion) and
  more than 25 interactive experiences spanning baseball, softball,
  basketball, soccer, yoga, dance, board sports, climbing, and swimming,
  developed with input from Los Angeles-based professional athletes and in
  partnership with Nike's Sport Research Lab, LA84, and the Dodgers
  Foundation. Content is presented bilingually in English and Spanish.
