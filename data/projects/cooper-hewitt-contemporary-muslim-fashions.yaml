summary: >
  Contemporary Muslim Fashions, a 6,275-square-foot exhibition on modest
  fashion featuring more than 80 ensembles, opened at Cooper Hewitt,
  Smithsonian Design Museum in New York City in 2019, with exhibition
  architecture and visual identity by Isometric Studio; the exhibition was
  originally curated and presented at the de Young Museum in San Francisco.
description: >
  Isometric Studio designed translucent half-arches inspired by the Cordoba
  Mosque's floor plan to subdivide the gallery into intimate thematic
  spaces, with sweeping curvilinear platforms and minimalist custom labels.
