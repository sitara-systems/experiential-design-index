summary: >
  NHM Commons, a new $75 million public wing and welcome center at the
  Natural History Museum of Los Angeles County, opened in Exposition Park in
  Los Angeles, California in November 2024, designed by Frederick Fisher and
  Partners with interior visitor-experience design by Studio Joseph.
description: >
  The new wing introduces both ticketed and non-ticketed visitors to NHM,
  facing Exposition Park with a 400-seat Commons Theater, a cafe, and the
  Judith Perlstein Welcome Center. Studio Joseph's interior design frames the
  mounted fossil skeleton of "Gnatalie," a Diplodocus, against a wall of oak
  fins referencing geological strata, and incorporates Barbara Carrasco's
  mural "L.A. History: A Mexican Perspective." Studio-MLA served as landscape
  architect.
