summary: >
  The Colored Musicians Club Jazz Museum, an interactive museum built into
  the former union-office space on the ground floor of the Colored
  Musicians Club at 145 Broadway in Buffalo, New York, opened in fall 2012,
  designed and fabricated by Hadley Exhibits.
description: >
  The museum uses listening stations, instrument demonstrations, and a
  hands-on "music engineer" mixing station (arranging a piece such as "Over
  the Rainbow") to tell the history of the club, chartered in 1935 as the
  only continuously running, all-Black-owned music venue in the United
  States.
sources:
