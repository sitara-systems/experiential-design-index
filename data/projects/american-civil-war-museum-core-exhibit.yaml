summary: >
  The American Civil War Museum's 30,000 sq ft flagship building at Historic
  Tredegar in Richmond, VA, opened in 2019; architecture by 3North with
  exhibit design, interactive media, and fabrication by Solid Light.
description: >
  A 6,000 sq ft core exhibition built within the historic Tredegar Iron
  Works that reframes the Civil War through first-person narratives of
  soldiers, civilians, politicians, and African Americans, enslaved and
  free. Received the 2020 Excellence in Exhibition recognition from the
  American Alliance of Museums.
