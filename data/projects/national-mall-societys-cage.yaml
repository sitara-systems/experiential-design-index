summary: >
  Society's Cage, a public pavilion installation confronting systemic racism
  through cage-like structures inscribed with statistics and testimony,
  opened on the National Mall in Washington, DC in August 2020; it was
  self-initiated and designed by a team within SmithGroup's Washington, DC
  office, with fabrication by Gronning Design + Manufacturing and ABC
  Imaging.
