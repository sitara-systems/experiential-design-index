summary: >
  The Big Break Visitor Center at the Delta, opened by the East Bay Regional
  Park District in Oakley, California in October 2012, features living
  exhibits and scenic displays on the California Delta designed by West
  Office Exhibition Design.
description: >
  Located within a wetland adjacent to one of the most pristine areas of the
  California Delta, the visitor center's exhibits explore the ecologic,
  economic, and scenic importance of the Delta's wetlands and the
  environmental challenges facing the region.
