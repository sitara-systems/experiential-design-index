summary: >
  The Interactive Collection Viewer, a touch-table exhibit letting visitors
  browse more than 200 items from the Smithsonian National Museum of
  African Art's collection, opened in the museum's renovated entrance
  pavilion in Washington, D.C. in October 2019, designed and built by Ideum
  with the museum's curators.
description: >
  The exhibit runs on two custom Ideum Platform multitouch tables arranged
  into four exploration zones: three let visitors browse artworks by
  country of origin on an animated map of Africa, and a fourth provides
  historical, cultural, and geographical context for the continent.
sources:
