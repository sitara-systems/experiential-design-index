summary: >
  The New York City Landmarks Preservation Commission moved into new
  offices and public hearing space in the landmarked Home Life Building
  in 2025, with an environmental graphics program designed by C&G Partners
  for a renovation by MBB Architects.
description: >
  C&G Partners created an environmental graphics program built around a
  dot-pattern motif derived from the LPC's perforated approval stamp,
  including privacy film referencing historic windows, large-scale
  color-halftone murals of iconic New York City landmarks, room signage
  named for notable architectural styles, and a unified system for
  displaying the agency's landmark photography collection.
