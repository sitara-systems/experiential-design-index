summary: >
  Kerouac, On the Road, a 1,500 sq ft exhibition at Lowell National
  Historical Park marking the 50th anniversary of "On the Road" and
  featuring Jack Kerouac's original scroll manuscript, opened in 2007 with
  exhibit design by Proun Design and fabrication by WB Inc; it received the
  AASLH 2008 Award of Merit.
description: >
  The exhibit paired the scroll manuscript with listening stations,
  personal and family artifacts, interpretive graphics, and interactive
  elements chronicling Kerouac's Lowell origins, his road trips, and his
  influence on the Beat Generation, developed in curatorial collaboration
  with UMass Lowell.
