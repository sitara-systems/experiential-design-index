summary: >
  IlluminationSpace, an 800 sq ft interactive science exploration space at
  the Advanced Science Research Center of the CUNY Graduate Center in New
  York, opened December 2018; exhibit design by Liberty Science Center and
  Peter Hyde Design, architecture by Flad Architects, lighting design by
  Available Light, and fabrication by Chicago Scenic Studios.
description: >
  Features interactive motion and touchscreen games, an interactive
  projection wall, and researcher conversations across five interconnected
  science areas: nanoscience, photonics, structural biology, neuroscience,
  and environmental sciences.
