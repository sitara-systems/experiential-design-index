id: georgia-tech-crosland-tower-chandelier
name: Crosland Tower Library Reading Room Chandelier
venue: georgia-tech-crosland-tower
project_type: installation
year_completed: 2018
credits:
  - firm: eos-lightmedia
    role: lighting-design
    note: "Programmed the volumetric light shows across the chandelier's 324 individual pendants (each with six double-sided LED boards) and a custom daily schedule"
technologies:
  - LED
  - volumetric lighting
summary: >
  A 8 ft by 80 ft by 10 ft volumetric LED chandelier art piece in the
  Crosland Tower library reading room at the Georgia Institute of
  Technology in Atlanta, completed in 2018, conceived with public artist
  Derek Porter and lit and programmed by Eos Lightmedia.
description: >
  The chandelier connects the physical architecture of two library
  buildings and serves as a gathering hub for students and faculty; Eos
  Lightmedia programmed slow, mesmerizing volumetric light sequences that
  morph on a custom daily schedule, with an intent for the shows to
  eventually be replaced by student-driven data visualizations. Public
  artist Derek Porter conceived the piece (individual credit, not recorded
  as a firm per this index's firms-and-projects-only scope). Client of
  record on Eos's own project page is listed as "Lumid"; role unclear from
  public sources, not recorded as a credit.
sources:
  - https://www.eoslightmedia.com/work/115
