summary: >
  The American Outpost visitor experience at James B. Beam Distilling Co. in
  Clermont, Kentucky, reopened in 2022 after a multi-million-dollar campus
  renovation; creative direction and brand strategy were by LOVE, with
  architecture by Bergmeyer, lighting design by Hartranft Lighting Design, and
  environmental graphics by Geograph Industries.
description: >
  The renovation reimagined the distillery's 400-acre visitor campus,
  including the American Outpost check-in and interactive retail
  experience, a six-stage multi-sensory bourbon-making tour where guests
  fill their own barrels and bottles, the Fred B. Noe Distillery VIP
  experience, and The Kitchen Table restaurant and bourbon bar. Named an
  honoree of the Experience Design category in Fast Company's 2023
  Innovation by Design Awards; named the Retail Design Institute's 2022
  Store of the Year. OJB Landscape Architecture is also credited (landscape
  architecture) but has no corresponding role in the current vocabulary;
  omitted from credits per the no-new-vocab-value rule and logged as a gap.
