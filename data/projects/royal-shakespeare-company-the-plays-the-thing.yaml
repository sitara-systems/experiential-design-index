summary: >
  "The Play's the Thing," the Royal Shakespeare Company's first permanent
  exhibition, opened June 21, 2016 in the Swan Wing in
  Stratford-upon-Avon, England, designed by Kossmann.dejong with fit-out
  by The Hub Limited; Glowbox delivered the Kinect-driven "On Stage"
  interactive, which places visitors into staged Shakespeare scenes.
