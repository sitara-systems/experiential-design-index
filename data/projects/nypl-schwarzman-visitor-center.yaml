summary: >
  The New York Public Library opened its first-ever Visitor Center in the
  Stephen A. Schwarzman Building in New York on July 11, 2023, as part of a
  building-wide renovation by Mecanoo and Beyer Blinder Belle, with
  interpretive exhibition design and graphics by Pure+Applied offering
  visual, tactile, braille, trilingual, and aural visitor resources.
description: >
  The Visitor Center transformed former office and map-storage space and
  included a new 2,250-square-foot public plaza, an ADA-accessible entrance,
  and a new public stair and elevator.
