summary: >
  Little Island, a 2.4-acre public park and performance venue built on
  pilings over the Hudson River in Manhattan, opened May 21, 2021 with a
  signage and environmental graphics system designed by C&G Partners for
  Hudson River Park Trust, working alongside architect Heatherwick Studio
  and landscape architect Mathews Nielsen Landscape Architects.
description: >
  C&G Partners designed the complete signage, wayfinding, and graphic
  identity system for Little Island, including poster cabinets along the
  Hudson River esplanade, sandblasted granite entry markers, park maps,
  weathering-steel directional monuments, and food-truck wraps. The
  graphic system abstracts natural foliage forms and changes its color
  palette by season. Little Island overall was a 2022 Finalist, Fast
  Company Innovation by Design Awards, Urban Design category.
