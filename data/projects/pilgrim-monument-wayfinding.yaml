summary: >
  A new exterior wayfinding sign system for the Pilgrim Monument and
  Provincetown Museum in Provincetown, Massachusetts, designed by Arrowstreet
  to coordinate the museum's two entrances after the debut of its inclined
  elevator in 2022.
description: >
  The museum's Bradford Street Access Project added an inclined elevator
  connecting High Pole Hill to Provincetown's commercial district, opening in
  spring 2022. The new route required a revised wayfinding strategy to
  identify both entrances and direct visitors around the expanded site;
  Arrowstreet designed a new exterior sign system inspired by signage found
  in historic New England parks.
