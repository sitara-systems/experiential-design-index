summary: >
  Campaigns of Courage, the two-gallery Road to Berlin (European Theater)
  and Road to Tokyo (Pacific Theater) pavilion at The National WWII Museum
  in New Orleans, opened in phases on December 13, 2014 and December 12,
  2015; architecture by Voorsanger Mathes LLC, exhibit design by Gallagher
  & Associates, and interactive/media design by Unified Field.
description: >
  Visitors receive personalized dog tags to customize their visit and
  access saved video, photos, and artifacts online after the visit. The two
  galleries include more than 25 interactive programs, 560 archival videos,
  character narratives for 100 individuals, 13 animated maps, and 12
  three-dimensional cutaway models.
