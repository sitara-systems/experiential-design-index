summary: >
  Escaramuza, the Poetics of Home is a traveling exhibition of photography
  by Constance Jaeggi and poetry by Angelina Sáenz and ire'ne lara silva,
  exploring Mexican American women's escaramuza equestrian performance;
  it debuted at the National Cowgirl Museum and Hall of Fame in Fort Worth,
  Texas in 2024 with exhibition design by Span Studio, and later traveled to
  the Poetry Foundation in Chicago (2025) and a Navy Pier satellite show.
description: >
  Span, led by Nick Adam and Kevin Moreland, developed spatial composition
  and pattern-based framing devices inspired by escaramuza maneuvers (el
  giro, el abanico, la escalera) and the hand-embroidered traje de adelita,
  working with the Poetry Foundation's curatorial team.
