summary: >
  Grundfos: Water Justice, a visitor exhibition at Grundfos's Water Utility
  global headquarters in Brookshire, Texas, opened with the headquarters'
  grand opening in November 2022, designed by C&G Partners in collaboration
  with The Mx Group.
description: >
  The exhibition combines company history and engineering storytelling with
  exhibits on global water access, including "The Weight of Water," which lets
  visitors carry a 40-pound jug to simulate a 3.5-mile water-fetching journey;
  a floating spiral installation of Grundfos Alpha pumps; a living plant wall;
  and modular demo stations along a "little river" floor element.
