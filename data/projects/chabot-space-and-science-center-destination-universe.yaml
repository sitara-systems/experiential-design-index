summary: >
  Destination Universe, a permanent exhibition exploring the origins of the
  universe through both scientific and folkloric lenses, opened at Chabot
  Space & Science Center in Oakland, California in 2006, with exhibit design
  by West Office Exhibition Design and fabrication by Gizmo Art Production.
description: >
  The exhibition includes an "Origins Theater" examining the Big Bang from
  scientific and mythological perspectives, interactive stations on stellar
  properties and nebula formation, and immersive elements aimed at younger
  audiences including a "Black Hole Tunnel" and a "Universe Kaleidoscope."
