summary: >
  "Head to Toe: Hat and Shoe Fashions from Historic New England," an
  exhibition of New England hat and shoe fashion from the 1750s to the
  1980s at the Eustis Estate in Milton, Massachusetts, opened June 1, 2018,
  with exhibit design by Proun Design and fabrication by Mystic Scenic
  Studios; part of the Mass Fashion consortium series.
description: >
  Arranged thematically, the exhibition explores body image, gender
  identity, cultural appropriation, and activism through Historic New
  England's hat and shoe collection.
