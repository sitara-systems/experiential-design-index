summary: >
  Driving America, a permanent automotive exhibition at The Henry Ford
  Museum of American Innovation in Dearborn, Michigan, opened to the public
  January 29, 2012, exhibit design by West Office Exhibition Design.
description: >
  The exhibition explores how attitudes toward personal mobility have
  evolved and examines the automobile's transformation from a workshop
  invention into a cultural force reshaping American society, addressing
  both its positive and negative effects. It received the Dibner Award for
  Excellence in Museum Exhibits.
