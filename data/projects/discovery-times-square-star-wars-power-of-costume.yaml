summary: >
  Star Wars and the Power of Costume, a Smithsonian Institution Traveling
  Exhibition Service production featuring more than 70 original costumes from
  the Star Wars films, ran at Discovery Times Square in New York City from
  November 14, 2015 to September 5, 2016, presented there with venue-specific
  scenography, lighting, and sound design by C&G Partners.
description: >
  The exhibition was organized by the Smithsonian Institution Traveling
  Exhibition Service (SITES) in partnership with Lucasfilm Ltd. and the Lucas
  Museum of Narrative Art; C&G Partners was engaged by producer Running Subway
  to design the New York presentation's scenography, lighting, and soundtrack
  moments, and to develop a custom visual treatment emphasizing costume's role
  in Star Wars storytelling.
