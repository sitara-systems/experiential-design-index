summary: >
  "You – The Inside Story," a 12,000-square-foot exhibit on human body
  science, opened December 2021 at the Maryland Science Center in
  Baltimore, designed by Metcalfe Architecture & Design and fabricated by
  Art Guild, presented by Johns Hopkins Medicine.
description: >
  Hands-on digital, electro-mechanical, and mechanical interactives
  explore human anatomy and physiology, including a bed-of-nails
  demonstration and an Operation-style parasite-removal game.
