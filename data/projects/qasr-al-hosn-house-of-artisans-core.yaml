summary: >
  House of Artisans, a permanent exhibition on Emirati craft culture,
  opened 2021 at the historic Qasr Al Hosn fort in Abu Dhabi, with media
  design by Tellart and spatial/graphic design by Kossmanndejong.
description: >
  The exhibition presents artifacts, interactive media, and live artisan
  demonstrations inside Abu Dhabi's oldest stone building; inaugurated by
  Sheikh Khaled bin Mohamed bin Zayed Al Nahyan.
