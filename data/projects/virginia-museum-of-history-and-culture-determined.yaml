summary: >
  "Determined: The 400-Year Struggle for Black Equality," a temporary
  exhibition commemorating the 400th anniversary of the first enslaved
  Africans' arrival in British North America, opened June 22, 2019 at the
  Virginia Museum of History & Culture in Richmond, Virginia, with exhibit
  and graphic design by HealyKohler Design; the exhibition subsequently
  toured as a traveling exhibition to other venues.
description: >
  The exhibition guides visitors through historical periods from the
  colonial era to the present using interactive AV media, interpretive
  graphics, hands-on activities, artifact collections, and individual
  profiles of people who fought for freedom, equal justice, and access to
  opportunity, closing with prompts inviting visitor reflection.
