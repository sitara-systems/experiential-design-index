summary: >
  A lighting-system-only conservation-driven relighting of the Rotunda
  for the Charters of Freedom at the National Archives Museum in
  Washington, DC — the room housing the Declaration of Independence,
  Constitution, and Bill of Rights — completed by 2014, designed by
  Available Light. Distinct from "Public Vaults" (2004) and "The American
  Story" (2025) already recorded at this venue.
