summary: >
  "Arabesque," an exhibition by artist Rayyane Tabet at Storefront for Art
  and Architecture in New York, ran January 23–April 18, 2020, with graphic
  identity and a 93-foot facade supergraphic by Morcos Key; it was a finalist
  in the Communication Arts 2020 Design Competition, Environmental Graphics
  category.
description: >
  The exhibition examined a speculative meeting between an American architect
  and a French historian over a century after their overlap at the École des
  Beaux-Arts, exploring decoration and ornamentation in the built
  environment. Morcos Key's contribution covered the graphic identity,
  promotional material, and the gallery's opaque gray facade displaying an
  Arabic transliteration of "arabesque" in vinyl.
