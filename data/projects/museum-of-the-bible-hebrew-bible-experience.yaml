id: museum-of-the-bible-hebrew-bible-experience
name: "Floor 3: Stories of the Bible — The Hebrew Bible Experience"
venue: museum-of-the-bible
project_type: new-exhibition
year_completed: 2017
credits:
  - firm: brc-imagination-arts
    role: exhibit-design
    note: >
      Concept development, design detail, production, immersive media
      production, fabrication, installation, and technical systems for the
      Hebrew Bible Experience, per BRC's own project page; no firm record
      yet (below the 3-project threshold).
technologies:
  - theatrical rooms
  - immersive media
  - surround sound
  - theatrical lighting
summary: >
  The Hebrew Bible Experience, a 15-scene immersive walkthrough on Floor 3
  of the Museum of the Bible in Washington, DC, opened with the museum on
  November 17, 2017, designed and produced by BRC Imagination Arts; it
  received a 2020 Thea Award for Outstanding Achievement in the Museum
  Exhibit category.
description: >
  Part of the museum's Floor 3 "Stories of the Bible" experience, distinct
  from the Floor 2 "Impact of the Bible" exhibits already recorded under
  Museum of the Bible Core Exhibits. Guests move through a series of
  theatrical rooms and multimedia environments depicting narratives from
  the Hebrew Bible, developed with a team of international scholars and
  rabbis.
