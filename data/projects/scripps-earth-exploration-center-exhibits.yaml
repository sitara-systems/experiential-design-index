summary: >
  The Scripps Earth Exploration Center (SEEC), an 87,500-square-foot
  expansion of an oceanography visitor facility into a full Earth systems
  science center at Scripps Institution of Oceanography in La Jolla, CA,
  opened in 2013, designed by Thinc Design.
description: >
  The exhibits use dynamic categories of investigation drawn from current
  research to highlight connections between Earth systems and their impact
  on people and society, moving away from traditional discipline-based
  organization.
