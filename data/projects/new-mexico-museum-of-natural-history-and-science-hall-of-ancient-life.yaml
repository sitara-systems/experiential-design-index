summary: >
  The Hall of Ancient Life, a permanent exhibition opened February 15, 2025,
  at the New Mexico Museum of Natural History & Science in Albuquerque, New
  Mexico, features two digital interactives designed and built by Ideum.
description: >
  Exploring Earth uses a 3D rotatable globe on a 55" touchscreen to show
  continental positions across 600 million years, with a New Mexico-focused
  mode covering the Paleozoic era. Postcards from the Paleozoic lets
  visitors create a personalized digital postcard set in one of five
  Paleozoic New Mexico environments, combining a camera-captured photo with
  species stickers and filters, downloadable via QR code.
