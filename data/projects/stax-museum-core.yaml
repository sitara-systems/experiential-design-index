summary: >
  The Stax Museum of American Soul Music, a 17,000 sq ft museum built as a
  replica of the original Stax Records recording studio in Memphis,
  Tennessee, opened May 2, 2003, with acoustic and audio-visual design by
  SH Acoustics.
description: >
  A replica of the original Stax recording studio (formerly the Capitol
  Theatre), including the sloped floor of Studio A, exhibiting artifacts,
  photos, and interactive media on the history of Stax Records and soul
  music.
