summary: >
  A 327-foot motion-activated digital canvas in the lobby of 44 Montgomery
  Street in San Francisco, designed by ESI Design for building owner Beacon
  Capital Partners, opened in 2020.
description: >
  Five motion sensors track visitors moving through the lobby; the digital
  display becomes more colorful and active as more people occupy the space,
  with a backdrop of vertical bands echoing the tower's exterior metal
  patterns. The installation won a 2020 SCN "Installs of the Year" honor and
  a Good Design Award in the Installation category.
