summary: >
  This Is New York: 100 Years of the City in Art and Pop Culture, a
  centennial exhibition at the Museum of the City of New York exploring the
  city's legacy in art and pop culture, opened May 26, 2023, with
  architectural design by Studio Joseph, interactive media design by Dome,
  and fabrication by Southside Design + Build.
description: >
  MCNY's own credit list for the exhibition also names Williams Brothers
  (gallery preparation and painting), several reproduction/graphics-printing
  vendors (Creative Graphic Services, Digital Data Depot, Full Point
  Graphics, Laumont Photographics, Tony Vaccaro Studio), type foundry Dinamo
  GmbH (exhibition font, non-US), and JT Robinette (art and artifacts
  collections management, an individual) — omitted from credits above as
  print/production vendors and an individual collections manager rather than
  design/production firms under the roles vocabulary, per research
  methodology's target-firm criteria.
sources:
