summary: >
  Brooklyn Botanic Garden debuted "Signs of Nature," a comprehensive
  orientation, directional wayfinding, and mapping system designed by C&G
  Partners, publicized in 2022.
description: >
  C&G Partners designed a system of polished porcelain-enamel-faced signs
  set within weathered bronze armatures, evoking the Garden's late
  19th-century fixtures, replacing disparate signage that had accumulated
  without unified design direction across the Garden's grounds.
