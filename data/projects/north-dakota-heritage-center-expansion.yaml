summary: >
  A $52 million expansion of the North Dakota Heritage Center & State Museum
  in Bismarck opened November 2, 2014, timed to the state's 125th
  anniversary; architecture by HGA and Lightowler Johnson Associates, with
  new permanent galleries developed by the Great Plains Exhibit Development
  joint venture of Lord Cultural Resources, Taylor Studios, and Xibitz.
description: >
  The expansion added four new permanent galleries (Innovation, Adaptation,
  Early Peoples, and the Governors Gallery) plus a new grand entrance,
  auditorium, and collections storage to the existing State Historical
  Society of North Dakota museum building.
