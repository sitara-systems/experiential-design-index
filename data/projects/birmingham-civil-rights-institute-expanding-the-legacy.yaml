summary: >
  "Expanding the Legacy," a refurbishment and new exhibit at the Birmingham
  Civil Rights Institute in Birmingham, Alabama; exhibit design by Amaze
  Design, with fabrication by Southern Custom Exhibits, lighting design by
  Available Light, media design by Northern Light Productions, and graphic
  design by Proun.
description: >
  The project refurbished portions of the original museum, which opened in
  1992 and received the 2007 National Award for Museum Services, and added a
  new exhibit aimed at making the civil rights movement relevant to young
  visitors today.
