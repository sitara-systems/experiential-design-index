summary: >
  Americans, a permanent exhibition examining the ubiquity of American
  Indian imagery in U.S. popular culture, opened January 2018 at the
  National Museum of the American Indian in Washington, DC, designed by
  Studio Joseph.
description: >
  The 9,200-square-foot exhibition spans six interconnected galleries
  addressing historical episodes — including Pocahontas, the Battle of
  Little Bighorn, Thanksgiving, and the Trail of Tears — through nearly 300
  objects, props, and images alongside 67 film and TV clips. Studio Joseph
  led exhibition design and architecture; Bluecadet designed the media for
  the exhibition's interactive decoder component. The exhibition received a
  2021 SEGD Global Design Award Merit Award in the Exhibition category.
