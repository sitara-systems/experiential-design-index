summary: >
  A renovation of the museum exhibits at Plains High School, the visitor
  center for what is now Jimmy Carter National Historical Park in Plains,
  Georgia, opened on Presidents' Day 2020; exhibit planning and content
  development by History Associates Incorporated with HealyKohler Design,
  and media by Northern Light Productions.
description: >
  Northern Light Productions created eight media programs for the
  refurbished visitor center, including linear films, a fully accessible
  touchscreen interactive, and soundscapes incorporating archival footage
  and interviews with local residents about the Carters' connection to
  Plains and their humanitarian work.
