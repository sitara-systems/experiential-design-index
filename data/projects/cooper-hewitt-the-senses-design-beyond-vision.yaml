summary: >
  The Senses: Design Beyond Vision, a 10,000-square-foot temporary exhibition
  inviting multi-sensory engagement with design objects, opened at the
  Cooper Hewitt, Smithsonian Design Museum in New York in April 2018,
  exhibition design by Studio Joseph; it received a 2020 SEGD Global Design
  Award Merit Award in the Exhibition category.
