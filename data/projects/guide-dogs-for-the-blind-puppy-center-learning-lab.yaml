summary: >
  The Puppy Center Learning Lab, an educational visitor space at Guide Dogs
  for the Blind's national headquarters in San Rafael, California, opened
  in 2020 as part of the organization's $23 million Puppy Center; Dreyfuss
  + Blackford designed the building, with exhibit design by West Office
  Exhibition Design and fabrication by Cinnabar.
description: >
  A visitor-facing education space offering a window into how Guide Dogs for
  the Blind breeds, socializes, raises, and trains guide dogs, including
  viewing windows into the puppy socialization area and a "real life"
  home-like environment room. Accessibility features include high-contrast
  graphics with audio descriptions, braille signage, and AV captioning, and
  touch models depict puppies at various developmental stages.
