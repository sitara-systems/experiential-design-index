summary: >
  The Cash Family Ranch Life Learning Center, a new building at the
  National Ranching Heritage Center on the Texas Tech University campus in
  Lubbock, opened October 12, 2023, with media programs by Northern Light
  Productions.
description: >
  Northern Light Productions created four media programs for the center:
  an orientation theater featuring an animated book with a hologram
  introduction, a 240-degree immersive film shot with 360-degree cameras
  at three Texas panhandle ranches, an animated bird's-eye-view projection
  on a 3D ranch model, and a projected cowboy character in a horse barn
  setting.
