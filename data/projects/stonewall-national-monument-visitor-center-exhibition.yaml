summary: >
  The Stonewall National Monument Visitor Center, a 3,700-sq-ft renovation of
  51 Christopher Street in New York City — part of the original Stonewall Inn
  complex — opened June 28, 2024 as the first LGBTQ+ visitor center in the
  National Park Service; architecture by EDG Architecture and Engineering,
  exhibition design by Local Projects, lighting design by Orsman Design, and
  AV consulting by HMBA.
