summary: >
  Connection Stations, five interactive installations distributed through
  the Royal Ontario Museum in Toronto, Ontario, opened March 7, 2025;
  interpretive planning and content development by Lord Cultural Resources,
  with exhibit design by kubik maltbie and multimedia production by NGX.
description: >
  Two of the five stations feature a multimedia gamified experience;
  visitors reflect on museum objects to build understanding of how others
  may experience the world, in service of cultivating social cohesion and
  recognizing bias.
