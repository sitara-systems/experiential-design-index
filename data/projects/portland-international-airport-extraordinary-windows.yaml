summary: >
  Extraordinary Windows, a permanent real-time generative media
  installation of twin 123-foot-wide LED walls above the security
  checkpoints of Portland International Airport's new main terminal in
  Portland, Oregon, opened with the terminal on August 14, 2024; created
  by dotdotdash with Half Sister Studio, its six Pacific Northwest
  landscape scenes run in Unreal Engine and respond to live weather,
  astronomical, and passenger-traffic data, within ZGF Architects' mass
  timber terminal.
