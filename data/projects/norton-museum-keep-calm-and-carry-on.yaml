summary: >
  "Keep Calm and Carry On: World War II and the British Home Front,
  1938-1951" opened November 1, 2012 at the Norton Museum of Art in West
  Palm Beach, Florida, curated by Donald Albrecht, with exhibition design by
  Pure+Applied.
description: >
  The exhibition explored Britain's wartime home-front mobilization through
  three sections -- fashion and beauty, shelter and protection, and
  propaganda and entertainment -- using drawings, posters, photographs,
  film, furniture, and fashion.
