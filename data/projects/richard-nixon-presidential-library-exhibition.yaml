summary: >
  A 12,000 sq ft core exhibition at the Richard Nixon Presidential Library
  and Museum in Yorba Linda, California, covering Nixon's presidential
  campaigns, the Vietnam War, and Watergate, opened in 2016, designed and
  produced by TAIT (via its Thinkwell Group studio) and featuring a
  reproduction of the Oval Office and large interactive touchscreens.
