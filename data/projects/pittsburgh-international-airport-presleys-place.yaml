summary: >
  Presley's Place, a 1,500 sq ft inclusive sensory suite for travelers with
  autism and sensory-processing differences, opened at Pittsburgh
  International Airport in July 2019; Hayes Design Group Architects
  designed the suite, and Children's Museum of Pittsburgh Design &
  Consulting designed and fabricated its sensory airplane-cabin experience
  with XYZ Custom, Inc.
description: >
  The suite includes a family room, three individual rooms, and a quiet
  room, plus a recreated airplane-cabin room built from donated American
  Airlines seats, overhead bins, and window wall panels, with a custom-built
  jet bridge and cabin divider and large-scale photographic wallpaper
  completing the illusion. Won AIA Pittsburgh's 2019 People's Choice Award;
  named a finalist in Accessible Design and an honoree in Experience Design
  in Fast Company's 2023 Innovation by Design Awards.
