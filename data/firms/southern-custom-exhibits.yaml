status_basis: >
  Credited as exhibit fabricator on the Boone Pickens Legacy Experience at
  Oklahoma State University, which opened to the public June 2025; live
  company website and LinkedIn presence maintained as of this check. A
  federal contract for exhibit fabrication at Chaco Culture National
  Historical Park (per USASpending.gov) began July 8, 2026, the most
  current activity signal found. A broader USASpending.gov review found
  over 50 Department of the Interior (NPS/FWS) awards to this firm
  spanning 2006-2026, most naming a specific park/site — this firm is
  essentially a recurring NPS exhibit-fabrication contractor with a much
  larger federal visitor-center portfolio than its own gallery page
  shows; most of that backlog remains unscreened (only a handful of
  well-corroborated, dated projects have been added to the corpus so
  far) and is logged for a future dedicated pass.
status_verified: 2026-07-19
summary: >
  Southern Custom Exhibits is an Anniston, Alabama-based, family-run exhibit
  fabrication and design-build firm operating since the mid-1990s, building
  interpretive exhibits for museums, national park visitor centers, and
  university and corporate facilities.
