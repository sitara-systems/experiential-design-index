status_basis: >
  Founder/principal Christopher Douglas Chadbourne died February 13, 2020
  (obituary: legacy.com/us/obituaries/nytimes/name/christopher-chadbourne-obituary?id=31938863;
  corroborated by michaeljfox.org/bio/christopher-chadbourne, which also
  states he "gradually left his firm" after a 2008 Parkinson's diagnosis).
  No public evidence of firm activity after the National Museum of the
  United States Army opening (Nov 2020, reflecting pre-death design work) —
  6 years with no confirmable new projects, press, hiring, or portfolio
  updates, exceeding the 5+-year-dormant threshold independent of the
  founder's death. No successor entity found.
status_verified: 2026-07-19
summary: >
  Christopher Chadbourne & Associates (CCA) is a Boston-based exhibit design
  firm working with museums, aquariums, zoos, visitor centers, and heritage
  attractions, known for combining artifacts, interactivity, and immersive
  environments in historical exhibitions.
