status_basis: >
  Continuous slate of newly completed and announced North American work,
  including the National Geographic Museum of Exploration's opening
  exhibits (Washington, DC, June 2026), Edge at Hudson Yards' immersive
  redesign (New York, 2026), the Milken Center for Advancing the American
  Dream's Kenneth C. Griffin Holodeck (Washington, DC, 2025), and Science
  World Vancouver's Animation Adventure with Molly of Denali (2025); firm
  states it has created 550+ projects worldwide since founding.
status_verified: 2026-07-18
summary: >
  Moment Factory is a Montréal-headquartered multimedia studio founded in
  2001 by Dominic Audet and Sakchin Bessette, designing and producing
  large-scale immersive and interactive experiences — projection mapping,
  architectural lighting, interactive media, and its proprietary X-Agora
  experience-runtime platform — for museums, cultural institutions, visitor
  attractions, and public spaces across North America and internationally.
