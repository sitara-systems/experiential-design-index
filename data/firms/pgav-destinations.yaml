status_basis: >
  Guardians of the Galaxy: Cosmic Rewind (EPCOT, opened 2022) and SeaWorld
  Yas Island Abu Dhabi (opened 2023) both won industry design awards listed
  on the firm's own awards page; active, regularly updated project portfolio
  at pgavdestinations.com/our-work/ as of the verification date.
status_verified: 2026-07-18
summary: >
  PGAV Destinations is the destination-attraction design practice of PGAV
  (Peckham Guyton Albers & Viets), a St. Louis, Missouri-based architecture
  and planning firm founded in 1965. PGAV Destinations provides master
  planning, architecture, and exhibit/experience design for zoos, aquariums,
  museums, theme parks, and brand-based destinations worldwide, with a
  second studio in Orlando, Florida.
