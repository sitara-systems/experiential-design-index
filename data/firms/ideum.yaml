status_basis: >
  Volcano Discovery Center at Valles Caldera National Preserve opened July
  2025; Dueling Dinosaurs experience at the North Carolina Museum of Natural
  Sciences and Voices from the Front at the National WWII Museum both opened
  in 2024; company marked its 25th anniversary in 2025 with continued
  product launches (+PLUS touch table series, TouchStory Reader Rail
  Builder).
status_verified: 2026-07-18
summary: >
  Ideum is a Corrales, New Mexico-based exhibit design and production firm
  founded in 1999 by Jim Spadaccini, building custom multitouch hardware,
  interactive software, and fabricated exhibits for museums, science
  centers, visitor centers, and cultural institutions. It relocated from
  Sausalito, California to New Mexico in 2005 and operates an in-house
  exhibit fabrication studio in Corrales opened in 2018.
