summary: >
  Holman Exhibits is a Toronto, Ontario-based exhibit fabrication company
  founded in 1964 by Peter Holman, specializing in the design, fabrication,
  and installation of museum, retail, and trade-show exhibits from a
  40,000-square-foot production facility.
