status_basis: >
  REVERSAL of the 2026-07-18 "active" determination, based on new evidence:
  museums.groupdelphi.com (the site that determination cited as evidence of
  activity) is now dead (NXDOMAIN); the legacy groupdelphi.com domain
  301-redirects to an unrelated third-party site, the signature of a lapsed
  domain; the Wayback Machine has no real content capture since January
  2022; an Indeed company-page review dated 2026-01-28 states "they're not
  there anymore they closed"; and no confirmable completed project was
  found after 2019 (Toyota Experience Center Plano). LinkedIn's company
  page still reads as active but is self-maintained and weighted below the
  above. Recommend an independent CA Secretary of State entity check
  before treating this as fully final, but public evidence clears the
  inactive bar. Operated 1989-2009 as Delphi Productions before merging
  with Icon Exhibits.
status_verified: 2026-07-19
summary: >
  Group Delphi (Delphi Productions until 2009) was a museum exhibit
  fabrication, AV integration, and media-production company based in
  Alameda, California, producing custom casework, interactives, and
  exhibit components for science centers and museums.
