summary: >
  dotdotdash is an experience innovation studio founded in Portland,
  Oregon in 2015, building real-time interactive media systems — Unreal
  Engine environments, LED installations, custom content-management
  systems, and data-driven generative content — alongside a larger body
  of brand campaign and digital product work. It was acquired by
  TBWA\Worldwide (Omnicom) in 2022 and operates as its own brand.
_comments: >
  Role calibration note for editorial review: most of the firm's output
  is brand campaigns and digital products (out of scope); its in-scope
  identity rests on permanent installations where clients engaged it
  directly for the interactive media layer (Port of Portland). Current
  site lists Los Angeles first among hubs with only LA/Amsterdam street
  addresses — HQ recorded as Portland per the 2022 acquisition release;
  operating center of gravity may be shifting to LA.
