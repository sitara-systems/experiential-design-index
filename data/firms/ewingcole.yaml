summary: >
  EwingCole is a Philadelphia-headquartered integrated architecture,
  engineering, interior design, and planning firm founded in 1961 (originally
  as Alexander Ewing & Associates), with additional offices in Charlotte,
  Irvine, New York, Pittsburgh, and Raleigh. The firm works across civic,
  cultural, education, health, and sports & entertainment sectors and has
  served as architect of record on multiple Smithsonian exhibition projects
  and the Highmark Mann Center renovation.
