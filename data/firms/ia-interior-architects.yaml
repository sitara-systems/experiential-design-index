summary: >
  IA Interior Architects is a San Francisco-based global interior
  architecture firm founded in 1984, with offices across the US and in
  London and Toronto. Its work is overwhelmingly corporate workplace
  interiors, with occasional experiential design and branded-environment
  work for corporate clients and, less often, public civic and cultural
  facilities.
