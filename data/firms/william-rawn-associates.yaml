status_basis: >
  Lead architect for the Boston Public Library Central Library renovation
  that included the Children's Library and Teen Central (2015) and the
  East Boston Branch Library (2013). Firm's own site lists 2024–2025
  awards (CNU Charter Award, USITT Architecture Award, Chicago Athenaeum
  American Architecture Award) and ongoing conference presentations,
  confirming current activity.
status_verified: 2026-07-19
summary: >
  William Rawn Associates is a Boston-based architecture firm founded in
  1983 by William L. Rawn III, known for performing-arts, higher-education,
  and public-realm buildings — including Tanglewood's Seiji Ozawa Hall —
  and for civic and library work such as the Boston Public Library's
  Central Library renovation.
