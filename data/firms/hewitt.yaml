summary: >
  Hewitt is a Seattle, Washington-based architecture firm founded in 1975
  by David Hewitt (originally as Hewitt Daly Architects), whose landscape
  architecture studio — established in 1988 as in-house support for the
  firm's housing, civic, and transit work — now collaborates broadly with
  outside architecture firms on site design across the Pacific Northwest.
