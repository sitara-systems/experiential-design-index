status_basis: >
  Joan Semmel: In the Flesh opened at The Jewish Museum (December 2025);
  Robert Rauschenberg's New York opened at the Museum of the City of New
  York (September 2025); signage and environmental graphics for the National
  Black Theatre's new building in progress, expected 2026.
status_verified: 2026-07-18
summary: >
  Isometric Studio is a Brooklyn-based design studio combining graphic
  design and architecture, founded in 2013 by Andy Chen and Waqas Jawaid.
  It works primarily with museums, cultural institutions, and universities
  on exhibition architecture, visual identity, and environmental graphics
  and wayfinding.
