summary: >
  Split Rock Studios is a Minneapolis, Minnesota-based, 100%
  employee-owned exhibit design and fabrication studio founded in 2000
  (via the acquisition of Deaton Museum Services, tracing the firm's
  roots to 1959), producing exhibit design, wood and metal fabrication,
  graphic design, and interactive media for museums, nature centers,
  and visitor centers nationwide.
