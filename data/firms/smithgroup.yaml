status_basis: >
  Ranked the largest museum and gallery architecture firm in the US for 2023
  (smithgroup.com); recently completed and ongoing museum projects include
  the Lillian and Albert Small Capital Jewish Museum (Washington, DC,
  opened 2023), the Baltimore Museum of Art's "The Culture: Hip Hop and
  Contemporary Art in the 21st Century" (2023, exhibition design credit),
  the Wisconsin History Center (design unveiled 2023, under construction),
  and a VMFA expansion (selected 2023, per blooloop); active news page
  through 2026.
status_verified: 2026-07-18
summary: >
  SmithGroup is a Detroit-based, employee-owned architecture, engineering,
  and planning firm founded in 1853 (as Sheldon Smith's practice; renamed
  SmithGroupJJR 2011-2018 after merging with landscape-architecture firm
  Johnson, Johnson & Roy, then simplified back to SmithGroup). Its Cultural
  market practice provides architecture, interior design, and exhibit
  design for museums and cultural institutions nationally.
