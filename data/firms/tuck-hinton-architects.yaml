status_basis: >
  Credited on three Nashville/Middle Tennessee visitor-experience projects
  spanning 2001-2016 (Country Music Hall of Fame and Museum; Jack Daniel's
  Distillery's White Rabbit Bottle Shop and Barrel House 1-14); firm listing
  and studio page remain live under new/younger ownership after founding
  principal Kem Hinton departed to form Kem Hinton Design in 2019, with
  current business listings (Yelp) showing activity as recently as June 2026.
status_verified: 2026-07-19
summary: >
  Tuck-Hinton Architects is a Nashville, Tennessee architecture firm founded
  in 1984 by Seab Tuck and Kem Hinton, known for civic, cultural, and museum
  buildings in Middle Tennessee including the Country Music Hall of Fame and
  Museum and Adventure Science Center; the firm continues to operate under
  its original name and city.
