status_basis: >
  Architecture credit across The National WWII Museum's Road to Victory
  campus master plan (phases through the 2023 Liberation Pavilion) and the
  2014-2015 Campaigns of Courage pavilion; firm's own site lists current
  work including the Museum of the Vietnam War & Archive at Texas Tech
  University as of verification date.
status_verified: 2026-07-19
summary: >
  Voorsanger Architects is a New York City architecture firm founded in
  1978 by Bartholomew Voorsanger (originally as Voorsanger & Mills
  Associates, reorganized as Voorsanger Architects PC in 1990), known for
  cultural and institutional work including The National WWII Museum's
  campus master plan and pavilions in New Orleans.
