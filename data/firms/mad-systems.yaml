status_basis: >
  Delivered AV integration for Fantasy: Realms of Imagination at the Bowers
  Museum (opened October 26, 2024) and for Dimensions in Testimony
  installations at the El Paso Holocaust Museum (opened October 5, 2024) and
  the Virginia Holocaust Museum (opened November 2024); company website and
  press coverage updated through 2026.
status_verified: 2026-07-18
summary: >
  MAD Systems is an Orange, California-based audiovisual systems integrator
  founded in 1998 by Maris Ensing. The firm designs, engineers, and installs
  AV infrastructure for museums, visitor centers, brand experiences, and
  themed attractions, known for its non-proprietary QuickSilver AV platform
  and its "AV++" architecture-first approach to long-lifecycle venue
  technology.
