status_basis: >
  Executive architect on the Princeton University Art Museum (opened October
  31, 2025) and design collaborator on the Studio Museum in Harlem (opened
  November 15, 2025); acquired by Corgan on November 3, 2025, but continues
  operating under the Cooper Robertson name and out of its New York office
  (cooperrobertson.com now redirects to a branded Corgan landing page,
  "Trusted Design, Expanded Reach"), with new work announced under its name
  into 2026 (Charlotte's New River District master plan).
status_verified: 2026-07-19
summary: >
  Cooper Robertson is a New York architecture and urban design firm founded
  in 1979 by Alex Cooper and Jaquelin Robertson, known for cultural,
  educational, and master-planning work; acquired by Corgan in November 2025
  but continuing to operate under its own name from its New York office as a
  Corgan studio.
