status_basis: >
  Continuous string of completed US cultural and civic buildings since its
  first US project (Wolfe Center for the Arts, Bowling Green State
  University, 2012): most recently the Theodore Roosevelt Presidential
  Library (Medora, ND, opened July 4, 2026) and the Dartmouth Hopkins Center
  for the Arts expansion (Hanover, NH, reopened October 2025); its Brooklyn,
  NY studio (established 2004 in Manhattan, relocated to DUMBO, Brooklyn in
  2025) employs roughly 70 of the firm's ~250 staff.
status_verified: 2026-07-18
summary: >
  Snøhetta is an architecture, landscape architecture, and interior design
  firm founded in Oslo, Norway in 1989. Its global headquarters remains in
  Oslo, but the firm has maintained a US studio in New York since 2004 (now
  based in Brooklyn) that has independently led a continuous body of US
  museum, library, and cultural-institution work for over a decade, credited
  in this index for architecture and landscape architecture on US cultural
  and civic buildings — including the SFMOMA expansion, the National
  September 11 Memorial Museum Pavilion, and the Theodore Roosevelt
  Presidential Library.
