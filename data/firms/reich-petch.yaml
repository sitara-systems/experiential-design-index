  Reich+Petch (also operating as R&P Design; formerly Reich & Petch Design
  International) is a multidisciplinary architecture and exhibit-design
  firm founded in 1987 by Tony Reich and Whit Petch, headquartered in
  Toronto, Ontario with a New York, New York office, working with museums,
  cultural institutions, and attractions across North America and
  internationally.
