status_basis: >
  Architecture credit on the 2025 Rock Chalk Renaissance renovation of David
  Booth Kansas Memorial Stadium and the 2021-opened Lower.com Field, plus the
  2019 Tulsa AERO bus rapid transit stations; a top-tier US infrastructure and
  architecture firm with 2022 architecture-division revenue of $693M, second
  highest of any US architecture firm.
status_verified: 2026-07-19
summary: >
  HNTB Corporation is an employee-owned infrastructure design firm
  headquartered in Kansas City, Missouri, founded in 1914 (as Howard, Needles,
  Tammen & Bergendoff, renamed HNTB in 1993). Its architecture practice
  designs sports and transportation venues nationally, including stadium
  architecture credited alongside experiential graphics and fabrication
  partners on this index.
