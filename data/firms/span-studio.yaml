status_basis: >
  Multiple 2025-2026 exhibition and signage projects for the Chicago
  Architecture Center and Intuit Art Museum, including "Currents: 60 Years
  of CAC" and "Flyway City: Architecture for a Flourishing Ecosystem" (both
  opened June 2026); active project listing on span.studio.
status_verified: 2026-07-18
summary: >
  Span Studio is a Chicago-based communication design studio working across
  visual identity, branding, exhibition design, and environmental graphics
  for cultural institutions, civic organizations, and museums. Founded in
  2020 by Bud Rodecker and John Pobojewski, former partners at the Chicago
  studio Thirst; Nick Adam joined as Associate Partner in 2023.
