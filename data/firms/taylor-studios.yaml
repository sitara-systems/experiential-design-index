status_basis: >
  Active company website listing projects through 2025 (Skelton Park
  African American Heritage Trail sculpture, a 2025 National WWI Museum
  trench/triage exhibit refresh) and open job postings for a Senior Project
  Manager and CAD Detailer as of this check; credited on the North Dakota
  Heritage Center expansion (2014), the University of Michigan Museum of
  Natural History's new building (2019), and the National WWI Museum's 2024
  media refresh. Acquired by Innovative Companies Inc. (Proviso Capital) in
  December 2021; founder Betty Brennan remained president and all 35 staff
  retained their positions, with no change to the firm's line of business.
status_verified: 2026-07-18
summary: >
  Taylor Studios is a Rantoul, Illinois-based exhibit design and fabrication
  firm founded in 1991, producing interpretive exhibits, dioramas, custom
  sculptural elements, and environmental graphics for museums, state and
  national parks, zoos, and visitor centers across the United States.
