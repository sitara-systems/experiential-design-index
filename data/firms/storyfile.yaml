summary: >
  StoryFile is a Los Angeles, California company building conversational
  AI video-testimony installations, founded by Heather Maio, who
  previously led the USC Shoah Foundation's Dimensions in Testimony
  project. Museum credits include interactive testimony installations at
  the National WWII Museum, the National Medal of Honor Museum, the
  National Naval Aviation Museum, and the Museum of Kansas City.
