status_basis: >
  Completed One Milestone at Harvard University's Enterprise Research Campus
  (opened June 2026, as architect of record with Studio Gang and Henning
  Larsen); ranked #16 largest architecture firm in Massachusetts by the
  Boston Business Journal (2026) and #9 among Boston's largest architecture
  firms (2025); Banker & Tradesman Best of 2025 Gold awards for commercial
  architecture/design and commercial real estate interior design.
status_verified: 2026-07-18
summary: >
  Arrowstreet is a Boston-based architecture, interior design, and
  environmental/experience graphic design firm founded in 1961 (incorporated
  under founders Jack Myer and Fletcher Ashley; took the Arrowstreet name in
  1973). Alongside its broader architecture and planning practice, its
  in-house graphic design studio produces environmental graphics, wayfinding,
  interpretive panels, and exhibit-adjacent installations for museums,
  libraries, and other civic and cultural clients.
