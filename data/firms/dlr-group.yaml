status_basis: >
  Completed a $150M, 375,000-sq-ft renovation and expansion of the Cleveland
  Museum of Natural History (construction complete December 2024), the
  first U.S. museum to achieve LEEDv4 BD+C New Construction Platinum
  certification; project recognized at the 2025 Prix Versailles. Firm
  maintains an active, continuously updated project portfolio and a
  dedicated Experiential Graphic Design service line.
status_verified: 2026-07-18
summary: >
  DLR Group is a 100%-employee-owned, multidisciplinary architecture and
  engineering firm headquartered in Omaha, Nebraska, founded in 1966,
  with offices across the US plus Dubai and Shanghai. Its practice spans
  K-12 and higher education, sports/athletics, healthcare, justice/civic,
  and cultural building types; in this index it is credited for building
  architecture and, through its in-house Experiential Graphic Design
  practice, environmental graphics and wayfinding on museum and
  educational-campus projects.
