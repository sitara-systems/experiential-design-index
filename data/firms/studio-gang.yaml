summary: >
  Studio Gang is a Chicago-based architecture and urban design practice
  founded by Jeanne Gang in 1997, with additional offices in New York, San
  Francisco, and Paris. Known for the Aqua Tower and other high-profile
  buildings, the firm's work spans architecture, planning, interiors, and
  exhibitions with an emphasis on sustainability and community engagement.
