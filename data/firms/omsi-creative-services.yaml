summary: >
  OMSI Creative Services is the exhibit design and fabrication studio of
  the Oregon Museum of Science and Industry in Portland, Oregon,
  operating one of the largest museum-based production shops in North
  America for more than 35 years. It develops, designs, and fabricates
  traveling exhibitions that debut at OMSI and tour internationally, and
  offers design-build and consulting services to outside institutions.
_comments: >
  Precedent note (editorial review 2026-07-20): this is a division of a
  nonprofit museum — the venue `omsi` in this dataset — recorded as a
  firm because it publicly offers commissionable design-build services to
  outside clients. Distinguished from the Disney/Universal in-house-unit
  exclusion, which covers units that are not engageable. The
  commissioned-work practice is long-standing (independent 2014 coverage
  documents nationwide client work); no publicly named outside-client
  commission with venue + year has been sourced yet — a follow-up target.
  Founded year omitted (shop described as "more than 35 years" old; no
  stated year).
