status_basis: >
  Continuously active lighting/AV design-build practice with a large,
  currently-listed project portfolio (127+ specialty-lighting credits per
  its own site); recent completed US work includes the National Museum of
  African American Music (2021), Museum of Indian Arts & Culture "Here, Now
  and Always" (2022), and the New Jersey Hall of Fame Entertainment and
  Learning Center (2024); named a TIME World's Greatest Places 2026 project
  contributor and an SEGD Honor Award 2025 recipient per its own awards
  page.
status_verified: 2026-07-18
summary: >
  Eos Lightmedia is a specialty lighting and audiovisual design-build firm
  headquartered in Vancouver, British Columbia, founded in 2008. It provides
  lighting design, supply, integration, and controls/programming services
  for museums, themed attractions, civic and public-art installations, and
  architectural and presentation spaces, with additional US facilities in
  Orlando, Florida and New York City.
