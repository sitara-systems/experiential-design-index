status_basis: >
  Leviathan was acquired by Envoy Group in September 2018 and, following
  a year of growth uniting Envoy's agency brands, was fully rebranded to
  "Envoy Chicago" in August 2021 — the Leviathan name was retired at that
  point. All of Leviathan's corpus-credited work (Art Institute of
  Chicago's JourneyMaker, 2016; Madhouse Team Store interactives, 2017;
  McDonald's Global Headquarters interactives, 2018) predates the
  rebrand; no work has appeared under the Leviathan name since.
status_verified: 2026-07-19
summary: >
  Leviathan was a Chicago-based experience design studio (founded 2010)
  known for interactive-media installations blending physical space,
  digital technology, and content design for museums, corporate, and
  retail clients — including the Art Institute of Chicago's JourneyMaker
  touch-table (2016) and McDonald's global headquarters interactives
  (2018). Acquired by Envoy Group in 2018 and folded into the unified
  "Envoy" brand in 2021, ending the Leviathan name.
