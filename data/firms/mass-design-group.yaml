status_basis: >
  Multiple recently completed public memorials and civic projects: The
  Embrace on Boston Common (2023), the Snow Country Prison Japanese American
  Memorial at United Tribes Technical College, Bismarck, ND (2024), and
  Champion's Walk at Corey Ingram Circle, Poughkeepsie, NY (dedicated 2024);
  several more in progress (Swords Into Plowshares, Charlottesville, VA,
  expected 2025; Standing Rock Cultural Center). Won the AIA's 2022
  Architecture Firm Award, its highest honor for a design practice.
status_verified: 2026-07-18
summary: >
  MASS Design Group (Model of Architecture Serving Society) is a Boston-based
  nonprofit architecture and design collective founded in 2008 by Michael
  Murphy and Alan Ricks, known for mission-driven public architecture,
  memorials, and civic spaces addressing justice, memory, and public health,
  including the National Memorial for Peace and Justice and The Embrace on
  Boston Common. It also maintains offices in Kigali, Rwanda; Poughkeepsie,
  New York; and Santa Fe, New Mexico.
