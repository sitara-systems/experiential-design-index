  Northern Light Productions is credited for VR and 180-degree film
  production at the New Jersey Hall of Fame Entertainment and Learning
  Center, which opened to the public in June 2024.
status_verified: 2026-07-18
summary: >
  Northern Light Productions is a documentary film and museum media
  production company based in Boston, founded in 1982 by filmmaker Bestor
  Cram. The company produces orientation films, immersive theater
  experiences, projection mapping, and interactive media and software for
  museums, visitor centers, and cultural institutions across the United
  States.
