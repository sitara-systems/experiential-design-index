status_verified: 2026-07-19
summary: >
  Kei Space Design is an exhibit design collective headquartered in Victoria,
  British Columbia, founded in 2009 by Juan Tanús, with a second studio in
  North Vancouver. It designs interpretive and exhibition spaces for
  museums, science centers, and visitor centers, frequently partnering with
  lighting and AV integration firms such as Eos Lightmedia.
