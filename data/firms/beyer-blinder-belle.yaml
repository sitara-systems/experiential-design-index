status_verified: 2026-07-18
summary: >
  Beyer Blinder Belle is a New York City architecture and planning firm
  founded in 1968 by John H. Beyer, Richard Blinder, and John Belle, with a
  specialty in historic preservation and civic/cultural work. Museum and
  cultural credits include the New York Public Library's Stephen A.
  Schwarzman Building visitor center and Polonsky Exhibition, Cooper Hewitt's
  reopening, the Frick Collection renovation, and Planet Word.
