status_basis: >
  Fabricator of "The People's House: A White House Experience" (Washington,
  DC), opened September 2024, first place in the Museums & Heritage category
  at the 2025 Inavation Awards; company blog active as of November 2025;
  acquired by the French Chargeurs group in 2025 and now operates as the
  American subsidiary of Chargeurs Museum Studio, continuing to produce work
  under the D&P name.
status_verified: 2026-07-18
summary: >
  Design and Production Incorporated (D&P) is a Lorton, Virginia-based
  museum exhibit fabricator founded in 1949, providing exhibit fabrication
  and installation, pre-fabrication consulting, and media/lighting systems
  integration for museums, presidential libraries, and visitor centers
  across the United States. D&P typically fabricates and installs exhibits
  designed by separate exhibit-design firms rather than designing exhibits
  itself. In 2025 D&P was acquired by the French Chargeurs group and now
  operates as the American subsidiary of its Chargeurs Museum Studio
  platform.
