summary: >
  Bearing Architecture (formerly Dangermond Keane Architecture) is a
  Portland, Oregon architecture practice led by principals Steve Dangermond
  and Christopher Keane, working on civic, educational, cultural/museum, and
  institutional projects. The firm rebranded from Dangermond Keane
  Architecture to Bearing Architecture at the same address and phone number,
  with continuous portfolio and staffing.
