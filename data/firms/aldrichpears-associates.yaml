summary: >
  AldrichPears Associates is a Vancouver, British Columbia interpretive
  planning and exhibit design firm founded in 1979 by Ron Pears and Phil
  Aldrich. It works internationally for museums, science centers,
  interpretive centers, zoos, aquariums, botanical gardens, and children's
  museums, including visitor center exhibits at Hoover Dam and Pearl Harbor
  and gallery renewal at the Manitoba Museum.
