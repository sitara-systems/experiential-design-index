status_basis: >
  Completed SFMOMA's "Reimagined: The Fisher Collection at 10" accessibility
  system (opened April 2026) and the Obama Presidential Center's inclusive
  design program (opened June 2026); ongoing museum and digital
  accessibility engagements listed on the firm's own projects page.
status_verified: 2026-07-18
summary: >
  Prime Access Consulting (PAC) is a Raleigh, North Carolina-based
  accessibility and inclusive-design consultancy, founded in 2011, led by
  Sina Bahram and Corey Timpson. It works across museum exhibitions,
  capital building projects, and digital products, developing
  multi-sensory accessibility systems (tactile wayfinding, audio/visual
  description, ASL and touch-object programs) and accessibility interface
  standards such as the Universal Access Point/Universal Keypad
  (Canadian Museum for Human Rights) and its successor the Universal
  Experience Point (Obama Presidential Center).
