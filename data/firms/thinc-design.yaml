summary: >
  Thinc Design is a New York City exhibition design and media studio founded
  in 1992 by Tom Hennes, working across museums, aquariums, zoos, memorials,
  and brand experience centers. The firm's credits include the National
  September 11 Memorial Museum, the Empire State Building's observatory
  experience, and aquarium and natural history exhibits for institutions
  including the California Academy of Sciences and the Cleveland Museum of
  Natural History.
