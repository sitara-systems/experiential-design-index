summary: >
  HGA (Hammel, Green and Abrahamson) is a Minneapolis, MN-based national
  multidisciplinary architecture and engineering firm founded in 1953, with
  offices across the Upper Midwest, West Coast, and East Coast. Within the
  Experiential Design Index, HGA is credited as architect of record on
  museum, cultural center, and visitor-facing institutional building projects.
