status_basis: >
  Architecture credit on three US buildings spanning 2006-2014 (Hearst
  Tower, Yale School of Management's Edward P. Evans Hall, S.C. Johnson's
  Fortaleza Hall); maintains standing New York and San Francisco studios as
  part of an active global practice (~1,500 staff) with ongoing major US
  work (e.g. Apple Park, Cupertino).
status_verified: 2026-07-19
summary: >
  Foster + Partners is a global architecture, urbanism, and design firm
  founded by Norman Foster in London in 1967. Its firm record here reflects
  its North America operating reality: standing studios in New York (record
  HQ) and San Francisco have independently delivered a sustained body of US
  work, including landmark buildings credited on this index for architecture
  alongside environmental-graphics, media-design, and interior partners.
