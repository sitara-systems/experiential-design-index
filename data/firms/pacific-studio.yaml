status_basis: >
  A full portfolio screen (2026-07-19) found the corpus already carried
  15 Pacific Studio credits, not the 4 in the prior basis, including a
  fabrication credit on the Agua Caliente Cultural Museum/Plaza (Palm
  Springs, CA), independently dated to November 2023 via both SEGD's own
  project page and RLMG's own project page — inside the 3-year active
  window. Conflicting signals exist: the company's own domain
  (pacificstudio.com) resolves to a parked for-sale listing, and
  unverified search summaries suggest a Crunchbase "permanently closed"
  tag and a Glassdoor review titled "the Company is now closed" (neither
  independently confirmed with a date). On balance, kept `active` on the
  dated, independently-sourced 2023 credit, but the closure signals are
  real enough to revisit if a future check finds nothing more recent.
status_verified: 2026-07-19
summary: >
  Pacific Studio is a Seattle-based design and fabrication company
  producing museum-quality exhibits, casework, and interactives for
  museums and visitor centers.
