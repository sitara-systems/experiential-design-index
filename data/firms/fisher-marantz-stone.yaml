status_verified: 2026-07-18
summary: >
  Fisher Marantz Stone (FMS) is a New York City-based architectural lighting
  design firm tracing to 1971, when theatrical lighting designer Jules
  Fisher partnered with Paul Marantz. FMS designs lighting for museums,
  performing arts venues, restoration projects, and cultural, academic, and
  civic institutions.
