status_basis: >
  Sit Spot – Reconnecting with the Living World opened at OMSI's Nancy
  Stueber Natural Sciences Hall (April 2026); Netherlands and Philippine
  Pavilions delivered for World Expo 2025 Osaka; active studio site and
  project portfolio maintained as of this check. International portfolio
  re-sweep (2026-07-19) confirmed a substantial non-US/Canada built
  portfolio (Chrome Web Lab, Science Museum London 2012; House of
  Artisans, Abu Dhabi 2021; Queen Maud's Album, Oslo 2017; Biomuseo,
  Panama 2019; UAE and Polish Pavilions, World Expo 2020 Dubai; UAE
  Pavilion, Floriade 2022) alongside its 5 existing US credits. Note: the
  firm's publicly visible current activity centers on its Amsterdam
  studio; the site lists Providence and San Francisco offices, but the
  scale of ongoing US-based operations is not independently established
  in the public record.
status_verified: 2026-07-19
summary: >
  Tellart is an experience design studio incorporated as Tellart LLC in
  Providence, Rhode Island in 2000, whose current public-facing studio
  operates from Amsterdam; it designs interactive installations,
  exhibitions, and multisensory experiences combining custom software,
  robotics, and fabrication for museums, world's fair pavilions, and brand
  experiences.
