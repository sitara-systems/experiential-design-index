status_basis: >
  Architect of record on the Museum of the American Revolution (opened
  2017, Philadelphia) and the George W. Bush Presidential Center (opened
  2013, Dallas); per ENR's own 2025 obituary coverage, RAMSA ranks No. 285
  on ENR's Top 500 Design Firms list with about 300 employees and $82.7M in
  2024 design revenue. Founder Robert A.M. Stern died November 27, 2025; the
  firm issued a statement affirming it remains "committed to carrying forth
  his ideals" and continues practicing under his name.
status_verified: 2026-07-19
summary: >
  Robert A.M. Stern Architects (RAMSA) is a New York-based architecture firm
  founded in 1969 by Robert A.M. Stern, known for classically-inflected
  institutional and residential work including university buildings,
  presidential libraries, and museums such as the Museum of the American
  Revolution and the George W. Bush Presidential Center.
