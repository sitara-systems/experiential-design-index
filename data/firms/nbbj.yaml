status_basis: >
  Named to TIME's 2025 TIME100 Most Influential Companies list (announced
  2025) for its prefabricated healthcare building work; completed the Stad
  Center for Pediatric Pain, Palliative & Integrative Medicine at UCSF in
  January 2025.
status_verified: 2026-07-18
summary: >
  NBBJ is a Seattle-based global architecture, planning, and design firm
  founded in 1943 (originally Naramore, Bain, Brady & Johanson), with offices
  across North America, the UK, and Asia. In 2020 it acquired ESI Design (see
  the separate `esi-design` firm record), which continues to operate under
  its own brand as NBBJ's experience-design studio. In this index NBBJ itself
  is credited for architecture, environmental graphics/wayfinding, and
  fabrication work on experiential building and installation projects,
  alongside its much larger general architecture practice (healthcare,
  workplace, science, education, and civic/cultural work), which is out of
  scope here.
