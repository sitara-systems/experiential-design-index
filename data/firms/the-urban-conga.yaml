  Cappella in Jacksonville, FL (installed May 2026); active studio website
  and press coverage through 2026.
status_verified: 2026-07-18
summary: >
  The Urban Conga is a Brooklyn, NY-based multidisciplinary design studio
  founded by Ryan Swanson (joined by Maeghann Coleman, AIA) that designs and
  fabricates community-co-designed interactive public art installations and
  "playable city" interventions — parks, plazas, housing developments, and
  festival commissions — across the United States.
