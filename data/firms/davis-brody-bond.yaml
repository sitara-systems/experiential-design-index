status_basis: >
  Acquired by multidisciplinary firm Page (announced November 2023); firm
  name, staff, and partners retained and continue to practice as "Davis
  Brody Bond, a Page Company"; firm website and press gallery actively
  maintained; recent credits include the AMNH Richard Gilder Center (opened
  2023) and the Frick Collection Portico Gallery.
status_verified: 2026-07-18
summary: >
  Davis Brody Bond is a New York City architecture firm founded in 1952 by
  Lewis Davis and Samuel Brody as Davis, Brody & Associates, taking its
  current name after a 1990/1996 merger with J. Max Bond Jr.'s Bond Ryder
  Associates. It became a Page company in 2023. Notable museum work includes
  the National September 11 Memorial & Museum, the National Museum of
  African American History and Culture, and the American Museum of Natural
  History's Richard Gilder Center.
