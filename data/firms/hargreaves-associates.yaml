status_basis: >
  Landscape architect of record on the William J. Clinton Presidential
  Center (2004), the Berkeley Art Museum and Pacific Film Archive (2016),
  and NYU Langone's Kimmel Pavilion (2018). Firm's own site (as
  "Hargreaves Jones," the current trading name since Mary Margaret Jones
  became President/CEO) is live and current as of 2026 with three active
  offices.
status_verified: 2026-07-19
summary: >
  Hargreaves Jones (founded 1983 by George Hargreaves as Hargreaves
  Associates) is a landscape architecture and urban design practice with
  offices in New York, San Francisco, and Cambridge, MA, known for
  large-scale waterfront, campus, and urban-park transformations
  including Chattanooga's 21st Century Waterfront and London's 2012
  Olympic Park.
