summary: >
  Two Twelve (legally 212Harakawa Inc.) is a New York-based wayfinding and
  environmental graphic design firm founded in 1980 by David Gibson, Juanita
  Dugdale, and Sylvia Harris, with a second office in Honolulu, working on
  signage and wayfinding systems for sports venues, museums, healthcare, and
  public spaces; a certified minority-owned and woman-owned business
  enterprise.
