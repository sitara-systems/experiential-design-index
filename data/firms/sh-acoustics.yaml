summary: >
  SH Acoustics is a Stamford, Connecticut-based acoustics and audio design
  consultancy led by CEO Steve Haas, working across residential, commercial,
  and museum/exhibit projects; its museum practice spans acoustic design,
  audio-delivery-system design, and calibration for exhibit galleries,
  theaters, and multimedia installations at institutions including the
  Smithsonian's National Museum of African American History and Culture, the
  Museum of the Bible, the Statue of Liberty Museum, and the Obama
  Presidential Center Museum.
