status_basis: >
  Its XTG (Experience Technology Group) division delivered the AV system for
  SeaWorld San Diego's "Jewels of the Sea: The Jellyfish Experience," which
  opened March 15, 2025 and is documented on AVI-SPL's own site.
status_verified: 2026-07-18
summary: >
  AVI-SPL is a Tampa, Florida-based audiovisual systems integrator formed in
  2008 from the merger of Audio Visual Innovations (founded 1979) and Signal
  Perfection Ltd. Its Experience Technology Group (XTG) division delivers AV
  integration and media-design work for museums, attractions, and brand
  experiences alongside the firm's larger enterprise AV/UC business.
