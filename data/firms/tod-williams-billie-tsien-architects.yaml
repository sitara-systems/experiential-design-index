summary: >
  Tod Williams Billie Tsien Architects is a New York-based architecture
  firm founded in 1986 by Tod Williams and Billie Tsien, focused on
  institutional work for museums, schools, and nonprofit organizations,
  including the American Folk Art Museum, the Barnes Foundation, the Hood
  Museum of Art, David Geffen Hall at Lincoln Center, and the Obama
  Presidential Center.
