summary: >
  Skidmore, Owings & Merrill (SOM) is a global architecture, engineering,
  and urban design firm founded in Chicago in 1936, with offices across the
  US and internationally. In this index SOM is credited for architecture
  and, through its in-house Graphics and Brand Studio, environmental
  graphics, wayfinding, and exhibit design on institutional and civic
  projects, alongside its much larger general architecture practice, which
  is out of scope here.
