status_basis: >
  Yakyu | Baseball exhibit opened at the National Baseball Hall of Fame and
  Museum (2025); The Dot Experience at the American Printing House for the
  Blind in progress (expected 2026); National Susan B. Anthony Museum & House
  Interpretive Center announced (expected 2026); internal ownership
  succession completed June 2024 with founder Cynthia Torp transitioning to
  Board Chair.
status_verified: 2026-07-18
summary: >
  Solid Light is a Louisville, Kentucky-based museum design-build studio,
  founded in 1999 by Cynthia Torp, that keeps exhibit design, interactive
  media, film/content production, and fabrication in-house on projects
  including distillery visitor experiences, history and civil rights
  museums, and interpretive centers.
