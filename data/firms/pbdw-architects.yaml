status_basis: >
  Architecture credit on the Palace Theatre Restoration (TSX Broadway),
  fully reopened November 2024, and executive/associate architect on
  Powerhouse Arts (Brooklyn, 2023, with Herzog & de Meuron); active firm
  marking its 60th anniversary (traced to Charles Platt's 1965 practice).
status_verified: 2026-07-19
summary: >
  PBDW Architects is a New York City architecture firm tracing its
  founding to Charles Platt's 1965 practice, formally merged into Platt
  Byard Dovell White Architects in 2001, known for cultural, preservation,
  and institutional work including New-York Historical Society galleries
  and multiple Broadway theater restorations.
