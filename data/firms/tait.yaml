summary: >
  TAIT is a Lititz, Pennsylvania-based staging, show-technology, and
  experiential media integrator founded in 1978, providing exhibit design,
  media design and software, AV integration, and fabrication for museums,
  attractions, and other fixed-installation experiential projects in
  addition to its large-scale touring and live-event production business
  (out of scope for this index). TAIT acquired Thinkwell Group, a themed
  entertainment and museum exhibit design studio, whose museum and
  attraction credits now appear as TAIT's own ("produced by Thinkwell, now
  tait" on TAIT's project pages).
