summary: >
  Creative Technology (CT), founded in 1986 in Crawley, England and now
  part of NEP Group, is a global audiovisual production and systems
  integration company operating from 30+ offices worldwide, including a
  Chicago office that performs AV integration and installation work for
  Chicago-area and Midwest museum and cultural-venue exhibits. Distinct
  from the unrelated Singapore-founded electronics company also named
  Creative Technology (maker of Sound Blaster audio hardware).
