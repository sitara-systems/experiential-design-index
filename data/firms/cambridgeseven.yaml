status_basis: >
  Continuously active since 1962; recent and in-progress work includes the
  Virginia Aquarium South Building and Vet Center reopening (2024), the Mote
  Science Education Aquarium (opened October 2025), and the Seneca Park Zoo
  Entry and Tropics Pavilion (announced 2025, under construction, expected
  completion 2028); firm website lists current job openings.
status_verified: 2026-07-18
summary: >
  CambridgeSeven (formerly Cambridge Seven Associates) is a Cambridge,
  Massachusetts architecture, master planning, and exhibit design firm
  founded in 1962 by seven architects, designers, and artists including
  Peter Chermayeff. It is best known for pioneering integrated
  architecture-and-exhibit design at public aquariums, beginning with the
  New England Aquarium (1969) and the National Aquarium in Baltimore (1981),
  and has since completed museum, aquarium, science center, sports hall of
  fame, and cultural-institution projects across the United States.
