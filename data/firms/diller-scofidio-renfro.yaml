status_verified: 2026-07-18
summary: >
  Diller Scofidio + Renfro is a New York City interdisciplinary architecture
  studio founded in 1981 by Elizabeth Diller and Ricardo Scofidio as Diller +
  Scofidio; Charles Renfro joined in 1997 and became partner in 2004, when
  the firm took its current name. Known for integrating architecture with
  visual and performing arts, its museum work includes the Cooper Hewitt
  reopening and interactive tables, and the United States Olympic &
  Paralympic Museum galleries.
