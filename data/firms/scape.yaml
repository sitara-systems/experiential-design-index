status_basis: >
  Lead landscape architect on Tom Lee Park in Memphis (opened 2023) and
  the Arkansas Museum of Fine Arts renovation (2023); named landscape
  architect on the announced MOSH Genesis project in Jacksonville
  (expected 2028). Firm's own site describes an active, 80+ person
  practice with offices in three cities as of 2026.
status_verified: 2026-07-19
summary: >
  SCAPE is a New York-headquartered landscape architecture and urban
  design studio founded in 2005 by Kate Orff, with additional offices in
  New Orleans and San Francisco. The firm focuses on climate-resilient,
  ecologically engaged public landscapes, waterfronts, and parks, and has
  received the Cooper Hewitt National Design Award (2019) and the Obel
  Award (2023).
