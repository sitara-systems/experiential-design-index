summary: >
  The Exhibits Dept. is a Pacific Grove, California-based boutique exhibit
  design studio, founded 2022 by principals Sarah Bartlett, Bart Hays, and
  Travis Wood, providing exhibit design, content development, and media
  design for museums, nature centers, and aquariums — often supplementing
  in-house institutional staff or partnering with architecture and
  fabrication firms on full-service delivery.
