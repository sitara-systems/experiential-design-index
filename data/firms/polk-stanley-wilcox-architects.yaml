status_basis: >
  Associate architect on the Robinson Center Performing Arts Complex
  renovation (Little Rock, 2016/2017) and the William J. Clinton
  Presidential Center joint venture; firm's own site lists an active,
  50-person practice with 800+ completed commissions and ongoing project
  news as of 2026.
status_verified: 2026-07-19
summary: >
  Polk Stanley Wilcox Architects is a Little Rock, Arkansas-based
  architecture firm founded in 1977 (originally Polk Shannon Stanley
  Architects), with a second office in Fayetteville, AR. The firm works
  broadly across institutional, cultural, and higher-education
  architecture and frequently serves as associate architect or architect
  of record alongside out-of-state design architects on Arkansas cultural
  projects.
