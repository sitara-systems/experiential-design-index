summary: >
  Dome (also known as Dome Collective) is a Brooklyn, New York experience
  design studio founded in 2014 by Lynn Kiang and Katie Lee, working on
  digital media strategy, interaction design, and interactive installations
  for museums and cultural institutions. It is certified as a Minority
  Women-Owned Business Enterprise (M/WBE) in New York City and State.
