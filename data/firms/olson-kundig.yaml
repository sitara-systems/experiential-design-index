  Digest's AD100 list for the 11th consecutive year (2024); active project
  portfolio and firm news published on olsonkundig.com through 2026.
status_verified: 2026-07-18
summary: >
  Olson Kundig is a Seattle-based architecture firm founded by Jim Olson in
  1966, with additional offices in New York City and Chicago. Beyond its
  broader residential and commercial practice, the firm is credited as
  architect of record on numerous museums, visitor centers, and cultural
  buildings across the United States, frequently designing exhibit spaces and
  interior architecture in addition to the building envelope.
