summary: >
  Beaudry Interactive is a Los Angeles-area experiential technology studio
  founded in 2006, specializing in interaction design, custom electronics,
  software and hardware development, and real-time show control for
  museums, science centers, and themed entertainment. It typically serves
  as the interactive-technology specialist within larger exhibit teams.
_comments: >
  Role identity: engageable standalone for the interactive/show-software
  layer — on each recorded project it was the interactive specialist under
  a separate lead designer (MDSX at the Franklin Institute, Chick Russell
  at the Atomic Museum). A claimed Chicago office could not be verified
  from any public source and is omitted.
