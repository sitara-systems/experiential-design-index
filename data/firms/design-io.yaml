summary: >
  Design I/O is an interactive installation studio founded in 2010 by
  Emily Gobeille and Theodore Watson, based in Petaluma, California and
  Brooklyn, New York, creating immersive, gesture- and movement-driven
  interactive installations for museums, science centers, and public
  spaces, with deep roots in the openFrameworks creative-coding
  community. It won the Cooper Hewitt National Design Award for Digital
  Design in 2020.
