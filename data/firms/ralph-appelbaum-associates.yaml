summary: >
  Ralph Appelbaum Associates is a New York-based museum exhibition design and
  interpretive planning firm founded in 1978 by Ralph Appelbaum, with
  additional offices in London, Berlin, and Beijing; it describes itself as
  the world's largest practice dedicated to the planning and design of
  museums and narrative environments.
