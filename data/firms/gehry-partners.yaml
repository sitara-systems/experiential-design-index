status_basis: >
  Firm continues to operate with a staff of over 100 following founder Frank
  Gehry's death on December 5, 2025 (age 96); in-progress projects at time of
  his death included the Colburn School expansion and Guggenheim Abu Dhabi,
  per multiple obituaries (NPR, Washington Post, Architectural Record).
status_verified: 2026-07-18
summary: >
  Gehry Partners, LLP is a Los Angeles architecture firm established by
  Frank Gehry in 1962 (as Frank O. Gehry and Associates; renamed Gehry
  Partners in 2001), known for landmark works including the Walt Disney
  Concert Hall and the Guggenheim Museum Bilbao. Museum and cultural credits
  in this index include the Jay Pritzker Pavilion at Millennium Park, the
  Museum of Pop Culture, and wayfinding/core project work at the
  Philadelphia Museum of Art.
