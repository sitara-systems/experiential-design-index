status_basis: >
  Credited as architect on multiple recently completed cultural/institutional
  projects: The Pulse at ASU's Beus Center for Law and Society (2016),
  Signage at PEM alongside the firm's Peabody Essex Museum expansion wing
  (opened 2019), the Jean & Ric Edelman Fossil Park & Museum of Rowan
  University (opened 2025), and the David H. Koch Center for Cancer Care at
  Memorial Sloan Kettering (opened 2020). Merged with CannonDesign in April
  2026 but continues practicing as a distinct studio ("Ennead, a CannonDesign
  company") per the firms' joint announcement.
status_verified: 2026-07-18
summary: >
  Ennead Architects is a New York City-based architecture firm founded in
  1963 (as James Stewart Polshek and Associates, renamed Ennead in 2010),
  known for museum, library, and cultural-institution architecture; became a
  CannonDesign company in April 2026 while continuing to practice under the
  Ennead name.
