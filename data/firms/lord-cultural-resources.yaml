status_basis: >
  Interpretive planning credit on Museum of the Rockies' Cretaceous Crossroads
  exhibition (opened July 2025), the Royal Ontario Museum's Connection
  Stations (opened March 2025), and the Harry J. Enns Wetland Discovery
  Centre reopening at Oak Hammock Marsh (opened May 2025); active published
  project portfolio and press activity through 2026. Museum Studio (a
  Chargeurs Group company) acquired a 51% majority stake, announced April
  10, 2025; Gail Lord remains active, CEO is now Delphine de Canecaude.
status_verified: 2026-07-19
summary: >
  Lord Cultural Resources is a Toronto-based cultural planning consultancy
  founded in 1981 by Gail and Barry Lord, providing master planning and
  interpretive planning services to museums, cultural districts, science
  centres, and visitor attractions, with additional offices in New York,
  Culver City CA, and Mumbai.
