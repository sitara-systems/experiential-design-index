status_basis: >
  Founded 1994; acquired by SapientNitro in 2012 and became part of Publicis
  following Publicis's 2015 acquisition of Sapient. In 2020 Publicis realigned
  Second Story's talent, capabilities, and work into Razorfish (Campaign US,
  2020-07-02). As of this check, secondstory.com redirects to
  razorfish.com/second-story/, and current Razorfish case-study pages credit
  work to "Second Story, part of Razorfish" rather than to Second Story as a
  standalone firm — evidence of a fully absorbed sub-brand/team rather than an
  independently operating studio.
status_verified: 2026-07-18
summary: >
  Second Story was a Portland, Oregon interactive design studio founded in
  1994 by Brad Johnson and Julie Beeler, known for narrative-driven
  interactive media and exhibit installations for museums, cultural
  institutions, and brands. Acquired by SapientNitro in 2012 and folded into
  Publicis Sapient in 2015, its talent and work were realigned into Razorfish
  in 2020, where its projects are now credited as "Second Story, part of
  Razorfish."
