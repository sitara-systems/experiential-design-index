summary: >
  HKS is a Dallas-based international architecture firm founded in 1939 by
  Harwood K. Smith, with more than 1,400 staff across offices worldwide. It
  is one of the leading sports-and-entertainment architecture practices in
  the US, credited with AT&T Stadium, SoFi Stadium, U.S. Bank Stadium,
  American Airlines Center, and the Cosm immersive-dome entertainment
  venues, alongside performing-arts venues including YouTube Theater and
  the Dr. Marcelo Cavazos Center for Visual and Performing Arts.
