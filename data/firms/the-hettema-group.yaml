  opened late 2023 and won a Thea Award for Outstanding Achievement (31st
  Annual, announced November 2024); active project gallery maintained on
  thgcreative.com as of this check.
status_verified: 2026-07-18
summary: >
  THG Creative is a Pasadena, California-based experience design studio
  founded by Phil Hettema in 2002 as The Hettema Group, creating
  attractions, exhibits, and immersive theatrical experiences for museums,
  theme parks, and observation venues. It took its current name after a
  2022 merger with Pasadena-based themed-entertainment design firm
  Themespace.
