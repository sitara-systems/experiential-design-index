status_basis: >
  Mood Media currently markets Technomedia as its advanced AV
  integration/media division (moodmedia.com, checked 2026-07-18); LinkedIn
  company page lists an active current workforce (~82 employees); won
  three 2020 Thea Awards from the Themed Entertainment Association for
  Hagrid's Magical Creatures Motorbike Adventure, Millennium Falcon:
  Smugglers Run, and Star Wars: Galaxy's Edge.
status_verified: 2026-07-18
summary: >
  Technomedia (Technomedia Solutions, LLC), founded in Orlando, Florida in
  2001 and acquired by Mood Media in 2012, is an advanced AV systems
  integrator providing design, engineering, and integration of large-scale
  immersive audio-visual and media systems for themed entertainment
  attractions, museums, and corporate environments.
