status_basis: >
  Closed July 2025 per the closure notice on the firm's own website;
  parent Medici XD (Nashville, formed November 2021, Mousetrappe a
  subsidiary from 2021) is also apparently defunct — its domain no longer
  resolves. Final years of activity include Expressions of America (2022)
  and the Freedom Theater (2023) at the National WWII Museum.
status_verified: 2026-07-20
summary: >
  Mousetrappe was a Burbank, California media design and production studio
  founded in 2005 by Daren Ulmer, producing show media for museums, theme
  parks, and attractions, including the National WWII Museum's Beyond All
  Boundaries and Expressions of America and the media for Space Shuttle
  Atlantis at Kennedy Space Center Visitor Complex. It operated as a
  subsidiary of Medici XD from 2021 and closed in July 2025.
