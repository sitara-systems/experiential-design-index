summary: >
  ESI Design is a New York experience-design studio founded by Edwin
  Schlossberg in 1977, known for weaving interactive and architectural media
  into museums, cultural institutions, and corporate/commercial spaces; NBBJ
  acquired the studio in February 2020, and it now operates as ESI Design, an
  NBBJ Company, with Schlossberg continuing to lead it as an NBBJ partner.
