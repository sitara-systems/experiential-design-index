status_verified: 2026-07-18
summary: >
  Crafted Action is a Philadelphia-based innovation consultancy specializing
  in Experiential Master Planning (EMP), a trademarked process integrating
  spatial, technology, and operational strategy for museums, performing-arts
  venues, and nonprofit and corporate clients. Founded in 2014 by architect
  Brad Krauskopf, the firm leads clients through experience strategy,
  interpretive planning, and exhibit and media design, typically coordinating
  fabrication and AV integration partners rather than executing those
  disciplines in-house.
