summary: >
  Potion Design was a New York interactive design and media studio founded in
  2005 by MIT Media Lab alumni Jared Schiffman and Phillip Tiongson,
  producing interactive exhibits, kiosks, and apps for museums including the
  Cleveland Museum of Art, the Rubin Museum, the National WWI Museum and
  Memorial, and the New York Public Library. In May 2024 it was acquired by
  the experience-design agency Hyperquake and its brand was absorbed into
  Hyperquake's operations.
