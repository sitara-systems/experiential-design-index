summary: >
  Three Dimensional Services (3DS) is a museum and exhibit fabrication firm
  headquartered in Delta, British Columbia, founded in 1980, with additional
  offices in Toronto, Ontario and Grand Rapids, Michigan. It builds exhibit
  casework, interactive science-center displays, and interpretive
  environments for museums, cultural centers, and visitor attractions across
  North America.
