status_basis: >
  Own project pages actively maintained (Heart of Africa at Columbus Zoo,
  Zoo Miami Mission Everglades, Permian Basin Petroleum Museum) and
  continued operation as a themed-construction/fabrication contractor for
  major theme park and museum clients (Disney, Universal) as of this check;
  acquired by general contractor PCL in May 2023, which did not end
  independent operations under the Nassal name.
status_verified: 2026-07-18
summary: >
  The Nassal Company is an Orlando, Florida-based themed-environment
  fabricator specializing in rockwork, scenic painting, architectural
  metals, and immersive-environment construction for theme parks, zoos,
  aquariums, museums, and resorts. Founded in 1984, it operates as "The
  Companies of Nassal" (including the related Lexington brand, tracked as a
  separate index record) and was acquired by general contractor PCL in 2023.
