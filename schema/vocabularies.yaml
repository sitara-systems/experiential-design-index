# Firm activity status — evidence-based, always dated (see editorial policy).
firm_statuses:
  - id: active
    label: Active
    note: >
      Public evidence of activity within the last 3 years: a completed or
      announced project, award entry, hiring, publications, or substantive
      website/press activity. Basis and verification date recorded on the
      firm record.
  - id: unclear
    label: Activity Unclear
    note: >
      No public evidence of activity found within the last 3 years, but no
      confirmation the firm has closed. Displayed prominently, not hidden.
  - id: inactive
    label: Inactive
    note: >
      Confirmed closed, merged, or absorbed — or no public activity for 5+
      years. Records are kept (the historical credits remain part of the
      record); successor firm linked where known.

