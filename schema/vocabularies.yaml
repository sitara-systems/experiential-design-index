# Controlled vocabularies for The Experiential Design Index.
# All enum-valued fields in data/ must use values defined here.
# Adding a value is a deliberate editorial act — extend via PR with rationale.

# The role a firm played on a project (a project credits the full delivery
# stack; a firm record lists the roles it offers). One firm may hold multiple
# roles on one project.
roles:
  - id: architecture
    label: Architecture
    note: Building or interior architecture of record
  - id: master-planning
    label: Master Planning
    note: Campus / venue / visitor-experience master planning
  - id: exhibit-design
    label: Exhibit Design
    note: Exhibition and environment design (spatial, interpretive layout)
  - id: interpretive-planning
    label: Interpretive Planning
    note: Content strategy, narrative, and interpretive frameworks
  - id: media-design
    label: Media Design & Software
    note: Interactive experiences, custom software, real-time media systems
  - id: content-production
    label: Content Production
    note: Film, video, audio, and linear media production
  - id: av-integration
    label: AV Integration
    note: Audiovisual systems engineering, integration, and installation
  - id: fabrication
    label: Fabrication
    note: Exhibit fabrication, casework, mounts, scenic construction
  - id: lighting-design
    label: Lighting Design
  - id: graphics-wayfinding
    label: Environmental Graphics & Wayfinding
  - id: technical-consulting
    label: Technical Consulting / Owner's Representation
    note: Technology master planning, owner's-side technical oversight
  - id: landscape-architecture
    label: Landscape Architecture
    note: Landscape and site design for experiential projects
  - id: acoustics
    label: Acoustic Consulting
    note: Acoustic design and consulting for experiential spaces
  - id: accessibility-consulting
    label: Accessibility / Inclusive Design Consulting
    note: ADA and inclusive-design consulting for exhibitions and venues
# Intentionally NOT roles (editorial decisions 2026-07-18, do not re-flag):
# general contracting/construction engineering, photography, and
# product/equipment manufacturers (loudspeaker, display, projector makers —
# a manufacturer whose product was used is not a delivery-stack credit).
# All appear in project credit lists but are outside the experiential
# delivery stack this index documents — leave those credits out of records.
# "Museum consulting" as a distinct role: parked at the recurrence bar
# (2026-07-18) — map to the closest existing role or omit; re-raise only
# after 3 independent flags.

# Project type — a proxy for scope and scale, from ground-up construction
# down to a single installation.
project_types:
  - id: new-building
    label: New Building
    note: Ground-up building or new wing, including its experiential program
  - id: major-renovation
    label: Major Renovation
    note: Building-scale renovation or full venue re-imagining
  - id: new-exhibition
    label: New Exhibition
    note: New permanent exhibition or gallery within an existing venue
  - id: exhibition-refresh
    label: Exhibition Refresh
    note: Substantial update of an existing exhibition
  - id: temporary-exhibition
    label: Temporary Exhibition
    note: Limited-run exhibition
  - id: traveling-exhibition
    label: Traveling Exhibition
  - id: installation
    label: Installation
    note: Single standalone experience, media piece, or interactive

# Technology tags — a small, controlled vocabulary of genuine capability
# DIFFERENTIATORS (editorial decision 2026-07-18). Commodity capabilities —
# UI/UX, film/video, content production, standard touchscreen interactives —
# are deliberately untagged and should never be proposed as tags. A tag
# applies to a project ONLY when the project's cited public sources support
# it (physical form and function as documented — never a firm's general
# capability claims, never "immersive"/"interactive" as marketing language).
# Projects carry tags in the optional `technology_tags` field; the free-text
# `technologies` field remains for description.
technology_tags:
  - id: immersive-environment
    label: Immersive Environment
    note: >
      Room-scale enclosing media — projection-mapped rooms, LED volumes,
      domes, 360° audiovisual spaces. Tag on documented physical form (the
      media surrounds the visitor), never on "immersive" as an adjective.
  - id: interactive-installation
    label: Interactive Installation
    note: >
      Installation-scale pieces whose behavior is driven by visitor input
      through sensing — gesture, body tracking, tangible objects, physical
      mechanisms. Excludes touchscreen/kiosk UI and passive media walls.
  - id: artificial-intelligence
    label: AI / Machine Learning
    note: >
      AI/ML drives the visitor-facing experience — generative content,
      computer-vision-driven response, conversational agents in the space.
      Use of AI tools in the design or production process does not qualify.
  - id: robotics
    label: Robotics & Kinetic Systems
    note: >
      Robotic or motion-controlled physical elements — robot arms, kinetic
      sculpture, motorized scenic, custom animatronics.
  - id: real-time
    label: Real-Time Graphics
    note: >
      Content rendered live at runtime (game engines and generative systems
      — e.g. Unreal, Unity, Notch, TouchDesigner, custom engines) rather
      than pre-rendered playback. Requires engine/tooling evidence in
      sources.

# Platforms — commercial products/software a project was built on, tracked
# as PROJECT ATTRIBUTES (editorial decision 2026-07-19). This does NOT
# change the standing rule that manufacturers are never delivery-stack
# credits — a product used is an attribute, not a firm credit. Evidence
# bar: a project's cited sources must name the product on THAT project;
# manufacturer/vendor deployment case-study pages are valid public sources
# (same precedent as firm portfolios — public even if self-authored).
